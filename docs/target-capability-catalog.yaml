version: 1
kind: target_product_capability_catalog
title: TheMuffinMan production-ready target capabilities
description: >
  Target product contract for the complete user-facing capabilities TheMuffinMan
  should provide. This describes intended scope, not implementation status.
  Current implementation status and evidence remain in docs/capability-inventory.yaml.
last_reviewed: 2026-07-16
source_documents:
  - docs/product-vision.md
  - docs/product-memory.md
  - docs/business-logic.md
  - docs/domain-technical.md
  - docs/capability-inventory.yaml
  - docs/agent-operating-model.yaml
surface_definitions:
  vision: Adaptive conversational or voice-guided surface with visual feedback.
  web_ui: Direct browser surface using the shared authenticated shell.
  mobile: Native mobile client surface.
  watch: Focused Watch interaction or backend handoff surface.
  api: Backend contract available to supported clients.
modules:
  - id: platform
    name: Platform and identity
    objects:
      - {id: account, name: Account, capability_ids: [platform.account.register, platform.account.authenticate, platform.account.logout, platform.account.recover]}
      - {id: profile, name: User profile, capability_ids: [platform.profile.view_own, platform.profile.view_other, platform.profile.update, platform.profile.view_reviews, platform.profile.manage_visibility]}
      - {id: location, name: Location preference, capability_ids: [platform.location.set_preference, platform.location.control_visibility, platform.location.use_current, platform.location.resolve]}
  - id: vision
    name: Adaptive command surface
    objects:
      - {id: task, name: Vision task, capability_ids: [vision.task.start, vision.task.continue, vision.task.review, vision.task.confirm, vision.task.cancel, vision.task.resume]}
      - {id: discovery, name: Discovery result, capability_ids: [vision.discovery.search, vision.discovery.compare, vision.discovery.open_detail]}
  - id: work
    name: Work marketplace
    objects:
      - {id: quest, name: Work opportunity, capability_ids: [work.quest.create, work.quest.view_own, work.quest.view_other, work.quest.discover, work.quest.update, work.quest.publish, work.quest.pause, work.quest.cancel, work.quest.start, work.quest.complete, work.quest.reopen, work.quest.confirm_terms, work.quest.reject_terms, work.quest.delete, work.quest.set_visibility, work.quest.manage_workers]}
      - {id: application, name: Work application, capability_ids: [work.application.create, work.application.view_own, work.application.review, work.application.update, work.application.withdraw, work.application.decide, work.application.view_detail, work.application.create_review]}
      - {id: dashboard, name: Work dashboard, capability_ids: [work.dashboard.view]}
      - {id: notification, name: Work notification, capability_ids: [work.notification.mark_read, work.notification.mark_all_read]}
  - id: circles
    name: Circles and relationships
    objects:
      - {id: circle, name: Circle, capability_ids: [circles.circle.create, circles.circle.view_own, circles.circle.view_other, circles.circle.update, circles.circle.archive, circles.circle.discover]}
      - {id: membership, name: Circle membership, capability_ids: [circles.membership.invite, circles.membership.accept, circles.membership.decline, circles.membership.cancel_invite, circles.membership.remove, circles.membership.leave]}
  - id: chat
    name: Shared chat
    objects:
      - {id: conversation, name: Conversation, capability_ids: [chat.conversation.open, chat.conversation.create_group, chat.conversation.view, chat.conversation.mark_read, chat.conversation.reconnect, chat.conversation.leave]}
      - {id: message, name: Chat message, capability_ids: [chat.message.send, chat.message.view, chat.message.edit, chat.message.reply, chat.message.react, chat.message.attach, chat.message.view_attachment]}
  - id: business
    name: Business profiles and booking
    objects:
      - {id: profile, name: Business profile, capability_ids: [business.profile.create, business.profile.view_public, business.profile.update, business.profile.gallery_manage]}
      - {id: offering, name: Business offering, capability_ids: [business.offering.create, business.offering.view_public, business.offering.update, business.offering.archive]}
      - {id: booking, name: Appointment booking, capability_ids: [business.booking.create, business.booking.view_own, business.booking.review, business.booking.confirm, business.booking.reject, business.booking.cancel, business.booking.complete, business.booking.no_show, business.booking.reschedule, business.booking.view_calendar]}
      - {id: availability, name: Business availability, capability_ids: [business.availability.manage]}
  - id: sharing
    name: Things and rides sharing
    objects:
      - {id: thing, name: Thing listing, capability_ids: [sharing.thing.create, sharing.thing.view_other, sharing.thing.discover, sharing.thing.update, sharing.thing.archive, sharing.thing.view_own]}
      - {id: borrow, name: Borrow request, capability_ids: [sharing.borrow.request, sharing.borrow.view_own, sharing.borrow.decide, sharing.borrow.cancel, sharing.borrow.return]}
      - {id: ride, name: Voluntary ride, capability_ids: [sharing.ride.create, sharing.ride.discover, sharing.ride.update, sharing.ride.join, sharing.ride.leave, sharing.ride.cancel, sharing.ride.complete]}
  - id: cross_module
    name: Shared product capabilities
    objects:
      - {id: search, name: Cross-module search, capability_ids: [cross_module.search.discover, cross_module.search.filter, cross_module.search.compare]}
      - {id: notification, name: Notification, capability_ids: [cross_module.notification.receive, cross_module.notification.view, cross_module.notification.mark_read, cross_module.notification.manage_preferences]}
      - {id: shell, name: Adaptive product shell, capability_ids: [cross_module.shell.navigate, cross_module.shell.render_context]}
      - {id: handoff, name: Native client handoff, capability_ids: [cross_module.handoff.mobile, cross_module.handoff.watch]}
      - {id: auditability, name: Product traceability, capability_ids: [cross_module.auditability.trace]}

capabilities:
  - {id: platform.account.register, module: platform, object: account, action: register, type: mutation, name: Create an account, actor: visitor, priority: critical, target_surfaces: {vision: false, web_ui: true, mobile: true, watch: false, api: true}, access: {scope: public, consent_required: false, privacy_rule: Account data is private by default.}, outcome: User creates a usable account and receives an authenticated session., failure_behavior: Explain invalid or duplicate input without creating a partial account., acceptance: [Required fields are validated, Credentials are protected, Registration is safely retryable], current_inventory_ids: [platform.account.register]}
  - {id: platform.account.authenticate, module: platform, object: account, action: authenticate, type: mutation, name: Log in, actor: visitor, priority: critical, target_surfaces: {vision: false, web_ui: true, mobile: true, watch: false, api: true}, access: {scope: public, consent_required: false, privacy_rule: Credentials and session data are private.}, outcome: User enters the authenticated product shell., failure_behavior: Show a safe authentication error without revealing whether an account exists., acceptance: [Valid credentials create a session, Invalid credentials fail safely, Session expiry is recoverable], current_inventory_ids: [platform.account.authenticate]}
  - {id: platform.account.logout, module: platform, object: account, action: logout, type: lifecycle, name: Log out, actor: authenticated_user, priority: high, target_surfaces: {vision: false, web_ui: true, mobile: true, watch: true, api: true}, access: {scope: authenticated, consent_required: false, privacy_rule: Session is invalidated.}, outcome: User leaves the authenticated session safely., failure_behavior: Local session state is cleared even if remote invalidation is unavailable., acceptance: [Protected surfaces require re-authentication after logout], current_inventory_ids: [platform.account.logout]}
  - {id: platform.profile.view_own, module: platform, object: profile, action: view_own, type: query, name: View own profile, actor: authenticated_user, priority: high, target_surfaces: {vision: true, web_ui: true, mobile: true, watch: false, api: true}, access: {scope: owner, consent_required: false, privacy_rule: User can see their permitted profile data.}, outcome: User sees identity and profile information relevant to them., failure_behavior: Show a recoverable read error without misleading stale data., acceptance: [Own data is complete, Sensitive fields are not exposed to others], current_inventory_ids: [platform.profile.view_own]}
  - {id: platform.profile.view_other, module: platform, object: profile, action: view_other, type: query, name: View another user's profile, actor: authenticated_user, priority: critical, target_surfaces: {vision: true, web_ui: true, mobile: true, watch: false, api: true}, access: {scope: authenticated, consent_required: true, privacy_rule: Show only fields allowed by visibility and relationship rules.}, outcome: User understands another participant's identity and trust context., failure_behavior: Explain unavailable or restricted profiles without leaking private data., acceptance: [Visibility is backend-enforced, Trust signals are contextual, Restricted data is omitted], current_inventory_ids: [platform.profile.view_other]}
  - {id: platform.profile.update, module: platform, object: profile, action: update, type: mutation, name: Update own profile, actor: authenticated_user, priority: high, target_surfaces: {vision: true, web_ui: true, mobile: true, watch: false, api: true}, access: {scope: owner, consent_required: false, privacy_rule: User controls permitted profile fields.}, outcome: User saves profile changes and sees the updated representation., failure_behavior: Preserve the previous valid profile and identify fields requiring correction., acceptance: [Only editable fields change, Validation is deterministic, Successful changes are reflected in reads], requires_confirmation: true, current_inventory_ids: [platform.profile.update]}
  - {id: platform.location.set_preference, module: platform, object: location, action: set_preference, type: mutation, name: Set location preference, actor: authenticated_user, priority: high, target_surfaces: {vision: true, web_ui: true, mobile: true, watch: false, api: true}, access: {scope: owner, consent_required: false, privacy_rule: Exact location is never implied by locality preference.}, outcome: User controls locality-aware discovery., failure_behavior: Explain provider or input failure and retain the last valid preference., acceptance: [Manual correction is possible, Discovery uses the saved preference, Permission denial is recoverable], current_inventory_ids: [platform.location.set_preference]}
  - {id: platform.location.control_visibility, module: platform, object: location, action: control_visibility, type: mutation, name: Control location visibility, actor: authenticated_user, priority: high, target_surfaces: {vision: true, web_ui: true, mobile: true, watch: false, api: true}, access: {scope: owner, consent_required: false, privacy_rule: User chooses whether and how location is shared.}, outcome: User understands and controls location exposure., failure_behavior: Do not widen visibility when a setting update fails., acceptance: [Visibility scope is explicit, Backend enforces scope, UI explains the consequence], current_inventory_ids: [platform.location.control_visibility]}

  - {id: work.quest.create, module: work, object: quest, action: create, type: mutation, name: Create a new work opportunity, actor: authenticated_user, priority: critical, target_surfaces: {vision: true, web_ui: true, mobile: true, watch: false, api: true}, access: {scope: authenticated, consent_required: false, privacy_rule: Visibility is selected by the owner.}, outcome: User creates a draft and can publish it after review., failure_behavior: Keep valid draft data and identify missing or invalid fields., acceptance: [Minimum fields are collected, Review is available, Publish is explicit, Location and schedule are validated], requires_confirmation: true, resulting_states: [draft], current_inventory_ids: [work.quest.create]}
