catalog_rules:
  production_ready_requires:
    - Every capability has a valid module and object reference.
    - Every capability has at least one target surface.
    - Every mutation or lifecycle capability defines failure behavior and acceptance criteria.
    - Every consent-required capability defines a privacy rule.
    - Every current inventory link resolves to docs/capability-inventory.yaml.
    - Every documented inventory module is represented in this catalog.
  current_state_note: >
    A target capability can have an empty current_inventory_ids list. That means
    the requirement is currently unmapped, not that it is implemented.
 # BUSINESS-BOOKING-RUNTIME-001: runtime API/browser evidence is captured; lifecycle completion remains explicitly separate.
