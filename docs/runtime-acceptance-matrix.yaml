    target: /calendar
    responsive_actions: [desktop_month_week_day, mobile_agenda_or_day, previous_next_today, open_event_destination]
    actions: [open_month_view, navigate_date, switch_week_and_day, open_event, confirm_timezone_and_empty_state]
    required_evidence: browser_trace
    status: passed
    evidence: [docs/work/web-ui-functional-completion-runtime-evidence.yaml, apps/themuffinman/frontend/web-runtime-smoke.har]
  - id: work-quest-management
