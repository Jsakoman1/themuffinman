kind: runtime_acceptance_matrix
version: 1
status: active
purpose: Browser and device scenarios required before implemented capabilities can be marked verified.
evidence_policy: Source tests and builds do not satisfy runtime evidence; each scenario needs an executed browser or device trace.
interaction_contract_policy:
  source: docs/work/linear-inspired-interaction-contract-audit.md
  rule: A changed desktop interaction must add browser evidence to its owning scenario; no scenario becomes passed from static validation alone.
  shared_checks: [canonical_route_preserved, nested_action_isolated, backend_action_authority, loading_empty_error_recovery, reduced_motion]
scenarios:
  - id: web-entry-and-discovery
    capability_ids: [work.quest.create, work.quest.discovery, circles.circle.discover, business.profile.view_public]
    target: /work/find
    actions: [open_work, confirm_create_new_work_entry, open_find_people, open_find_business, open_result_detail, confirm_empty_and_error_recovery]
    required_evidence: browser_trace
    status: passed
    evidence: [docs/work/web-ui-functional-completion-runtime-evidence.yaml, apps/themuffinman/frontend/web-runtime-smoke.har]
  - id: web-chat-inbox-and-send
    capability_ids: [chat.conversation.open, chat.conversation.create_group, chat.message.send]
    target: /chat
    actions: [load_inbox, identify_request_failure_if_any, open_direct_chat, create_group, open_thread, send_message, retry_after_failure, mobile_back_to_inbox, mobile_composer_keeps_primary_action]
    required_evidence: browser_trace
    status: passed
    evidence: [docs/work/web-ui-functional-completion-runtime-evidence.yaml, apps/themuffinman/frontend/web-runtime-smoke.har]
  - id: web-circles-partial-load
    capability_ids: [circles.circle.create, circles.circle.discover, circles.membership.accept]
    target: /circles
