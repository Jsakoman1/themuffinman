version: 1
id: plan-scope-control-standard
title: Prevent duplicate verification and uncontrolled plan scope
purpose: Ensure every new master or non-trivial child plan distinguishes already verified baseline behavior from residual work and genuinely new verification.
canonical_owner: docs/implementation-control.md
applies_to: [docs/master-plan.template.yaml, docs/work-plan.template.yaml, docs/work/*.yaml]
required_scope_fields:
  reused_verified_plans:
    type: list
    rule: Name prior verified plans, runtime artifacts, or audits reused as baseline evidence.
  baseline_only_surfaces:
    type: list
    rule: Name surfaces that must not be fully re-tested unless a retest trigger is present.
  residual_scope:
    type: list
    rule: Describe only the remaining defects, integration gaps, or evidence gaps.
  retest_triggers:
    type: list
    rule: Define the concrete code, contract, route, permission, or regression changes that justify re-testing baseline behavior.
  non_duplication_rule:
    type: string
    rule: State that prior verified evidence is not counted as new completion.
required_atomic_task_fields:
  observable_outcome:
    type: string
    rule: State one independently verifiable outcome; a task must not be a whole feature, layer, or workstream.
  required_paths:
    type: list
    rule: Name the exact files that must change for this atomic outcome; separate independently verifiable domain, API, client, documentation, and runtime work.
  leaf_validation:
    type: string
    rule: Use a repository-root-safe validation command that does not invoke a verifier recursively.
  dependencies:
    type: list
    rule: Name earlier atomic task ids required before this task can start.
  evidence_boundary:
    type: list
    rule: State which new test, API, visual, runtime, or documentation evidence this task must produce.
atomic_task_rules:
  - Every implementation task in a strict plan must satisfy required_atomic_task_fields.
  - A task is too broad when it spans more than one independently closable layer or has multiple unrelated observable outcomes; split it before goal pursuing.
  - A master execution inventory must map one ordered item to exactly one atomic task.
  - Broad child plans may group scope, but they cannot be the verifier-controlled implementation queue.
  - Planning hardening must be the first task for a new broad master and must be verifier-verified before product implementation starts.
required_preflight_checks:
  - verify_baseline_commit
  - reconcile_reused_verified_plans
  - classify_each_scope_item_as_baseline_only_residual_or_new
  - identify_changed_shared_surfaces_and_retest_triggers
  - check_child_and_inventory_scope_consistency
  - confirm_required_code_test_or_runtime_paths_for_new_work
required_closeout_checks:
  - compare_before_and_after_verified_evidence
  - report_only_new_repairs_and_new_evidence
  - preserve_existing_pending_and_external_boundaries
  - run_work_verify_and_relevant_audits
forbidden_patterns:
  - broad_core_retest_without_trigger
  - copying_historical_acceptance_as_new_evidence
  - marking_a_capability_complete_because_it_is_mapped
  - replacing_runtime_evidence_with_source_or_build_success
  - using_a_new_registry_as_a_second_status_authority
review_questions:
  - What was already verified before this plan?
  - What exactly remains broken, incomplete, or unproven?
  - Which changed surface justifies each new test?
  - Which existing evidence is reused rather than repeated?
  - What will the closeout count as genuinely new?
