metadata:
  version: "1.0.0"
  status: active
  default_failure_mode: fail_closed

purpose: Product agent safety only. Implementation planning and completion live in docs/work/*.yaml.

safety:
  rules:
    - id: exact-target-before-mutation
      rule: Resolve the exact target before any mutating operation.
    - id: explicit-confirmation-before-destructive-action
      rule: Require explicit confirmation before destructive or externally visible actions.
    - id: backend-authority
      rule: Enforce permissions, validation, workflow transitions, and ownership in backend services.
    - id: fail-closed-on-ambiguity
      rule: Stop when identity, scope, permission, or requested state is ambiguous.
    - id: separate-sandbox-from-production
      rule: Keep synthetic and sandbox execution separate from production-like behavior.

implementation_control:
  plan_template: docs/work-plan.template.yaml
  plan_directory: docs/work/
  verifier: scripts/verify-work.rb
  verify_command: make work-verify plan=<work-plan>
  completion_state: verified
  evidence_rule: Evidence is generated by the verifier through executed validation commands.

autonomous_batch_execution:
  default: continue_until_batch_boundary
  rules:
    - id: frontload-safe-batch
      rule: When the user authorizes autonomous continuation, load the complete safe slice queue before implementation and execute it in dependency order.
    - id: no-single-slice-stop
      rule: Do not end a turn after one completed slice while another safe queued slice remains in scope.
    - id: closeout-after-batch
      rule: Send the final response only after the batch is verified, genuinely blocked, or requires a missing user decision.
    - id: record-follow-ups
      rule: Record newly discovered deferred work with a stable backlog ID and continue with the next safe slice.
    - id: blocker-threshold
      rule: Treat a missing product rule, external authority, or required approval as a blocker; ordinary implementation complexity is not a reason to stop.

product_sources:
  api_catalog: docs/agent-operating-model/sections/api.yaml
  intent_catalog: docs/agent-operating-model/sections/intents.yaml
