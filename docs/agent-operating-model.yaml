intents:
- id: create_user
  description: Create a normal end-user account through the public registration flow.
  mutating: true
  required_inputs:
  - email
  - username
  - password
  optional_inputs:
  - profile_description
  - profile_avatar_data_url
  - location_settings
  defaults:
  - field: role
    value: USER
  workflow:
  - step: 1
    action: Normalize email and validate required registration inputs.
    source_refs:
    - auth_controller
    - app_user_service
    - rich_text_validator
    - service_errors
    fail_if:
    - email is blank or invalid
    - username is blank
    - password is blank
  - step: 2
    action: Create the user through the registration endpoint.
    endpoint_id: auth_register
    source_refs:
    - auth_controller
  - step: 3
    action: If profile or location enrichment is requested, use the authenticated
      self-update flow after registration.
    endpoint_id: update_current_user
    source_refs:
    - app_user_controller
    - app_user_request_dto
    - app_user_service
    - location_settings_service
- id: create_user_as_admin
  description: Create one user account through the admin user-management endpoint.
  mutating: true
  required_inputs:
  - email
  - username
  - password
  optional_inputs:
  - profile_description
  - profile_avatar_data_url
  - location_settings
  - role
  defaults:
  - field: role
    value: USER
  workflow:
  - step: 1
    action: Reuse backend account validation, uniqueness checks, optional profile
      enrichment, and optional explicit role assignment.
    source_refs:
    - app_user_request_dto
    - app_user_service
    - location_settings_service
    - rich_text_validator
    - service_errors
    fail_if:
    - email is blank or invalid
    - username is blank
    - password is blank
  - step: 2
    action: Create the user through the admin create-user endpoint.
    endpoint_id: create_user_as_admin
    source_refs:
    - app_user_controller
    - app_user_service
- id: open_auth_identity
  description: Read the current authenticated auth identity snapshot.
  mutating: false
  required_inputs:
  - authenticated_user
  optional_inputs: []
  defaults: []
  workflow:
  - step: 1
    action: Require authenticated context and load the current auth identity snapshot.
    endpoint_id: auth_me
    source_refs:
    - auth_controller
    - service_errors
- id: run_admin_agent_playground
  description: Run the admin-only planning playground for natural-language workflow
    analysis.
  mutating: false
  required_inputs:
  - authenticated_user
  - prompt
  optional_inputs: []
  defaults: []
  workflow:
  - step: 1
    action: Require admin authority and a non-blank prompt.
    source_refs:
    - admin_agent_controller
    - admin_agent_playground_service
    - service_errors
    fail_if:
    - authenticated user is not admin
    - prompt is missing
  - step: 2
    action: Run the planning prompt through the admin playground endpoint.
    endpoint_id: run_admin_agent_playground
    source_refs:
    - admin_agent_controller
    - admin_agent_playground_service
- id: execute_admin_agent_capability
  description: Run the first guarded admin-only direct execution slice, currently
    synthetic quest batch generation for one exact target user after explicit confirmation.
  mutating: true
  required_inputs:
  - authenticated_user
  - prompt
  optional_inputs:
  - confirmed
  defaults:
  - field: confirmed
    value: false
  workflow:
  - step: 1
    action: Require admin authority, a non-blank prompt, and shared prompt preparation
      before execution planning.
    source_refs:
    - admin_agent_controller
    - admin_agent_execution_service
    - admin_agent_prompt_preparation_service
    - admin_agent_execution_request_dto
    - service_errors
    fail_if:
    - authenticated user is not admin
    - prompt is missing
  - step: 2
    action: Convert the prompt into the first reusable admin execution plan shape
      and stop unless the capability is the supported synthetic quest batch flow.
    source_refs:
    - admin_synthetic_quest_execution_planner
    - admin_agent_surface_policy
    - sandbox_generation_planner
    fail_if:
    - prompt does not resolve to the supported direct execution capability
    - direct execution is disabled by policy
  - step: 3
    action: Resolve one exact target user and cap the batch size through typed agent
      properties before any mutation can run.
    source_refs:
    - admin_agent_target_user_resolver
    - admin_agent_execution_service
    - app_user_lookup_service
    fail_if:
    - target user is missing
    - target user does not resolve exactly
  - step: 4
    action: Return a confirmation preview until explicit confirmation is provided,
      then create synthetic quests through the existing quest creation boundary with
      creator override.
    endpoint_id: run_admin_agent_execution
    source_refs:
    - admin_agent_execution_service
    - admin_agent_execution_response_dto
    - quest_service
    fail_if:
    - confirmation is missing
- id: simulate_admin_agent_execution
  description: Run an admin-only dry-run simulation through resolution, clarification,
    safety-policy, and endpoint-selection logic without mutating anything.
  mutating: false
  required_inputs:
  - authenticated_user
  - prompt
  optional_inputs: []
  defaults: []
  workflow:
  - step: 1
    action: Require admin authority, a non-blank prompt, and planning-only execution
      mode.
    source_refs:
    - admin_agent_controller
    - admin_agent_playground_service
    - admin_agent_simulation_request_dto
    - service_errors
    fail_if:
    - authenticated user is not admin
    - prompt is missing
  - step: 2
    action: Run the prompt through the dry-run simulation endpoint and return selected
      intent, capability assessments, lineage, and endpoint plan without mutating
      backend state.
    endpoint_id: run_admin_agent_simulation
    source_refs:
    - admin_agent_controller
    - admin_agent_playground_service
    - admin_agent_simulation_response_dto
- id: open_current_user_account
  description: Read the current authenticated user's account profile view.
  mutating: false
  required_inputs:
  - authenticated_user
  optional_inputs: []
  defaults: []
  workflow:
  - step: 1
    action: Require authenticated context and load the current user account view.
    endpoint_id: get_current_user
    source_refs:
    - app_user_controller
    - app_user_service
    - service_errors
- id: authenticate_user
  description: Authenticate one user through the login endpoint.
  mutating: true
  required_inputs:
  - email
  - password
  optional_inputs: []
  defaults: []
  workflow:
  - step: 1
    action: Require normalized email plus password and fail on invalid credentials.
    source_refs:
    - auth_controller
    - service_errors
    fail_if:
    - email is missing
    - password is missing
    - credentials are invalid
  - step: 2
    action: Authenticate through the login endpoint.
    endpoint_id: auth_login
    source_refs:
    - auth_controller
- id: open_app_user_options
  description: Open the current user's backend-prepared option sets for workmarket
    and related forms.
  mutating: false
  required_inputs:
  - authenticated_user
  optional_inputs: []
  defaults: []
  workflow:
  - step: 1
    action: Require authenticated context and load current backend options.
    endpoint_id: get_app_user_options
    source_refs:
    - app_user_controller
    - app_user_service
    - service_errors
- id: open_user_record
  description: Open one user record after exact user resolution.
  mutating: false
  required_inputs:
  - authenticated_user
  - user_id
  optional_inputs: []
  defaults: []
  workflow:
  - step: 1
    action: Require one exact user target.
    source_refs:
    - app_user_lookup_service
    - service_errors
    fail_if:
    - user_id is missing
  - step: 2
    action: Load the backend user record through the direct user endpoint.
    endpoint_id: get_app_user
    source_refs:
    - app_user_controller
    - app_user_service
- id: set_profile_location
  description: Set or clear the authenticated user's profile location through the
    self-update flow.
  mutating: true
  required_inputs:
  - authenticated_user
  - location_mode
  optional_inputs:
  - default_radius_km
  - exact_visibility_scope
  - exact_visible_circle_ids
  - exact_visible_user_ids
  - lookup_query
  - latitude
  - longitude
  - provider
  - provider_place_id
  - label
  - country_code
  - country
  - locality
  - postal_code
  - street
  - house_number
  - resolved_at
  defaults:
  - field: location_mode
    value: 'OFF'
  - field: default_radius_km
    value: 10
  - field: exact_visibility_scope
    value: NOBODY
  workflow:
  - step: 1
    action: Build a self-update payload that includes the current authenticated user's
      required email and username plus nested locationSettings.
    source_refs:
    - app_user_controller
    - app_user_request_dto
    - user_location_settings_request_dto
    - app_user_service
    fail_if:
    - authenticated user context is missing
    - required self-update identity fields are unavailable
  - step: 2
    when: location_mode == OFF
    action: Use OFF mode to clear stored profile coordinates and provider metadata.
    source_refs:
    - location_settings_service
    - service_errors
  - step: 3
    when: location_mode != OFF and latitude+longitude are provided
    action: Use provided coordinates directly inside locationSettings.
    source_refs:
    - user_location_settings_request_dto
    - location_settings_service
    - location_reverse_lookup_request_dto
  - step: 4
    when: location_mode != OFF and latitude+longitude are provided and human-readable
      address fields are missing
    action: Optionally resolve the nearest address through reverse lookup before saving
      the profile.
    endpoint_id: reverse_lookup_location
    source_refs:
    - location_lookup_controller
    - location_reverse_lookup_request_dto
    - location_settings_service
  - step: 5
    when: location_mode != OFF and lookup_query is provided
    action: Resolve a candidate address through lookup and use a selected result to
      fill label, address parts, coordinates, provider, and resolvedAt.
    endpoint_id: lookup_location
    source_refs:
    - location_lookup_controller
    - location_lookup_request_dto
    - location_settings_service
    fail_if:
    - lookup returns no acceptable candidate and no coordinates are available
  - step: 6
    when: location_mode != OFF and only manual address fields are provided
    action: Allow save only if the backend can auto-resolve the manual address into
      usable coordinates.
    source_refs:
    - location_settings_service
    - service_errors
    fail_if:
    - manual address cannot be resolved into usable coordinates
  - step: 7
    when: exact_visibility_scope == CIRCLES
    action: Require at least one owner-owned circle id.
    source_refs:
    - location_settings_service
    - service_errors
    fail_if:
    - no exact_visible_circle_ids are provided
    - selected circle ids are not owned by the authenticated user
  - step: 8
    when: exact_visibility_scope == USERS
    action: Require at least one selected user and only allow existing circle contacts.
    source_refs:
    - location_settings_service
    - service_errors
    fail_if:
    - no exact_visible_user_ids are provided
    - selected users are invalid or not connected through circles
  - step: 9
    action: Persist the profile location through the current-user update endpoint.
    endpoint_id: update_current_user
    source_refs:
