- id: apply_to_quest
  description: Create one application for an open visible quest as a non-owner user.
  mutating: true
  required_inputs:
  - authenticated_user
  - quest_id
  - message
  optional_inputs:
  - proposed_price
  defaults: []
  workflow:
  - step: 1
    action: Require an application payload with meaningful message content and a proposed-price
      shape that matches the target quest pricing mode.
    source_refs:
    - quest_application_request_dto
    - quest_application_service
    - rich_text_validator
    - service_errors
    fail_if:
    - message is blank or has no meaningful content
    - target quest is paid and proposed_price is missing
    - target quest is paid and proposed_price is below 0.01
    - target quest is free and proposed_price is provided
  - step: 2
    action: Require the target quest to be visible to the acting user and currently
      OPEN.
    source_refs:
    - quest_application_service
    - quest_visibility_service
    - service_errors
    fail_if:
    - quest is not visible to the acting user
    - quest is not open
  - step: 3
    action: Reject self-application and duplicate application attempts.
    source_refs:
    - quest_application_service
    - service_errors
    fail_if:
    - acting user is the quest creator
    - acting user already has an application for the quest
  - step: 4
    action: Persist the application through the apply endpoint.
    endpoint_id: apply_to_quest
    source_refs:
    - quest_application_controller
