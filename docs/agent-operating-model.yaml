      or automation-facing backend data without being the strict execution chokepoint.
    current_gate: report_only
    required_artifacts:
    - backend_audit_inventory
    - future_source_of_truth_target
  - id: internal_support
    description: Internal infrastructure, repositories, models, config, and support
      code that should stay inventoried but not coupled to full agent-safe registration
      today.
    current_gate: report_only
    required_artifacts:
    - backend_audit_inventory
  - id: out_of_scope
    description: Bootstrap or framework entrypoint files that stay visible in inventory
      but are intentionally excluded from stricter agent-safe registration.
    current_gate: report_only
    required_artifacts:
    - backend_audit_inventory
