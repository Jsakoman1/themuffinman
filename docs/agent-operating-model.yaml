  required_inputs:
  - authenticated_user
  - assignment_mode
  optional_inputs:
  - target_user_id
  - target_user_ids
  - circle_ids
  - circle_id
  - bulk_action
  defaults:
  - field: assignment_mode
    value: single_sync
  workflow:
  - step: 1
    when: assignment_mode == single_sync
    action: Require one target_user_id and a replacement set of owner-owned circle
      ids.
    source_refs:
    - connection_circle_update_dto
    - circle_service
    - circle_membership_service
    - service_errors
    fail_if:
    - target_user_id is missing
    - one or more circle_ids are invalid for the authenticated owner
  - step: 2
    when: assignment_mode == single_sync
    action: Allow the single-sync mode only for an already connected user.
    source_refs:
    - circle_service
    - service_errors
    fail_if:
    - target user is not an accepted circle connection
  - step: 3
    when: assignment_mode == single_sync
    action: Replace the target contact's current owner-side circle assignments with
      the requested set.
    endpoint_id: update_connection_circles
    source_refs:
    - circle_controller
    - connection_circle_update_dto
    - circle_service
    - circle_membership_service
  - step: 4
    when: assignment_mode == bulk_add_or_remove
    action: Require one owner-owned circle_id, one or more target_user_ids, and a
      bulk action of ADD or REMOVE.
    source_refs:
    - bulk_circle_membership_update_dto
    - circle_service
    - circle_membership_service
    - service_errors
    fail_if:
    - circle_id is missing
    - target_user_ids are missing
    - bulk_action is missing
  - step: 5
    when: assignment_mode == bulk_add_or_remove
    action: Reject any target user who is not an accepted circle connection of the
      acting owner.
    source_refs:
    - circle_service
    - service_errors
    fail_if:
    - one or more target users are not accepted circle connections
  - step: 6
    when: assignment_mode == bulk_add_or_remove
    action: Apply the add-or-remove membership mutation through the bulk endpoint.
    endpoint_id: update_connection_circles_bulk
    source_refs:
    - circle_controller
    - bulk_circle_membership_update_dto
    - circle_service
    - circle_membership_service
