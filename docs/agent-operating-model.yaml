documentation_sync:
  required_docs:
  - AGENTS.md
  - docs/business-logic.md
  - docs/codex-fast-path.md
  - docs/domain-technical.md
  - docs/vision-architecture-patterns.md
  - docs/agent-operating-model.md
  - docs/agent-operating-model.yaml
  - docs/feature-delivery-workflow.md
  - docs/change-completion-checklist.md
  - docs/implementation-backlog.md
  - docs/feature-completion-manifest.schema.json
  - docs/validation-evidence.schema.json
  - docs/example-scenario-library.md
  - docs/regression-scenario-catalog.md
  - docs/regression-scenario-catalog.yaml
  - docs/docs-as-contract-slices.md
  - docs/docs-as-contract-slices.yaml
  - docs/documentation-sync-policy.md
  required_tests:
  - apps/themuffinman/src/test/java/com/themuffinman/app/docs/AgentOperatingModelValidationTest.java
  - apps/themuffinman/src/test/java/com/themuffinman/app/chat/service/ChatServiceTest.java
  - apps/themuffinman/src/test/java/com/themuffinman/app/agent/service/AdminAgentGoldenPromptMatrixTest.java
  - apps/themuffinman/src/test/java/com/themuffinman/app/agent/service/AdminAgentCapabilityBoundaryTest.java
  rules:
  - id: tiered_feature_workflow_entrypoint
    description: Feature delivery starts from the compact fast path and escalates
      into the full workflow only when the tier or resolver requires it.
    source_refs:
    - agents_doc
    - codex_fast_path_doc
    - feature_delivery_workflow_doc
    - change_completion_checklist_doc
    - agent_operating_model_doc
    - documentation_sync_policy_doc
    doc_paths:
    - AGENTS.md
    - docs/codex-fast-path.md
    - docs/feature-delivery-workflow.md
    - docs/change-completion-checklist.md
    - docs/agent-operating-model.md
    - docs/documentation-sync-policy.md
    must_contain_all:
    - docs/codex-fast-path.md is the compact execution entrypoint for most feature
      work.
    - Use the full workflow only when the change is high-risk, multi-layer, agent/tooling/workflow-related,
      or when a resolver requires it.
    - Manifest usage is tier-driven and conditional instead of being the default for
      every non-trivial backend change.
  - id: documentation_updates_required_for_logic_changes
    description: Logical changes must propagate into the living docs and agent-safety
      artifacts in the same change.
    source_refs:
    - agents_doc
    - business_logic_doc
    - domain_technical_doc
    - documentation_sync_policy_doc
    doc_paths:
    - AGENTS.md
    - docs/agent-operating-model.md
    - docs/documentation-sync-policy.md
    must_contain_all:
    - update all affected living docs in the same change
    - No logic-only change is complete until the affected docs, agent artifacts, and
      validation tests are updated together.
    - A logic change is not complete when only code and tests are updated.
    - For protected documentation-sync phrases, copy the exact canonical sentence
      verbatim into every required file.
    - Do not paraphrase, shorten, reorder, or partially restate protected canonical
      wording.
  - id: master_plan_allowed_for_complex_batches
    description: Broad or long-running work may use one master plan plus explicit
      child plans when that keeps the batch auditable and reduces unnecessary operator
      interaction.
    source_refs:
    - agents_doc
    - documentation_sync_policy_doc
    doc_paths:
    - AGENTS.md
    - docs/agent-operating-model.md
    - docs/documentation-sync-policy.md
    - docs/change-completion-checklist.md
    must_contain_all:
    - For broad, long-running, or high-complexity work, prefer a master plan that
      coordinates a group of narrower `.agents/*-plan.md` files in explicit sequence
      instead of treating the entire task as one flat plan.
    - Use the master-plan pattern when it safely reduces unnecessary human interaction,
      increases automation, or makes a larger batch auditable through one final closeout
      pass.
    - When `AGENTS.md` records a standing autonomous continuation preference, do not
      stop only to ask which safe offered follow-up slice should run next; continue
      with the best sequenced slice unless scope changes, approval is required, or
      a real blocker appears.
  - id: persistent_backlog_tracks_deferred_work
    description: Deferred implementation and control-system follow-ups must stay in
      persistent backlog files with stable IDs, and resolved items must be removed
      when completed.
    source_refs:
    - agents_doc
    - implementation_backlog_doc
    - documentation_sync_policy_doc
    - agent_improvement_backlog_doc
    doc_paths:
    - AGENTS.md
    - docs/agent-operating-model.md
    - docs/documentation-sync-policy.md
    - docs/implementation-backlog.md
    - docs/agent-improvement-backlog.md
    must_contain_all:
    - Record new deferred implementation or control-system work in the appropriate
      persistent backlog with a stable ID before closing the change that discovered
      it.
    - When a backlog item is implemented, remove it from the open backlog and clear
      matching inline `TODO(<ID>):` or `FIXME(<ID>):` references in the same change.
  - id: admin_generation_flows_expand_with_feature_logic
    description: Feature expansions that change entity logic or workflow shape must
      propagate into admin-generation and sandbox-generation flow docs.
    source_refs:
    - agents_doc
    - documentation_sync_policy_doc
    - domain_technical_doc
    doc_paths:
    - AGENTS.md
    - docs/agent-operating-model.md
    - docs/documentation-sync-policy.md
    must_contain_all:
    - review and extend affected admin or sandbox generation flows
    - admin-generation or sandbox-generation coverage for entities and workflows
    - synthetic admin-generation flows must be kept current with newly introduced
      feature logic, validations, and edge cases
  - id: chat_requires_current_accepted_relation
    description: Chat access must stay restricted to current accepted relations, not
      pending or stale ones.
    source_refs:
    - chat_service
    - circle_relation_service
    - circle_membership_service
    - business_logic_doc
    - domain_technical_doc
    doc_paths:
    - docs/business-logic.md
    - docs/domain-technical.md
    - docs/agent-operating-model.md
    - docs/documentation-sync-policy.md
    must_contain_all:
    - Pending circle requests do not create chat eligibility.
    - Chat workspace only includes current accepted circle contacts.
    - Existing conversation history does not preserve chat access after the accepted
      relation is lost.
  - id: sandbox_flow_stays_separate_from_production_flow
    description: Sandbox and synthetic flows must stay explicitly separated from production-like
      user actions.
    source_refs:
    - business_logic_doc
    - domain_technical_doc
    - documentation_sync_policy_doc
    doc_paths:
    - docs/business-logic.md
    - docs/domain-technical.md
    - docs/agent-operating-model.md
    must_contain_all:
    - Sandbox flow must stay separate from real-life product flow.
    - sandbox behavior must stay separate from production mutation semantics
    - Internal sandbox flow is a separate capability from production-like voice flow.
