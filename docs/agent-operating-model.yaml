  - step: 2
    action: Prepare the selected-people circle and create the circle-only quest first.
    intent_ref: create_circle_only_quest_for_selected_people
    source_refs:
    - circle_controller
    - circle_service
    - quest_controller
    - quest_service
  - step: 3
    when: applicant_payloads are provided
    action: Require one applicant-side payload per intended worker and execute applications
      only in the authenticated context of each applicant.
    source_refs:
    - quest_application_request_dto
    - quest_application_service
    - service_errors
    fail_if:
    - an applicant payload is missing for a person who must apply
    - an applicant-side authenticated context is missing
  - step: 4
    when: applicant_payloads are provided
    action: Create the applications one by one through the applicant-side workflow.
    intent_ref: apply_to_quest
    endpoint_id: apply_to_quest
    source_refs:
    - quest_application_controller
    - quest_application_service
    - quest_visibility_service
  - step: 5
    when: auto_approve_applicants == true
    action: Approve the target applications only from owner or admin context, respecting
      assignee_target capacity.
    intent_ref: approve_application
    endpoint_id: approve_application
    source_refs:
    - quest_application_controller
    - quest_application_service
    - quest_state_transition_service
    - service_errors
  - step: 6
    when: auto_approve_applicants == true and applicant_payloads are missing
    action: Stop because approval cannot happen before real applications exist.
    source_refs:
    - quest_application_service
    - service_errors
    fail_if:
    - no real applications exist to approve
  - step: 7
    when: auto_start_when_assigned == true
    action: Require the quest to already be ASSIGNED and require an execution actor
      that is owner, admin, or approved worker.
    source_refs:
    - quest_service
    - quest_state_transition_service
    - service_errors
    fail_if:
    - quest is not assigned after approval flow
    - execution_actor is missing
    - execution_actor lacks execution authority
  - step: 8
    when: auto_start_when_assigned == true
    action: Start the quest through the execution workflow.
    intent_ref: start_quest
    endpoint_id: start_quest
    source_refs:
    - quest_controller
    - quest_service
    - quest_state_transition_service
- id: voice_prepare_scheduled_circle_only_quest_for_selected_people
  description: Resolve a voice instruction for a scheduled circle-only quest and prepare
    it toward ASSIGNED or STARTED without guessing missing actor-side context.
  mutating: true
  required_inputs:
  - owner_user
  - requester_time_zone
  - selected_people
  - scheduling_request
  - quest_payload_template
  optional_inputs:
  - existing_circle_id
  - circle_name
  - auto_invite_missing_people
  - multi_actor_accept_context
  - selected_applicant_payloads
  - auto_approve_selected_applicants
  - auto_decline_unexpected_applicants
  - term_change_request
  - review_handoff_plan
  - auto_start_when_assigned
  - auto_complete_after_execution
  - execution_actor
  defaults:
  - field: auto_invite_missing_people
    value: false
  - field: auto_approve_selected_applicants
    value: false
  - field: auto_decline_unexpected_applicants
    value: false
  - field: auto_start_when_assigned
    value: false
  - field: auto_complete_after_execution
    value: false
  workflow:
  - step: 1
    action: Read the authenticated caller identity and resolve the voice scheduling
      request into an absolute quest timestamp in the caller's timezone before mutation.
    intent_ref: open_auth_identity
    source_refs:
    - auth_controller
    - quest_request_dto
    - quest_validation_service
    - service_errors
    fail_if:
    - requester_time_zone is missing
    - authenticated owner context is missing
    - scheduling_request cannot be resolved into an absolute scheduled_at
    - resolved scheduled_at is invalid for quest creation
  - step: 2
    action: Resolve selected people into concrete user ids and reject ambiguous or
      unresolved matches.
    source_refs:
    - app_user_lookup_service
    - circle_service
    - circle_relation_service
    - service_errors
    fail_if:
    - selected_people is empty
    - one or more selected people cannot be resolved safely
  - step: 3
    action: Build a quest payload that forces audience CIRCLES and injects the resolved
      absolute schedule.
    source_refs:
    - quest_request_dto
    - quest_validation_service
    - service_errors
    fail_if:
    - quest_payload_template is missing required quest fields
    - the resolved payload does not use audience CIRCLES
  - step: 4
    action: Prepare the selected-people circle and create the scheduled circle-only
      quest.
    intent_ref: create_circle_only_quest_for_selected_people
    source_refs:
    - circle_controller
    - circle_service
    - quest_controller
    - quest_service
  - step: 5
    when: selected_applicant_payloads are provided
    action: Require one applicant-authenticated payload per intended worker and keep
      the applicant set inside the resolved selected people set.
    source_refs:
    - quest_application_request_dto
    - quest_application_service
    - service_errors
    fail_if:
    - an applicant payload is missing for a selected worker who must apply
    - an applicant-side authenticated context is missing
    - an applicant payload belongs to someone outside the resolved selected people
      set
  - step: 6
    when: selected_applicant_payloads are provided
    action: Create the selected workers' applications through applicant-side execution
      only.
    intent_ref: apply_to_quest
    endpoint_id: apply_to_quest
    source_refs:
    - quest_application_controller
    - quest_application_service
    - quest_visibility_service
  - step: 7
    when: auto_approve_selected_applicants == true
    action: Approve only the intended selected pending applications from owner or
      admin context and stop when assignee_target capacity is reached.
    intent_ref: approve_application
    endpoint_id: approve_application
    source_refs:
    - quest_application_controller
    - quest_application_service
    - quest_state_transition_service
    - service_errors
  - step: 8
    when: auto_approve_selected_applicants == true and selected_applicant_payloads
      are missing
    action: Stop because selected approvals cannot happen before real selected applications
      exist.
    source_refs:
    - quest_application_service
    - service_errors
    fail_if:
    - no real selected applications exist to approve
  - step: 9
    when: auto_decline_unexpected_applicants == true
    action: Decline only pending applications from users outside the resolved selected
      people set through owner or admin context.
    intent_ref: decline_application
    endpoint_id: decline_application
    source_refs:
    - quest_application_controller
    - quest_application_service
    - quest_visibility_service
    - service_errors
  - step: 10
    when: term_change_request is provided after the quest reaches ASSIGNED or IN_PROGRESS
    action: Request the owner-side term change and expect WAITING_CONFIRMATION until
      approved-worker or admin decision completes.
    intent_ref: request_owner_term_change
    endpoint_id: update_quest
    source_refs:
    - quest_controller
    - quest_service
    - quest_update_service
    - quest_state_transition_service
  - step: 11
    when: auto_start_when_assigned == true
    action: Require the quest to already be ASSIGNED and require an execution actor
      that is owner, admin, or approved worker.
    source_refs:
    - quest_service
    - quest_state_transition_service
    - service_errors
    fail_if:
    - quest is not assigned after selected approval flow
    - execution_actor is missing
    - execution_actor lacks execution authority
  - step: 12
    when: auto_start_when_assigned == true
    action: Start the quest through the execution workflow.
    intent_ref: start_quest
    endpoint_id: start_quest
    source_refs:
    - quest_controller
    - quest_service
    - quest_state_transition_service
  - step: 13
    when: auto_complete_after_execution == true
    action: Complete the quest only after it has reached IN_PROGRESS and an execution-authorized
      actor is present.
    intent_ref: complete_quest
    endpoint_id: complete_quest
    source_refs:
    - quest_controller
    - quest_service
    - quest_state_transition_service
  - step: 14
    when: review_handoff_plan is provided and the quest is COMPLETED
    action: Hand off to post-completion review creation only for valid employer-worker
      review pairs.
    intent_ref: create_review
    endpoint_id: create_or_update_review
    source_refs:
    - user_review_controller
    - user_review_service
    - quest_application_service
    - service_errors
- id: create_sandbox_user_with_circle_and_quest_flow
  description: Plan a synthetic admin-only test-data flow that creates users, circles,
    quest applications, lifecycle transitions, and reviews without pretending it is
    a production user path.
  mutating: true
  required_inputs:
  - admin_actor
  - environment_scope
  - synthetic_user_batch
  - sandbox_flow_plan
  optional_inputs:
  - synthetic_circle_plan
  - synthetic_quest_plan
  - synthetic_application_plan
  - synthetic_execution_plan
  - synthetic_review_plan
  - synthetic_marker_strategy
  defaults: []
  workflow:
  - step: 1
    action: Read the authenticated admin identity and require explicit admin authority
      plus developer-controlled environment scope before any synthetic flow is allowed.
    intent_ref: open_auth_identity
    source_refs:
    - auth_controller
    - agents_doc
    - documentation_sync_policy_doc
    - service_errors
    fail_if:
    - admin_actor is missing
    - environment_scope is not explicitly sandbox-safe
  - step: 2
    action: Require an explicit synthetic marker strategy so sandbox entities can
      later be distinguished from real data.
    source_refs:
    - business_logic_doc
    - domain_technical_doc
    fail_if:
    - synthetic_marker_strategy is missing
  - step: 3
    action: Create the synthetic users and any required profile defaults.
    intent_ref: create_user_with_quests
    source_refs:
    - auth_controller
    - app_user_service
    - app_user_controller
  - step: 4
    when: synthetic_circle_plan is provided
    action: Create synthetic circles and memberships as part of the sandbox dataset.
    intent_ref: create_circle
    source_refs:
    - circle_controller
    - circle_service
    - circle_membership_service
  - step: 5
    when: synthetic_quest_plan is provided
    action: Create synthetic quests or selected-people quest flows from admin-controlled
      sandbox input.
    intent_ref: create_circle_only_quest_for_selected_people
    source_refs:
    - quest_controller
    - quest_service
    - circle_controller
    - circle_service
  - step: 6
    when: synthetic_application_plan is provided
    action: Allow synthetic multi-actor application creation only because this flow
      is explicitly sandbox-only.
    source_refs:
    - quest_application_service
    - documentation_sync_policy_doc
  - step: 7
    when: synthetic_execution_plan is provided
    action: Allow synthetic approval, start, completion, and optional term-change
      scenarios only inside the sandbox contract.
    source_refs:
    - quest_application_service
    - quest_service
    - quest_state_transition_service
  - step: 8
    when: synthetic_review_plan is provided
    action: Allow synthetic review generation only after synthetic completion plan
      reaches COMPLETED state.
    source_refs:
    - user_review_service
    - quest_service
    - service_errors
