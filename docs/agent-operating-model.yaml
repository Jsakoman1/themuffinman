  - quest currently IN_PROGRESS
  state_changes:
  - transition quest to COMPLETED
  side_effects:
  - unlock post-completion review workflow
  notifications:
  - approved applicant sees quest completed notice
  blocking_conditions:
  - missing execution authority
  - quest not IN_PROGRESS
  source_refs:
  - complete_quest_use_case
  - quest_execution_primitive_service
- intent_id: confirm_quest_term_change
  preconditions:
  - exact quest identity
  - approved-worker or admin authority
  - quest currently WAITING_CONFIRMATION
  state_changes:
  - apply pending term fields
  - restore previous quest status
  side_effects:
  - clear pending term change state
  notifications:
  - approved applicant and quest creator both see confirmation notice
  blocking_conditions:
  - missing authority
  - missing pending term state
  - quest not WAITING_CONFIRMATION
  source_refs:
  - confirm_quest_term_change_use_case
  - quest_state_transition_service
- intent_id: reject_quest_term_change
  preconditions:
  - exact quest identity
  - approved-worker or admin authority
  - quest currently WAITING_CONFIRMATION
  state_changes:
  - restore previous quest status without applying pending term fields
  side_effects:
  - clear pending term change state
  notifications:
  - approved applicant and quest creator both see rejection notice
  blocking_conditions:
  - missing authority
  - missing previous quest status
  - quest not WAITING_CONFIRMATION
  source_refs:
  - reject_quest_term_change_use_case
  - quest_state_transition_service
- intent_id: request_owner_term_change
  preconditions:
  - exact owned quest identity
  - validated term update payload
  state_changes:
  - apply direct term update or queue WAITING_CONFIRMATION state depending on current
    quest status
  side_effects:
  - notify approved worker when active quest term changes need confirmation
  notifications:
  - approved applicant sees term confirmation request or update
  blocking_conditions:
  - missing owner authority
  - invalid term payload
  - unsupported quest status
  source_refs:
  - update_quest_use_case
  - quest_state_transition_service
- intent_id: create_review
  preconditions:
  - exact completed quest identity
  - authenticated reviewer
  - validated review payload
  state_changes:
  - persist new or updated review for quest counterpart
  side_effects:
  - resolve review target role and prevent self-review
  notifications:
  - none
  blocking_conditions:
  - quest not COMPLETED
  - reviewer not eligible
  - invalid review payload
  source_refs:
  - user_review_service
- intent_id: create_user_with_quests
  preconditions:
  - admin authority
  - unique batch payloads
  - validated user and quest generation inputs
  state_changes:
  - persist generated user and generated quests
  side_effects:
  - reuse create-user and create-quest validation flows
  notifications:
  - none
  blocking_conditions:
  - insufficient unique payloads
  - unresolved creator identity
  - invalid generated quest input
  source_refs:
  - app_user_service
  - create_quest_use_case
- intent_id: create_circle_only_quest_for_selected_people
  preconditions:
  - resolved selected people
  - accepted connections only
  - validated quest payload
  state_changes:
  - persist or reuse owner circle
  - sync selected members
  - persist circle-only quest
  side_effects:
  - translate selected audience into deterministic circle visibility
  notifications:
  - none
  blocking_conditions:
  - unresolved selected people
  - non-connection targets
  - invalid quest payload
  source_refs:
  - circle_service
  - create_quest_use_case
- intent_id: prepare_circle_only_quest_flow_to_start
  preconditions:
  - resolved selected people
  - real applicant-side context
  - quest can progress through lifecycle
  state_changes:
  - persist selected-people circle quest
  - related applications
  - approvals
  - and start transition when all prerequisites are met
  side_effects:
  - reuse create quest
  - application approval
  - and start-quest flows in order
  notifications:
  - participants see application and lifecycle notices
  blocking_conditions:
  - selected people unresolved
  - applicant context missing
  - quest never reaches ASSIGNED
  source_refs:
  - create_quest_use_case
  - quest_application_service
  - start_quest_use_case
- intent_id: voice_prepare_scheduled_circle_only_quest_for_selected_people
  preconditions:
  - caller timezone resolved
  - selected people resolved
  - real multi-actor execution context
  state_changes:
  - persist scheduled circle-only quest flow toward start-ready state
  side_effects:
  - resolve relative schedule into absolute timestamp before mutation
  notifications:
  - participants see lifecycle notices when steps execute
  blocking_conditions:
  - timezone unresolved
  - selected people unresolved
  - applicant context missing
  source_refs:
  - create_quest_use_case
  - quest_application_service
  - start_quest_use_case
- intent_id: create_sandbox_user_with_circle_and_quest_flow
  preconditions:
  - admin or developer sandbox authority
  - synthetic generation inputs
  - sandbox isolation
  state_changes:
  - persist synthetic user
  - circle
  - applications
  - and quest demo flow data
  side_effects:
  - mark generated flow as sandbox-only and keep it separated from production semantics
  notifications:
  - none
  blocking_conditions:
  - sandbox authority missing
  - unsupported synthetic payload
  - sandbox isolation rules violated
  source_refs:
  - admin_agent_playground_service
  - app_user_service
  - create_quest_use_case
- intent_id: execute_admin_agent_capability
  preconditions:
  - admin authority
  - direct execution enabled
  - exact target user
  - explicit confirmation
  state_changes:
  - persist synthetic quests for the resolved target user
  side_effects:
  - reuse quest creation with creator override and synthetic marker strategy
  notifications:
  - none
  blocking_conditions:
  - execution disabled
  - target user unresolved
  - confirmation missing
  - batch limit exceeded
  source_refs:
  - admin_agent_execution_service
  - admin_synthetic_quest_execution_planner
  - quest_service
- intent_id: save_my_business_profile
  preconditions:
  - authenticated owner
  - validated business profile payload
  - unique slug for owner scope
  state_changes:
  - persist current user's business profile
  side_effects:
  - sanitize rich-text business description and update active directory visibility
  notifications:
  - none
  blocking_conditions:
  - missing authenticated owner
  - invalid profile payload
  - slug conflict
  source_refs:
  - business_profile_service
- intent_id: create_thing_listing
  preconditions:
  - authenticated owner
  - validated thing listing payload
  state_changes:
  - persist owned thing-sharing listing
  side_effects:
  - make listing available to listing read surfaces when marked available
  notifications:
  - none
  blocking_conditions:
  - missing authenticated owner
  - invalid listing payload
  source_refs:
  - thing_sharing_service
- intent_id: request_borrow_thing
  preconditions:
  - authenticated requester
  - exact listing identity
  - available listing
  state_changes:
  - persist thing borrow request
  side_effects:
  - link request to listing owner and requester
  notifications:
  - none
  blocking_conditions:
  - missing authenticated requester
  - listing unavailable or missing
  source_refs:
  - thing_sharing_service
- intent_id: create_ride_offer
  preconditions:
  - authenticated driver
  - validated ride offer payload
  - driver-owned visible circles when provided
  state_changes:
  - persist voluntary ride offer
  side_effects:
  - make active offer visible through ride offer read surfaces
  notifications:
  - none
  blocking_conditions:
  - missing authenticated driver
  - invalid departure time
  - invalid visible circles
  source_refs:
  - ride_offer_service
