version: 1
kind: product_capability_inventory
title: TheMuffinMan capability inventory
description: >
  Canonical product truth for what TheMuffinMan should support, what the current
  code exposes, and what remains missing, broken, or only partially implemented.
  This file is the machine-readable source for future implementation planning.
last_reviewed: 2026-07-15
interaction_contract_audit:
  reviewed_on: 2026-07-17
  plan: docs/work/linear-inspired-interaction-contract-audit.yaml
  scope: authenticated route ownership, backend read-model/action boundaries, and guarded desktop interaction expansion
  invariants:
    - backend query parameters determine collection membership and authorization
    - client display state may not create permissions, workflow transitions, or shared persistence
    - preview complements but never replaces canonical detail routes
  blocked_until_contract:
    - shared favorites and subscriptions
    - saved or shared views
    - board/timeline mutation and bulk actions
    - speculative prefetch, optimistic mutation, virtualization, and infinite scroll
review_policy:
  owner: product-and-engineering
  cadence: every_master_plan_closeout
  rule: >
    A capability may be marked implemented only when its intended behavior,
    backend boundary, user-facing surface, and validation evidence agree.
active_plans:
  - id: work-capability-closure
    path: docs/work/work-capability-closure.yaml
    scope: Work create, management, and application gaps
  - id: chat-reconnect-resync
    path: docs/work/chat-reconnect-resync.yaml
    scope: browser Chat recovery and conversation resync
  - id: profile-location-settings-surface
    path: docs/work/profile-location-settings-surface.yaml
    scope: direct profile location settings and correction flow
  - id: things-listing-surface
    path: docs/work/things-listing-surface.yaml
    scope: Things discovery, listing creation, and borrow requests
  - id: things-borrow-cancellation
    path: docs/work/things-borrow-cancellation.yaml
    scope: borrower-owned cancellation of pending Things requests
  - id: circles-privacy-explanation
    path: docs/work/circles-privacy-explanation.yaml
    scope: circle visibility and consent explanation
  - id: chat-attachment-surface
    path: docs/work/chat-attachment-surface.yaml
    scope: browser Chat attachment upload and send flow
  - id: chat-attachment-preview
    path: docs/work/chat-attachment-preview.yaml
    scope: browser image attachment preview lifecycle
  - id: cross-module-visibility-acceptance
    path: docs/work/cross-module-visibility-acceptance.yaml
    scope: cross-module visibility and consent acceptance matrix
  - id: profile-location-visibility-scope
    path: docs/work/profile-location-visibility-scope.yaml
    scope: exact location privacy scope control
  - id: plan-coverage-audit
    path: docs/work/plan-coverage-audit.yaml
    scope: automatic inventory-to-master plan coverage validation
  - id: things-owner-borrow-workflow
    path: docs/work/things-owner-borrow-workflow.yaml
    scope: owner decisions and borrower return lifecycle for Things
  - id: things-detail-surface
    path: docs/work/things-detail-surface.yaml
    scope: dedicated Things listing detail route
  - id: runtime-acceptance-catalog
    path: docs/work/runtime-acceptance-catalog.yaml
    scope: browser and device runtime acceptance scenarios
  - id: cross-module-search-contract
    path: docs/work/cross-module-search-contract.yaml
    scope: mixed-family search and comparison semantics
  - id: native-client-handoff-contract
    path: docs/work/native-client-handoff-contract.yaml
    scope: iPhone and Watch backend-owned handoff contract
  - id: frontend-ux-modernization
    path: docs/work/frontend-ux-modernization.yaml
    scope: standardized, functional, reusable authenticated web UI/UX
statuses:
  planned: The product intends to support it, but implementation has not started.
  not_offered: Some supporting code may exist, but users have no usable product surface.
  partial: A meaningful slice exists, but one or more intended workflows or clients are missing.
  broken: The capability is offered but a known defect prevents reliable use.
  implemented: The primary web/backend workflow exists, but broader clients or polish may remain.
  verified: Implemented and validated against its current acceptance criteria.
  deprecated: Deliberately being removed or replaced.
priorities:
  - critical
  - high
  - medium
  - low
source_documents:
  - id: vision
    path: docs/product-vision.md
    role: intended product direction and interaction principles
  - id: memory
    path: docs/product-memory.md
    role: durable product and architecture lessons
  - id: business_logic
    path: docs/business-logic.md
    role: user-facing behavior and rules
  - id: domain_technical
    path: docs/domain-technical.md
    role: entities, permissions, workflows, and invariants
  - id: readme
    path: apps/themuffinman/README.md
    role: current module boundaries and implementation notes
  - id: vision_status
    path: docs/vision-status-ledger.md
    role: current Vision capability history and known limitations
  - id: modern_master_plan
    path: docs/work/modern-minimal-adaptive-product.yaml
    role: latest verified adaptive surface implementation batch
