  order: [platform, business, chat_social, work_sharing]
  required_review_fields: [endpoint, domain, controller, owner, consumer, authority, test, runtime_class, evidence, decision, unresolved_gap]
  completion_rule: A row may leave review_required only when owner, consumer, authority, test, and source or runtime evidence are recorded.
  non_promotion_rule: Static classification, controller inspection, or client linkage alone cannot change runtime acceptance status.
  batch_boundary: Each batch is verified independently and updates only its owned rows; unresolved rows retain review_required.
