    decision: reviewed_with_gaps
    unresolved_gap: Chat protocol, circle eligibility, attachment lifecycle, and direct consumer/runtime links require row-level follow-up.
  - batch: work_sharing
    owner: workmarket_or_sharing
    endpoints: [GET /news/me/unread-count, GET /quests, DELETE /quests/:param, GET /quests/:param, GET /quests/:param/applications, PATCH /quests/:param/applications/:param/approve, PATCH /quests/:param/applications/:param/decline, PATCH /quests/:param/cancel, PATCH /quests/:param/complete, PATCH /quests/:param/pause, PATCH /quests/:param/resume, PATCH /quests/:param/start, PATCH /quests/:param/term/confirm, PATCH /quests/:param/term/reject, GET /quests/presets/:param, GET /quests/search]
    consumers: [web, vision, admin]
    authority: docs/permission-visibility-matrix.yaml#workmarket_quest
    tests: [docs/regression-scenario-catalog.yaml]
    runtime_class: runtime_evidence_not_reconciled
    evidence: [docs/endpoint-capability-traceability-registry.yaml, source-traced-controller]
    decision: reviewed_with_gaps
    unresolved_gap: Work and sharing rows need per-endpoint consumer/test/runtime linkage; static controller ownership is not runtime proof.
