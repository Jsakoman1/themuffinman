  - id: vision-direct-message-idempotency
    domain: vision
    risk: high
    scenario: A confirmed Vision direct message must be sent once, retain its authoritative message id, and return a completed readback on repeated confirmation without sending a duplicate.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/vision/service/VisionConversationServiceTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/vision/service/VisionChatExecutionServiceTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=VisionConversationServiceTest,VisionChatExecutionServiceTest
  - id: ui-linking-vision-inline-runtime-closeout
    domain: web-vision
    risk: high
