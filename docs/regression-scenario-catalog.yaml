---
regression_scenarios:
  - id: agent-exact-target-fail-closed
    domain: agent
    risk: high
    scenario: Admin-agent mutating prompts must fail closed until exact target resolution and required confirmation exist.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/agent/service/AdminAgentExecutionServiceTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/agent/service/AdminSyntheticQuestExecutionPlannerTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=AdminAgentExecutionServiceTest,AdminSyntheticQuestExecutionPlannerTest
  - id: workmarket-quest-lifecycle
    domain: workmarket
    risk: high
    scenario: Quest create, update, delete, start, complete, and term-change flows must resolve actors, validate state, persist changes, and publish expected notifications.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/vision/service/QuestWorkflowScenarioTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=QuestWorkflowScenarioTest
  - id: workmarket-application-lifecycle
    domain: workmarket
    risk: high
    scenario: Application apply, applicant edit, withdraw, owner approve, owner decline, and admin mutation flows must enforce ownership, status, pricing, and notification rules.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/vision/service/QuestWorkflowScenarioTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=QuestWorkflowScenarioTest
  - id: workmarket-dashboard-read-model
    domain: workmarket
    risk: medium
    scenario: Dashboard sections, applicant actions, open-work groups, and notification destinations must stay backend-prepared and role-aware.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/vision/service/VisionCapabilityPreviewServiceTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/vision/service/DashboardVisionPromptServiceTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=VisionCapabilityPreviewServiceTest,DashboardVisionPromptServiceTest
  - id: social-chat-relation-access
    domain: social
    risk: high
    scenario: Circle membership, accepted relation state, blocking, discovery, and chat eligibility must not leak pending or stale contacts.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/social/service/CircleServiceTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/social/service/CircleRelationServiceTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/chat/service/ChatServiceTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=CircleServiceTest,CircleRelationServiceTest,ChatServiceTest
  - id: location-exact-visibility
    domain: location
    risk: high
    scenario: Exact location access must allow owners, respect circle and explicit-user scopes, and avoid provider calls when lookup is disabled.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/location/service/LocationAccessPolicyServiceTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/location/service/LocationLookupServiceTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=LocationAccessPolicyServiceTest,LocationLookupServiceTest
  - id: identity-admin-account-safety
    domain: identity
    risk: high
    scenario: Account creation, deletion, role changes, duplicate email checks, profile sanitization, and admin detail access must stay fail-closed.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/identity/service/AppUserServiceTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/identity/service/AdminUserDetailServiceTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/identity/controller/AuthControllerTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=AppUserServiceTest,AdminUserDetailServiceTest,AuthControllerTest
  - id: business-profile-public-directory
    domain: business
    risk: medium
    scenario: Business profiles must derive stable slugs, reject duplicate slugs, expose active directory entries, and hide inactive public profiles.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/business/service/BusinessProfileServiceTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=BusinessProfileServiceTest
  - id: things-borrow-request-workflow
    domain: things
    risk: medium
    scenario: Thing listings and borrow requests must enforce owner boundaries, duplicate pending request rules, and viewer-specific pending request read state.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/things/service/ThingSharingServiceTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=ThingSharingServiceTest
  - id: rides-circle-scoped-offers
    domain: rides
    risk: medium
    scenario: Ride offers must validate scheduling windows, reject unowned visibility circles, and return visible offer read models.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/rides/service/RideOfferServiceTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=RideOfferServiceTest
  - id: common-cross-module-primitives
    domain: common
    risk: medium
    scenario: Shared actor, ownership, scheduling-window, circle visibility, rich-text sanitization, and structured error primitives must remain stable across modules.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/common/concepts/CoreConceptsTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/common/validation/RichTextInputValidatorTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/common/controller/GlobalExceptionHandlerTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=CoreConceptsTest,RichTextInputValidatorTest,GlobalExceptionHandlerTest
  - id: vision-learning-eval-harness
    domain: common
    risk: medium
    scenario: Preference confidence decay, learned-memory recall, and clarification wording should stay stable while weak ambiguous follow-ups keep the current topic thread.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/vision/service/VisionLearningEvaluationHarnessTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/vision/service/VisionConversationServiceTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=VisionLearningEvaluationHarnessTest,VisionConversationServiceTest
  - id: vision-crud-utterance-regressions
    domain: vision
    risk: medium
    scenario: Real voice utterances must keep the standard create/view/update/delete contract stable across circles, applications, profiles, chat, discovery, and read snapshots.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/vision/service/VisionSlotFillingRegressionTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/vision/service/VisionSemanticRouteCatalogServiceTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=VisionSlotFillingRegressionTest,VisionSemanticRouteCatalogServiceTest
  - id: identity-profile-read-model
    domain: identity
    risk: medium
    scenario: Profile view must stay role-aware, preserve edit and relation actions, and keep public summary assembly aligned with the backend read model.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/identity/service/UserProfileViewServiceTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/identity/service/IdentityUserSummaryAssemblerTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=UserProfileViewServiceTest,IdentityUserSummaryAssemblerTest
  - id: social-circle-discovery-read-model
    domain: social
    risk: medium
    scenario: Circle discovery, membership, and search surfaces must keep nearby discovery, relationship state, and admin overviews aligned with backend read models.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/social/service/CircleDiscoveryServiceTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/social/service/CircleMembershipServiceTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/social/service/CircleSearchQueryServiceTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/social/service/CircleAdminOverviewAssemblerTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=CircleDiscoveryServiceTest,CircleMembershipServiceTest,CircleSearchQueryServiceTest,CircleAdminOverviewAssemblerTest
  - id: workmarket-quest-read-model
    domain: workmarket
    risk: medium
    scenario: Quest browsing, recommendation ranking, and quest news read state must stay backend-prepared and viewer-aware.
    test_files:
      - apps/themuffinman/src/test/java/com/themuffinman/app/vision/service/VisionCapabilityPreviewServiceTest.java
      - apps/themuffinman/src/test/java/com/themuffinman/app/vision/service/VisionCapabilityPreviewServiceAliasResolutionTest.java
    commands:
      - cd apps/themuffinman && ./mvnw test -Dtest=VisionCapabilityPreviewServiceTest,VisionCapabilityPreviewServiceAliasResolutionTest
