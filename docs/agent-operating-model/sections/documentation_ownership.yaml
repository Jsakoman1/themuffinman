---
documentation_ownership:
  documentation_templates:
  - id: new_workflow
    label: New workflow
    template_path: ".agents/templates/docs/new-workflow.template.md"
    required_living_docs:
    - docs/business-logic.md
    - docs/domain-technical.md
    - docs/agent-operating-model.md
    required_sections:
    - Behavior Summary
    - State Model
    - Permissions And Visibility
    - Validation And Edge Cases
    - Documentation Delta
    - Validation Evidence
  - id: new_endpoint
    label: New endpoint
    template_path: ".agents/templates/docs/new-endpoint.template.md"
    required_living_docs:
    - docs/domain-technical.md
    - docs/business-logic.md
    - docs/agent-operating-model.md
    required_sections:
    - Endpoint Contract
    - Behavior Summary
    - Permissions And Visibility
    - Validation And Errors
    - Documentation Delta
    - Validation Evidence
  - id: new_dto_contract
    label: New DTO contract
    template_path: ".agents/templates/docs/new-dto-contract.template.md"
