    required_living_docs:
    - docs/business-logic.md
    - docs/domain-technical.md
    generated_artifacts:
    - docs/generated/backend-audit-inventory.json
    validation_commands:
    - "./mvnw test"
  - id: frontend_contract
    required_living_docs:
    - docs/domain-technical.md
    - docs/agent-operating-model.md
    generated_artifacts:
    - apps/themuffinman/frontend/src/contracts/generated/themuffinmanContract.ts
    validation_commands:
    - npm run validate:contracts
    - npm run type-check
    - npm run build
  - id: workflow_change
    required_living_docs:
    - docs/business-logic.md
    - docs/domain-technical.md
    - docs/agent-operating-model.md
    generated_artifacts:
    - docs/agent-operating-model.yaml
    - docs/generated/automation-read-model-inventory.json
    validation_commands:
    - make audit-agent-safety
    - "./mvnw test"
  - id: schema_migration
    required_living_docs:
    - docs/domain-technical.md
    generated_artifacts:
    - docs/generated/backend-audit-inventory.json
    validation_commands:
    - "./mvnw test"
  - id: agent_contract
    required_living_docs:
    - docs/codex-fast-path.md
    - docs/feature-delivery-workflow.md
    - docs/agent-operating-model.md
    - docs/documentation-sync-policy.md
    - docs/change-completion-checklist.md
    generated_artifacts:
    - docs/agent-operating-model.yaml
    - docs/generated/source-of-truth-audit.json
    validation_commands:
    - ruby scripts/generate-agent-operating-model.rb
    - make audit-agent-safety
  - id: sandbox_generation
    required_living_docs:
    - docs/business-logic.md
    - docs/domain-technical.md
    - docs/agent-operating-model.md
    generated_artifacts:
    - docs/agent-operating-model.yaml
