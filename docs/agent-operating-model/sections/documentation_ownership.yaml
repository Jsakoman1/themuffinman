    - docs/business-logic.md
    - docs/agent-operating-model.md
    required_sections:
    - DTO Contract
    - Field Semantics
    - Permissions And Visibility
    - Compatibility Notes
    - Documentation Delta
    - Validation Evidence
  - id: new_module
    label: New module
    template_path: ".agents/templates/docs/new-module.template.md"
