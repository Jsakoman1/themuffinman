    validation_commands:
    - make audit-local-tooling-incremental
  - id: backlog_hygiene
    required_living_docs:
    - docs/implementation-backlog.md
    - docs/agent-improvement-backlog.md
    generated_artifacts: []
    validation_commands:
    - ruby scripts/todo-audit.rb
