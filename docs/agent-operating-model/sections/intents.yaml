    - quest_state_transition_service
    - quest_access_policy_service
    - service_errors
    fail_if:
    - acting user is neither admin nor approved applicant
  - step: 2
    action: Require the quest to be in WAITING_CONFIRMATION and have a restorable
      previous status.
    source_refs:
    - quest_state_transition_service
    - quest_service
    - service_errors
    fail_if:
    - quest is not waiting for confirmation
    - the backend cannot restore the previous quest status
  - step: 3
    action: Reject the term change through the dedicated endpoint and restore the
      previous active quest status without applying pending term fields.
    endpoint_id: reject_quest_term_change
    source_refs:
    - quest_controller
    - quest_service
    - quest_state_transition_service
- id: request_owner_term_change
  description: Request or apply a quest term change through the owner update flow.
  mutating: true
  required_inputs:
  - authenticated_user
  - quest_id
  - scheduled_at
  optional_inputs:
  - ends_at
  - term_fixed
  defaults: []
  workflow:
  - step: 1
    action: Require owner authority over the quest update flow.
    source_refs:
    - quest_service
    - quest_update_service
    - service_errors
    fail_if:
    - acting user is not the quest owner
  - step: 2
    action: Validate the requested term payload.
    source_refs:
    - quest_request_dto
    - quest_validation_service
    - service_errors
    fail_if:
    - scheduled_at and term flags are invalid
    - ends_at is invalid for the requested schedule
  - step: 3
    when: quest status is OPEN or CANCELLED
    action: Apply the term directly through quest update without waiting for worker
      confirmation.
    endpoint_id: update_quest
    source_refs:
    - quest_controller
    - quest_service
    - quest_update_service
    - quest_state_transition_service
  - step: 4
    when: quest status is ASSIGNED or IN_PROGRESS
    action: Queue the term change through quest update and move the quest into WAITING_CONFIRMATION.
    endpoint_id: update_quest
    source_refs:
    - quest_controller
    - quest_service
    - quest_update_service
    - quest_state_transition_service
- id: create_review
  description: Create or update a post-completion review for the employer or approved
    worker.
  mutating: true
  required_inputs:
  - authenticated_user
  - quest_id
  - reviewed_user_id
  - stars
  optional_inputs:
  - comment
  defaults: []
  workflow:
  - step: 1
    action: Require the quest to already be COMPLETED.
    source_refs:
    - user_review_service
    - quest_service
    - service_errors
    fail_if:
    - quest is not completed
  - step: 2
    action: Validate review payload and reject self-review.
    source_refs:
    - user_review_request_dto
    - user_review_service
    - rich_text_validator
    - service_errors
    fail_if:
    - reviewed_user_id is missing
    - stars are outside 1..5
    - comment is too long
    - acting user is reviewing themselves
  - step: 3
    action: Require the target review relationship to match completed quest roles.
    source_refs:
    - user_review_service
    - quest_application_service
    - service_errors
    fail_if:
    - acting user is not allowed to review the employer for this quest
    - reviewed user was not an approved worker for this quest
  - step: 4
    action: Persist the review through the review endpoint.
    endpoint_id: create_or_update_review
    source_refs:
    - user_review_controller
    - user_review_service
    - user_review_request_dto
- id: create_user_with_quests
  description: Create one normal user and then create a caller-defined number of distinct
    quests owned by that user.
  mutating: true
  required_inputs:
  - base_email
  - username
  - password
  - quest_count
  - quest_templates
  optional_inputs:
  - profile_description
  - profile_avatar_data_url
  - location_settings
  - shared_quest_defaults
  defaults:
  - field: quest_count
    value: 1
  workflow:
  - step: 1
    action: Read the authenticated caller identity and require admin-controlled batch
      input validation before creating the user or any quests.
    intent_ref: open_auth_identity
    source_refs:
    - auth_controller
    - app_user_service
    - quest_validation_service
    - documentation_sync_policy_doc
    fail_if:
    - admin actor context is missing
    - base user identity inputs are incomplete
    - quest batch request is missing deterministic templates or defaults
  - step: 2
    action: Execute the create_user workflow first and stop if user creation fails.
    intent_ref: create_user
    source_refs:
    - auth_controller
    - app_user_service
    - app_user_controller
  - step: 3
    action: If quest defaults require visible profile-backed location, ensure the
      user profile location is configured before quest creation.
    intent_ref: set_profile_location
    endpoint_id: update_current_user
    source_refs:
    - location_settings_service
    - app_user_controller
    - service_errors
  - step: 4
    when: shared_quest_defaults or templates require selected circle ids that do not
      yet exist
    action: Create missing owner circles before quest creation.
    intent_ref: create_circle
    endpoint_id: create_circle
    source_refs:
    - circle_controller
    - circle_service
    - service_errors
  - step: 5
    when: shared_quest_defaults or templates require selected users inside owner circles
    action: Assign connected users into owner circles before creating the quests.
    intent_ref: assign_circle_members
    source_refs:
    - circle_controller
    - circle_service
    - circle_membership_service
    - service_errors
  - step: 6
    action: Ensure the requested batch count is at least 1 and that enough meaningfully
      distinct quest payloads can be produced.
    source_refs:
    - quest_validation_service
    - rich_text_validator
    fail_if:
    - quest_count is below 1
    - not enough unique quest payloads are available for the requested batch
  - step: 7
    action: Create quests one by one using the create_quest workflow and stop on the
      first unsafe validation failure.
    intent_ref: create_quest
    endpoint_id: create_quest
    source_refs:
    - quest_controller
    - quest_service
    - quest_update_service
    - location_settings_service
- id: create_circle_only_quest_for_selected_people
  description: Prepare a circle-limited quest for selected people by ensuring connection,
    circle membership, and then quest creation.
  mutating: true
  required_inputs:
  - authenticated_user
  - selected_people
  - circle_name
  - quest_payload
  optional_inputs:
  - existing_circle_id
  - auto_invite_missing_people
  - multi_actor_accept_context
  defaults:
  - field: auto_invite_missing_people
    value: false
  workflow:
  - step: 1
    action: Require at least one selected person and a quest payload that uses audience
      CIRCLES.
    source_refs:
    - quest_request_dto
    - circle_service
    - service_errors
    fail_if:
    - selected_people is empty
    - quest_payload audience is not CIRCLES
  - step: 2
    when: existing_circle_id is not provided
    action: Create the owner circle that will hold the selected people.
    intent_ref: create_circle
    endpoint_id: create_circle
    source_refs:
    - circle_controller
    - circle_service
  - step: 3
    when: all selected people are already accepted connections
    action: Assign the selected accepted connections into the owner circle.
    intent_ref: assign_circle_members
    source_refs:
    - circle_controller
    - circle_service
    - circle_membership_service
  - step: 4
    when: some selected people are not accepted connections and auto_invite_missing_people
      == true
    action: Send invites to the missing people, but do not treat them as connected
      yet.
    intent_ref: create_circle_connection
    endpoint_id: create_circle_request
    source_refs:
    - circle_controller
    - circle_relation_service
    - service_errors
  - step: 5
    when: some selected people are not accepted connections and multi_actor_accept_context
      is provided
    action: Allow recipient-side acceptance only through explicit multi-actor execution
      context.
    intent_ref: accept_circle_connection
    endpoint_id: accept_circle_request
    source_refs:
    - circle_controller
    - circle_relation_service
    - service_errors
  - step: 6
    when: after connection checks and optional accept flow, some selected people are
      still not accepted connections
    action: Stop instead of creating a misleading circle-only quest for people who
      cannot actually be added.
    source_refs:
    - circle_service
    - circle_relation_service
    - service_errors
    fail_if:
    - one or more selected people are still not accepted connections
  - step: 7
    action: Create the final circle-only quest using the prepared owner circle selection.
    intent_ref: create_quest
    endpoint_id: create_quest
    source_refs:
    - quest_controller
    - quest_service
    - quest_visibility_service
    - service_errors
- id: prepare_circle_only_quest_flow_to_start
  description: Prepare a selected-people circle quest all the way to ASSIGNED or STARTED,
    but only when each actor-side prerequisite is available.
  mutating: true
  required_inputs:
  - owner_user
  - selected_people
  - circle_name
  - quest_payload
  optional_inputs:
  - existing_circle_id
  - auto_invite_missing_people
  - multi_actor_accept_context
  - applicant_payloads
  - auto_approve_applicants
  - auto_start_when_assigned
  - execution_actor
  defaults:
  - field: auto_invite_missing_people
    value: false
  - field: auto_approve_applicants
    value: false
  - field: auto_start_when_assigned
    value: false
  workflow:
  - step: 1
    action: Read the authenticated owner context before preparing the selected-people
      quest flow.
    intent_ref: open_auth_identity
    source_refs:
    - auth_controller
    - circle_service
    - quest_service
    - documentation_sync_policy_doc
    fail_if:
    - owner_user is missing
    - authenticated owner context is missing
  - step: 2
    action: Prepare the selected-people circle and create the circle-only quest first.
    intent_ref: create_circle_only_quest_for_selected_people
    source_refs:
    - circle_controller
    - circle_service
    - quest_controller
    - quest_service
  - step: 3
    when: applicant_payloads are provided
    action: Require one applicant-side payload per intended worker and execute applications
      only in the authenticated context of each applicant.
    source_refs:
    - quest_application_request_dto
    - quest_application_service
    - service_errors
    fail_if:
    - an applicant payload is missing for a person who must apply
    - an applicant-side authenticated context is missing
  - step: 4
    when: applicant_payloads are provided
    action: Create the applications one by one through the applicant-side workflow.
    intent_ref: apply_to_quest
    endpoint_id: apply_to_quest
    source_refs:
    - quest_application_controller
    - quest_application_service
    - quest_visibility_service
  - step: 5
    when: auto_approve_applicants == true
    action: Approve the target applications only from owner or admin context, respecting
      assignee_target capacity.
    intent_ref: approve_application
    endpoint_id: approve_application
    source_refs:
    - quest_application_controller
    - quest_application_service
    - quest_state_transition_service
    - service_errors
  - step: 6
    when: auto_approve_applicants == true and applicant_payloads are missing
    action: Stop because approval cannot happen before real applications exist.
    source_refs:
    - quest_application_service
    - service_errors
    fail_if:
    - no real applications exist to approve
  - step: 7
    when: auto_start_when_assigned == true
    action: Require the quest to already be ASSIGNED and require an execution actor
      that is owner, admin, or approved worker.
    source_refs:
    - quest_service
    - quest_state_transition_service
    - service_errors
    fail_if:
    - quest is not assigned after approval flow
    - execution_actor is missing
    - execution_actor lacks execution authority
  - step: 8
    when: auto_start_when_assigned == true
    action: Start the quest through the execution workflow.
    intent_ref: start_quest
    endpoint_id: start_quest
    source_refs:
    - quest_controller
    - quest_service
    - quest_state_transition_service
- id: voice_prepare_scheduled_circle_only_quest_for_selected_people
  description: Resolve a voice instruction for a scheduled circle-only quest and prepare
    it toward ASSIGNED or STARTED without guessing missing actor-side context.
  mutating: true
  required_inputs:
  - owner_user
  - requester_time_zone
  - selected_people
  - scheduling_request
  - quest_payload_template
  optional_inputs:
  - existing_circle_id
  - circle_name
  - auto_invite_missing_people
  - multi_actor_accept_context
  - selected_applicant_payloads
  - auto_approve_selected_applicants
  - auto_decline_unexpected_applicants
  - term_change_request
  - review_handoff_plan
  - auto_start_when_assigned
  - auto_complete_after_execution
  - execution_actor
  defaults:
  - field: auto_invite_missing_people
    value: false
  - field: auto_approve_selected_applicants
    value: false
  - field: auto_decline_unexpected_applicants
    value: false
  - field: auto_start_when_assigned
    value: false
  - field: auto_complete_after_execution
    value: false
  workflow:
  - step: 1
    action: Read the authenticated caller identity and resolve the voice scheduling
      request into an absolute quest timestamp in the caller's timezone before mutation.
    intent_ref: open_auth_identity
    source_refs:
    - auth_controller
    - quest_request_dto
    - quest_validation_service
    - service_errors
    fail_if:
    - requester_time_zone is missing
    - authenticated owner context is missing
    - scheduling_request cannot be resolved into an absolute scheduled_at
    - resolved scheduled_at is invalid for quest creation
  - step: 2
    action: Resolve selected people into concrete user ids and reject ambiguous or
      unresolved matches.
    source_refs:
    - app_user_lookup_service
    - circle_service
    - circle_relation_service
    - service_errors
    fail_if:
    - selected_people is empty
    - one or more selected people cannot be resolved safely
  - step: 3
    action: Build a quest payload that forces audience CIRCLES and injects the resolved
      absolute schedule.
    source_refs:
    - quest_request_dto
    - quest_validation_service
    - service_errors
    fail_if:
    - quest_payload_template is missing required quest fields
    - the resolved payload does not use audience CIRCLES
  - step: 4
    action: Prepare the selected-people circle and create the scheduled circle-only
      quest.
    intent_ref: create_circle_only_quest_for_selected_people
    source_refs:
    - circle_controller
    - circle_service
    - quest_controller
    - quest_service
  - step: 5
    when: selected_applicant_payloads are provided
    action: Require one applicant-authenticated payload per intended worker and keep
      the applicant set inside the resolved selected people set.
    source_refs:
    - quest_application_request_dto
    - quest_application_service
    - service_errors
    fail_if:
    - an applicant payload is missing for a selected worker who must apply
    - an applicant-side authenticated context is missing
    - an applicant payload belongs to someone outside the resolved selected people
      set
  - step: 6
    when: selected_applicant_payloads are provided
    action: Create the selected workers' applications through applicant-side execution
      only.
    intent_ref: apply_to_quest
    endpoint_id: apply_to_quest
    source_refs:
    - quest_application_controller
    - quest_application_service
    - quest_visibility_service
  - step: 7
    when: auto_approve_selected_applicants == true
    action: Approve only the intended selected pending applications from owner or
      admin context and stop when assignee_target capacity is reached.
    intent_ref: approve_application
    endpoint_id: approve_application
    source_refs:
    - quest_application_controller
    - quest_application_service
    - quest_state_transition_service
    - service_errors
  - step: 8
    when: auto_approve_selected_applicants == true and selected_applicant_payloads
      are missing
    action: Stop because selected approvals cannot happen before real selected applications
      exist.
    source_refs:
    - quest_application_service
    - service_errors
    fail_if:
    - no real selected applications exist to approve
  - step: 9
    when: auto_decline_unexpected_applicants == true
    action: Decline only pending applications from users outside the resolved selected
      people set through owner or admin context.
    intent_ref: decline_application
    endpoint_id: decline_application
    source_refs:
    - quest_application_controller
    - quest_application_service
    - quest_visibility_service
    - service_errors
  - step: 10
    when: term_change_request is provided after the quest reaches ASSIGNED or IN_PROGRESS
    action: Request the owner-side term change and expect WAITING_CONFIRMATION until
      approved-worker or admin decision completes.
    intent_ref: request_owner_term_change
    endpoint_id: update_quest
    source_refs:
    - quest_controller
    - quest_service
    - quest_update_service
    - quest_state_transition_service
  - step: 11
    when: auto_start_when_assigned == true
    action: Require the quest to already be ASSIGNED and require an execution actor
      that is owner, admin, or approved worker.
    source_refs:
    - quest_service
    - quest_state_transition_service
    - service_errors
    fail_if:
    - quest is not assigned after selected approval flow
    - execution_actor is missing
    - execution_actor lacks execution authority
  - step: 12
    when: auto_start_when_assigned == true
    action: Start the quest through the execution workflow.
    intent_ref: start_quest
    endpoint_id: start_quest
    source_refs:
    - quest_controller
    - quest_service
    - quest_state_transition_service
  - step: 13
    when: auto_complete_after_execution == true
    action: Complete the quest only after it has reached IN_PROGRESS and an execution-authorized
      actor is present.
    intent_ref: complete_quest
    endpoint_id: complete_quest
    source_refs:
    - quest_controller
    - quest_service
    - quest_state_transition_service
  - step: 14
    when: review_handoff_plan is provided and the quest is COMPLETED
    action: Hand off to post-completion review creation only for valid employer-worker
      review pairs.
    intent_ref: create_review
    endpoint_id: create_or_update_review
    source_refs:
    - user_review_controller
    - user_review_service
    - quest_application_service
    - service_errors
- id: create_sandbox_user_with_circle_and_quest_flow
  description: Plan a synthetic admin-only test-data flow that creates users, circles,
    quest applications, lifecycle transitions, and reviews without pretending it is
    a production user path.
  mutating: true
  required_inputs:
  - admin_actor
  - environment_scope
  - synthetic_user_batch
  - sandbox_flow_plan
  optional_inputs:
  - synthetic_circle_plan
  - synthetic_quest_plan
  - synthetic_application_plan
  - synthetic_execution_plan
  - synthetic_review_plan
  - synthetic_marker_strategy
  defaults: []
  workflow:
  - step: 1
    action: Read the authenticated admin identity and require explicit admin authority
      plus developer-controlled environment scope before any synthetic flow is allowed.
    intent_ref: open_auth_identity
    source_refs:
    - auth_controller
    - agents_doc
    - documentation_sync_policy_doc
    - service_errors
    fail_if:
    - admin_actor is missing
    - environment_scope is not explicitly sandbox-safe
  - step: 2
    action: Require an explicit synthetic marker strategy so sandbox entities can
      later be distinguished from real data.
    source_refs:
    - business_logic_doc
    - domain_technical_doc
    fail_if:
    - synthetic_marker_strategy is missing
  - step: 3
    action: Create the synthetic users and any required profile defaults.
    intent_ref: create_user_with_quests
    source_refs:
    - auth_controller
    - app_user_service
    - app_user_controller
  - step: 4
    when: synthetic_circle_plan is provided
    action: Create synthetic circles and memberships as part of the sandbox dataset.
    intent_ref: create_circle
    source_refs:
    - circle_controller
    - circle_service
    - circle_membership_service
  - step: 5
    when: synthetic_quest_plan is provided
    action: Create synthetic quests or selected-people quest flows from admin-controlled
      sandbox input.
    intent_ref: create_circle_only_quest_for_selected_people
    source_refs:
    - quest_controller
    - quest_service
    - circle_controller
    - circle_service
  - step: 6
    when: synthetic_application_plan is provided
    action: Allow synthetic multi-actor application creation only because this flow
      is explicitly sandbox-only.
    source_refs:
    - quest_application_service
    - documentation_sync_policy_doc
  - step: 7
    when: synthetic_execution_plan is provided
    action: Allow synthetic approval, start, completion, and optional term-change
      scenarios only inside the sandbox contract.
    source_refs:
    - quest_application_service
    - quest_service
    - quest_state_transition_service
  - step: 8
    when: synthetic_review_plan is provided
    action: Allow synthetic review generation only after synthetic completion plan
      reaches COMPLETED state.
    source_refs:
    - user_review_service
    - quest_service
    - service_errors
