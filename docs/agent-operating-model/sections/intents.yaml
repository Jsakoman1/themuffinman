    and the user explicitly confirms.
  mutating: true
  required_inputs:
  - authenticated_user
  optional_inputs:
  - prompt_text
  - conversation_id
  - source
  - action
  - review_target
  defaults: []
  workflow:
  - step: 1
    action: Require authenticated context and load or create one persisted vision
      conversation.
    endpoint_id: process_vision_conversation_turn
    source_refs:
    - vision_conversation_controller
    - vision_conversation_service
    - vision_conversation_turn_request_dto
    - vision_conversation_turn_response_dto
    - vision_slot_summary_dto
    - vision_quest_review_dto
    - service_errors
  - step: 2
    action: Keep the turn read-only while the backend collects one missing quest slot
      at a time, including reward, visibility, schedule, and location decisions; require
      explicit confirmation when a custom location lookup proposes a more precise
      candidate before review may continue; route `OPEN_CHAT` through the existing
      chat-open boundary when the semantic plan resolves a target contact; require
      typed review-edit actions with one explicit review target whenever the client
      requests a review correction; keep reset and cancel on dedicated lifecycle
      endpoints; execute the first real quest creation only when the execution flag
      is enabled and the user explicitly confirms.
    source_refs:
