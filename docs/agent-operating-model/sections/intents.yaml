- id: set_profile_location
  description: Set or clear the authenticated user's profile location through the
    self-update flow.
  mutating: true
  required_inputs:
  - authenticated_user
  - location_mode
  optional_inputs:
  - default_radius_km
  - exact_visibility_scope
  - exact_visible_circle_ids
  - exact_visible_user_ids
  - lookup_query
  - latitude
  - longitude
  - provider
  - provider_place_id
  - label
  - country_code
  - country
  - locality
  - postal_code
  - street
  - house_number
  - resolved_at
  defaults:
  - field: location_mode
    value: 'OFF'
  - field: default_radius_km
    value: 10
  - field: exact_visibility_scope
    value: NOBODY
  workflow:
  - step: 1
    action: Build a self-update payload that includes the current authenticated user's
      required email and username plus nested locationSettings.
    source_refs:
    - app_user_controller
    - app_user_request_dto
    - user_location_settings_request_dto
    - app_user_service
    fail_if:
    - authenticated user context is missing
    - required self-update identity fields are unavailable
  - step: 2
    when: location_mode == OFF
    action: Use OFF mode to clear stored profile coordinates and provider metadata.
    source_refs:
    - location_settings_service
    - service_errors
  - step: 3
    when: location_mode != OFF and latitude+longitude are provided
    action: Use provided coordinates directly inside locationSettings.
    source_refs:
    - user_location_settings_request_dto
    - location_settings_service
    - location_reverse_lookup_request_dto
  - step: 4
    when: location_mode != OFF and latitude+longitude are provided and human-readable
      address fields are missing
    action: Optionally resolve the nearest address through reverse lookup before saving
      the profile.
    endpoint_id: reverse_lookup_location
    source_refs:
    - location_lookup_controller
    - location_reverse_lookup_request_dto
    - location_settings_service
  - step: 5
    when: location_mode != OFF and lookup_query is provided
    action: Resolve a candidate address through lookup and use a selected result to
      fill label, address parts, coordinates, provider, and resolvedAt.
    endpoint_id: lookup_location
    source_refs:
    - location_lookup_controller
    - location_lookup_request_dto
    - location_settings_service
    fail_if:
    - lookup returns no acceptable candidate and no coordinates are available
  - step: 6
    when: location_mode != OFF and only manual address fields are provided
    action: Allow save only if the backend can auto-resolve the manual address into
      usable coordinates.
    source_refs:
    - location_settings_service
    - service_errors
    fail_if:
    - manual address cannot be resolved into usable coordinates
  - step: 7
    when: exact_visibility_scope == CIRCLES
    action: Require at least one owner-owned circle id.
    source_refs:
    - location_settings_service
    - service_errors
    fail_if:
    - no exact_visible_circle_ids are provided
    - selected circle ids are not owned by the authenticated user
  - step: 8
    when: exact_visibility_scope == USERS
    action: Require at least one selected user and only allow existing circle contacts.
    source_refs:
    - location_settings_service
    - service_errors
    fail_if:
    - no exact_visible_user_ids are provided
    - selected users are invalid or not connected through circles
  - step: 9
    action: Persist the profile location through the current-user update endpoint.
    endpoint_id: update_current_user
    source_refs:
    - app_user_controller
    - app_user_request_dto
    - location_settings_service
