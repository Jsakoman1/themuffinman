- id: delete_user_as_admin
  description: Delete one exact user account through the admin endpoint only after
    explicit destructive confirmation.
  mutating: true
  required_inputs:
  - authenticated_user
  - user_id
  - destructive_confirmation
  optional_inputs: []
  defaults: []
  workflow:
  - step: 1
    action: Require admin authority and one exact user target.
    source_refs:
    - app_user_service
    - service_errors
    fail_if:
    - user_id is missing
    - acting user is not admin
  - step: 2
    action: Apply backend account-protection rules before deletion.
    source_refs:
    - app_user_service
    - service_errors
    fail_if:
    - the target user is the acting admin
    - the target user is the last remaining admin
  - step: 3
    action: Require explicit destructive confirmation before deletion.
    source_refs:
    - app_user_service
    - service_errors
    fail_if:
    - destructive_confirmation is missing or false
  - step: 4
    action: Delete the user through the admin delete endpoint.
    endpoint_id: delete_user_as_admin
    source_refs:
    - app_user_controller
    - app_user_service
- id: resolve_circle_recipient
  description: Resolve one social recipient from natural-language or partial-name
    input before invite or accept flows.
  mutating: false
  required_inputs:
  - authenticated_user
  - recipient_query
  optional_inputs:
  - expected_relation_state
  defaults: []
  workflow:
  - step: 1
    action: Require a non-blank recipient query and normalize the search text.
    source_refs:
    - circle_service
    - service_errors
    fail_if:
    - recipient_query is missing
    - recipient_query is blank after trim
  - step: 2
    action: Search relationship-aware user candidates through the social search endpoint.
    endpoint_id: search_circle_users
    source_refs:
    - circle_controller
    - circle_service
    - circle_relation_service
  - step: 3
    action: Stop unless exactly one concrete recipient can be selected safely from
      the returned candidates.
    source_refs:
    - circle_service
    - circle_relation_service
    - service_errors
    fail_if:
    - no user candidate matches the intended recipient
    - multiple user candidates still match the intended recipient
  - step: 4
    when: expected_relation_state == incoming_request
    action: If the next workflow expects an incoming request, confirm the resolved
      recipient actually maps to an incoming pending request for the acting user.
    endpoint_id: get_incoming_circle_requests
    source_refs:
    - circle_controller
    - circle_service
    - circle_relation_service
    - service_errors
    fail_if:
    - the resolved recipient does not have an incoming pending request for the acting
      user
- id: resolve_user_candidate
  description: Resolve one user target from natural-language input before profile,
    social, or chat actions.
  mutating: false
  required_inputs:
  - authenticated_user
  - user_query
  optional_inputs:
  - scope
  defaults:
  - field: scope
    value: social_search
  workflow:
  - step: 1
    action: Require a non-blank user query and normalize the search text.
    source_refs:
    - circle_service
    - app_user_lookup_service
    - service_errors
    fail_if:
    - user_query is missing
    - user_query is blank after trim
  - step: 2
    when: scope == social_search
    action: Search relationship-aware user candidates through the social search endpoint.
    endpoint_id: search_circle_users
    source_refs:
    - circle_controller
    - circle_service
    - circle_relation_service
  - step: 3
    when: scope == accepted_contact
    action: Restrict user resolution to current accepted contacts through the connections
      endpoint.
    endpoint_id: get_circle_connections
    source_refs:
    - circle_controller
    - circle_service
    - circle_relation_service
  - step: 4
    when: scope == app_user_directory
    action: Resolve users from the admin app-user directory search surface.
    endpoint_id: get_all_app_users
    source_refs:
    - app_user_controller
    - app_user_service
    - app_user_lookup_service
  - step: 5
    when: scope == blocked_user_list
    action: Restrict user resolution to the acting user's current blocked users.
    endpoint_id: get_blocked_users
    source_refs:
    - circle_controller
    - circle_service
    - circle_relation_service
  - step: 6
    action: Stop unless exactly one user candidate can be selected safely.
    source_refs:
    - circle_service
    - app_user_lookup_service
    - service_errors
    fail_if:
    - no user candidate matches the intended target
    - multiple user candidates still match the intended target
- id: resolve_outgoing_circle_request
