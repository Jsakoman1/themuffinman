- id: create_quest
  description: Create one quest for the authenticated acting user.
  mutating: true
  required_inputs:
  - authenticated_user
  - title
  - description
  - reward_amount
  optional_inputs:
  - audience
  - selected_circle_ids
  - scheduled_at
  - end_at
  - location_visibility
  - location_source
  - location_label
  - location_country_code
  - location_country
  - location_locality
  - location_postal_code
  - location_street
  - location_house_number
  - assignee_target
  - images
  defaults:
  - field: audience
    value: CIRCLES
  - field: assignee_target
    value: 1
  - field: location_visibility
    value: INHERIT
  - field: location_source
    value: PROFILE
  workflow:
  - step: 1
    action: Build a quest request payload and validate quest core fields, term flags,
      assignee target, image limits, and rich-text content.
    source_refs:
    - quest_request_dto
    - quest_validation_service
    - rich_text_validator
    - service_errors
    fail_if:
    - title is missing
    - description has no meaningful content
    - reward amount is negative
    - term_fixed is missing on create
    - scheduled_at is missing when term_fixed is true
    - end_at is not after scheduled_at
    - assignee_target is below 1
    - more than 10 images are provided
    - an image is not a data URL
  - step: 2
    when: audience == EVERYONE
    action: Clear or ignore selected circle visibility because public quests do not
      keep circle restrictions.
    source_refs:
    - quest_validation_service
    - quest_visibility_service
    - service_errors
  - step: 3
    when: audience == CIRCLES and selected_circle_ids are provided
    action: Validate each selected circle id against circles owned by the authenticated
      quest owner.
    source_refs:
    - quest_validation_service
    - quest_visibility_service
    - service_errors
    fail_if:
    - audience is CIRCLES and selected circles are invalid for the owner
  - step: 4
    when: audience == CIRCLES and selected_circle_ids are omitted or empty
    action: Allow the fallback visibility model where quest access is later resolved
      from the creator's accepted circle relation with the viewer.
    source_refs:
    - quest_visibility_service
    - quest_validation_service
  - step: 5
    when: location_visibility == OFF
    action: Clear quest location data and skip profile-location or custom-location
      requirements.
    source_refs:
    - location_settings_service
    - service_errors
  - step: 6
    when: location_visibility != OFF and location_source == PROFILE
    action: Use the creator's saved profile location snapshot for the quest.
    source_refs:
    - location_settings_service
    - service_errors
    fail_if:
    - location_source is PROFILE with visible location but the user profile location
      is unusable
  - step: 7
    when: location_visibility == INHERIT and location_source == PROFILE and creator
      profile location mode == OFF
    action: Allow inherited profile location to collapse to no quest location instead
      of forcing visible location.
    source_refs:
    - location_settings_service
  - step: 8
    when: location_visibility != OFF and location_source == CUSTOM
    action: Require at least one custom address field and rely on backend auto-resolution
      to obtain usable coordinates.
    source_refs:
    - quest_request_dto
    - quest_validation_service
    - location_settings_service
    - service_errors
    fail_if:
    - custom location has no address-related field
    - location_source is CUSTOM and coordinates cannot be resolved
  - step: 9
    action: Persist the quest through the quest create endpoint.
    endpoint_id: create_quest
    source_refs:
    - quest_controller
    - quest_request_dto
    - quest_service
    - quest_update_service
