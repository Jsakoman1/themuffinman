  future_tightening:
  - phase: next
    target_tier: automation_relevant
    goal: Promote only small rule-scoped DTO, read-model, or service slices into strict source-of-truth registration and documentation coverage; keep the broad service catch-all report-only until each service slice is stable, domain-owned, and low-noise.
  - phase: later
    target_tier: internal_support
    goal: Keep explicit inventory and ownership visibility across the rest of the backend without forcing workflow-coupled fail-hard rules for every support class.
  domain_ownership:
