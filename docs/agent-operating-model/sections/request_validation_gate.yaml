---
request_validation_gate:
- id: app_user_request_validation
  java_class: com.themuffinman.app.identity.dto.AppUserRequestDTO
  validated_fields:
  - field: email
    required_annotations:
    - NotBlank
    - Email
    - Size
  - field: username
    required_annotations:
    - NotBlank
    - Size
  - field: password
    required_annotations:
    - Size
  - field: profileDescription
    required_annotations:
    - Size
  - field: profileAvatarDataUrl
    required_annotations:
    - Size
    - Pattern
  service_validator_source_refs:
  - app_user_service
  service_validation_markers:
  - validateEmail
  - validateUsername
  - validatePassword
  - applyUserLocationSettings
  doc_paths:
  - docs/domain-technical.md
  - docs/business-logic.md
  verification_tests:
  - apps/themuffinman/src/test/java/com/themuffinman/app/identity/service/AppUserServiceTest.java
- id: quest_request_validation
  java_class: com.themuffinman.app.workmarket.dto.QuestRequestDTO
  validated_fields:
  - field: title
    required_annotations:
    - NotBlank
    - Size
  - field: description
    required_annotations:
    - NotBlank
    - Size
  - field: awardAmount
    required_annotations:
    - NotNull
    - DecimalMin
    - Digits
  service_validator_source_refs:
  - quest_validation_service
  - quest_update_service
  service_validation_markers:
  - validateQuestTitle
  - validateQuestDescription
  - validateQuestAwardAmount
  - validateQuestImages
  - validateQuestLocation
  - applyQuestLocation
  doc_paths:
  - docs/domain-technical.md
  - docs/business-logic.md
  verification_tests:
  - apps/themuffinman/src/test/java/com/themuffinman/app/workmarket/dto/RequestDtoValidationTest.java
  - apps/themuffinman/src/test/java/com/themuffinman/app/workmarket/service/QuestServiceTest.java
- id: quest_application_request_validation
  java_class: com.themuffinman.app.workmarket.dto.QuestApplicationRequestDTO
  validated_fields:
  - field: message
    required_annotations:
    - NotBlank
    - Size
  - field: proposedPrice
    required_annotations:
    - Digits
  service_validator_source_refs:
  - quest_application_workflow_support
  service_validation_markers:
  - Application message is required
  - Free quest applications cannot have a proposed price
  - Proposed price is required for paid quests
  doc_paths:
  - docs/domain-technical.md
  - docs/business-logic.md
  verification_tests:
  - apps/themuffinman/src/test/java/com/themuffinman/app/workmarket/dto/RequestDtoValidationTest.java
  - apps/themuffinman/src/test/java/com/themuffinman/app/workmarket/service/QuestApplicationServiceTest.java
- id: admin_quest_application_update_request_validation
  java_class: com.themuffinman.app.workmarket.dto.AdminQuestApplicationUpdateRequestDTO
  validated_fields:
  - field: message
    required_annotations:
    - Size
  - field: proposedPrice
    required_annotations:
    - Digits
  service_validator_source_refs:
  - quest_application_admin_service
  service_validation_markers:
  - Application update request is required
  - applyAdminStatusUpdate
  - Applications cannot be moved back to pending
  doc_paths:
  - docs/domain-technical.md
  - docs/business-logic.md
  verification_tests:
  - apps/themuffinman/src/test/java/com/themuffinman/app/workmarket/service/QuestApplicationServiceTest.java
- id: circle_group_request_validation
  java_class: com.themuffinman.app.social.dto.CircleGroupRequestDTO
  validated_fields:
  - field: name
    required_annotations:
    - NotBlank
    - Size
  service_validator_source_refs:
  - circle_service
  service_validation_markers:
  - Circle name is required
  doc_paths:
  - docs/domain-technical.md
  - docs/business-logic.md
  verification_tests:
  - apps/themuffinman/src/test/java/com/themuffinman/app/social/service/CircleServiceTest.java
