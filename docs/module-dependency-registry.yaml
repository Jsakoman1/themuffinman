- id: frontend_shell
  owner: frontend_platform
  packages: [apps/themuffinman/frontend/src/modules/app-shell]
edges:
- {from: vision, to: [common, platform, work, business, chat, social, sharing, cross_module], relationship: orchestration_and_adapters, evidence: source-trace}
- {from: work, to: [common, platform], relationship: domain_identity_and_shared_primitives, evidence: source-trace}
- {from: business, to: [common, platform], relationship: domain_identity_and_shared_primitives, evidence: source-trace}
- {from: chat, to: [common, platform, storage], relationship: domain_identity_storage_and_realtime, evidence: source-trace}
- {from: social, to: [common, platform], relationship: circle_identity_and_visibility, evidence: source-trace}
- {from: sharing, to: [common, platform], relationship: identity_and_shared_primitives, evidence: source-trace}
- {from: cross_module, to: [common, platform, work, chat], relationship: aggregation_and_notifications, evidence: source-trace}
- {from: frontend_shell, to: [frontend_feature_modules, backend_api_contracts], relationship: presentation_and_api_consumption, evidence: source-trace}
constraints:
- id: backend_domain_services_are_authoritative
  state: documented_constraint
  evidence: [AGENTS.md, docs/domain-technical.md]
- id: vision_may_orchestrate_but_not_bypass_domain_authority
  state: documented_constraint
  evidence: [docs/vision-architecture-patterns.md, docs/system-map.md]
- id: package_dependency_forbidden_directions
  state: not_enforced
  evidence: []
  gap: No automated package rule currently proves or rejects forbidden dependency directions.
- id: code_ownership_enforcement
  state: unknown
  evidence: []
  gap: No CODEOWNERS or equivalent repository ownership policy was evidenced.
dependency_boundary_analysis:
  reviewed_at: '2026-07-22'
  status: analysis_complete
  enforcement_scope: repository_visible_backend_packages_and_frontend_modules
  proposed_forbidden_directions:
    - id: domain_to_frontend
      from: backend_domain_services
      to: frontend_sources
      reason: Backend authority must remain client-independent.
    - id: feature_to_vision_internal
      from: [work, business, chat, social, sharing]
      to: [vision_internal_implementation]
      reason: Vision may orchestrate domain services; feature domains must not depend on vision internals.
    - id: frontend_feature_to_backend_internals
      from: frontend_feature_modules
      to: backend_domain_implementation
      reason: Frontend consumers may use API contracts, never backend package internals.
  accepted_exception_shape:
    required_fields: [id, from, to, owner, reason, expiry_or_review, evidence]
    rule: Exceptions must be narrow, named, owner-reviewed, and evidenced; wildcard exceptions are forbidden.
  implementation_notes:
    - The first audit should begin with source imports and package paths, then compare only against these explicit rules; ordinary cross-module collaboration remains governed by the registry edges.
    - A detected edge must report source file, importing symbol/package, target package, and remediation or exception path.
    - This analysis does not assert that every proposed direction is currently violated; implementation must prove the selected rules against source.
optimization_actions:
- id: OPT-BASELINE-003
  status: implemented_pending_closeout
  next_action: Verify the dependency-direction audit through the next optimization work plan and retain explicit exceptions.
  validation_target: make audit-module-dependency-direction
