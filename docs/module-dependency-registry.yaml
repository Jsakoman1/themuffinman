- id: work
  owner: workmarket_domain
  packages: [workmarket]
- id: business
  owner: business_domain
  packages: [business]
- id: chat
  owner: chat_domain
  packages: [chat, storage]
- id: social
  owner: circles_domain
  packages: [social]
- id: sharing
  owner: sharing_domain
  packages: [things, rides]
- id: cross_module
  owner: shared_product_surfaces
