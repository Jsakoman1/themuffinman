- runtime_artifact_must_be_fresh_and_declared_by_owning_plan
- native_contract_readiness_is_not_device_implementation_proof
coverage_contract:
  status: implemented
  edge_order: [capability, source, endpoint, client, test, runtime, evidence]
  evidence_classes: [source_trace, validated_contract, test_result, browser_trace, device_trace, provider_trace, operator_trace]
  missing_edge_semantics: Missing evidence is a navigable gap; it does not imply capability absence or runtime failure.
  pending_runtime_semantics: Pending runtime rows remain pending until their declared evidence class is present and reconciled.
  generated_report: docs/audit-output/capability-evidence-coverage.json
runtime_pending_vision_contract:
  owner_plan: docs/work/runtime-pending-web-operations-01-vision-runtime.yaml
  capability_families: [vision]
  status_authority: docs/runtime-acceptance-matrix.yaml
  evidence_boundary: browser/runtime trace must include provider outcome, correlation, recovery, final state, and separated timing where applicable
  static_or_aggregate_evidence_is_insufficient: true
  latest_partial_trace: docs/runtime-evidence/browser-runtime-vision-provider-failure-attempt-2026-07-22.json
  latest_partial_trace_status: not_promoted
  latest_partial_trace_blocker: missing_observable_provider_failure_contract
runtime_pending_web_operations_closeout: docs/runtime-evidence/runtime-capability-closeout-2026-07-22.yaml
system_map_hardening_endpoint_index: docs/system-map-endpoint-evidence-registry.yaml
core_product_stabilization_runtime:
  owner_plan: docs/work/core-product-stabilization-business-rides-05-runtime-regression-release.yaml
  artifact: docs/runtime-evidence/core-product-stabilization-business-rides-runtime-2026-07-22.json
