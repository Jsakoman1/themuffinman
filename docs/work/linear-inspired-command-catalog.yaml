kind: work
version: 1
id: linear-inspired-command-catalog
title: Typed command catalog and keyboard navigation
status: draft
master_plan: docs/work/linear-inspired-product-behavior-expansion-master.yaml
baseline: 2a34d383aaa91ffd5449a60c3c80085c8563c7dc
objective: >
  Turn the existing global search/create entries into a typed command catalog that supports
  backend-authorized navigation and explicitly eligible actions without pretending that a
  command palette is a natural-language assistant.
requirements:
  - Command items have stable ids, labels, shortcuts, group, availability reason, and typed target/action payloads.
  - Navigation commands may be locally static; object actions and personal shortcuts must be backend-provided or rechecked by existing endpoints.
  - Editable controls, dialogs, and the Vision composer suppress global shortcuts; no command path bypasses confirmation or validation.
