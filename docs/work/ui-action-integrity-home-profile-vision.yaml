    run type-check && npm --prefix apps/themuffinman/frontend run build
  acceptance:
  - Home presents real next actions or clearly informational summaries; “Resume work”
    is not a label for static metrics.
  - Every Home count is backed by the same query scope as its destination; “Open work”,
    “My active quests”, and similar labels never open an unrelated or differently
    scoped list.
  - Home is an orientation surface with a small number of meaningful cards, not a
    duplicate Work dashboard with explanatory filler.
  - Every clickable metric applies a meaningful destination/filter/focus, and nonclickable
    metrics are visually noninteractive.
  - Work, Thing, Ride, Circle, Business, People, Chat, Application, and Profile object
    routes remain direct Web routes.
  - Home counts, labels, query scope, and opened collection agree; zero metrics are
    not misleading action buttons.
  - Home remains a small orientation surface and does not duplicate the Work collection
    toolbar or explanatory filler.
