acceptance:
- Preview preserves the canonical detail route as the source of deep-linking and never
  creates a competing detail model.
- Utility rails only render backend-prepared properties and permitted actions, with
  an accessible narrow-screen fallback.
- Inline edits recover from failure and refresh from the authoritative backend response.
- Any overlap with the active action-dialog standardization plan is sequenced after
  that plan's verification.
