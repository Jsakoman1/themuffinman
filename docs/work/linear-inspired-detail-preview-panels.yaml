kind: work
version: 1
id: linear-inspired-detail-preview-panels
title: Detail previews, utility rails, and contextual object actions
status: verified
master_plan: docs/work/linear-inspired-product-app-redesign-master.yaml
baseline: 2a34d383aaa91ffd5449a60c3c80085c8563c7dc
objective: 'Reuse canonical detail routes while introducing a coherent main-context
  plus optional utility-panel layout for objects that already expose complete backend-prepared
  detail data.

'
reuses:
- docs/work/frontend-ux-action-hierarchy-preview-cards.yaml
- docs/work/frontend-contract-action-dialog-standardization.yaml
requirements:
- Main content owns narrative, activity, conversation, and rich content; utility rail
  owns compact properties and allowed actions.
- The panel is togglable, locally remembered only where safe, and accessible as an
  inline section or sheet on narrow screens.
- Inline edits preserve cancel, save, error, refresh, and backend-authorized field
  behavior.
