  title: Define the surface archetype boundary and migration map
  type: analysis
  status: done
  paths:
  - docs/work/main-surfaces-surface-architecture-analysis.md
  - apps/themuffinman/frontend/src/modules/app-shell/components/SurfaceContentView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/WorkspaceSurfaceView.vue
  validation: ruby -e 'require "yaml"; YAML.load_file("docs/work/main-surfaces-surface-architecture.yaml")'
- id: architecture-implementation
  title: Extract dashboard, discovery, operations, Chat, and Calendar renderers
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/components/SurfaceHeader.vue
  - apps/themuffinman/frontend/src/modules/app-shell/components/SurfaceMetricGrid.vue
