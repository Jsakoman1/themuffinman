  validation: npm --prefix apps/themuffinman/frontend run build
- id: architecture-contract
  title: Add renderer coverage and dead-prop checks
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/validate-modern-surface-contract.mjs
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
acceptance:
- Home, Work, Business, Chat, and Calendar render through explicit maintainable archetype
  boundaries.
- Notes and descriptions are either visible and useful or removed from the data contract.
- No route loses its existing deep link or backend action.
