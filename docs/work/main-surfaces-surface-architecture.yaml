kind: work
version: 1
id: main-surfaces-surface-architecture
title: Decompose generic surface rendering into maintainable archetypes
status: verified
master_plan: docs/work/main-surfaces-modernization-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- cross_module.web_ui
- cross_module.auditability
objective: 'Replace the over-generalized SurfaceContentView branches with a small
  set of explicit surface archetypes that share tokens and primitives while keeping
  module-specific presentation understandable.

'
requirements:
- Preserve route and API behavior while reducing conditional rendering density.
- Keep backend-prepared sections and action data as the input boundary.
- Use shared header, status, card, metric, and action primitives rather than duplicating
  local rules.
- Keep Chat and Calendar specialized because their interaction models differ from
  dashboard/list surfaces.
- Remove dead props and ensure notes, descriptions, metrics, and empty states are
  actually rendered.
