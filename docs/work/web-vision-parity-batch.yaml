kind: work
version: 1
id: web-vision-parity-batch
title: Close safe Web/Vision production-client parity gaps
status: verified
master_plan: docs/work/target-capability-production-readiness.yaml
baseline: 4715898
capability_ids:
- work.quest.create
- chat.conversation.open
- chat.conversation.create_group
- circles.circle.create
- circles.circle.view_other
- circles.membership.leave
- circles.membership.remove
- sharing.thing.create
- sharing.thing.update
- sharing.thing.archive
- business.booking.create
- cross_module.notification.manage_preferences
objective: Make safe, already-backed capabilities directly discoverable and executable
  from the Web UI while preserving Vision as an equal production client.
tasks:
- id: shared-entry-actions
  title: Expose direct Work, Chat, Circles, Things, and Business entry actions
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/shellDefinitions.ts
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build
- id: circles-direct-actions
  title: Add member visibility, self-leave, and member removal actions to Circles
  type: implementation
  status: done
  capability_ids:
  - circles.circle.view_other
  - circles.membership.leave
  - circles.membership.remove
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/api/userShellApi.ts
  - apps/themuffinman/frontend/src/modules/app-shell/views/CirclesView.vue
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build
- id: things-owner-actions
  title: Add owner edit and archive actions to Things
  type: implementation
  status: done
  capability_ids:
  - sharing.thing.update
  - sharing.thing.archive
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/api/userShellApi.ts
  - apps/themuffinman/frontend/src/modules/app-shell/views/ThingsDiscoveryView.vue
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build
- id: vision-notification-preferences
  title: Add confirmed Vision updates for one notification preference
  type: implementation
  status: done
  capability_ids:
  - cross_module.notification.manage_preferences
  paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/model/VisionIntent.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/service/VisionConversationService.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/service/VisionNotificationPreferenceExecutionAdapter.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/service/VisionSemanticRouteCatalogService.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/service/VisionSurfacePolicy.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/service/VisionConversationSnapshotSupport.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/service/VisionSemanticPromptPayloadBuilder.java
  - apps/themuffinman/src/test/java/com/themuffinman/app/vision/service/VisionSemanticRouteCatalogServiceTest.java
  validation: cd apps/themuffinman && ./mvnw -Dtest='VisionIntentRouterTest,VisionSemanticRouteCatalogServiceTest,VisionConversationServiceTest'
    test
- id: inventory-sync
  title: Record exact Web evidence and residual runtime limitations
  type: documentation
  status: done
  paths:
  - docs/capability-inventory.yaml
  - docs/work/web-vision-parity-program.yaml
  - docs/work/web-vision-parity-residual-audit.yaml
  - docs/implementation-backlog.md
  validation: make audit-target-capability-coverage && make audit-docs && git diff
    --check
- id: batch-verification
  title: Verify the complete parity batch
  type: verification
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/api/userShellApi.ts
  - apps/themuffinman/frontend/src/modules/app-shell/views/CirclesView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/ThingsDiscoveryView.vue
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build && cd apps/themuffinman && ./mvnw -DskipTests
    compile && git diff --check
