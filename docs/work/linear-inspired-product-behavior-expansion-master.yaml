exit_criteria:
  - Users can manage a bounded set of permitted personal shortcuts without exposing unavailable or unauthorized objects.
  - Attention is presented through one backend-prepared inbox projection with permitted destination and read behavior.
  - Preview panels are adopted on selected supported collections and always retain a direct canonical detail route.
  - The command surface uses a typed backend catalog for navigable destinations and eligible actions.
  - Chat and attention changes reconcile through typed refresh behavior with loading and recovery evidence.
  - Every child passes its verifier and browser evidence covers keyboard, narrow fallback, permission changes, error, and reconnect paths.
