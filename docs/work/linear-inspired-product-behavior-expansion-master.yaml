objective: >
  Extend the verified desktop interaction grammar into backend-owned product behavior:
  personal object pinning, a coherent attention inbox, safe route-backed previews,
  command navigation, and reliable realtime continuity. Preserve existing Java/Spring
  domain authority and direct routes. Do not copy Linear branding, assets, copy, or
  proprietary product behavior.
