principles:
  - A personal shortcut is viewer-owned, explicitly scoped, and never grants access to an object.
  - A canonical route remains the source of truth; a preview is only an additional read mode.
  - Backend DTOs define visible actions, ordering, unread/read state, and permitted filter values.
  - Commands may navigate or invoke already-authorized actions, but never infer intent, targets, or permission.
  - Realtime events prompt a safe refresh or typed reconciliation; they do not apply speculative client state.
  - No board drag/drop, timeline editing, bulk operations, generic subscriptions, optimistic mutation, or client cache is introduced without a dedicated contract.
