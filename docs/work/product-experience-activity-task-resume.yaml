kind: work
version: 1
id: product-experience-activity-task-resume
title: Activity timeline and task resume
status: verified
master_plan: docs/work/product-experience-account-discovery-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- platform.activity
- platform.task_resume
- cross_module.history
objective: 'Give users one privacy-aware activity timeline and resumable task state
  so they can understand recent work, bookings, rides, lending, chat, and Vision actions
  without each module inventing a separate history model.

'
requirements:
- Timeline entries are typed, deduplicated, viewer-scoped, and linked only to allowed
  destinations.
- Resume state is bounded, expiry-aware, and never stores secrets or sensitive raw
  form values.
- Users can dismiss or clear resumable suggestions without changing workflow state.
tasks:
- id: activity-resume-contract
  title: Define timeline projection, resume state, retention, and privacy rules
  type: analysis
  status: done
  paths:
  - docs/work/product-experience-activity-task-resume-analysis.md
  - docs/domain-technical.md
  validation: make audit-docs
- id: activity-resume-backend
  title: Implement activity projection and safe task-resume contract
  type: implementation
  status: done
  paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/activity/service/ActivityReadService.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/notification/service/AttentionCenterService.java
  - apps/themuffinman/src/main/resources/db/migration/V66__create_activity_resume_dismissal.sql
  validation: cd apps/themuffinman && ./mvnw test
- id: activity-resume-ui
  title: Implement timeline, continue card, dismiss, and deep-link surfaces
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views/ActivityView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/api/userShellApi.ts
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build
- id: activity-resume-runtime
  title: Verify timeline privacy, resume, expiry, dismiss, and route recovery
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/run-web-runtime-smoke.mjs
  - docs/runtime-acceptance-matrix.yaml
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
  manual_runtime_command: npm --prefix apps/themuffinman/frontend run web-runtime-smoke
  manual_runtime_requires_escalation: true
acceptance:
- Recent cross-module activity is visible only to the correct viewer.
- Interrupted flows can be resumed or dismissed without accidental workflow mutation.
- Expired or forbidden objects produce safe recovery rather than dead links.
