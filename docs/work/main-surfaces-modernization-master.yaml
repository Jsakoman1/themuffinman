exit_criteria:
- Home contains no duplicate destination navigation or decorative non-clickable action
  controls.
- Home metrics and attention items expose backend-consistent destinations and useful
  empty states.
- Business landing communicates setup, profile, offerings, bookings, calendar, and
  recovery states.
- Find Work uses the AVAILABLE backend preset and never presents the current user's
  own quests as external discovery results.
- Main discovery and operations rows use one predictable preview/open/action contract
  without duplicate Open controls.
- Generic shell rendering is split into maintainable archetypes without moving product
  logic into Vue.
- Type-check, build, frontend/static audits, docs audits, runtime acceptance, and
  browser smoke pass.
