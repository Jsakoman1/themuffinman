id: main-surfaces-modernization-master
title: Modernize Home, Business, Work discovery, and authenticated surface architecture
status: verified
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
objective: 'Make the main authenticated surfaces calm, useful, and action-oriented.
  Home must be a dashboard rather than a second navigation rail; Business must have
  a meaningful owner landing state even when setup or read models are incomplete;
  Find Work must exclude the current user''s own quests and present a clear discovery
  layout; repeated rows, metrics, cards, and actions must be truly clickable or intentionally
  informational; and generic surface rendering must be decomposed into small backend-prepared
  surface archetypes.

'
principles:
- Sidebar navigation owns destination discovery; page content owns orientation and
  the next useful action.
- Every visible metric, row, or card is either actionable with a clear destination
  or explicitly presented as informational.
- Frontend maps backend-provided data and navigation targets; it does not invent permissions,
  ownership, filtering policy, or workflow state.
- Discovery separates available external work from owned work through backend presets.
- Empty, partial, loading, and forbidden states explain what happened and provide
  a safe recovery or setup action.
- Vision remains contextual assistance, not a duplicate navigation system or substitute
  for direct web flows.
