kind: work
version: 1
id: linear-inspired-performance-and-state-continuity
title: Fast collection continuity, URL state, and measured rendering
status: verified
master_plan: docs/work/linear-inspired-product-app-redesign-master.yaml
baseline: 2a34d383aaa91ffd5449a60c3c80085c8563c7dc
objective: 'Make supported collection-to-detail and collection-to-preview flows feel
  immediate and continuous: preserve a viewer''s permitted filter context, selection,
  and scroll return state while measuring rather than assuming frontend performance
  improvements.

'
reuses:
- docs/work/frontend-ux-action-hierarchy-preview-cards.yaml
- docs/work/product-experience-activity-task-resume.yaml
- docs/work/product-experience-universal-search-saved-intents.yaml
requirements:
- URL state may represent only canonical, non-sensitive route and supported backend
  query parameters; it must never serialize private object data, temporary form input,
  or permission assumptions.
- Store local display, selected-preview, and scroll restoration state per route/context
  and discard it when the backend query, viewer, or object availability changes.
- Do not add speculative prefetch, optimistic mutation, virtualization, or infinite
  scrolling without measured need and a stable API, ordering, accessibility, and failure
  contract.
- Loading must retain layout stability and announce progress; cached content must
  not be represented as authoritative after a mutation or visibility change.
tasks:
- id: continuity-and-performance-baseline
  type: docs-only
  status: done
  paths:
  - docs/work/linear-inspired-performance-and-state-continuity-analysis.md
  - docs/work/linear-inspired-interaction-contract-audit.md
  - docs/regression-scenario-catalog.yaml
  validation: make audit-frontend && make audit-docs
- id: shared-supported-view-state
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/composables/useSurfaceViewState.ts
  - apps/themuffinman/frontend/src/modules/app-shell/views/WorkDiscoveryView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/WorkQuestDetailView.vue
  - apps/themuffinman/frontend/src/router.ts
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build
- id: continuity-runtime-evidence
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/run-web-runtime-smoke.mjs
  - docs/runtime-acceptance-matrix.yaml
  validation: npm --prefix apps/themuffinman/frontend run validate:web-surface &&
    make audit-runtime-acceptance
  manual_runtime_command: npm --prefix apps/themuffinman/frontend run web-runtime-smoke
  manual_runtime_requires_escalation: true
acceptance:
- A supported filtered collection returns to the same permitted query, selected item
  or preview, and sensible scroll position after opening and closing a canonical detail.
- Browser traces prove loading, changed visibility, failed refresh, and stale-state
  discard behavior rather than only a successful warm return.
- Any performance optimization is backed by a recorded baseline and does not change
  API call authority, ordering, permissions, or accessible navigation.
