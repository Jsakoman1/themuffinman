kind: work
version: 1
id: web-ui-functional-completion
title: Complete the Web UI as a fully functional production client
status: verified
master_plan: docs/work/web-ui-functional-completion-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
objective: Make the authenticated Web UI a complete, discoverable, runtime-validated
  production client for the supported product capabilities. Close missing entry points,
  broken Chat and Circles loading, the non-visual Calendar surface, and missing Find
  Work, Find People, and Find Business discovery journeys while preserving backend
  ownership of permissions, visibility, consent, validation, ranking, and state transitions.
source_artifacts:
- docs/work/web-ui-functional-completion-analysis.md
- docs/product-memory.md
- docs/product-vision.md
- docs/implementation-control.md
- docs/capability-inventory.yaml
reconciliation:
  verified_dependencies:
  - docs/work/modern-shell-navigation.yaml
  - docs/work/modern-chat-calendar-business.yaml
  - docs/work/modern-work-discovery.yaml
  - docs/work/web-entry-point-parity.yaml
  - docs/work/target-capability-production-readiness-chat.yaml
  - docs/work/target-capability-production-readiness-circles.yaml
  - docs/work/target-capability-production-readiness-business.yaml
  - docs/work/target-capability-production-readiness-work.yaml
  open_boundaries:
  - id: people-discovery
    source: docs/work/cross-module-search-contract.yaml
    resolution: Existing comparison contract is reused; Find People needs a concrete
      viewer-aware read model.
  - id: business-discovery
    source: docs/work/target-capability-production-readiness-business.yaml
    resolution: Existing owner/public business surfaces are reused; public discovery
      remains new work.
  no_reimplementation: Do not redo verified Chat message controls, Circles owner actions,
    Work discovery search implementation, Business owner operations, or Vision adapters.
    Extend them only where the acceptance matrix exposes a Web runtime or discoverability
    gap.
non_negotiables:
- Web UI and Vision are equal production clients; Vision must not compensate for missing
  Web UI.
- No feature is complete without a discoverable route or action, happy path, validation,
  recovery, and runtime evidence.
- Backend services own permissions, visibility, consent, ranking, validation, and
  state transitions.
- A failed secondary request must not blank an otherwise usable surface.
- Find People and Find Business require explicit backend read-model contracts.
- Calendar must provide a real visual calendar workspace, not only a list projection.
- No commit or push is part of this plan.
tasks:
- id: route-surface-contract
  title: Define canonical Web routes, navigation entries, and surface acceptance matrix
  type: documentation
  status: done
  paths:
  - docs/work/web-ui-functional-completion-analysis.md
  - apps/themuffinman/frontend/src/router.ts
  - apps/themuffinman/frontend/src/modules/app-shell/shellDefinitions.ts
  - apps/themuffinman/frontend/src/modules/app-shell/shellRouteRegistry.ts
  - docs/capability-inventory.yaml
  validation: make audit-docs && make audit-plan-coverage
  depends_on: []
  closeout_gate: Every supported surface has one canonical route, one visible entry
    action, and a documented Web/Vision status.
  progress: Added explicit `/work/find`, People, and Business discovery routes, corrected
    static/dynamic route ordering, and verified local route serving; the static Web
    surface contract and authenticated browser smoke now guard canonical routes and
    visible actions. Permission and broader parity review remain open.
- id: web-runtime-harness
  title: Add authenticated browser smoke scenarios and request-level diagnostics for
    Web surfaces
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend
  - apps/themuffinman/src/test
  - docs/regression-scenario-catalog.yaml
  validation: npm --prefix apps/themuffinman/frontend run validate:web-surface &&
    npm --prefix apps/themuffinman/frontend run type-check && npm --prefix apps/themuffinman/frontend
    run build && cd apps/themuffinman && ./mvnw test
  depends_on:
  - route-surface-contract
  closeout_gate: Authenticated browser traces can identify request failures and record
    loading, success, empty, error, retry, and auth states.
- id: work-entry-and-discovery
  title: Expose Create new work and a canonical Find Work journey
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/router.ts
  - apps/themuffinman/frontend/src/modules/app-shell/views/WorkDiscoveryView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/WorkQuestCreateView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/shellDefinitions.ts
  - apps/themuffinman/frontend/src/modules/app-shell/views/HomeHubView.vue
  validation: npm --prefix apps/themuffinman/frontend run validate:web-surface &&
    npm --prefix apps/themuffinman/frontend run type-check && npm --prefix apps/themuffinman/frontend
    run build
  depends_on:
  - route-surface-contract
  closeout_gate: A user can enter Find Work and Create new work directly from Home,
    Work, and mobile navigation.
  progress: Added the canonical `/work/find` route, persistent Create new work and
    Find work actions, corrected the static create-route ordering, fixed the explicit
    `termFixed` form contract and write transaction, and passed authenticated Create
    Work plus quest detail edit/refresh mutation smoke.
- id: chat-contract-and-reliability
  title: Diagnose and fix Chat inbox loading, then complete direct, group, thread,
    and message journeys
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views/ChatSurfaceView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/api/userShellApi.ts
  - apps/themuffinman/src/main/java/com/themuffinman/app/chat
  - apps/themuffinman/src/test/java/com/themuffinman/app/chat
  validation: cd apps/themuffinman && ./mvnw test && cd ../../ && npm --prefix apps/themuffinman/frontend
    run validate:web-surface && npm --prefix apps/themuffinman/frontend run type-check
    && npm --prefix apps/themuffinman/frontend run build
  depends_on:
  - web-runtime-harness
  closeout_gate: Inbox failure identifies the endpoint/status, successful inbox loads,
    direct/group chat opens, message send succeeds, and retry/reconnect recovers.
  progress: Fixed the PostgreSQL DISTINCT plus computed ORDER BY failure in the conversation
    fetch query; authenticated browser smoke now covers accepted-contact direct chat,
    group chat with two contacts, message send, and retry recovery.
- id: circles-contract-and-reliability
  title: Make Circles resilient, useful, and connected to people discovery
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views/CirclesView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/api/userShellApi.ts
  - apps/themuffinman/src/main/java/com/themuffinman/app/social
  - apps/themuffinman/src/test/java/com/themuffinman/app/social
  validation: cd apps/themuffinman && ./mvnw test && cd ../../ && npm --prefix apps/themuffinman/frontend
    run type-check && npm --prefix apps/themuffinman/frontend run build
  depends_on:
  - web-runtime-harness
  closeout_gate: Groups, connections, requests, blocked users, and search remain independently
    useful when a secondary read fails.
  progress: Replaced aggregate Promise.all failure with partial data loading and explicit
    warnings, corrected the blocked-users path from `/circles/blocks` to backend `/circles/blocked`,
    and verified reads, Create Circle, invite/accept, and forced partial recovery
    in authenticated Chromium.
- id: find-people-contract
  title: Create the canonical Find People route, read model, search, profile, and
    trust actions
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/router.ts
  - apps/themuffinman/frontend/src/modules/app-shell
  - apps/themuffinman/src/main/java/com/themuffinman/app/social
  - apps/themuffinman/src/main/java/com/themuffinman/app/identity
  - docs/business-logic.md
  - docs/domain-technical.md
  - docs/capability-inventory.yaml
  validation: cd apps/themuffinman && ./mvnw test && cd ../../ && npm --prefix apps/themuffinman/frontend
    run type-check && npm --prefix apps/themuffinman/frontend run build
  depends_on:
  - circles-contract-and-reliability
  closeout_gate: Find People has a canonical route, backend viewer-aware search, profile
    detail, consent/trust actions, and recoverable states.
  progress: Added /people, /people/:userId, backend-backed search/profile reads, viewer-aware
    invite, and block/unblock actions; authenticated browser smoke now verifies search,
    invite, and accepted-contact setup.
- id: find-business-contract
  title: Create the canonical Find Business discovery contract and Web journey
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/router.ts
  - apps/themuffinman/frontend/src/modules/app-shell
  - apps/themuffinman/src/main/java/com/themuffinman/app/business
  - apps/themuffinman/src/test/java/com/themuffinman/app/business
  - docs/business-logic.md
  - docs/domain-technical.md
  - docs/capability-inventory.yaml
  validation: cd apps/themuffinman && ./mvnw test && cd ../../ && npm --prefix apps/themuffinman/frontend
    run type-check && npm --prefix apps/themuffinman/frontend run build
  depends_on:
  - find-people-contract
  closeout_gate: Find Business returns backend-ranked public businesses, opens public
    detail, and hands off to booking without local fake discovery.
  progress: Added /business/find and moved query filtering into the backend directory
    contract; authenticated browser smoke now verifies owner profile setup, timezone,
    offering, availability, public detail, customer booking handoff, owner review/
    confirmation, and 403 recovery.
- id: visual-calendar
  title: Replace the generic Calendar list with a visual month, week, and day workspace
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views
  - apps/themuffinman/frontend/src/modules/app-shell/components
  - apps/themuffinman/frontend/src/modules/app-shell/shellSurfaceData.ts
  - apps/themuffinman/src/main/java/com/themuffinman/app/workmarket
  - apps/themuffinman/src/main/java/com/themuffinman/app/business
  validation: cd apps/themuffinman && ./mvnw test && cd ../../ && npm --prefix apps/themuffinman/frontend
    run validate:web-surface && npm --prefix apps/themuffinman/frontend run type-check
    && npm --prefix apps/themuffinman/frontend run build
  depends_on:
  - work-entry-and-discovery
  - find-business-contract
  closeout_gate: Calendar supports month/week/day views, date navigation, event selection,
    timezone clarity, cross-module data, and recovery states.
  progress: Added month/week/day rendering, date navigation, Today control, browser
    timezone labeling, cross-module event rows, empty state, and a shared loading/error
    gate with Retry; authenticated browser interaction, business booking data, and
    forced primary-read recovery now pass.
- id: authenticated-surface-sweep
  title: Sweep every authenticated route for loading, empty, error, retry, permission,
    and mutation states
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views
  - apps/themuffinman/frontend/src/modules/app-shell/components
  - docs/regression-scenario-catalog.yaml
  validation: npm --prefix apps/themuffinman/frontend run validate:web-surface &&
    npm --prefix apps/themuffinman/frontend run type-check && npm --prefix apps/themuffinman/frontend
    run build && make audit-docs
  depends_on:
  - chat-contract-and-reliability
  - circles-contract-and-reliability
  - find-people-contract
  - find-business-contract
  - visual-calendar
  closeout_gate: No authenticated route has a missing loading, empty, error/retry,
    permission, or mutation outcome state.
  progress: Completed a source-level sweep of authenticated shell states and added
    a shared gate so loading and error/retry states do not render stale surface content
    underneath. Browser smoke now covers primary and secondary recovery plus forced
    403 and Chat resync states.
- id: parity-and-closeout
  title: Update capability evidence, living docs, backlog, and close the program only
    with runtime proof
  type: verification
  status: done
  paths:
  - docs/capability-inventory.yaml
  - docs/implementation-backlog.md
  - docs/business-logic.md
  - docs/domain-technical.md
  - docs/agent-operating-model.yaml
  validation: make audit-docs && make audit-plan-coverage && make audit-target-capability-coverage
  depends_on:
  - authenticated-surface-sweep
  closeout_gate: All runtime traces, capability mappings, parity records, docs audits,
    and master verifier evidence agree.
acceptance:
- "/work visibly exposes Create new work and Find Work without requiring Vision."
- "/chat loads the inbox in an authenticated browser, identifies any failing request,
  supports opening/direct/group chat, sending a message, and recovery."
- "/circles loads independently useful groups, connections, requests, blocked users,
  and search states; one failed secondary read does not erase the page."
- "/people or the agreed canonical Find People route supports search, profile viewing,
  trust/consent actions, and empty/error/retry states."
- "/business/find or the agreed canonical Find Business route supports discovery,
  business detail, and booking handoff through backend-owned contracts."
- "/calendar renders month/week/day navigation and event selection with work and business
  data, timezone clarity, and empty/error/retry states."
- Every supported Web capability has matching Vision evidence recorded independently.
- Backend tests, frontend type-check/build, browser runtime scenarios, documentation
  audits, and the master work verifier pass.
