kind: work
version: 1
id: product-experience-multi-business-favorites
title: Support multiple owned businesses and favorite-business booking shortcuts
status: verified
master_plan: docs/work/product-experience-account-discovery-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- business.profile
- business.profile.view_public
- business.booking.create
- business.favorite
objective: 'Expand business ownership from one implicit profile to an explicit set
  of businesses owned by a user, then let users favorite public businesses and start
  a valid appointment flow from that favorite while preserving business, offering,
  availability, booking, consent, and cancellation rules.

'
requirements:
- A user can create, edit, archive, switch, and select among multiple owned businesses.
- Every offering, availability rule, booking, public slug, and gallery belongs to
  one business.
- Favorites are user-owned, idempotent, removable, and only expose public business
  data.
- Favorite-to-book handoff uses backend availability and booking validation; frontend
  does not invent slots.
