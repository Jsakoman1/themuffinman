  title: Define multi-business ownership, active-business context, and favorite invariants
  type: analysis
  status: done
  paths:
  - docs/work/product-experience-multi-business-favorites-analysis.md
  - docs/domain-technical.md
  - docs/business-logic.md
  validation: make audit-docs
- id: multi-business-backend
  title: Implement business ownership model, scoping, and migration
  type: implementation
  status: done
  paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/business/service/BusinessProfileService.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/business/controller/BusinessProfileController.java
  - apps/themuffinman/src/main/resources/db/migration/V61__create_business_favorite.sql
  - apps/themuffinman/src/test/java/com/themuffinman/app/business/service/BusinessProfileServiceTest.java
  validation: cd apps/themuffinman && ./mvnw test
- id: favorites-and-booking-backend
  title: Implement favorite business and valid appointment handoff contracts
  type: implementation
  status: done
  paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/business/service/BusinessFavoriteService.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/business/controller/BusinessFavoriteController.java
  - apps/themuffinman/src/test/java/com/themuffinman/app/business/service/BusinessFavoriteServiceTest.java
  validation: cd apps/themuffinman && ./mvnw test
- id: multi-business-favorites-ui
  title: Implement business switcher, favorites, and appointment shortcut UI
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views/BusinessDiscoveryView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/BusinessProfileView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/api/userShellApi.ts
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build
- id: business-favorites-runtime
  title: Verify multi-business and favorite-to-book journeys
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/run-web-runtime-smoke.mjs
  - apps/themuffinman/frontend/scripts/run-business-multi-smoke.mjs
  - docs/runtime-acceptance-matrix.yaml
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
  manual_runtime_command: npm --prefix apps/themuffinman/frontend run web-runtime-smoke
  manual_runtime_requires_escalation: true
acceptance:
- One user can own and switch between at least two businesses without data leakage
  between business scopes.
- A public business can be favorited/unfavorited and appears in the user's favorites.
- Favorite business opens a backend-valid offering/availability/booking flow.
- Unauthorized ownership changes and invalid booking slots are rejected by backend
  contracts and surfaced clearly.
