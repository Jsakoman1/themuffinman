rules:
- Domain services remain authoritative for permissions, validation, transitions, and
  resource ownership.
- Transport context must not become a second business-rule layer.
- Idempotency replay must bind actor, operation, key, and payload fingerprint.
- Unknown commit outcome requires read-back semantics before a retry is permitted.
- Side-effect delivery evidence remains separate from domain commit evidence.
- No runtime or production claim is made from static implementation alone.
