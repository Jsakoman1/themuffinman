kind: work
version: 1
id: target-capability-implementation-slice-planning
title: Generate prioritized implementation slices from target capabilities
status: verified
baseline: 4715898
objective: 'Convert target capabilities into deterministic implementation-planning
  records ordered by priority and grouped by module without claiming that generated
  records are verified work plans.

'
scope:
  included:
  - stable slice IDs derived from target capability IDs
  - critical and high delivery queue prioritization
  - current status and mapping quality context
  - missing web UI and Vision surface signals
  - recommended module workstream grouping
  excluded:
  - implementing application behavior
  - automatically creating or verifying child work plans
  - replacing implementation-backlog.md or work-plan evidence
tasks:
- id: slice-planning-rules
  title: Define deterministic slice generation rules
  type: analysis
  status: done
  paths:
  - docs/target-capability-catalog.yaml
  - docs/implementation-control.md
  - docs/implementation-backlog.md
  validation: ruby -e "require 'yaml'; YAML.load_file('docs/target-capability-catalog.yaml');
    puts 'slice sources valid'"
- id: slice-generator
  title: Implement machine-readable implementation slice generator
  type: implementation
  status: done
  paths:
  - scripts/audits/generate-target-capability-slices.rb
  validation: make generate-target-capability-slices >/tmp/target-capability-slices.yaml
    && ruby -e "require 'yaml'; d=YAML.load_file('/tmp/target-capability-slices.yaml');
    abort 'invalid slice report' unless d['kind']=='target_capability_implementation_slices';
    puts d['summary']"
- id: slice-command
  title: Expose slice generation through the repository Makefile
  type: implementation
  status: done
  paths:
  - Makefile
  validation: make generate-target-capability-slices >/tmp/target-capability-slices.yaml
- id: slice-documentation
  title: Document generated slice semantics and work-plan handoff
  type: documentation
  status: done
  paths:
  - docs/implementation-control.md
  - docs/implementation-backlog.md
  validation: make audit-docs
- id: slice-validation
  title: Validate prioritized slice output and repository controls
  type: validation
  status: done
  paths:
  - docs/work/target-capability-implementation-slice-planning.yaml
  validation: make generate-target-capability-slices >/tmp/target-capability-slices.yaml
    && make audit-target-capability-catalog && make audit-target-capability-coverage
    && make audit-plan-coverage
