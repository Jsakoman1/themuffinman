baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- chat.messaging
- chat.attachments
- calendar.personal
- business.calendar
objective: 'Make Chat feel like a real conversation product and Calendar feel like
  a dependable visual planning tool across desktop and mobile.

'
requirements:
- Chat has inbox, conversation, mobile back, message bubbles, unread state, composer,
  attachment, reply, reaction, edit, delete, and recovery states.
- Chat actions remain usable by keyboard and touch without overwhelming the message
  surface.
- Calendar supports month, week, day, today, previous/next, event preview, empty-day,
  and mobile agenda behavior.
- Calendar event types and actionable destinations are visually distinguishable.
- Responsive layouts avoid horizontal overflow and preserve primary actions.
tasks:
