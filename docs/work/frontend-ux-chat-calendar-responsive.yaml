  title: Complete responsive Chat state transitions and action affordances
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views/ChatSurfaceView.vue
  validation: npm --prefix apps/themuffinman/frontend run type-check
- id: calendar-workspace
  title: Refine visual Calendar workspace, event preview, and mobile agenda mode
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/components/SurfaceContentView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/shellSurfaceData.ts
  validation: npm --prefix apps/themuffinman/frontend run build
- id: responsive-runtime
  title: Add browser runtime checks for Chat and Calendar desktop/mobile paths
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/run-web-runtime-smoke.mjs
  - docs/runtime-acceptance-matrix.yaml
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
acceptance:
- A user can enter, leave, resume, and recover a conversation without losing context.
- A user can inspect a day/week/month and open an event destination on desktop and
  mobile.
