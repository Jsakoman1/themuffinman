title: Product-wide shell, Vision, account, discovery, trust, preferences, and coordination
  expansion
status: verified
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
objective: 'Remove duplicated page chrome and make the product''s global navigation,
  assistant entry, account identity, discovery paths, business ownership, and commute
  matching coherent across Web and Vision. Add the backend contracts required for
  profile media, multiple businesses, favorites, appointment shortcuts, privacy-safe
  recurring commute suggestions, attention management, trust signals, saved intents,
  user preferences, activity history, task resumption, and universal creation.

'
principles:
- The authenticated shell owns global navigation, account access, and the single persistent
  Vision entry.
- Each page has one canonical title and one primary action hierarchy.
- Web and Vision remain equal clients; neither is a substitute for the other.
- Backend services own identity, media permissions, business ownership, favorites,
  matching eligibility, consent, and workflow state.
- Location, profile images, gallery media, business favorites, and commute suggestions
  are opt-in and privacy-scoped.
- New domain concepts require DTOs, validation, persistence, synthetic/admin coverage,
  and runtime evidence before closeout.
