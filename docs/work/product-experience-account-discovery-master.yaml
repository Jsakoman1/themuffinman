exit_criteria:
- Authenticated pages expose one canonical title, one predictable header, and no duplicated
  module chrome.
- Vision is a distinct global shell capability with text and microphone entry, visible
  state, and contextual handoff.
- Username/avatar account access exposes profile, settings, gallery, notifications,
  and logout without duplicating page actions.
- Profile avatar and optional gallery have backend-owned upload, visibility, ordering,
  deletion, and recovery contracts.
- Discovery clearly exposes Find Work, Offer Work, Find People, Find Business, Find
  Rides, and Things to borrow.
- A user can own multiple businesses and favorite other businesses with a direct appointment
  path.
- Commute suggestions match only consented users with privacy-safe recurring schedule
  and location rules.
- Web/Vision contracts, backend tests, runtime evidence, documentation, and plan audits
  pass.
