task_start_protocol:
  - Read the master, owning child objective, this task contract, and relevant domain/Vision documentation before `make work-start`.
  - Confirm whether the task is contract, primitive, adoption, or evidence; do not absorb a later category into it.
  - Record a newly discovered missing rule or route as backlog/plan work before proceeding; do not quietly expand the item.
  - Only the verifier may mark an item verified.
