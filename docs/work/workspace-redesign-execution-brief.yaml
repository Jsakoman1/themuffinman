kind: execution_brief
version: 1
id: workspace-redesign-execution-brief
status: draft
master_plan: docs/work/workspace-redesign-complete-master.yaml
purpose: >
  The mandatory task-level intent layer for the workspace redesign. Read this
  before starting any inventory item together with the owning child plan and the
  master. It prevents a component, CSS, or screenshot-only change from being
  mistaken for delivery of the product behavior.
north_star: >
  Make the authenticated Web application a calm, dense, keyboard-capable workspace:
  stable navigation and context, fast inspect-before-open work, backend-authoritative
  actions and state, and responsive rails. Borrow these interaction principles,
  never Linear branding, issue semantics, boards, drag/drop, or generic bulk actions.
non_negotiables:
  - Backend owns visibility, membership, permissions, allowed actions, workflow transitions, personal context, and activity facts.
  - Use shared tokens and primitives; do not add route-local CSS when an approved primitive or archetype applies.
  - A collection uses one primary row target, independent nested actions, backend-supported metadata/status, and an inspect path before canonical navigation.
  - A focused collection supports visible sequential row navigation with Arrow keys and, where compatible, J/K; Enter opens, P previews, Escape clears, and shortcuts never hijack text inputs.
  - A substantial detail uses main content plus activity and utility context only where useful; simple settings and confirmations stay simple.
  - Narrow layouts replace a contextual rail with a drawer or route; they do not silently drop its information or actions.
  - Vision remains a distinct adaptive, voice-ready canvas. Handoffs are typed and returnable; it never becomes a third workspace rail.
  - Never infer a mutation, permission, filter membership, or saved context in the client.
task_contracts:
