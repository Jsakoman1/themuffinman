id: linear-inspired-attention-inbox
title: Backend-prepared attention inbox and notification context
status: draft
master_plan: docs/work/linear-inspired-product-behavior-expansion-master.yaml
baseline: 2a34d383aaa91ffd5449a60c3c80085c8563c7dc
objective: >
  Evolve the existing notification and activity reads into one viewer-scoped, backend-prepared
  attention inbox with source, state, destination, and only explicitly permitted actions.
requirements:
  - Reuse existing news, activity, circle-request, booking, ride, and chat projection sources where available; do not duplicate domain event rules in Vue.
  - Preserve existing one-item and mark-all read semantics. Snooze, archive, follow/subscription, and bulk actions are out of scope unless separately contracted.
  - Ordering, unread count, action labels, and safe destinations are supplied by the backend projection.
