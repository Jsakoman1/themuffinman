kind: work
version: 1
id: linear-inspired-realtime-continuity
title: Typed realtime reconciliation for Chat and attention surfaces
status: draft
master_plan: docs/work/linear-inspired-product-behavior-expansion-master.yaml
baseline: 2a34d383aaa91ffd5449a60c3c80085c8563c7dc
objective: >
  Make existing Chat and attention surfaces feel immediate through typed server events and
  safe refresh/reconciliation, without using client-side speculative workflow transitions.
requirements:
  - Reuse existing Chat sync and domain notification fan-out; do not create a second event bus.
  - Event payloads identify only a viewer-visible resource and refresh hint. The client reloads through existing authorized read APIs.
  - Reconnect, duplicate event, changed visibility, failed sync, and offline recovery behavior are specified and tested.
