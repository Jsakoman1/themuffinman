    validation: cd apps/themuffinman && ./mvnw test
  - id: realtime-surface-recovery
    type: implementation
    status: pending
    paths: [apps/themuffinman/frontend/src/modules/app-shell/views/ChatSurfaceView.vue, apps/themuffinman/frontend/src/modules/app-shell/views/NotificationsView.vue, apps/themuffinman/frontend/src/modules/app-shell/api/userShellApi.ts]
    validation: npm --prefix apps/themuffinman/frontend run build && npm --prefix apps/themuffinman/frontend run validate:web-surface
  - id: realtime-runtime-evidence
