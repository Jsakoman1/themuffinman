id: r1-b-location-context
title: Standardize location context, consent, and recovery states
status: verified
baseline: bf7a9ef
strict_verification: true
objective: Make the existing backend-owned location flow honest and recoverable by
  exposing explicit resolution state, provider availability, permission denial, manual
  correction, and exact-location consent through stable DTOs and a thin Web settings
  surface. Do not expand into quest-location or native-client work.
