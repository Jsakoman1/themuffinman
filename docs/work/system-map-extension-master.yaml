readiness_criteria:
- Every extension has an owner, source links, output registry or report, evidence
  class, and explicit gap state.
- The coverage registry remains the single index of mapped, partial, and unknown dimensions.
- No child plan claims completion solely from an audit report.
- Cross-cutting changes update System Map navigation and affected living documentation.
- Every child plan has required output paths and a verifier-compatible validation
  command.
- External blockers are recorded as explicit unknown evidence with a stable follow-up
  ID.
