objective: Remove remaining local date/time formatting and visible state vocabulary
  drift that remains after the verified state-and-formatting baseline, without changing
  domain state semantics.
implementation_contract:
  minimum_source_surfaces:
  - apps/themuffinman/frontend/src/services/formatters.ts
  - every residual local date/time formatter identified in the matrix
  - every changed surface with loading, empty, error, stale, success, retry, or undo
    copy drift
  required_user_visible_changes:
  - All matrix-listed dates/times use the shared formatter unless a documented timezone
    exception is intentional.
  - Loading, empty, error, stale, success, retry, and undo states use consistent vocabulary
    and actionable next steps.
  - State changes are visible through shared status/live-region primitives where appropriate.
  required_runtime_scenarios:
  - representative date/time surfaces across Work, Chat, Things/Rides, Business, and
    notifications
  - loading/empty/error/retry state inspection on at least three modules
  - locale/timezone exception verification where calendar meaning requires it
  anti_partial: Migrating a subset of formatters without completing the matrix is
    insufficient.
scope_control:
  standard: docs/plan-scope-control-standard.yaml
  baseline_only_surfaces:
  - Backend timestamps, timezone authority, workflow states, and presentation DTO
    labels.
  - Existing shared formatter and state vocabulary contracts unless this audit identifies
    a concrete residual inconsistency.
  residual_scope:
  - Replace remaining local DateTimeFormat/toLocale formatting in affected Web surfaces.
  - Align loading, stale, success, error, unavailable, and recovery wording where
    the current audit finds drift.
  - Preserve explicit timezone labeling for calendar and booking surfaces.
  retest_triggers:
  - Any date/time output, timezone label, or state/status copy change.
  - Any mutation feedback or recovery behavior change.
  non_duplication_rule: Do not duplicate backend state mapping or infer transitions
    from labels.
