title: Repair frontend runtime correctness regressions
status: verified
baseline: 2997ba0
master_plan: docs/work/frontend-next-standardization-master.yaml
strict_verification: true
serial_task_execution: true
execution_inventory: docs/work/frontend-next-standardization-execution-inventory.yaml
objective: Resolve the reported runtime correctness regressions before further visual
  cleanup.
scope_control:
  standard: docs/plan-scope-control-standard.yaml
  non_duplication_rule: Reuse the existing backend AVAILABLE and MY_VISIBLE Work presets
    and existing Things API contract; do not add frontend-side ownership or visibility
    filtering.
reported_regressions:
- The same quest IDs appear under My work and Find work.
- The Applications surface is ambiguous and should be labeled My applications when
  it represents applications submitted by the current viewer.
- Create and Search popovers can extend beyond the viewport and become clipped on
  the left.
