kind: plan
version: 1
id: business-capability-closure
title: Close Business profile, booking, and availability gaps
status: done
master_plan: docs/work/capability-coverage-and-reliability.yaml
capability_ids: [business.profile, business.booking, business.availability]
baseline: 6018777
objective: >
  Turn existing Business backend rules and read models into a reliable compact
  owner/customer workflow with explicit booking and availability actions.
tasks:
  - id: business-audit
    status: done
    title: Audit owner and customer booking routes, actions, policies, and gaps
    evidence:
      - apps/themuffinman/src/main/java/com/themuffinman/app/business/controller/BusinessBookingController.java
      - apps/themuffinman/src/main/java/com/themuffinman/app/business/service/BusinessBookingReadService.java
      - apps/themuffinman/frontend/src/modules/app-shell/api/userShellApi.ts
  - id: business-surface
    status: done
    title: Implement compact profile, offering, booking, and availability surfaces
    evidence:
      - apps/themuffinman/frontend/src/modules/app-shell/views/BusinessBookingsView.vue
      - apps/themuffinman/frontend/src/modules/app-shell/views/BusinessProfileView.vue
      - apps/themuffinman/frontend/src/modules/app-shell/views/BusinessOfferingsView.vue
      - apps/themuffinman/frontend/src/modules/app-shell/views/BusinessAvailabilityView.vue
      - apps/themuffinman/frontend/src/modules/app-shell/views/BusinessAvailabilityExceptionsView.vue
      - apps/themuffinman/frontend/src/modules/app-shell/views/BusinessPublicView.vue
      - apps/themuffinman/frontend/src/modules/app-shell/views/BusinessMyBookingsView.vue
      - apps/themuffinman/frontend/src/router.ts
  - id: business-validation
    status: done
    title: Validate booking lifecycle, permissions, empty/error states, and docs
    evidence:
      validation:
        - cd apps/themuffinman/frontend && npm run type-check
        - cd apps/themuffinman/frontend && npm run build
        - cd apps/themuffinman/frontend && npm run validate:modern-surface
        - cd apps/themuffinman && ./mvnw test -q
        - make audit-docs
        - make audit-todo
        - git diff --check
      notes:
        - Backend permissions and lifecycle transitions remain authoritative through allowedActions and existing use cases.
        - Browser-level runtime acceptance is not claimed by compile/test validation alone.
