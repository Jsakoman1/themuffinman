  output: |+
    docs/domain-technical.md:1586:- `LocationAccessPolicyService` owns the named exact-location permission decision used by quest location labels and visibility summaries
    docs/domain-technical.md:1591:- visibility summary and source summary are backend-generated presentation strings
    docs/domain-technical.md:1602:- circle-only quest visibility is enforced through `WorkmarketQuestVisibilityService`
    docs/domain-technical.md:1604:- fallback circle visibility uses `circleService.isCircleBetween(currentUser, quest.getCreator())`
    docs/domain-technical.md:1605:- workmarket notifications also carry circle-request events and actions, so the news feed is not quest-only
    docs/domain-technical.md:1611:- quest DTO presentation includes location label, source summary, and visibility summary generated from location rules
    docs/domain-technical.md:1612:- exact quest address visibility can degrade per viewer based on the creator profile-sharing rules
    docs/domain-technical.md:1650:- `questsApi` maps `/quests`, `/quests/search`, `/quests/presets/:preset`, `/quests/:id`, `/quests/:id/detail`, and lifecycle mutation routes
    docs/domain-technical.md:1664:- unconfigured provider returns an empty configured=`false` response for normal lookup
    docs/domain-technical.md:1687:- bean-validation failures return code `VALIDATION_ERROR`
    docs/domain-technical.md:1691:- malformed request bodies return `BAD_REQUEST` with message `Malformed request body`
    docs/domain-technical.md:1741:- `app.retention.notifications.days` defaults to `7`
    docs/domain-technical.md:1742:- `app.retention.notifications.cleanup-cron` defaults to `0 30 3 * * *`
    docs/domain-technical.md:1780:- Chat workspace, conversation sync, and business owner booking reads accept explicit scan limits; clients may request a bounded scan window but must not discard returned records locally.
    docs/domain-technical.md:1783:- Cross-module search comparison is backend-owned: entity-family selection, visibility filtering, ranking, pagination, empty states, and errors are returned as contract data. Clients preserve each result's family label and source route and do not locally re-rank or truncate mixed results. The acceptance matrix is `docs/cross-module-search-acceptance.yaml`.
    docs/domain-technical.md:1784:- Future iPhone and Watch clients use `docs/native-client-handoff-contract.yaml` as the shared handoff boundary. They reuse backend permissions, action DTOs, pagination, retry semantics, and source routes; compact Watch presentation may reduce density but cannot redefine workflow meaning or authorization.
    docs/domain-technical.md:1792:- `PATCH /things/borrow-requests/{requestId}/decision?approve=true|false` is owner-owned and only accepts `PENDING`, transitioning to `APPROVED` or `DECLINED`. Approval records `approvedAt` and makes the listing unavailable; an approved request can be returned only by its borrower through `PATCH /things/borrow-requests/{requestId}/return`, which transitions to `RETURNED` and restores listing availability.
    docs/domain-technical.md:1794:- The Circles surface explains the policy boundary but does not calculate access locally. Backend circle membership, location visibility, and module-specific access services remain authoritative.
    docs/domain-technical.md:1797:- `docs/cross-module-visibility-acceptance.yaml` is the machine-readable matrix for circle, location, Work, Chat, and Things visibility boundaries. It records backend policy, frontend explanation/surface, and targeted-test evidence separately from browser/device runtime evidence.

