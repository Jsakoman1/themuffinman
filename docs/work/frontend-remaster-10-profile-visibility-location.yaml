- Profile editing, visibility, consent, gallery, location, and notification settings
  remain complete and backend-authoritative.
- Advanced settings are progressively disclosed without hiding required safety context.
- Provider, permission, unresolved, and retry states are explicit and recoverable.
- VisionForWeb handoff can open the correct settings context without exposing terminal
  Vision UI.
- Desktop and mobile settings are usable without a long undifferentiated form.
