execution_inventory: docs/work/frontend-app-remaster-master-execution-inventory.yaml
objective: Simplify the existing profile/settings workspace and its visibility, consent,
  gallery, notification, and location flows while keeping privacy and location authority
  backend-owned.
implementation_contract:
  minimum_source_surfaces:
  - ProfileLocationSettingsView.vue
  - PeopleProfileView.vue
  - NotificationPreferencesView.vue
  - shared AppFormField/AppFormFooter/AppStatus surfaces where adopted
  required_user_visible_changes:
  - Profile editing is grouped into understandable sections with progressive disclosure
    where content is long.
  - Visibility and consent controls explain audience/impact without changing backend
    authority.
  - Location settings show provider/loading/failure/retry states and do not leave
    a sticky footer over content.
  - Notification preferences and profile detail use the same form/action grammar on
    mobile.
  required_runtime_scenarios:
  - profile settings load and section navigation
  - visibility selector change/readback without local permission inference
  - location success, unavailable, and retry presentation
  - mobile edit/save/cancel layout with no footer or nav overlap
  anti_partial: Mobile padding or sticky-footer CSS alone is insufficient.
scope_control:
  standard: docs/plan-scope-control-standard.yaml
  baseline_only_surfaces:
  - Profile, visibility, consent, location, and notification capability status.
  - Backend redaction, circle consent, provider recovery, and persistence rules.
  - Existing profile/settings routes and VisionForWeb handoff query contracts.
  residual_scope:
  - Reduce the complexity of the large ProfileLocationSettingsView form.
  - Improve progressive disclosure for visibility, circle/user selection, gallery,
    and location sections.
  - Clarify provider unavailable, permission denied, unresolved, and retry states.
  - Standardize notification preference presentation with the shared form grammar.
  retest_triggers:
  - Any visibility/consent selector or location action placement change.
  - Any profile route, Vision handoff, or settings section change.
  - Any avatar/gallery upload or deletion behavior change.
  non_duplication_rule: UI may explain backend-authorized privacy state but must not
    calculate visibility or consent locally.
change_impact_review:
