exit_criteria:
  - The child plans are independently verified in strict serial order; no master completion is inferred from static tests alone.
  - “Pokaži mi poslove koje sam ja postao” opens /work/quests from every authenticated Web route through a typed backend action.
  - A specific authorized Work request can resolve a person, title, and relative date and open the canonical Work detail view.
  - Ambiguous, unauthorized, stale, and unsupported requests produce safe clarification or recovery.
  - Vision is available inline from every authenticated Web route and can continue the same persisted conversation while navigating.
  - Text and voice send their normalized input through the same OpenAI semantic interpretation path and share one Web action contract.
  - OpenAI is the only production natural-language interpreter; no local translator, local intent classifier, or semantic emergency fallback is available in production Vision.
  - Development/test profiles may use a clearly labeled local parser only for deterministic fixtures and contract tests.
  - When OpenAI is unavailable, Vision pauses input processing, preserves retryable state, and shows a typed provider-unavailable recovery message instead of returning UNSUPPORTED.
  - Existing Vision mutation capabilities reuse existing preview, confirmation, execution, permission, and adapter boundaries.
  - The animated assistant has accessible, dismissible, reduced-motion-aware states and does not replace canonical direct Web navigation.
  - The Web action contract is versioned and portable to future iPhone and Apple Watch clients.
  - Backend tests, frontend type-check/build, route and contract audits, semantic scenarios, browser runtime evidence, documentation updates, and cleanup all pass.
  - Closeout removes temporary screenshots, smoke traces, and analysis artifacts created only by this master while retaining canonical docs and required runtime evidence.
