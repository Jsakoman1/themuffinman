objective: >-
  Turn the existing backend-governed Vision conversation system into a global,
  inline, context-aware Web assistant that can understand text and voice,
  resolve authorized product entities, navigate to canonical Web surfaces,
  open detail views, control supported surface state, and execute existing
  typed backend capabilities with explicit confirmation where required.
  Preserve the same semantic contracts for future iPhone and Apple Watch
  clients.
