  title: Reconcile current Vision capabilities, Web routes, and target catalog
  child_plan: docs/work/vision-for-web-contract-rebaseline.yaml
  outcome: One authoritative matrix separates existing Vision behavior, partial handoff behavior, missing Web navigation capabilities, and deferred device consumers.
- id: my-work-and-read-navigation
  title: Add the first end-to-end Web navigation slice and canonical read destinations
  child_plan: docs/work/vision-for-web-read-navigation.yaml
  outcome: My Work and the initial module destinations open from any authenticated route through backend-owned Vision actions.
- id: universal-target-resolution
  title: Resolve personal context, entity targets, ownership, and relative time constraints
  child_plan: docs/work/vision-for-web-target-resolution.yaml
  outcome: Vision can safely resolve requests such as Frank's Work from yesterday and clarify ambiguous targets.
- id: inline-global-runtime
  title: Host the existing Vision conversation runtime inline in the authenticated Web shell
  child_plan: docs/work/vision-for-web-inline-runtime.yaml
  outcome: One persistent text/voice Vision session is available from every Web route while /vision remains the full-screen canvas.
- id: web-surface-action-bridge
  title: Let Vision open details, previews, filters, focus state, and comparisons in existing Web surfaces
  child_plan: docs/work/vision-for-web-surface-bridge.yaml
  outcome: Vision controls canonical Web surfaces without duplicating Work, Chat, Things, Business, or Circle UI logic.
- id: animated-assistant-experience
  title: Add the contextual animated helper presence and accessible interaction states
  child_plan: docs/work/vision-for-web-assistant-presence.yaml
  outcome: Vision behaves as a helpful, dismissible, Office-assistant-inspired presence with clear idle, listening, thinking, result, clarification, and recovery states.
- id: text-voice-and-locale-parity
  title: Unify OpenAI-backed text and voice behavior for expected Croatian and English Web commands
  child_plan: docs/work/vision-for-web-input-parity.yaml
  outcome: Text and voice produce the same OpenAI-backed semantic and Web action contract; provider outage pauses Vision with recoverable retry state and never invokes a local translator or classifier.
- id: cross-client-contract-and-closeout
  title: Verify the portable contract, runtime journeys, documentation, and cleanup
  child_plan: docs/work/vision-for-web-closeout.yaml
  outcome: Web, future iPhone, and future Watch clients can consume the versioned Vision action contract, with runtime evidence and temporary artifact cleanup.
