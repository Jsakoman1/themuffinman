semantic_interpreter_policy:
  provider: OpenAI
  rule: OpenAI is the only semantic interpreter for both text and voice input.
  responsibility:
  - understand the user's natural-language request
  - identify the intended capability and entity family
  - select one route from the backend-published route catalog
  - extract only route-approved slots and target hints
  - preserve context across follow-up turns
  backend_boundary:
  - The backend publishes the allowed route, capability, entity, and slot contract to OpenAI.
  - The backend sanitizes and validates every OpenAI response before routing or execution.
  - OpenAI never receives authority to invent routes, permissions, mutations, or hidden data.
  unavailable_behavior:
  - Do not translate, classify, route, or execute locally when OpenAI is unavailable.
  - Pause Vision input processing and mark the Vision assistant unavailable.
  - Preserve the current conversation and unsent input so the user can retry when the provider returns.
  - Show a concise recoverable message; do not convert provider outage into UNSUPPORTED.
  - Existing direct Web navigation and non-Vision product features remain available.
  prohibited:
  - local translator in production runtime
  - local semantic intent classifier in production runtime
  - local emergency parser for real user commands in production runtime
  - silently switching between semantic providers
  development_only:
  - A local parser may remain available behind an explicit development/test profile.
  - Development mode may use deterministic fixtures to test route contracts, slot schemas, UI states, and adapter wiring without making provider calls.
  - Development parser output must be labeled as synthetic and must never be presented as production semantic understanding evidence.
  - Production configuration must fail closed if the development parser is enabled or selected.
gaps_to_close:
  - The global shell opens a separate /vision route instead of hosting one persistent inline Vision session.
  - Vision can return result links, but the handoff contract does not yet describe a concrete target action and canonical destination.
  - My Work / own posted quests is a Web capability and target-catalog capability but has no dedicated Vision intent and route mapping.
  - Entity resolution, owner scope, relative dates, and personal context are not yet exposed through one universal Web target-resolution path.
  - Text and voice do not yet share one global Web assistant runtime from every authenticated route.
  - Existing Web surfaces do not accept one standard Vision focus, preview, filter, and navigation handoff.
  - The current local emergency semantic path must be removed from the Vision routing contract; OpenAI is mandatory and provider outage must pause Vision rather than fall back to local translation/classification.
  - The animated Vision presence is not yet a persistent contextual assistant with idle, listening, thinking, result, clarification, and recovery states.
architecture_invariants:
  - Backend owns intent interpretation, capability selection, entity resolution, permissions, validation, workflow state, and route eligibility.
  - Frontend owns presentation, local open/close state, router execution of backend-approved destinations, focus behavior, and animation.
  - The model may select only backend-published routes, capabilities, entity families, and slot schemas.
  - Read/navigation, preview, proposal, and mutation execution remain separate action classes.
  - Existing domain services and typed adapters remain authoritative; Vision must not duplicate domain mutations.
  - Text and voice use the same conversation, semantic, resolution, review, and execution path.
  - An ambiguous, unauthorized, stale, or unsupported target produces clarification or recovery and never a guessed route or privacy leak.
  - Web, iPhone, and Watch consume versioned semantic/action contracts; device-specific presentation stays client-owned.
  - Vision remains available as a full-screen /vision canvas while the Web assistant becomes an additional host for the same conversation runtime.
  - The animated assistant is helpful and dismissible, not an intrusive replacement for direct Web navigation.
  - OpenAI is the sole production semantic interpreter; provider unavailability pauses Vision processing instead of invoking local translation or intent inference.
  - A local parser may exist only behind an explicit development/test profile for deterministic fixtures and contract validation.
web_action_contract:
  id: vision-web-action-v1
  actions:
  - NAVIGATE_TO_SURFACE
  - OPEN_ENTITY_DETAIL
  - OPEN_ENTITY_PREVIEW
  - SEARCH_AND_OPEN
  - APPLY_SURFACE_FILTER
  - FOCUS_ENTITY
  - SHOW_COMPARISON
  - REQUEST_CLARIFICATION
  - PROPOSE_MUTATION
  - EXECUTE_MUTATION
  required_fields:
  - action
  - routeKey
  - canonicalPath
  - entityFamily
  - targetId
  - viewerSafeLabel
  - preview
  - returnContext
  - allowedActions
  - requiresConfirmation
  - ambiguity
  - recoveryOptions
  invariants:
  - canonicalPath is backend-approved and maps to an existing Web route.
  - targetId is present only after backend authorization and deterministic target resolution.
  - mutation actions cannot execute without the existing Vision review and confirmation boundary.
  - frontend never constructs a domain route from raw natural-language input.
  - the contract carries a version, correlation id, and source context for future device handoff.
primary_user_journeys:
  - id: open-my-work
    prompt_examples:
    - Pokaži mi poslove koje sam ja postao
    - Show me my posted work
    - Otvori moj Work
    expected_flow: VIEW_MY_WORK -> work.quest.view_own -> work.my_quests -> /work/quests
    acceptance: From any authenticated Web route, text and voice open the existing My Work surface without showing unsupported or requiring a manual result link.
  - id: open-specific-work
    prompt_examples:
    - Pokaži mi posao košenja trave kojeg je Frank jučer objavio
    - Open Frank's lawn-mowing job from yesterday
    expected_flow: resolve person + quest + relative date + visibility -> OPEN_ENTITY_DETAIL -> canonical Work detail route
    acceptance: One authorized match opens its canonical Work detail; multiple, inaccessible, stale, or missing matches recover safely.
  - id: open-workspace
    prompt_examples:
    - Otvori moje prijave
    - Idi na Business bookings
    - Otvori zadnji chat s Frankom
    expected_flow: semantic intent -> backend route catalog -> typed Web action -> canonical surface
    acceptance: Existing list and workspace routes open directly from any module and preserve return context.
  - id: execute-existing-capability
    prompt_examples:
    - Kreiraj novi Work
    - Pauziraj ovaj posao
    - Pošalji Circle request Franku
    expected_flow: existing Vision slots -> preview -> confirmation -> typed adapter -> optional affected-surface navigation
    acceptance: Existing mutation paths remain backend-authoritative and gain Web context without duplicated frontend logic.
