kind: work
version: 1
id: web-entry-point-parity
title: Make Work creation and Chat entry points directly discoverable
status: verified
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
master_plan: docs/work/target-capability-production-readiness.yaml
capability_ids:
- work.quest.create
- chat.conversation.open
- chat.conversation.create_group
objective: Close the first practical Web UI parity gap by exposing direct Work creation,
  direct Chat opening, and group conversation creation from their module entry surfaces.
tasks:
- id: work-entry
  title: Add a direct New quest action to the Work entry surface
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/shellDefinitions.ts
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build
- id: chat-direct-entry
  title: Add direct person search and open-chat action to Chat
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/api/userShellApi.ts
  - apps/themuffinman/frontend/src/modules/app-shell/views/ChatSurfaceView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/shellDefinitions.ts
  validation: npm --prefix apps/themuffinman/frontend run generate:contracts && npm
    --prefix apps/themuffinman/frontend run type-check && npm --prefix apps/themuffinman/frontend
    run build
- id: parity-evidence
  title: Record direct entry evidence and keep backend ownership explicit
  type: documentation
  status: done
  paths:
  validation: git diff --check
- id: entry-verification
  title: Verify frontend production build and backend contract compilation
  type: verification
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views/ChatSurfaceView.vue
