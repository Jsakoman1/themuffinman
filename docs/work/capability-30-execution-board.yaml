kind: capability_execution_board
version: 1
id: capability-30-execution-board
title: Completed execution board for the 30 previously partial capabilities
status: completed
source_inventory: docs/capability-inventory.yaml
source_gap_analysis: docs/work/capability-30-gap-analysis.yaml
execution_rule: Execute entries in order. A slice is complete only when its owner plan is verified, its listed files are current, and the inventory entry has matching evidence. Do not invent a new slice while an entry is open.
state_definition: implementation_complete_runtime_pending means code, contract, docs, and strict owner-plan verification passed, but the declared browser acceptance evidence is still missing.
scope_rule: The 30 entries below are the historical partial capabilities closed by this board. Current open inventory status is maintained in docs/capability-inventory.yaml.
goal_contract:
  objective: Close the 30 partial capabilities in this board in order, with backend-owned behavior and reusable Web/Vision contracts.
  unit_of_work: One board entry and its owner plan; do not create a second master plan or parallel capability slice.
  source_of_truth: This board defines the capability order, owner plan, implementation file scope, and close_when contract.
  runtime_source_of_truth: docs/runtime-acceptance-matrix.yaml defines browser/device evidence; an evidence file may only satisfy the actions it explicitly records.
  implementation_gate: owner_plan_verified plus listed files current plus backend/API/frontend/docs validation passing.
  runtime_gate: At least one declared critical-path runtime scenario for the capability is passed when the capability changes user-visible behavior; overlapping matrix scenarios remain diagnostics and are not a reason to repeat the same implementation loop.
  closeout_gate: Update this board, docs/capability-inventory.yaml, affected living docs, and the runtime matrix together; then run strict work-plan verification and the repository audits.
loop_prevention:
  active_entry: At most one implementation entry may be in progress at a time.
  next_entry: Continue only to the next ordered entry after the current entry reaches a terminal status.
  terminal_statuses: [current_web_verified_native_deferred, deferred_by_product_decision, implementation_complete_runtime_pending, runtime_verified]
  forbidden: [inventing_new_capabilities, reopening_verified_slices_without_new_evidence, treating_source_tests_as_browser_evidence, marking_broad_runtime_scenarios_passed_with_narrow_traces, repeating_equivalent_runtime_traces_after_critical_path_is_proven]
  blocker_rule: Stop only for a real blocker, required approval, conflict, or missing external product decision; record it in the current owner plan before pausing.
  cleanup_rule: Do not create screenshots, HARs, smoke-test artifacts, or duplicate plan files; retain only source, tests, docs, YAML control files, and compact JSON runtime evidence.
product_deferrals:
  platform.account.recover: Deferred by DEC-003; retain current partial implementation and do not add provider work in this board.
  cross_module.mobile_watch: Deferred by DEC-002; maintain backend presentation contracts and do not build native apps in this board.
phases:
- id: P1-trust-context
  entries: [01, 02, 04, 05, 06, 07, 08, 09]
- id: P2-domain-workflows
  entries: [16, 17, 18, 19, 20, 21, 22, 23, 24]
- id: P3-vision
  entries: [10, 11, 12, 13, 14, 15]
- id: P4-cross-module
  entries: [25, 26, 27, 28, 30]
- id: P5-explicit-deferrals
  entries: [03, 29]
