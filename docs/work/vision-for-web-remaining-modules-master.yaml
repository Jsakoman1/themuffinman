kind: master
version: 1
id: vision-for-web-remaining-modules-master
title: Complete VisionForWeb navigation across remaining Web modules
status: verified
baseline: 479332c
strict_verification: true
serial_task_execution: true
execution_inventory: docs/work/vision-for-web-remaining-modules-execution-inventory.yaml
analysis_reference: docs/work/vision-for-web-remaining-modules-analysis.md
objective: Analyze and complete the remaining module integrations so VisionForWeb
  can use OpenAI semantic interpretation to select backend-published actions, resolve
  authorized targets, and navigate to real canonical Web surfaces for Work, Circles,
  Profile, People, Things, Rides, Business, Chat, Notifications, and Activity. Preserve
  backend ownership of permissions, workflow rules, and route selection, and produce
  runtime evidence for every module family.
scope:
  included:
  - Work applications and Work/application detail navigation
  - Circles, people, profile, and authorized person/circle target resolution
  - Things, borrow requests, thing detail, and rides
  - Business discovery, public profile, offerings, bookings, availability, and calendar
  - Chat workspace, conversation targets, and conversation detail navigation
  - Notifications and Activity entry points
  - One versioned portable Vision Web action contract for future iPhone and Apple
    Watch clients
  excluded:
  - Rebuilding existing module domain behavior that already works
  - Native iPhone or Apple Watch UI implementation
  - Local natural-language translation or production fallback classification
semantic_policy:
  production_interpreter: OpenAI
  local_parser: development_and_test_fixtures_only
  outage_behavior: pause Vision, preserve conversation, expose retry; never invent
    a route
execution_rules:
- Start inventory items strictly in sequence; never mark a later item complete before
  its dependency is verified.
- Inspect the existing domain service and route registry before adding an adapter;
  reuse existing authorization and DTO assembly paths.
- Publish intent, route key, target policy, and canonical path from backend services;
  the Vue client may only execute typed actions.
- Every implementation task must change its required backend/frontend paths and add
  focused automated coverage for its new behavior.
- Every runtime task must use the real authenticated Web stack and record input, OpenAI
  interpretation, action payload, final URL, and recovery result.
- Closeout removes temporary smoke outputs while retaining only canonical runtime
  evidence and living documentation.
execution_sequence:
- contract-matrix
- work
- social-identity
- things-rides
- business
- chat
- attention-activity
- cross-module-targets
- runtime-closeout
action_contract:
  version: vision-web-action-v2
  action_types:
  - NAVIGATE_TO_SURFACE
  - OPEN_ENTITY_DETAIL
  - OPEN_ENTITY_PREVIEW
  - APPLY_SURFACE_STATE
  - OPEN_CONVERSATION
  - SHOW_CLARIFICATION
  - SHOW_PROVIDER_RECOVERY
  required_fields:
  - action
  - routeKey
  - canonicalPath
  - entityFamily
  - targetId
  - viewerSafeLabel
  - returnContext
  - allowedActions
  - requiresConfirmation
  - ambiguous
  - recoveryOptions
  invariants:
  - Frontend never constructs a domain route from raw natural language.
  - Backend resolves viewer scope, permissions, entity targets, and canonical routes.
  - Detail actions contain an authorized target id; ambiguous targets never navigate.
  - Mutation actions remain behind existing Vision review and confirmation boundaries.
  - Every runtime proof records input, semantic intent, action contract, final URL,
    and recovery behavior.
