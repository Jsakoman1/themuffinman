acceptance:
- Every authenticated route retains an obvious active destination, global search,
  and direct-create entry without changing route or API ownership.
- Any favorite, recent, bell, or workspace affordance is hidden until its explicit
  user-owned backend capability is documented and available.
- Desktop rail collapse and narrow-screen fallback retain keyboard and screen-reader
  access to all primary destinations.
- Existing search and create entries are extended in place; no second global entry
  or competing shortcut model is added.
