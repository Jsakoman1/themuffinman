requirements:
- Keep global, module, and personal shortcut areas visually distinct.
- Keep the workspace/account control, global search, and direct create action predictable
  across routes.
- Do not add a generic bell or star control until notification/subscription and favorite
  ownership exist in the API.
- Define a real mobile fallback instead of compressing desktop semantics into a scrolling
  strip.
