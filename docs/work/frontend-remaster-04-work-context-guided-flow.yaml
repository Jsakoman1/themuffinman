objective: Apply the approved app-like and turn-based grammar to existing Work discovery,
  quest detail, application review, and creation capabilities without changing backend
  actions or scopes.
implementation_contract:
  minimum_source_surfaces:
  - WorkDiscoveryView.vue
  - WorkQuestCreateView.vue
  - WorkQuestDetailView.vue
  - WorkQuestApplicationsView.vue
  - WorkApplicationsView.vue
  - WorkApplicationDetailView.vue
  required_user_visible_changes:
  - Discovery has a clear scope switch, search/filter/sort state, selected-row context,
    and canonical detail handoff.
  - Creation is a guided multi-step or clearly staged flow with draft, validation,
    submit, success, and recovery states.
  - Quest and application details expose one primary next action, secondary actions,
    and explicit pending/success/error feedback.
  - Mobile keeps the selected context usable without horizontal overflow or losing
    the canonical detail path.
  required_runtime_scenarios:
  - authenticated Work discovery and scope change
  - row selection, context preview, and canonical detail navigation
  - create quest open, validation feedback, and safe cancel/recovery without unintended
    persistence
  - application review/action rendering from backend allowedActions
  anti_partial: A description sanitizer, aria-only change, or single discovery CSS
    tweak is insufficient.
scope_control:
  standard: docs/plan-scope-control-standard.yaml
  baseline_only_surfaces:
  - Work capability status and backend workflow transitions.
  - My work versus Find work visibility scopes.
  - Existing canonical Work routes and allowedActions.
  residual_scope:
  - Discovery density and comparison presentation.
  - Context/detail behavior and guided creation/review.
  - Mobile presentation, state clarity, and action feedback.
  retest_triggers:
  - Work row selection or canonical detail navigation changes.
  - Application/quest action placement or allowedActions rendering changes.
  - Owned/discoverable scope or visibility presentation changes.
  non_duplication_rule: Reuse verified Work scope, context, form, and action evidence;
    this plan owns only residual UX remaster behavior.
change_impact_review:
  required: true
  report: docs/audit-output/system-map-change-impact.json
  disposition: required_before_implementation
