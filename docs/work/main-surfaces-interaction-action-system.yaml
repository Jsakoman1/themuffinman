  validation: npm --prefix apps/themuffinman/frontend run type-check
- id: interaction-contract-checks
  title: Detect visible but non-actionable metrics, rows, and duplicate actions
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/validate-modern-surface-contract.mjs
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
acceptance:
- No main surface presents a button, link, metric, or card that looks actionable but
  has no meaningful response.
- Duplicate title/Open/card activation is reduced to one clear interaction.
- Keyboard, pointer, touch, loading, disabled, and nested-action behavior remain correct.
