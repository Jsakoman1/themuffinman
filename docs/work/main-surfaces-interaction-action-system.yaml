kind: work
version: 1
id: main-surfaces-interaction-action-system
title: Standardize clickable rows, metrics, previews, and actions
status: verified
master_plan: docs/work/main-surfaces-modernization-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- cross_module.web_ui
- work.quest.management
- business.booking
- circles.relationships
- platform.profile.view_own
objective: 'Remove misleading non-clickable UI and repeated action controls across
  Home, Business, Work, Circles, Profile, Chat, Things, and Rides. Every visible object
  must have an intentional interaction contract.

'
requirements:
- Metrics can carry optional destinations and render as links only when actionable.
- Rows and cards use one preview/open target; nested buttons and menus never trigger
  the parent.
- Action labels and enabled states come from backend DTOs or explicit route ownership.
- Empty states contain a useful next action when one exists.
- Destructive or low-frequency actions move into shared action menus or confirmation
  surfaces.
tasks:
- id: interaction-contract
  title: Define machine-readable metric, row, card, and action interaction contracts
  type: analysis
  status: done
  paths:
  - docs/work/main-surfaces-interaction-action-system-analysis.md
  - apps/themuffinman/frontend/src/modules/app-shell/shellSurfaceData.ts
  - apps/themuffinman/frontend/src/modules/app-shell/components/AppActionMenu.vue
  - apps/themuffinman/frontend/src/modules/app-shell/components/SurfaceRow.vue
  validation: ruby -e 'require "yaml"; YAML.load_file("docs/work/main-surfaces-interaction-action-system.yaml")'
- id: interaction-adoption
  title: Adopt clickable metrics, rows, previews, and action menus across main surfaces
  type: implementation
  status: done
  paths:
