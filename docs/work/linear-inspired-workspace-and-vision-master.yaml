acceptance:
- The shell, Work, Things, Rides, Business, notifications, Chat, and detail routes
  visibly use one workspace grammar rather than isolated CSS overrides.
- At least two real collections adopt the shared preview primitive; preview has direct
  route, keyboard, stale-object, and narrow-screen proof.
- Personal pins, attention, command entries, and realtime refresh have explicit backend
  ownership and cannot leak inaccessible objects or actions.
- Vision remains a quiet, voice-ready adaptive conversation with shared handoff and
  recovery language, not a duplicate sidebar/dashboard application. Personalized context,
  intent assessment, and any execution authority stay backend-owned, consent-bound,
  and confirmation-gated.
- Each implementation slice has screenshot and browser evidence captured after the
  change; the final verifier must fail if any required evidence artifact is absent.
- No board mutation, drag/drop, generic subscriptions, shared saved views, bulk object
  actions, optimistic workflow updates, or client permission logic is introduced without
  its own future contract.
