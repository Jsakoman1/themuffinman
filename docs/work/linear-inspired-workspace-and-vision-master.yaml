objective: 'Deliver the originally requested substantial frontend redesign as one
  coherent product program: a calm, dense, keyboard-first authenticated workspace
  inspired by modern desktop product applications, backed by the API contracts needed
  for pins, attention, previews, commands, and safe realtime reconciliation; keep
  Vision a distinct, Her-like adaptive conversation surface. Preserve Java/Spring
  domain authority, existing direct workflows, and canonical routes. Do not copy Linear
  branding, assets, exact copy, or proprietary domain model.

'
completion_guardrails:
- Execution is strictly serial through the named execution inventory: start one task,
    implement it, verify it, then start the next task.
- No child is complete because a component exists; each named interaction must be
  adopted on a named route.
- Every strict task changes every listed required path; broad directories are forbidden
  in required_paths.
- Every visual task records changed desktop and narrow screenshots from the named
  route.
- Every runtime task records changed HAR, screenshot, and generated trace metadata
  from an intentionally started stack.
- Static validation, existing HAR files, stale screenshots, and a green build cannot
  substitute for changed runtime evidence.
- A pre-existing user dev server is never stopped and cannot be claimed as agent-produced
  runtime evidence.
- Backend-owned filters, actions, permissions, workflow transitions, read models,
  and event visibility remain authoritative.
