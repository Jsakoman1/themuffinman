title: Authenticated frontend UX and UI modernization
status: verified
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
objective: 'Make the authenticated web client feel like one clear, modern, adaptive
  product. Users must always understand where they are, what they can do next, what
  a click will open, and whether an action is loading, saved, blocked, or destructive.
  Frontend presentation state stays local, while permissions, validation, visibility,
  workflow transitions, and action availability remain backend/API-owned.

'
principles:
- One shared shell and one interaction vocabulary across modules.
- One obvious primary action per surface; secondary and destructive actions are subordinate.
- Clickable cards open previews/details; nested actions never trigger the parent target.
- Short fields may use inline pencil editing; complex workflows use dialogs or dedicated
  pages.
- Rich text is used only where content meaning benefits from formatting.
- Vision complements direct web interaction; it does not replace usable web UI.
- Every async action exposes loading, success, error, empty, retry, and disabled states.
- No frontend permission or business-rule inference beyond backend-provided DTO actions.
