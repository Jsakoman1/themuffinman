exit_criteria:
- Navigation has a deliberate primary/secondary information architecture on desktop
  and mobile.
- All core module cards have a predictable preview/detail interaction and clear action
  hierarchy.
- Supported forms use shared field, validation, dialog, draft, save, cancel, and unsaved-change
  patterns.
- Chat and Calendar are usable at desktop and mobile widths with visible state transitions.
- Shared UI primitives cover buttons, icon actions, cards, dialogs, status, empty
  state, action menus, and form fields.
- Accessibility checks cover keyboard focus, labels, dialog semantics, touch targets,
  reduced motion, and contrast-sensitive states.
- Type-check, build, static audits, browser runtime smoke, documentation audits, and
  work-plan verification pass.
- No required product behavior is moved from backend/API contracts into Vue-only rules.
