kind: work
version: 1
id: linear-inspired-object-interaction-system
title: Shared object selection, actions, and preview interaction system
status: verified
master_plan: docs/work/linear-inspired-product-app-redesign-master.yaml
baseline: 2a34d383aaa91ffd5449a60c3c80085c8563c7dc
objective: 'Define one reusable interaction system for object rows, cards, previews,
  menus, keyboard focus, and mutation feedback. Multiple access paths must invoke
  the same backend-authorized action rather than duplicate domain rules in Vue.

'
reuses:
- docs/work/frontend-ux-action-hierarchy-preview-cards.yaml
- docs/work/frontend-contract-action-dialog-standardization.yaml
requirements:
- Distinguish hover, focus, preview, single selection, multi-selection, and inline
  edit.
- Preserve one primary open target and prevent nested actions from opening it.
- Suppress global shortcuts while typing in inputs, editors, selects, or Vision composers.
- Expose only actions whose DTO/API contract says the current viewer may perform them.
- Require confirmation for destructive actions through the shared action dialog.
- Resolve the current AppActionMenu stale-surface finding before adding a menu abstraction: either
    adopt it through the shared registry or remove it in a dedicated, evidenced cleanup
    task.
