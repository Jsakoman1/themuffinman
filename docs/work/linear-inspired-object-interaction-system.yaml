acceptance:
- A primary row/card target, overflow action, keyboard invocation, and preview all
  use one descriptor/invocation path.
- Nested actions never trigger the parent open behavior, and destructive actions retain
  the existing shared confirmation and recovery behavior.
- No new Vue-side permission rule or duplicate mutation runner is introduced according
  to the frontend audits.
- The active action-dialog standardization plan is verified before this plan changes
  its overlapping components.
