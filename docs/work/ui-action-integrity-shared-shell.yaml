  acceptance:
  - Preview/open/detail/action menu behavior has one consistent grammar.
  - Informational rows cannot appear as actionable rows without a route or handler.
  - Shared rendering never invents permission state; it only consumes backend action
    descriptors.
  - Hidden, disabled, confirmation, destructive, and retry states render consistently.
  - Stats expose an explicit filter/destination or render as noninteractive metrics.
  - Locale-aware date, timezone, and money formatting is reused by Work, Business,
    Things, and Rides.
  - Route metadata, active navigation, and shell context agree for Home, Profile,
    Settings, Notifications, Activity, Onboarding, and Saved searches.
  - Every keyboard shortcut and metric affordance resolves to a real action, and collection
    rows retain a stable identity when the same kind/time appears more than once.
  - Shared hierarchy defines one primary action, compact secondary action access,
    one preview/detail transition, and one nonduplicated utility rail per surface.
  - Redundant headings, explanatory paragraphs, repeated summaries, and display-density
    controls are removed or collapsed when they do not add a distinct decision or
    action.
