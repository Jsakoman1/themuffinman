  and module views; it does not introduce a parallel frontend system.

'
principles:
- Use the supplied reference images only for general application-UI qualities, never
  branding or copied layouts.
- Keep the shared desktop sidebar, compact header, clear surface boundaries, and intentional
  responsive fallback.
- Use tokens and existing shared components before route-specific styling.
- Preserve backend-provided labels, filters, actions, states, and API behavior.
- Verify type safety, production build, static surface contracts, and real rendered
  browser behavior for each increment.
