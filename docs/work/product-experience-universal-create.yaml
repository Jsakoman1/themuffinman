id: product-experience-universal-create
title: Universal create and offer entry
status: verified
master_plan: docs/work/product-experience-account-discovery-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- cross_module.create
- work.quest.create
- sharing.ride.create
- sharing.thing.create
- business.profile
objective: 'Add one global create/offer entry that routes users into Create Work,
  Offer Ride, List Thing, Create Business, Add Availability, or Start Chat while preserving
  direct module entries and backend-owned action eligibility.

'
requirements:
- The global create menu is discoverable but does not replace module-specific actions.
- Options are route/configuration-driven and disabled options explain why.
- Every handoff preserves authenticated context and returns to the correct detail
  surface.
tasks:
- id: universal-create-contract
  title: Define create taxonomy, eligibility, labels, and return destinations
  type: analysis
  status: done
  paths:
  - docs/work/product-experience-universal-create-analysis.md
  - docs/domain-technical.md
  validation: make audit-docs
- id: universal-create-ui
  title: Implement shared Create/Offer menu and module handoffs
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/components/UniversalCreateMenu.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/AuthenticatedShellView.vue
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build
- id: universal-create-runtime
  title: Verify create/offer handoffs, disabled states, and completion returns
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/run-web-runtime-smoke.mjs
  - docs/runtime-acceptance-matrix.yaml
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
  manual_runtime_command: npm --prefix apps/themuffinman/frontend run web-runtime-smoke
  manual_runtime_requires_escalation: true
acceptance:
- A user can start each supported create/offer flow from one predictable global entry.
- Direct module entry points remain available without competing duplicate menus.
- Disabled or unauthorized options cannot be forced through the client.
