serial_task_execution: true
execution_inventory: docs/work/frontend-ux-simplification-master-execution-inventory.yaml
planning_source: docs/work/ui-ux-full-product-audit-2026-07-24.md
scope_control:
  standard: docs/plan-scope-control-standard.yaml
  reused_verified_plans:
  - docs/work/frontend-app-remaster-master.yaml
  - docs/work/frontend-app-remaster-08-runtime-visual-closeout.yaml
  - docs/work/business-booking-end-to-end-master.yaml
  - docs/work/ui-linking-vision-inline-master.yaml
  baseline_only_surfaces:
  - Existing backend domain behavior, permissions, visibility, consent, workflow transitions,
    and booking invariants.
  - Existing canonical routes and API contracts unless a task explicitly records a
    retest-triggered contract change.
  - Existing verified shell tokens, components, formatting, VisionForWeb boundary,
    and module capability mappings.
  - Existing Business flexible service model, pricing, availability, resource assignment,
    booking lifecycle, and runtime evidence.
  - Native iPhone, Watch, deployment, provider, and unrelated backend test boundaries.
  residual_scope:
  - Make the UI task-oriented instead of exposing every available action and section
    simultaneously.
  - Add explicit multi-business owner context and unified personal/business schedule
    ownership.
  - Turn Business calendar into a booking-first calendar with availability/resource
    layers.
  - Convert Business service setup and public booking into progressive, schema-adaptive
    steps.
  - Migrate all authenticated module surfaces to the shared task-surface, attention,
    overflow, and responsive rules.
  - Prove desktop, narrow-screen, keyboard, loading, empty, error, and recovery behavior
    for changed surfaces.
  retest_triggers:
  - Any change to authenticated shell navigation, context state, route handoff, or
    VisionForWeb mounting.
  - Any shared component or token change affecting more than one module.
  - Any route/detail/sheet/drawer ownership change.
  - Any Business context, calendar, booking, availability, resource, or service-setup
    interaction change.
  - Any responsive or accessibility behavior change.
  - Any change to an action's presentation based on backend-provided allowedActions
    or workflow state.
  non_duplication_rule: Prior verified plans and runtime evidence are baseline only.
    This master verifies only new simplification, context, sequencing, and current
    visual/runtime evidence.
