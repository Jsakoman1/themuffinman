- id: control-hardening
  priority: P0
  child: docs/work/frontend-ux-simplification-atomic-task-hardening.yaml
  outcome: Every implementation slice has one observable outcome, bounded paths, dependencies,
    leaf validation, and an evidence boundary.
- id: baseline-and-decisions
  priority: P0
  child: docs/work/frontend-ux-simplification-01-baseline-and-ux-decisions.yaml
  outcome: A frozen route/surface matrix and explicit turn-based, context, responsive,
    and ownership decisions exist before implementation.
- id: shared-task-foundation
  priority: P0
  child: docs/work/frontend-ux-simplification-02-shared-task-foundation.yaml
  outcome: Shared TaskSurface, ContextSwitcher, ActionOverflow, AttentionQueue, progressive
    disclosure, and responsive primitives are implemented without domain logic.
- id: business-context-and-calendar
  priority: P0
  child: docs/work/frontend-ux-simplification-03-business-context-contract.yaml
  outcome: The backend exposes a viewer-scoped multi-business and unified schedule
    read contract without moving authority into the frontend.
- id: business-context-and-calendar-web
  priority: P0
  child: docs/work/frontend-ux-simplification-04-business-context-and-calendar-web.yaml
  outcome: Owners can switch between multiple businesses and see a booking-first schedule
    with role/business/date filters and availability layers.
- id: business-guided-setup
  priority: P1
  child: docs/work/frontend-ux-simplification-05-business-guided-setup.yaml
  outcome: Owner service setup is a progressive, schema-adaptive guided flow with
    a customer-facing preview.
- id: business-guided-booking
  priority: P1
  child: docs/work/frontend-ux-simplification-06-business-guided-booking.yaml
  outcome: Public booking uses explicit business/service/options/date/slot/review
    steps and only exposes fields required by the selected service contract.
- id: work-module-migration
  priority: P1
  child: docs/work/frontend-ux-simplification-07-core-module-migration.yaml
  outcome: Home and Work use one-next-action, focused detail, and progressive-disclosure
    behavior.
- id: chat-attention-migration
  priority: P1
  child: docs/work/frontend-ux-simplification-08-chat-attention-migration.yaml
  outcome: Chat, Notifications, Activity, and Calendar use one attention model and
    focused responsive task states.
- id: social-migration
  priority: P1
  child: docs/work/frontend-ux-simplification-09-social-and-sharing-migration.yaml
  outcome: Circles, People, Things, and Rides adopt the same task modes, focused actions,
    and simpler mobile behavior.
- id: profile-migration
  priority: P1
  child: docs/work/frontend-ux-simplification-10-profile-and-settings-migration.yaml
  outcome: Profile, location, visibility, gallery, and settings become focused guided
    editors with explicit save state.
- id: vision-responsive-accessibility
  priority: P1
  child: docs/work/frontend-ux-simplification-11-vision-responsive-accessibility.yaml
  outcome: VisionForWeb remains contextual, changed surfaces work at narrow widths,
    keyboard/focus states are complete, and reduced motion is respected.
- id: runtime-closeout
  priority: P0
  child: docs/work/frontend-ux-simplification-12-runtime-visual-closeout.yaml
  outcome: Current browser, visual, responsive, accessibility, type-check, build,
    and control evidence proves the completed scope.
