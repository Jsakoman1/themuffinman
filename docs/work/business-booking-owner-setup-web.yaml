  acceptance:
  - Owner can create and edit a business with timezone, booking enabled state, contact
    data, and active/public state.
  - Owner can configure an offering as appointment, window, stay, quantity reservation,
    drop-off/queue, quote/project, or package.
  - Owner can define demand fields and options such as quantity, participant/animal/item
    details, vehicle size, room count, add-ons, and required customer information.
  - Owner can configure fixed, per-time, per-quantity, per-participant/item, package,
    tiered, modifier, minimum-charge, free, or quote pricing with a preview of the
    calculation.
  - Owner can define employees/pools, rooms/bays/equipment, generic shared capacity,
    required resource counts, and assignment policy where the business needs them.
  - Owner can define recurring local opening windows per weekday and per-resource/pool
    overrides, including slot granularity, windows, stays, quantity capacity, and
    buffers.
  - Owner can add and remove blocked or replacement windows without stale incompatible
    fields being submitted.
  - Owner can define structured booking conditions and sees the customer-facing validation
    preview before publishing.
  - Owner can save a service schema version and historical bookings retain the old
    schema and values.
  - Owner setup entrypoints and active-business switching remain represented in the
    capability and interface inventories.
  - New schema, pricing, and resource routes have explicit API methods, frontend routes,
    shell entrypoints, loading/error/retry states, and backend permission checks.
  - Resource management cannot select users outside the owner-approved scope and public
    pages never reveal private employee identity data.
  - Owner can see existing bookings and their status, duration, customer, and allowed
    actions in the Business calendar context.
  - All errors, permissions, archive semantics, and timezone labels come from backend
    contracts and recover clearly in Web.
