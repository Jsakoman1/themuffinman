  acceptance:
  - Typed fulfillment modes support exact appointment, arrival/time window, all-day
    or stay, quantity reservation, drop-off/queue, quote/project, and package flows.
  - Demand can represent quantity, participants/animals/items, selected options, dimensions
    or vehicle class, notes, and business-defined required fields without putting
    business logic in Vue or Vision.
  - Resources can represent an individual employee, a staff pool, a bay/room/equipment
    pool, or generic shared capacity; a booking can require one resource or consume
    multiple capacity units.
  - Fixed offerings support 30-minute and 120-minute examples, while quantity and
    option rules can change duration, price, or capacity consumption.
  - Pricing supports fixed amount, per minute/hour/day, per quantity/unit, per participant/animal/item,
    package, tiered, modifier/add-on, minimum-charge, free, and quote/manual-review
    modes; calculation output is explainable and snapshotted.
  - Conditions support typed lead time, advance horizon, cancellation, approval, service-area,
    participant/size, required-data, and consent rules, with business-authored labels
    and recovery messages.
  - Existing bookings remain readable after offering/rule edits through immutable
    snapshots and versioned configuration references.
  - Public availability and quote generation and booking validation use the same backend
    services and timezone/DST semantics.
  - The backend returns a typed result: bookable slot, bookable window, quantity capacity,
      quote-required, unavailable, or clarification-required; it does not force every
      service into a slot.
  - SINGLE and SHARED capacity, resource assignment, buffers, and concurrency rules
    are atomic and cannot overbook.
  - The initial queue/drop-off implementation is represented as an arrival window
    or quote/project state; a queue position algorithm is not silently included.
  - Capability IDs distinguish service schema, resource pools, quotes, flexible availability,
    demand capture, and booking snapshots instead of hiding them under the existing
    generic Business capability.
  - Synthetic admin/sandbox generation describes the new Business entities and edge
    cases separately from production behavior.
  - Employee and resource references are owner-scoped, and public DTOs expose only
    safe resource labels or availability metadata.
  - Custom demand data has explicit validation, sanitization, visibility, and retention
    behavior.
  - Booking events and notification/audit consumers preserve existing created/status/rescheduled
    lifecycle semantics.
