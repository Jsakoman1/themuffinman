capability_ids:
- cross_module.web_ui
- cross_module.auditability
objective: 'Prove the modernized authenticated frontend through source audits, builds,
  browser runtime flows, documentation synchronization, and verified work-plan evidence
  before closing the master plan.

'
requirements:
- Every master child plan is verified or has an explicit external blocker.
- Type-check, generated contract check, build, frontend audits, docs audits, and recursion
  audit pass.
- Browser smoke covers authenticated navigation, primary actions, overlays, Chat,
  Calendar, recovery, and responsive entrypoints.
- Runtime acceptance evidence is recorded in machine-readable docs, not only in terminal
  output.
- Business and domain docs reflect any changed user-facing behavior and invariants.
- No commit or push is performed implicitly by the plan.
tasks:
- id: runtime-matrix
  title: Extend runtime acceptance matrix for final UX flows and responsive states
  type: documentation
  status: done
  paths:
  - docs/runtime-acceptance-matrix.yaml
  - apps/themuffinman/frontend/scripts/run-web-runtime-smoke.mjs
  validation: make audit-runtime-acceptance
- id: final-validation
  title: Run complete frontend and documentation validation suite
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/validate-modern-surface-contract.mjs
  - docs/work/frontend-ux-modernization-master.yaml
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build && make audit-frontend && make audit-docs
- id: browser-evidence
  title: Run browser smoke and record runtime evidence
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/run-web-runtime-smoke.mjs
  - docs/work/frontend-ux-modernization-analysis.md
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
  manual_runtime_command: npm --prefix apps/themuffinman/frontend run web-runtime-smoke
  manual_runtime_requires_escalation: true
  note: Browser runtime smoke is executed manually with approved escalation and recorded
    in evidence; work-plan verification uses the leaf contract audit inside the sandbox.
acceptance:
- Master completion is supported by child-plan evidence and current repository state.
- Runtime evidence covers the same scope as the product UX requirements.
