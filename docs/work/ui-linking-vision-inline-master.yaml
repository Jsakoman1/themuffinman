preflight:
- Verify the baseline revision remains dcb983f4ad2b0354101caa8c1cdc47c624fb8b71 before
  any child is started.
- Confirm the previously verified Vision plans remain baseline-only and are not re-enqueued
  in this inventory.
- Compare every backend-published canonical path with the Vue router and shell route
  registry.
- Confirm each child task id matches exactly one execution-inventory item and each
  inventory item points to one child task.
- Confirm every strict task has concrete required_paths that are repository files,
  not directories or globs.
- Confirm runtime evidence uses a fresh artifact and the owned dev stack is stopped
  after capture.
- Confirm docs affected by route, workflow, permission, or Vision behavior changes
  are included in the closing slice.
rules:
- Backend services remain authoritative for permission, visibility, entity resolution,
  validation, and mutation safety.
- Every Vision navigation action must resolve to an existing canonical Web route;
  missing routes may not fall back to the Vision console.
- Every mutating Vision flow requires typed inputs, a review state, explicit confirmation,
  and a recoverable final state.
- "“Go to circles” is navigation-only; “open my circles” must load the viewer-scoped
  circles surface."
- "“Send message to Nikolina” must resolve the recipient and message body before confirmation
  and sending."
- Browser evidence is required for route and inline interaction claims; type-check/build
  alone is insufficient.
close_when:
- Every child plan is independently verifier-verified in the declared serial order.
- No known missing canonical route remains in backend-published or Vision-published
  Web actions.
- Work, Things, Rides, People, Business, Chat, Circles, and Vision affected rows expose
  a clear primary destination or explicit action.
- The five requested Vision scenarios pass with fresh browser evidence: open quest
    “Suitcases”, create new work, open my circles, go to circles, and send a message
    to Nikolina.
- Existing verified route/target-resolution evidence is not relabeled as proof of
  the exact requested prompts; the requested prompts receive fresh scenario evidence.
- Stale modern-surface checks are either repaired or narrowed to current behavior
  with regression coverage.
- Frontend type-check/build, backend tests for changed Vision/chat behavior, route/action
  audits, and declared browser scenarios pass.
