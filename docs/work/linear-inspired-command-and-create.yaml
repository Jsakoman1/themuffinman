acceptance:
- Search/command, find-in-view, create, form editing, and Vision input announce distinct
  scopes and do not steal one another's keyboard input.
- A command result and a direct button execute the same permitted route or backend
  operation.
- Form handoff preserves existing validation, cancellation, and error recovery without
  a second draft or creation model.
- Existing global search, saved intent, create, and Vision entry contracts are extended
  rather than duplicated.
