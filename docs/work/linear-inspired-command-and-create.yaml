baseline: 2a34d383aaa91ffd5449a60c3c80085c8563c7dc
objective: 'Build distinct, accessible global search/command and direct-create entry
  behavior while preserving current direct module forms and keeping draft scope explicit.

'
reuses:
- docs/work/product-experience-universal-search-saved-intents.yaml
- docs/work/product-experience-universal-create.yaml
- docs/work/product-experience-vision-global-entry.yaml
requirements:
- Command search returns destinations and actions separately, ranked by the permitted
  current context.
- Global search, find-in-view, recent objects, direct create, and Vision prompt have
  visibly different scopes.
- Shortcuts do not fire while typing in a form field, rich editor, native select,
  or Vision composer.
- Initial shortcuts are limited to discoverable, non-destructive open/search/create
  actions.
