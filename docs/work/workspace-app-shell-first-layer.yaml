preflight_constraints:
- Preserve the existing top-level workspace destinations Home, Work, Chat, Calendar,
  Business, Circles, Things, and Rides; the first transition changes presentation
  and backend preparation, not route availability.
- Keep /workspace/commands as the command catalog for search, create, pinned objects,
  and Vision handoff. The new /workspace/navigation contract owns module visibility,
  child destinations, active-route identity, and attention signals only.
- 'Follow the existing authenticated API pattern: frontend requests use withAuth(),
  backend controllers receive the authenticated AppUser, and domain permissions remain
  in backend read services.'
- Prefer service-level contract tests plus a focused standalone MockMvc controller
  test, matching existing activity and domain test conventions.
