kind: work
version: 1
id: workspace-app-shell-first-layer
title: First transition layer from website pages to an app-like workspace shell
status: verified
baseline: 8e422fe
strict_verification: true
serial_task_execution: true
execution_inventory: docs/work/workspace-app-shell-first-layer-execution-inventory.yaml
execution_rules:
- Execute tasks strictly in sequence order; a later task cannot start while an earlier
  task is pending or failed.
- Every implementation task must change every path listed in required_paths; paths
  are the complete permitted scope.
- A type-check or build cannot close a task that declares contract, visual, DOM, or
  runtime acceptance.
- Reuse existing route and command contracts unless the task explicitly changes their
  documented ownership.
- Any discovered out-of-scope work must be recorded in docs/implementation-backlog.md
  before continuing.
- Do not mark the plan verified until the work-plan verifier records passing evidence
  for every task.
objective: Introduce a persistent ChatGPT-inspired app-like authenticated workspace
  shell with visible modules and backend-prepared relevant nested destinations, while
  preserving canonical routes, domain-owned workflows, Vision's blank-canvas grammar,
  and future mobile/native portability.
design_reference:
  product: docs/product-vision.md
  technical: docs/domain-technical.md
  memory: docs/product-memory.md
  control: docs/implementation-control.md
  preflight: docs/workspace-shell-preflight.md
  inspiration: docs/references/chatgpt-desktop-app-inspiration.md
  external_product_references:
  - https://help.openai.com/en/articles/20001276
  - https://help.openai.com/en/articles/6825453-chatgpt-release-notes
  - https://help.openai.com/en/articles/20001277
  related_shell_sources:
  - apps/themuffinman/frontend/src/modules/app-shell/views/AuthenticatedShellView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/shellDefinitions.ts
  - apps/themuffinman/frontend/src/modules/app-shell/shellRouteRegistry.ts
  - apps/themuffinman/frontend/src/modules/app-shell/shellSurfaceData.ts
ownership:
  backend:
  - viewer-scoped module visibility and route eligibility
  - active child relevance, unread/attention semantics, and counts
  - stable module/child ids, labels, ordering, and route identity
  - redaction and permission boundaries for any navigation metadata
  frontend:
  - rendering the persistent rail and nested destinations
  - expanded/collapsed group state and responsive drawer state
  - active-route highlighting and presentation density
  - keyboard focus, responsive layout, and local transition feedback
  domain_surfaces:
  - remain authoritative for data reads, validation, permissions, mutations, and workflow
    transitions
contract:
  id: workspace-navigation-v1
  proposed_read_model:
  - module id, label, icon key, route, order, and visibility
  - child destination id, label, route, order, and relevance reason
  - backend-prepared badge/count/unread presentation data
  - contract version and safe refresh/reconnect metadata
  invariants:
  - navigation metadata never authorizes a domain mutation
  - counts are never synthesized from partially loaded frontend collections
  - child routes must resolve to canonical existing routes
  - Vision remains a separate adaptive surface and is not rendered as persistent module
    chrome
visual_direction:
  target: ChatGPT-like desktop application clarity, not a marketing website or dashboard
    wall
  principles:
  - One persistent workspace frame with a calm rail, one contextual header, and one
    dominant content surface.
  - Navigation is shallow and purposeful: modules first, relevant child destinations
      second, rare actions in overflow.
  - Recent, pinned, unread, and attention states are compact signals; they are not
    explanatory paragraphs.
  - Use rows, lists, and focused detail panes as the default information architecture;
    cards are reserved for true object summaries or comparison groups.
  - Prefer one clear title, one optional short supporting line, and one primary action
    per surface.
  - Remove repeated eyebrow, utility-note, context-note, helper, and empty explanatory
    copy when the UI state already communicates the meaning.
  - 'Increase readability before adding decoration: body text must not depend on tiny
    muted metadata for essential meaning, and labels must remain readable at narrow
    widths and normal desktop zoom.'
  - 'Keep visual hierarchy quiet: restrained borders, minimal shadows, limited radii,
    one accent, and no competing dashboard tiles.'
  - Use progressive disclosure for secondary actions, filters, account tools, and
    advanced settings.
  typography:
  - Raise the default body and control text scale from the current sub-13px baseline
    to a readable 14-15px range.
  - Keep metadata subordinate but readable; do not use low-contrast or sub-12px text
    for required information.
  - Use sentence case for labels and short nouns for navigation; avoid uppercase section
    labels except for rare system status or compact overline treatment.
  layout:
  - Keep one app shell instead of page-specific chrome; route changes update the selected
    surface in place.
  - Keep the rail stable on desktop and use one drawer grammar on narrow layouts;
    do not maintain a second mobile navigation model with different destinations.
  - Use a centered readable content measure for conversational and detail surfaces,
    with full-width collection rows only where scanning benefits from it.
  - Reserve a right utility rail for contextual actions or inspection, never for repeated
    descriptions.
  component_rules:
  - Prefer semantic components such as nav, main, section, header, ul/ol, and form;
    use div only for layout grouping.
  - Each reusable surface component owns one responsibility and exposes slots for
    actions instead of nested wrapper markup and repeated copy.
  - Collections default to SurfaceRow/list primitives; avoid nested cards, card-in-card
    layouts, and duplicate Open actions.
  - Empty, loading, error, and success states use shared primitives with one concise
    explanation and one recovery action.
  - Move rare actions into AppActionMenu/overflow and keep the header to the few actions
    needed for the current task.
  anti_patterns:
  - Website-style hero/marketing copy inside authenticated product surfaces.
  - More than one explanatory paragraph before the primary content or action.
  - Tiny muted descriptions used as the only way to understand a row or action.
  - Repeated desktop/mobile markup that creates two navigation grammars.
  - Frontend-derived counts, relevance, permissions, or module visibility.
  - Copying ChatGPT source code, private CSS, assets, or proprietary implementation
    details.
