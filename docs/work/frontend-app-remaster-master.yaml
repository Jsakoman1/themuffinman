acceptance:
  product_and_ux:
  - The authenticated Web product reads as one coherent application with stable spatial
    memory.
  - Each remastered surface has one clear primary action and an explicit next state
    or recovery path.
  - Direct UI remains complete; turn-based assistance complements it and does not
    replace it.
  - Details open in context surfaces only where that preserves task continuity; canonical
    routes remain available for deep/complex details.
  - Tabs are limited to independent parallel contexts and do not replace normal navigation.
  - No changed flow requires an unnecessary full browser reload.
  system_map_and_architecture:
  - Every changed action remains linked to an existing capability and Web surface.
  - No frontend code owns permission, visibility, consent, eligibility, workflow transition,
    or persistence authority.
  - Existing allowedActions and backend-prepared DTOs remain authoritative.
  - VisionForWeb remains the only Vision surface used from authenticated Web UI.
  visual_and_interaction:
  - Shared tokens and primitives govern spacing, type, color, surfaces, actions, focus,
    responsive behavior, and motion.
  - Loading, empty, error, stale, success, retry, and undo states use one visible
    vocabulary.
  - Motion is short, functional, and reduced-motion aware.
  - Keyboard, screen-reader, focus, contrast, and touch-target behavior pass for changed
    surfaces.
  delivery_and_evidence:
  - Every child is independently verified through the work-plan verifier.
  - Shared behavior changes include type-check, build, static audits, and browser/visual
    evidence where required.
  - Module workflow changes include current browser evidence for the affected journey.
  - The master is not verified while any child or execution-inventory item remains
    pending or blocked.
closeout:
  required_commands:
  - make work-verify plan=<child-plan>
  - npm --prefix apps/themuffinman/frontend run type-check
  - npm --prefix apps/themuffinman/frontend run build
  - make audit-frontend
  - make audit-plan-coverage
  - make audit-truth-registry
  - make audit-docs
  - git diff --check
  required_evidence:
  - current browser runtime JSON for changed journeys
  - changed visual screenshot evidence for shared and representative module surfaces
  - verifier-generated child evidence
  cleanup:
  - Remove temporary screenshots and traces not referenced by current evidence registries.
  - Keep the final master, verified child plans, canonical product/control docs, and
    current evidence only.
  evidence:
    runtime: docs/runtime-evidence/frontend-remaster-closeout-2026-07-23.json
    visual:
    - docs/runtime-evidence/frontend-remaster-closeout-1440.png
    - docs/runtime-evidence/frontend-remaster-closeout-980.png
    - docs/runtime-evidence/frontend-remaster-closeout-700.png
    - docs/runtime-evidence/frontend-remaster-closeout-390.png
    narrative: docs/work/frontend-remaster-runtime-visual-closeout-2026-07-23.md
stop_conditions:
- A proposed UX change requires a new backend capability, permission, workflow transition,
  or DTO contract.
- A surface decision changes the meaning of visibility, consent, membership, booking,
  lending, ride, work, chat, or notification states.
- A shared primitive regresses an already verified surface and safe recovery is not
  available in the current slice.
- Required browser/runtime or visual evidence cannot be captured in the owned environment.
- A stale/detached component cannot be removed safely without an ownership or product
  decision.
