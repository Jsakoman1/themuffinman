- id: ux-architecture
  priority: P0
  child: docs/work/frontend-remaster-02-ux-architecture-decisions.yaml
  outcome: Route, collection, split-view, detail, drawer, sheet, dialog, tab, inline-edit,
    turn-based, mobile, motion, and accessibility rules are decided before shared
    implementation begins.
- id: shared-foundation
  priority: P0
  child: docs/work/frontend-remaster-03-shared-surface-motion-foundation.yaml
  outcome: Only the missing shared primitives and tokens are implemented, with no
    duplication of already verified standardization work.
- id: work-remaster
  priority: P1
  child: docs/work/frontend-remaster-04-work-context-guided-flow.yaml
  outcome: Existing Work discovery, quest detail, application review, and creation
    flows use the approved app-like and turn-based grammar.
- id: chat-remaster
  priority: P1
  child: docs/work/frontend-remaster-05-chat-workspace-recovery.yaml
  outcome: Chat remains an intentional two-pane workspace with simpler composer, attachment,
    reconnect, mobile, and feedback behavior.
- id: module-sweep
  priority: P2
  child: docs/work/frontend-remaster-06-social-sharing-business-sweep.yaml
  outcome: Circles/People, Things, Rides, and Business adopt shared patterns only
    at existing mapped surfaces and named UX gaps.
- id: personal-context-and-commands
  priority: P1
  child: docs/work/frontend-remaster-09-personal-context-command-center.yaml
  outcome: Home, Attention, Activity, Search, Create, and saved-search surfaces form
    one calm personal context layer without duplicating module dashboards.
- id: profile-visibility-location
  priority: P1
  child: docs/work/frontend-remaster-10-profile-visibility-location.yaml
  outcome: Profile, visibility, consent, and location settings become a simpler guided
    workspace while backend privacy and location authority remain intact.
- id: identity-and-onboarding
  priority: P1
  child: docs/work/frontend-remaster-12-identity-onboarding.yaml
  outcome: Login, registration, recovery, reset, and optional onboarding share the
    same calm form/state grammar without changing authentication authority.
- id: formatting-and-state-consistency
  priority: P2
  child: docs/work/frontend-remaster-11-formatting-state-consistency.yaml
  outcome: Remaining local date/time and visible state formatting drift is reconciled
    with the shared formatter and state vocabulary baseline.
- id: cleanup
  priority: P2
  child: docs/work/frontend-remaster-07-css-obsolete-surface-review.yaml
  outcome: Duplicate CSS is reduced and stale/detached components are removed or retained
    with an explicit ownership decision.
- id: closeout
  priority: P0
  child: docs/work/frontend-remaster-08-runtime-visual-closeout.yaml
  outcome: Changed shell and representative module journeys have current browser,
    responsive, visual, accessibility, type-check, build, and static-audit evidence.
