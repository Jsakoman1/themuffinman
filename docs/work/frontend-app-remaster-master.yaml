goal_pursuing:
  status: reopened
  reopened_at: '2026-07-24T00:00:00+02:00'
  reopen_reason: Prior verification proved required-path changes and static/runtime
    loading evidence, but did not prove the planned authenticated interaction, visual
    simplification, accessibility, or module-specific implementation scope.
  objective: 'Execute the 12-slice frontend app-remaster program in serial order:
    first reconcile the exact System Map baseline and residual scope, then implement
    the approved shared UX grammar and targeted module migrations, and finally prove
    current browser, visual, responsive, accessibility, and static evidence.'
  execution_mode: serial
  first_plan: docs/work/frontend-remaster-01-system-map-reconciliation.yaml
  first_task: freeze-baseline-and-residual-matrix
  start_command: make work-start plan=docs/work/frontend-remaster-01-system-map-reconciliation.yaml
    task=freeze-baseline-and-residual-matrix
  verification_command: make work-verify plan=docs/work/frontend-remaster-01-system-map-reconciliation.yaml
    task=freeze-baseline-and-residual-matrix
  continue_rule: Advance only after the current execution-inventory item and child
    task are verifier-marked done/verified. Start exactly one item at a time and use
    the next sequence number only after current evidence is recorded.
  first_slice_rule: The first slice is analysis-only. It must freeze the dirty-worktree
    boundary, produce the route/surface/capability/baseline/residual matrix, and classify
    all open product/backend decisions before any implementation child starts.
  stop_conditions:
  - A proposed UI change requires a new capability, endpoint, DTO, permission, visibility,
    consent, eligibility, or workflow transition.
  - A product decision is required for route/detail/context/sheet/tab ownership and
    cannot be resolved from the decision record.
  - A shared primitive change would regress a verified surface without a safe bounded
    migration.
  - Browser/runtime or visual evidence cannot be captured in the owned local environment.
  - The dirty worktree makes exact changed-file impact impossible to establish for
    the current slice.
  closeout_rule: The master remains open until all 12 child plans, all 12 inventory
    items, current runtime/visual evidence, and final audits pass through the normal
    work-plan verifier. Required-path changes alone do not prove a child; authenticated
    journeys and concrete UX acceptance evidence are mandatory.
  anti_partial_rule: A child cannot close from required-path changes or static checks
    alone. Every implementation child must record concrete before/after UI behavior,
    rendered browser interaction for every named journey, desktop/mobile visual review,
    and an empty deferred-scope list. Any incomplete planned item keeps the child pending
    and the master open.
pre_goal_gates:
- All 12 child plan files exist and are linked from the master and execution inventory.
- Serial inventory sequence is complete and ordered from 1 through 12.
- The implementation deep dive and System Map audit are linked as planning evidence.
- Existing verified frontend plans are recorded as baseline-only and are not re-counted.
- The first task is analysis-only and has exact required paths plus leaf validation.
- make audit-plan-coverage, make audit-docs, and make audit-frontend pass at preflight.
objective: Remaster the existing authenticated Web frontend into one calm, modern,
  minimal, application-like workspace by simplifying navigation and workflows, standardizing
  shared UI/UX and CSS, improving contextual and turn-based interactions, and preserving
  every existing backend-owned capability and canonical route. This program changes
  presentation and interaction grammar; it does not invent domain capabilities or
  move domain authority into the frontend.
analysis_summary:
  product_direction: 'The Web client is the structured application workspace: stable
    shell, collections, details, search, actions, and safe workflow completion. VisionForWeb
    is the inline contextual assistant and canonical Web handoff layer, while the
    detached Vision console is not a Web navigation surface.'
  design_direction: Use a dark graphite workspace with compact typography, dense but
    readable rows, quiet metadata, restrained borders and status color, sparse elevation,
    clear primary actions, and functional reduced-motion-aware transitions.
  architecture_direction: Keep frontend ownership limited to navigation presentation,
    route context, surface state, loading/error states, and thin client orchestration.
    Backend DTOs, allowedActions, permissions, visibility, consent, workflow state,
    action contracts, and authoritative readback remain the source of truth.
  current_state: The current registry records 46 authenticated Web routes, 44 concrete
    surfaces, one redirect, no placeholder module routes, and no detached routes in
    the route inventory. A stale-surface audit still identifies six likely unused
    components and one detached Vision console view for ownership review.
  residual_problem: Existing standardization work is verified, but remaining modernization
    must reconcile that baseline with the product vision, simplify high-complexity
    surfaces, apply a coherent app-like interaction grammar, address named mobile/detail/privacy/recovery
    gaps, and prove changed behavior visually and in the browser.
scope_control:
  standard: docs/plan-scope-control-standard.yaml
  reused_verified_plans:
  - docs/work/frontend-standardization-master.yaml
  - docs/work/frontend-next-standardization-master.yaml
  - docs/work/frontend-standardization-foundation.yaml
  - docs/work/frontend-standardization-module-sweep.yaml
  - docs/work/frontend-user-facing-surface-archetypes.yaml
  - docs/work/frontend-user-facing-state-form-standardization.yaml
  - docs/work/frontend-user-facing-responsive-consolidation.yaml
  - docs/work/frontend-context-panel-standardization.yaml
  - docs/work/frontend-form-and-action-standardization.yaml
  - docs/work/frontend-css-responsive-consolidation.yaml
  - docs/work/frontend-accessibility-keyboard-standardization.yaml
  - docs/work/frontend-contract-audit.yaml
  baseline_only_surfaces:
  - Existing backend domain behavior, permissions, visibility, consent, and workflow
    transitions.
  - Existing capability status and Web action mapping in docs/capability-inventory.yaml.
  - Existing canonical routes and typed API contracts unless a child plan records
    a retest-triggered change.
  - Existing verified shell, collection, detail, state, form, CSS, responsive, and
    accessibility evidence.
  - Existing VisionForWeb boundary and terminal Vision restriction from the Web shell.
  - Native iPhone, Watch, deployment, and provider runtime boundaries.
  residual_scope:
  - Reconcile verified frontend standardization with product-vision workspace language.
  - Make explicit route/detail/context/sheet/tab decisions for residual surfaces.
  - Add only missing shared surface, action-feedback, motion, responsive, and accessibility
    primitives.
  - Simplify Work, Chat, social, sharing, rides, and business surfaces where current
    inventory or audits identify a gap.
  - Remove or explicitly retain stale/detached UI candidates after ownership review.
  - Capture browser, responsive, visual, and accessibility evidence for changed surfaces.
  retest_triggers:
  - Authenticated shell navigation, route handoff, VisionForWeb mounting, or canonical
    deep-link behavior changes.
  - Shared dialog, sheet, form, surface, navigation, feedback, motion, or token behavior
    changes.
  - A module action placement change affects a backend-provided allowedActions contract.
  - A surface change affects visibility, consent, membership, booking, work, ride,
    lending, chat, or notification state presentation.
  - A route changes from direct detail to context/sheet or from context/sheet to canonical
    detail.
  - Responsive or accessibility behavior changes across more than one module.
  non_duplication_rule: Prior verified plans are baseline evidence only. This master
    owns only the residual remaster scope listed here. A capability, route, action,
    or visual standard already verified by a referenced plan must not be counted again
    as new completion.
  change_impact_review:
    required: true
    report: docs/audit-output/system-map-change-impact.json
    disposition: required_before_implementation
system_map_guardrails:
  canonical_sources:
  - docs/system-map.md
  - docs/system-map-module-registry.yaml
  - docs/system-map-change-impact-registry.yaml
  - docs/system-map-dependency-registry.yaml
  - docs/system-map-workflow-registry.yaml
  - docs/system-map-coverage-registry.yaml
  - docs/client-surface-registry.yaml
  - docs/capability-inventory.yaml
  - docs/target-capability-catalog.yaml
  - docs/endpoint-capability-traceability-registry.yaml
  rules:
  - Capability status is read from docs/capability-inventory.yaml, not inferred from
    a route, button, mockup, or prompt.
  - Frontend may present backend action flags but may not reimplement authorization,
    visibility, consent, eligibility, or workflow authority.
  - New convenience navigation is not a new capability and must not be represented
    as one.
  - Existing Web capability mapping must be reused for Work, Chat, Circles, Business,
    Things, Rides, search, notifications, and shell actions.
  - Browser/runtime gaps remain gaps until a current trace proves them; static route
    mapping is not runtime evidence.
  - VisionForWeb may open or control canonical Web surfaces only through backend-approved
    handoffs and remains inline in the authenticated shell.
  - Native contracts are not Web implementation evidence.
  explicit_non_scope:
  - New domain actions, mutation endpoints, or capability families.
  - Frontend-owned domain data fetching or persistence.
  - Local permission or collection-membership inference.
  - Reopening or embedding the detached Vision console in Web.
  - Treating all details as popups, all navigation as tabs, or all tasks as chatbot
    turns.
