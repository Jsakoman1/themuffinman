kind: work
version: 1
id: frontend-ux-action-hierarchy-preview-cards
title: Standardize action hierarchy, cards, previews, and menus
status: verified
master_plan: docs/work/frontend-ux-modernization-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- work.quest.management
- things.listings
- rides.discovery
- circles.relationships
- business.profile
objective: 'Make browsing and decision-making fast by giving every result row/card
  a predictable preview target, metadata hierarchy, primary action, and safe secondary/destructive
  action treatment.

'
requirements:
- Work, Things, Rides, People, Business, Circles, and Notifications use a shared card/row
  interaction contract.
- Whole-card activation is keyboard accessible and nested controls stop propagation.
- Preview surfaces show the minimum useful context before navigation.
- Action visibility comes from backend DTO allowedActions/primaryAction data.
- Edit, delete, archive, block, cancel, and leave actions use consistent confirmation
  and danger treatment.
- Action menus are available where many low-frequency actions currently compete with
  the primary action.
tasks:
- id: card-primitive
  title: Implement shared clickable card, metadata, and action-menu primitives
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/components/AppCard.vue
  - apps/themuffinman/frontend/src/modules/app-shell/components/AppActionMenu.vue
  - apps/themuffinman/frontend/src/styles/base.css
  validation: npm --prefix apps/themuffinman/frontend run type-check
- id: discovery-adoption
  title: Adopt card and preview behavior across Work, Things, Rides, People, and Business
    discovery
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views/WorkDiscoveryView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/ThingsDiscoveryView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/RidesView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/PeopleDiscoveryView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/BusinessDiscoveryView.vue
  validation: npm --prefix apps/themuffinman/frontend run build
- id: card-contract
  title: Guard nested-action and preview behavior in static surface contracts
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/validate-modern-surface-contract.mjs
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
acceptance:
- A user can distinguish preview, open, edit, and destructive actions without reading
  implementation details.
- Cards provide hover, focus, active, disabled, and mobile touch feedback.
- No nested action accidentally triggers a parent card navigation.
