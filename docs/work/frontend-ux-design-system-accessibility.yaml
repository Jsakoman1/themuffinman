kind: work
version: 1
id: frontend-ux-design-system-accessibility
title: Consolidate design system and accessibility behavior
status: verified
master_plan: docs/work/frontend-ux-modernization-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- cross_module.web_ui
- cross_module.auditability
objective: 'Replace repeated local styling and interaction behavior with a small reusable
  frontend vocabulary that is accessible, responsive, and easy to extend.

'
requirements:
- Shared tokens cover color, text hierarchy, spacing, radii, borders, shadows, focus,
  danger, and motion.
- Shared primitives cover button, icon button, card, dialog, status, empty state,
  action menu, field, and form footer.
- Icon-only actions always have accessible names and tooltips.
- All controls have visible focus, disabled, hover, pressed, and reduced-motion behavior.
- Touch targets meet the existing coarse-pointer minimum and dialogs trap/restore
  focus appropriately.
- Duplicate local CSS is removed only after the shared primitive is adopted and verified.
tasks:
- id: primitive-inventory
  title: Inventory repeated UI patterns and finalize shared primitive contracts
  type: analysis
  status: done
  paths:
  - docs/work/frontend-ux-modernization-analysis.md
  - apps/themuffinman/frontend/src/modules/app-shell/components/AppIconButton.vue
  - apps/themuffinman/frontend/src/modules/app-shell/components/AppDialog.vue
  - apps/themuffinman/frontend/src/modules/app-shell/components/AppStatus.vue
  validation: ruby -e 'require "yaml"; YAML.load_file("docs/work/frontend-ux-modernization-master.yaml")'
- id: primitive-adoption
  title: Replace repeated module-level controls and status markup with shared primitives
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views/AuthenticatedShellView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/ChatSurfaceView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/WorkDiscoveryView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/BusinessProfileView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/CirclesView.vue
  - apps/themuffinman/frontend/src/styles/base.css
  validation: npm --prefix apps/themuffinman/frontend run type-check
- id: accessibility-contract
  title: Add static accessibility and interaction contract checks
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/validate-modern-surface-contract.mjs
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
acceptance:
- No core interactive surface relies on unlabeled icon-only actions or invisible focus.
- Shared tokens and primitives are used by every authenticated module family.
- Static checks detect missing labels, missing dialog semantics, and stale duplicate
  primitives.
