  acceptance:
  - 5K and wide desktop layouts use a centered readable content measure instead of
    stretching text and rows across the entire viewport.
  - Wide screens can use intentional secondary columns, detail utilities, or empty
    breathing space where the surface supports it; no arbitrary full-width dashboard
    grids are introduced.
  - Authenticated module surfaces share the same page header, toolbar, row, detail,
    empty, loading, error, and dialog primitives or document an explicit exception.
  - Shared frontend primitives and backend-prepared DTOs are reused across module
    surfaces; a visual exception requires a documented reason rather than a parallel
    component.
  - Hardcoded tiny typography in shared surfaces and touched module views is migrated
    to semantic tokens; descriptions and metadata remain secondary without becoming
    unreadable.
  - The rail, header, content measure, detail rail, dialogs, keyboard focus, reduced
    motion, forced colors, and 980px/640px responsive behavior remain coherent.
  - The plan audits Work, Business, Things, Rides, Chat, Circles, People, Profile,
    Notifications, Calendar, Search, and Home views; findings and exceptions are recorded
    in the analysis artifact.
  must_prove:
  - No frontend domain rules, permissions, API interpretation, or Vision console UI
    are introduced.
  - The inline VisionForWeb host remains usable at wide and narrow Web widths.
