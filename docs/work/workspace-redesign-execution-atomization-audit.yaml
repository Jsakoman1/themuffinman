completion_guardrails:
  - All items remain planned until their child plan is activated with exact current paths and a clean baseline.
  - A route adoption cannot be verified by a shared-component validation or another route's screenshot.
  - Runtime evidence must be created after intentionally starting the relevant stack and must show the named state transition.
  - The master plan remains draft; this audit plans work and does not claim implementation.
directory_completeness_pass:
  date: 2026-07-18
  route_inventory: {routes: 43, concrete_surfaces: 42, scope: frontend router and shared-shell consumers}
  added_secondary_surface_inventory: [SEC-01, SEC-02, SEC-03, SEC-04, SEC-05, SEC-06, SEC-07, SEC-08, SEC-09, SEC-10, SEC-11, SEC-12, SEC-13, SEC-14, SEC-15]
  resolved_route_gaps:
    - HomeHubView personal workspace
    - WorkApplicationsView, WorkApplicationDetailView, and WorkQuestApplicationsView
    - BusinessPublicView, BusinessMyBookingsView, and BusinessAvailabilityExceptionsView
    - PeopleProfileView, SavedSearchIntentsView, and ActivityView
    - WorkspaceSurfaceView route variants for calendar, business, and profile
    - LoginView and RegisterView as deliberately lightweight identity entry surfaces
  capability_gaps_reviewed:
    source: make audit-target-capability-coverage
    findings: {web_ui_missing: 3, vision_missing: 8, not_ready: 28}
    decision: >
      Cross-device handoff, Watch, and mobile capability completion are not silently
      folded into this desktop workspace redesign. Cross-module search comparison is
      a separate product capability unless a backend-owned compare contract is
      approved; the Command Center and Quick Switcher remain navigation/action
      discovery, not an invented comparison engine. Vision shell-navigation parity
      is intentionally not required because Vision has its own adaptive grammar.
  non_plan_findings:
    - Endpoint linkage reports 72 backend endpoints without a frontend callsite; most are admin or API-only and require a separate API/client-scope decision, not cosmetic redesign adoption.
    - The frontend audit still reports local permission logic and repeated circle blocking actions; retain these as backend-authority review targets when the named route is adopted.
visual_fidelity_expansion:
  source: docs/product-vision.md and supplied screenshot references
  decision: >
    Visual resemblance is an explicit workspace acceptance concern, not an inferred
    side effect of replacing buttons. The VFY sequence precedes shared primitive and
    route adoption work, specifies original graphite/density/polish constraints,
    and rejects copied Linear assets or workflow semantics.
  excluded_product_semantics: [issue boards, drag and drop, manual ordering, shared custom views, generic bulk mutations]
