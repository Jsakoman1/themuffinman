kind: execution_atomization_audit
version: 1
id: workspace-redesign-second-order-atomization
status: analysis_complete
scope:
  master_plan: docs/work/workspace-redesign-complete-master.yaml
  execution_inventory: docs/work/workspace-redesign-complete-execution-inventory.yaml
finding: >
  The first inventory identified the right product surfaces, but 28 entries still
  combined authority design, shared UI construction, several route adoptions, and
  final proof. That granularity would permit a visually improved route to be
  called complete before its backend contract, context continuity, or narrow
  behavior had independent evidence.
atomization_rules:
  - A task owns one change kind: backend/read contract, shared primitive, one named route adoption, or acceptance evidence.
  - A task may cover one bounded UI family only; it must not combine unrelated routes merely because they share a module.
  - Backend permission, availability, recency, activity, and state rules are specified and tested before a frontend consumer adopts them.
  - A shared primitive is not verified by its existence; a later named route adoption must prove it is used in context.
  - Visual evidence, reconnect/retry behavior, keyboard behavior, and narrow-layout evidence are separate acceptance tasks.
  - No task is complete from a build alone. Each task declares the smallest appropriate static, backend, visual, or runtime proof.
  - A task with more than three primary production paths must be split unless those paths form one inseparable component contract.
