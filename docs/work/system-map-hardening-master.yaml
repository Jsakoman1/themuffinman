sequence:
- order: 1
  child: module-topology
  reason: Establish complete denominator before relationship mapping
- order: 2
  child: interface-evidence
  depends_on:
  - module-topology
  reason: Use the module denominator to classify endpoint and client edges
- order: 3
  child: dependencies-data-ownership
  depends_on:
  - module-topology
  reason: Ownership must precede impact and workflow conclusions
- order: 4
  child: workflows-permissions
  depends_on:
  - module-topology
  - dependencies-data-ownership
  reason: State and permission authority depend on ownership boundaries
- order: 5
  child: side-effects-operations
  depends_on:
  - dependencies-data-ownership
  - workflows-permissions
  reason: Side-effects are classified against domain owners and transitions
- order: 6
  child: client-parity-external
  depends_on:
  - interface-evidence
  - workflows-permissions
  - side-effects-operations
  reason: Client and provider boundaries require authoritative contracts
- order: 7
  child: closeout
  depends_on:
  - module-topology
  - interface-evidence
  - dependencies-data-ownership
  - workflows-permissions
  - side-effects-operations
  - client-parity-external
  reason: Reconcile only after all registries exist
quality_gates:
- no_registry_claim_without_canonical_source
- no_current_status_from_historical_analysis_only
- no_module_marked_complete_when_runtime_or_external_edges_are_unknown
- no_dependency_exception_without_owner_and_expiry_or_review_date
- no_cross_module_change_without_impact_record
completion_policy:
  every_scope_item: Must have an owner, canonical source, evidence class, current
    status, and known gap or verification path.
  module_completion: A module is mapped only when domain, data, endpoints, clients,
    workflows, permissions, side effects, tests, and runtime boundaries are addressed.
  no_false_closure: Mapping completeness does not imply product completeness or runtime
    success.
exit_gate:
  required_conditions:
  - all_module_scope_items_have_registry_entries
  - all_selected_endpoints_have_client_capability_test_and_runtime_edges_or_typed_gaps
  - data_ownership_and_dependency_boundaries_are_explicit
  - workflows_permissions_and_invariants_are_linked_to_authoritative_services
  - side_effects_jobs_providers_storage_and_replay_boundaries_are_explicit
  - web_vision_native_and_external_boundaries_are_separated
  - change_impact_and_drift_control_process_is_documented
  - closeout_audits_and_plan_verification_pass
success_measures:
- System Map can identify the likely owner and affected surfaces before a repair or
  feature change.
- Every important claim can be traced to current code, a test, runtime evidence, or
  a typed external gap.
- Cross-module changes expose their downstream data, permission, client, side-effect,
  and evidence impact.
