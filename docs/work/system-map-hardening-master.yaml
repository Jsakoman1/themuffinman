entry_gate:
  required_commands:
  - make audit-docs
  - make audit-truth-registry
  - make audit-plan-coverage
  required_state:
  - current_system_map_and_existing_registries_are_read
  - all_current_backend_domains_and_frontend_modules_are_enumerated
  - historical_analysis_is_not_promoted_to_current_truth
