principles:
- System Map describes current code and evidence, not aspirational architecture.
- Runtime evidence, source evidence, and product intent remain separate evidence classes.
- Each module has one authoritative owner for data, permissions, state transitions,
  and external side effects.
- Frontend and Vision may present actions but backend services remain authoritative.
- Missing evidence is recorded as a typed gap with owner, next action, and review
  date.
- Planned modules are mapped as planned boundaries and never represented as implemented.
- Native/device readiness is separate from native/device implementation proof.
