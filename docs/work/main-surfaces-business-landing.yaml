kind: work
version: 1
id: main-surfaces-business-landing
title: Make Business landing useful and resilient
status: verified
master_plan: docs/work/main-surfaces-modernization-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- business.profile
- business.booking
- business.availability
- business.offering
objective: 'Replace the empty or generic Business landing with a clear owner workspace
  that communicates setup status, public identity, offerings, bookings, and calendar
  entry points even when one backend read surface is unavailable.

'
requirements:
- Use one backend-prepared owner landing contract or a documented composition of existing
  owner read models.
- Do not silently collapse all request failures into an empty page; distinguish not
  configured, unavailable, forbidden, and empty states.
- Expose one primary setup or operational action and subordinate links to profile,
  offerings, bookings, and calendar.
- Keep business owner data separate from public business discovery data.
- Preserve backend ownership of bookingEnabled, allowed actions, and profile visibility.
