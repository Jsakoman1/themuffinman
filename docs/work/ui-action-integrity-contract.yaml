  acceptance:
  - Action ids are stable and entity-scoped; labels are presentation, not authority.
  - Each action declares visibility, enabled state, command route, confirmation policy,
    success state, failure recovery, and canonical destination where applicable.
  - The contract distinguishes navigation, mutation, review, destructive, and informational
    metric behavior.
  - The route registry contains canonical Web routes for every audited entity family
    and explicitly forbids Vision fallback detail routes.
  - The matrix schema can represent viewer role and entity lifecycle state without
    frontend inference.
  - Currency, locale, and timezone formatting ownership is documented as shared client
    presentation over backend values.
  - The action matrix is populated for Home, Work, Things, Rides, Circles, People,
    Notifications, Activity, Chat, Business, Calendar, Profile, and VisionForWeb handoff
    surfaces.
  - Home metric scope ids and canonical destinations are frozen before any Home or
    Work implementation slice begins.
