acceptance:
- Collection surfaces clearly distinguish backend filters from local display controls
  and state the persistence scope of each control.
- Dense rows expose title, state, metadata, open target, loading, empty, and error
  states accessibly without color-only meaning.
- Board, timeline, drag/drop, bulk mutation, and saved-view controls appear only after
  their typed backend capability exists.
