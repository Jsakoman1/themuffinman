kind: work
version: 1
id: linear-inspired-collection-views
title: Dense collection rows, filters, display modes, and grouped views
status: verified
master_plan: docs/work/linear-inspired-product-app-redesign-master.yaml
baseline: 2a34d383aaa91ffd5449a60c3c80085c8563c7dc
objective: 'Standardize high-volume collection surfaces around one accessible row/card
  grammar, backend-owned filters, optional local display modes, and explicit state
  recovery.

'
requirements:
- Use rows by default for high-volume operations; use cards only for visual comparison
  or a supported board.
- Separate filter membership, sort order, grouping, and visible metadata in both UI
  and code.
- Add sticky groups, board columns, drag/drop, and bulk actions only after a concrete
  API contract exists.
- Preserve list focus and scroll position when previewing or returning from a detail
  route.
