kind: execution_inventory
version: 1
id: vision-for-web-integration-master-execution-inventory
master_plan: docs/work/vision-for-web-integration-master.yaml
purpose: >-
  Strict serial queue for the VisionForWeb program. Every item maps to exactly one
  child-plan task and closes one meaningful contract, capability, runtime, or
  documentation outcome. The queue prevents analysis-only loops and prohibits
  starting later work before the previous slice is verified.
scope:
  production_semantic_provider: OpenAI only
  development_parser: allowed only in explicit development/test profiles
  native_clients: contract readiness only; no iPhone or Watch implementation
  first_vertical_slice: My Work navigation from any authenticated Web route
execution_rules:
- Execute items strictly by sequence.
- Start exactly one item at a time through the work-start workflow.
- A child task cannot be marked complete without changed required paths and its declared validation.
- Runtime and visual items require fresh evidence from the current run.
- OpenAI outage behavior must be validated as paused Vision with retry, never local routing.
- Any discovered out-of-scope work must be recorded in docs/implementation-backlog.md before continuation.
items:
- id: contract-matrix
  sequence: 1
  plan: docs/work/vision-for-web-contract-rebaseline.yaml
  task: freeze-capability-route-matrix
  owner: docs-and-contract
  status: pending
  outcome: Authoritative capability-to-route matrix with My Work as the first missing navigation capability.
  closeout: Matrix parses, references real current surfaces, and distinguishes implementation from evidence.
- id: architecture-docs
  sequence: 2
  plan: docs/work/vision-for-web-contract-rebaseline.yaml
  task: reconcile-product-architecture-docs
  owner: docs-and-contract
  status: pending
