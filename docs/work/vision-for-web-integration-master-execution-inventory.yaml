  closeout: Docs audits and diff checks pass with no conflicting local production fallback rule.
- id: my-work-backend
  sequence: 3
  plan: docs/work/vision-for-web-read-navigation.yaml
  task: implement-my-work-capability
  owner: backend-vision
  status: pending
  outcome: VIEW_MY_WORK resolves viewer-owned Work through the published semantic route catalog.
  closeout: Backend tests prove intent, route, ownership, and invalid model response rejection.
