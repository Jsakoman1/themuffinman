kind: work
version: 1
id: product-experience-discovery-ia
title: Make work, people, business, rides, and things discovery explicit
status: verified
master_plan: docs/work/product-experience-account-discovery-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- work.quest.discovery
- people.profile.discovery
- business.profile.view_public
- sharing.ride.discover
- sharing.thing.discover
objective: 'Rework navigation and page entry points so users can immediately find
  work, offer work, find people, find businesses, find rides, and browse things to
  borrow. Keep search, visibility, filtering, and action eligibility backend-owned.

'
requirements:
- Primary navigation and page actions use explicit product language rather than generic
  module labels alone.
- Find surfaces distinguish external discovery from owned/manage surfaces.
- Search and empty/error states offer a clear recovery or next action.
- Discovery cards and rows have one predictable open/preview/action contract.
tasks:
- id: discovery-entry-inventory
  title: Map every discovery route, label, action, and missing entry point
  type: analysis
  status: done
  paths:
  - docs/work/product-experience-discovery-ia-analysis.md
  - apps/themuffinman/frontend/src/router.ts
  - apps/themuffinman/frontend/src/modules/app-shell/shellRouteRegistry.ts
  validation: make audit-frontend
- id: explicit-discovery-navigation
  title: Implement explicit Find/Offer navigation and consistent discovery headers
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/shellRouteRegistry.ts
  - apps/themuffinman/frontend/src/modules/app-shell/shellDefinitions.ts
  - apps/themuffinman/frontend/src/modules/app-shell/views
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run validate:modern-surface
- id: discovery-recovery-contract
  title: Align backend-prepared discovery states and client recovery behavior
  type: implementation
  status: done
  paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/workmarket/controller/QuestController.java
  - apps/themuffinman/frontend/src/modules/app-shell/api/userShellApi.ts
  validation: cd apps/themuffinman && ./mvnw test
- id: discovery-runtime
  title: Verify entry discovery and direct web completion for all modules
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/run-web-runtime-smoke.mjs
  - docs/runtime-acceptance-matrix.yaml
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
  manual_runtime_command: npm --prefix apps/themuffinman/frontend run web-runtime-smoke
  manual_runtime_requires_escalation: true
acceptance:
- Find Work, Offer Work, Find People, Find Business, Find Rides, and Things to borrow
  are discoverable without Vision.
- Owned/manage views are not confused with external discovery views.
- Each discovery surface has working loading, empty, forbidden, failure, retry, and
  detail handoff states.
- Runtime evidence covers all six entry families.
