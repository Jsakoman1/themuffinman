  validation: cd apps/themuffinman && ./mvnw -q test && cd ../.. && npm --prefix apps/themuffinman/frontend
    run type-check && npm --prefix apps/themuffinman/frontend run build
  acceptance:
  - Work collection has one obvious primary action; search, filters, sorting, density,
    Vision, preview, and detail remain available without competing as equal-weight
    controls.
  - Display density controls are local preferences in a compact view menu and do not
    occupy the main action row by default.
  - Work preview and full detail have clear hierarchy and do not repeat the same title,
    metadata, and action grammar unnecessarily.
  - Work owner assignment explicitly resolves the selected approved worker or exposes
    a clear backend selection contract.
  - Application list and detail expose the same allowed self-service actions and canonical
    routes.
  - Apply, edit, withdraw, approve, decline, release, replace, pause, resume, start,
    complete, cancel, and delete have exact state-aware visibility.
  - Work currency/date text uses shared formatting and no hardcoded euro/en-US assumptions
    remain.
