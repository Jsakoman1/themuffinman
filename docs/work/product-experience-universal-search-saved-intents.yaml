kind: work
version: 1
id: product-experience-universal-search-saved-intents
title: Universal search and saved intents
status: verified
master_plan: docs/work/product-experience-account-discovery-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- cross_module.search
- cross_module.search.save
- vision.discovery.search
objective: 'Provide one permission-aware search entry across work, people, businesses,
  rides, things, and conversations, plus saved searches and recurring intents that
  can be resumed in Web or Vision without copying private source data.

'
requirements:
- Search results are typed, ranked, paginated, and visibility-filtered by backend
  contracts.
- Saved intents have bounded query fields, owner, scope, expiry, pause, and notification
  preference.
- Search never reveals private existence, exact location, or hidden relationship data.
tasks:
- id: universal-search-contract
  title: Define query, result, ranking, saved-intent, and privacy contracts
  type: analysis
  status: done
  paths:
  - docs/work/product-experience-universal-search-saved-intents-analysis.md
  - docs/domain-technical.md
  validation: make audit-docs
- id: universal-search-backend
  title: Implement typed search and saved-intent backend services
  type: implementation
  status: done
  paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/search/service/SavedSearchIntentService.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/service/VisionSearchDiscoveryService.java
  - apps/themuffinman/src/main/resources/db/migration/V63__create_saved_search_intent.sql
  validation: cd apps/themuffinman && ./mvnw test
- id: universal-search-clients
  title: Implement Web search palette and Vision search/resume handoff
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/components/GlobalSearchEntry.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/SavedSearchIntentsView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/api/userShellApi.ts
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build
- id: universal-search-runtime
  title: Verify search privacy, saved intents, and recovery
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/run-web-runtime-smoke.mjs
  - docs/runtime-acceptance-matrix.yaml
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
  manual_runtime_command: npm --prefix apps/themuffinman/frontend run web-runtime-smoke
  manual_runtime_requires_escalation: true
acceptance:
- One search entry discovers all supported object families without replacing module
  detail flows.
- Saved intents can be created, paused, edited, deleted, and resumed through Web and
  Vision.
- Backend visibility and ranking rules are enforced consistently.
