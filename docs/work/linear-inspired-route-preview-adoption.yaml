master_plan: docs/work/linear-inspired-product-behavior-expansion-master.yaml
baseline: 2a34d383aaa91ffd5449a60c3c80085c8563c7dc
objective: >
  Adopt the verified shared preview primitive on selected existing collections, with a
  small server-prepared preview DTO only where the collection row lacks safe detail context.
requirements:
  - Preview is keyboard reachable, closes with Escape, preserves the collection route, and exposes a direct canonical detail link.
  - Preview payloads contain only fields already visible to that viewer and do not expose action eligibility inferred in the client.
  - Start with Work and one non-Work object family selected by the audit; do not attempt every module in one slice.
