kind: work
version: 1
id: frontend-app-remaster-draft
title: Frontend app-like UI/UX remaster — planning draft
status: draft
baseline: dcb983f
strict_verification: true
planning_only: true
purpose: >-
  Temporary planning artifact derived from the frontend simplification and
  modernization note. This file is not the implementation master plan and is
  intentionally incomplete until the target experience, module scope, and
  migration order are reviewed.
scope_control:
  standard: docs/plan-scope-control-standard.yaml
  reused_verified_plans:
    - docs/work/frontend-standardization-master.yaml
    - docs/work/frontend-next-standardization-master.yaml
    - docs/work/frontend-css-responsive-consolidation.yaml
    - docs/work/frontend-form-and-action-standardization.yaml
    - docs/work/frontend-context-panel-standardization.yaml
    - docs/work/frontend-accessibility-keyboard-standardization.yaml
  baseline_only_surfaces:
    - Existing authenticated app shell and shared frontend primitives are baseline inputs, not new completion evidence.
    - Existing VisionForWeb boundary and canonical web routes are baseline inputs; this plan may improve their UX but does not reopen the terminal boundary decision.
    - Existing module routes and API contracts remain baseline inputs unless a later child plan explicitly changes them.
  residual_scope:
    - Define the target app shell and module surface archetypes.
    - Identify duplicated, obsolete, or inconsistent frontend UI and CSS.
    - Decide where to use route transitions, split views, drawers, sheets, dialogs, tabs, and inline editing.
    - Define the turn-based interaction model without replacing direct manipulation with chat.
    - Define design tokens, shared component boundaries, responsive behavior, motion rules, and accessibility requirements.
    - Produce implementation-ready child-plan boundaries for the later master plan.
  retest_triggers:
    - Any change to authenticated shell navigation, route handoffs, VisionForWeb mounting, or canonical deep links.
    - Any change to shared dialog, sheet, form, surface, navigation, or feedback primitives.
    - Any change to module-specific workflows, permissions, action contracts, or backend-prepared view data.
    - Any responsive, motion, accessibility, or CSS-token change affecting more than one module.
  non_duplication_rule: >-
    Existing verified plans and evidence are used only as baseline context. The
    later master plan must contain only residual remaster scope and must not
    re-count completed standardization work.
