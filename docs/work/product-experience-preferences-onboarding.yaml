kind: work
version: 1
id: product-experience-preferences-onboarding
title: User preferences and adaptive onboarding
status: verified
master_plan: docs/work/product-experience-account-discovery-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- platform.preferences
- platform.onboarding
- vision.personalization
objective: 'Establish an explicit preference and onboarding contract for locale, timezone,
  privacy defaults, notifications, home/work areas, commute schedule, work radius,
  categories, and Vision personalization.

'
requirements:
- Preferences are explicit, editable, versioned where sensitive, and never silently
  inferred as policy.
- Onboarding is resumable and skippable without blocking core product use.
- Sensitive location, schedule, and personalization preferences have separate consent
  and revoke behavior.
tasks:
- id: preferences-contract
  title: Define preference taxonomy, defaults, consent, versioning, and reset behavior
  type: analysis
  status: done
  paths:
  - docs/work/product-experience-preferences-onboarding-analysis.md
  - docs/agent-operating-model.yaml
  validation: make audit-docs
- id: preferences-backend
  title: Implement preference storage, viewer DTO, defaults, and consent audit
  type: implementation
  status: done
  paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/identity/service/OnboardingProgressService.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/notification/service/NotificationPreferenceService.java
  - apps/themuffinman/src/main/resources/db/migration/V65__create_onboarding_progress.sql
  validation: cd apps/themuffinman && ./mvnw test
- id: onboarding-ui
  title: Implement resumable onboarding and preference management
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views/OnboardingView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/NotificationPreferencesView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/api/userShellApi.ts
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build
- id: preferences-runtime
  title: Verify opt-in, skip, edit, reset, revoke, and resumed onboarding
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/run-web-runtime-smoke.mjs
  - docs/runtime-acceptance-matrix.yaml
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
  manual_runtime_command: npm --prefix apps/themuffinman/frontend run web-runtime-smoke
  manual_runtime_requires_escalation: true
acceptance:
- Core product use remains available when onboarding is skipped.
- Sensitive preferences require explicit consent and support revoke/reset.
- Web and Vision consume the same preference contract.
