acceptance:
  - 'The Web workspace visibly follows the visual-reference contract on desktop and
    narrow evidence: graphite surfaces, compact geometry, subtle separators,
    restrained elevation, semantic status color, and clear text/metadata hierarchy.'
  - Named authenticated routes visibly adopt shared controls and scaffolds; local pill
    button and ad-hoc field CSS is removed only after the replacement is adopted.
  - Work and Things demonstrate the canonical collection context/list/preview flow;
    their detail routes demonstrate main/activity/utility flows where justified.
  - Chat demonstrates index/thread/context behavior and backend-owned reconnect recovery.
  - Business, Rides, Circles, People, Profile, Settings, notifications, and onboarding
    use the appropriate shared collection, detail, or form archetype without forcing
    a third column onto simple tasks.
  - Home, applications, public and customer-facing Business views, saved intents,
    activity, hub routes, and identity entry are explicitly assessed and migrated
    where they are authenticated or task-bearing surfaces; none is silently left in
    legacy card-first styling.
  - Command, creation, pins, and attention are discoverable and backend-authoritative.
  - Users can resize and restore eligible workspace rails, use a keyboard Quick
    Switcher for backend-visible recent objects, and choose a presentation density
    without changing collection membership or permissions.
  - Right-click/context actions, overflow actions, tooltips, keyboard help, and
    primary/secondary/destructive hierarchy resolve to one action definition.
  - Activity rails render backend-prepared events consistently for Work, Things,
    Business, Circles, and Chat where the read model supports them.
  - Returning from a supported preview/detail preserves supported collection context
    and safely clears inaccessible or stale selections.
  - Vision handoff and return retain typed context while Vision stays voice-ready,
    consent-bound, confirmation-gated, and visually distinct from the workspace.
  - Every adopted desktop and narrow route has fresh visual evidence; runtime behavior
    has fresh trace/HAR evidence from an intentionally started stack; no child or this
    master is verified before every serial inventory item is verifier-marked verified.
  - Focused dense collections demonstrate input-safe Arrow/J/K traversal, Enter open,
    preview, and Escape clear behavior in their keyboard evidence where the route has
    a collection selection model.
