objective: >
  Deliver one coherent dark graphite authenticated workspace rather than a color-only
  skin: a stable shell, compact low-chrome visual language, optional three-column
  collection/detail archetypes, dense backend-
  owned collections, inspect-before-open previews, inline structured work, typed
  command and creation entry points, personal attention, safe chat continuity, and
  a distinct first-class Vision client with typed handoff and return context.

start_gates:
  - Keep this master draft until every child has exact required paths and an atomic
    task mapping in the execution inventory.
  - 'Apply the second-order execution atomization rules: backend contract, shared
    primitive, named route adoption, and acceptance proof stay independently tracked.'
  - Record a fresh committed baseline and isolate unrelated working-tree changes
    before activating the first inventory item.
  - Run `make audit-frontend`, `make audit-docs`, `make audit-impact`,
    `make audit-plan-coverage`, and `make audit-work-plan-recursion` at activation.
  - For each route adoption, confirm its backend read model, allowed actions,
    permissions, filtering, and workflow transitions before changing Vue.
  - For every new or changed Vision handoff, reread `docs/vision-architecture-patterns.md`
    and extend the typed presentation/handoff contract first.
  - Do not start a child merely because a similarly named historical plan is verified.

principles:
  - 'The desktop workspace follows the original graphite visual-reference contract:
    quiet near-black surfaces, subtle separators, compact squared controls, dense
    hierarchy, restrained status color, and no default card/pill/shadow language.'
  - Backend decides membership, permissions, allowed actions, workflow state,
    attention, personal context, and visibility; frontend renders the prepared state.
  - One primary target opens an object; nested buttons, overflow actions, and keyboard
    interactions remain independent and accessible.
  - Filters change backend-supported membership; display controls change only
    presentation. Neither creates client-side business rules.
  - A third workspace column is used only where it contributes context, inspection,
    activity, or safe actions; it becomes an explicit drawer or route on narrow screens.
  - Shared controls and layouts replace route-local CSS incrementally; no global
    override may masquerade as component adoption.
  - Rail widths, density, recents, favorites, and saved personal intents are user
    presentation/context preferences. They remain user-scoped and cannot expose an
    inaccessible object or alter backend collection membership.
  - Keyboard shortcuts and right-click menus are additional paths to the same
    backend-allowed action definitions; they do not introduce a second mutation layer.
  - Refresh preserves usable context where safe. Do not use optimistic workflow
    transitions; show refreshing, reconnected, stale, retry, and failure states.
  - 'Performance changes follow measurement: retain list content during refresh, fetch
    previews non-blockingly, lazy-load route boundaries, and virtualize only genuinely
    large collections without breaking keyboard selection.'
  - Vision is a main adaptive voice/context-aware surface, not an embedded workspace
    dashboard. Handoffs are typed, consent-safe, backend-prepared, and returnable.
  - The plan borrows interaction principles from reference material without copying
    Linear branding, copy, assets, board semantics, or proprietary domain model.

