kind: work
version: 1
id: web-optimization-guided-intake
title: Introduce backend-driven turn-based guided intake
status: verified
baseline: 7972676741cdee89361012afb0a769b43f2c2dc4
strict_verification: true
serial_task_execution: true
execution_inventory: docs/work/web-optimization-execution-inventory.yaml
master_plan: docs/work/web-optimization-master.yaml
depends_on:
- docs/work/web-optimization-theme.yaml
coverage_contract:
  rule: Turn-based intake applies to every multi-field create or edit workflow that
    benefits from progressive disclosure; it does not replace collection browsing,
    search, detail inspection, chat message composition, notifications, or single-action
    confirmations.
  architecture_rule: Implement one reusable backend/API guided-intake contract and
    shared step model; do not create one bespoke wizard implementation per entity
    family.
  entity_families:
  - Work: quest creation, application submission, and any multi-field quest edit flow.
  - Business: business profile, offerings, availability, availability exceptions,
      and booking intake.
  - Things: listing creation/editing and borrowing/request intake.
  - Rides: ride offer creation/editing and commute preference intake where multiple
      fields exist.
  - Social: circle creation/editing, membership/request forms, and invite flows.
  - Identity: profile, location, gallery, onboarding, and account preference forms.
  exclusions: Chat messages, notifications, search filters, list/detail pages, and
    destructive actions keep their existing focused interaction unless a later plan
    proves a multi-step workflow is needed.
tasks:
- id: implement-turn-based-intake-contract
  title: Define and implement portable guided-intake step orchestration
  type: implementation
  status: done
  sequence: 1
  inventory_item: backend-guided-intake-contract
