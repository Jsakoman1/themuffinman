  validation: "./apps/themuffinman/mvnw -f apps/themuffinman/pom.xml test"
  acceptance:
  - Response exposes exactly one current step, its input kind, label, placeholder,
    allowed choices, current value, validation state, and next action.
  - Backend owns step order, conditional fields, requiredness, normalization, and
    draft state transitions.
  - The step schema, transition semantics, validation errors, draft lifecycle, and
    review boundary are reusable across all entity families and clients.
  - Existing Vision slot turns and Web guided forms can consume the same step metadata
    without introducing a local production parser.
  - Contract is client-neutral and can later be rendered by Web, the standalone Vision
    console, iPhone, and Apple Watch.
  - This task changes the shared backend contract, not the future standalone Vision
    console UI.
  must_prove:
  - Partial drafts cannot execute or submit before backend completion and review rules
    pass.
