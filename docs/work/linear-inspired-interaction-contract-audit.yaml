- Keep a frontend-only display preference local until persistence, ownership, and
  sharing rules are explicit.
- Capture the current audit baseline: 43 routes, 42 concrete route surfaces, one likely-unused
    AppActionMenu, and existing workflow/feedback overlap findings must be resolved
    or explicitly preserved before a new primitive is introduced.
