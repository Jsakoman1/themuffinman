kind: master
version: 1
id: capability-coverage-and-reliability
title: Capability coverage and reliability
status: deferred
deferred_reason: Browser/device runtime tooling and native iPhone/Watch implementation are outside the current workspace scope.
deferred_at: 2026-07-16
resume_when: A browser/device runtime harness or native client implementation workspace is available.
baseline: 6018777
inventory: docs/capability-inventory.yaml
objective: >
  Close the highest-impact product capability gaps by connecting intended behavior
  to reliable backend workflows, usable web surfaces, future-client contracts,
  and explicit validation evidence.
goals:
  - Close the critical Work create, management, and application workflow gaps.
  - Close the critical Business booking action and editing gaps.
  - Build a capability-by-capability Vision execution acceptance matrix.
  - Preserve one backend-owned contract for web, iPhone, and Watch clients.
  - Keep every capability status synchronized with actual implementation evidence.
non_negotiables:
  - Do not mark a capability implemented because only an endpoint or placeholder surface exists.
  - Every plan checkbox must identify the capability IDs it changes.
  - Every broken or partial result must remain visible in the inventory until verified.
  - Backend permissions, validation, workflow transitions, and action availability remain authoritative.
children:
  - docs/work/work-capability-closure.yaml
  - docs/work/business-capability-closure.yaml
  - docs/work/vision-execution-acceptance.yaml
  - docs/work/native-client-contract-readiness.yaml
  - docs/work/chat-reconnect-resync.yaml
  - docs/work/profile-location-settings-surface.yaml
  - docs/work/things-listing-surface.yaml
  - docs/work/things-borrow-cancellation.yaml
  - docs/work/circles-privacy-explanation.yaml
  - docs/work/chat-attachment-surface.yaml
  - docs/work/chat-attachment-preview.yaml
  - docs/work/cross-module-visibility-acceptance.yaml
  - docs/work/profile-location-visibility-scope.yaml
  - docs/work/plan-coverage-audit.yaml
  - docs/work/things-owner-borrow-workflow.yaml
  - docs/work/things-detail-surface.yaml
  - docs/work/runtime-acceptance-catalog.yaml
  - docs/work/cross-module-search-contract.yaml
  - docs/work/native-client-handoff-contract.yaml
dependencies:
  - docs/work/work-capability-closure.yaml -> docs/work/business-capability-closure.yaml
  - docs/work/work-capability-closure.yaml -> docs/work/vision-execution-acceptance.yaml
  - docs/work/vision-execution-acceptance.yaml -> docs/work/native-client-contract-readiness.yaml
tasks:
  - id: inventory-baseline
    status: done
    capability_ids: [cross_module.auditability]
    title: Establish the capability inventory and gap taxonomy
    evidence:
      files: [docs/capability-inventory.yaml, docs/capability-inventory.md]
      validation: ruby -e 'require "yaml"; YAML.load_file("docs/capability-inventory.yaml")'
  - id: work-closure
    status: done
    capability_ids: [work.quest.create, work.quest.management, work.application]
    title: Close the first Work workflow gaps
    child_plan: docs/work/work-capability-closure.yaml
  - id: business-closure
    status: done
    capability_ids: [business.profile, business.booking, business.availability]
    title: Close Business booking and owner operations gaps
    child_plan: docs/work/business-capability-closure.yaml
  - id: vision-acceptance
    status: done
    capability_ids: [vision.create_quest, vision.execution, vision.read_discovery]
    title: Add capability-level Vision execution acceptance
    child_plan: docs/work/vision-execution-acceptance.yaml
  - id: client-readiness
    status: done
    capability_ids: [cross_module.mobile_watch, cross_module.search]
    title: Make native-client contracts and high-volume handoff explicit
    child_plan: docs/work/native-client-contract-readiness.yaml
  - id: remaining-critical-runtime
    status: pending
    capability_ids: [work.quest.management, work.application, business.booking, business.availability, vision.execution, chat.realtime]
    title: Add browser/device runtime acceptance for implemented workflows
    child_plan: docs/work/runtime-acceptance-catalog.yaml
    note: Scenario catalog and route guards are verified; the remaining work is execution of real route interactions, reconnects, and failure recovery in a browser/device runtime.
  - id: remaining-cross-module-contracts
    status: pending
    capability_ids: [circles.relationships, circles.visibility, cross_module.search, cross_module.auditability]
    title: Complete privacy, discovery comparison, and automatic inventory-to-plan coverage checks
    child_plan: docs/work/cross-module-search-contract.yaml
    note: Privacy explanation, search contract, and machine-enforced plan coverage are implemented; runtime execution of the visibility/search matrices remains open.
  - id: remaining-product-surfaces
    status: pending
    capability_ids: [things.listings, platform.location, chat.attachments]
    title: Close the next partial product surfaces with dedicated web workflows
    note: Things detail and lending workflows are implemented; mobile/watch attachment strategy and location/Things device acceptance remain open.
exit_criteria:
  - All child plans are verified or explicitly blocked with a recorded external blocker.
  - Critical capability gaps are either verified closed or linked to a still-open task.
  - Inventory statuses and evidence match the real repository state.
  - Full backend/frontend/docs validation passes.
