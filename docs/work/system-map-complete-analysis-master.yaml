analysis_protocol:
  evidence_classes:
  - source-trace: Directly traced from code, schema, configuration, or generated contract.
  - validated-contract: Supported by a focused test, audit, or verifier result.
  - runtime-proof: Supported by current browser, device, or runtime evidence.
  - inferred-risk: A bounded inference that must identify its source basis and uncertainty.
  - unknown: A deliberately recorded gap; it must not be presented as implemented
      or verified.
  required_finding_disposition:
  - update_the_owning_canonical_source
  - add_or_update_a_machine_readable_registry_row
  - create_or_link_a_stable_backlog_ID
  - record_no_change_with_evidence
  output_rules:
  - Each round document must distinguish current implementation, target intent, and
    unverified assumption.
  - Each registry row must contain an owner, source links, evidence class, confidence,
    and last-reviewed round.
  - Each analysis boundary must state what was not inspected and why.
  - No analysis result may infer production behavior solely from static source inspection.
readiness_criteria:
- Every child has a unique serial inventory item, explicit dependency, registry or
  canonical output, and leaf validation.
- Runtime and performance claims remain classified as unproven until current runtime
  evidence exists.
- The final round updates the living system map rather than creating a competing narrative
  map.
