objective: Extend the living system map into a complete, evidence-backed system truth
  model for features, fixes, and future analysis. Map canonical ownership, backend
  and database structure, APIs and clients, workflows and invariants, tests and runtime
  evidence, operations, security, and drift-control mechanisms without confusing target
  scope with current implementation.
