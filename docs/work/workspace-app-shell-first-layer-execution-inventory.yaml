kind: execution_inventory
version: 1
id: workspace-app-shell-first-layer-execution-inventory
master_plan: docs/work/workspace-app-shell-first-layer.yaml
purpose: Serial implementation map for the first app-shell transition. Every delivery
  item has one owner surface, concrete paths, and one closeout condition so implementation
  does not drift into an open-ended redesign loop.
scope:
  desktop_first: true
  first_modules:
  - home
  - work
  - chat
  - calendar
  - business
  - circles
  - things
  - rides
  account_surface: profile remains an account/settings surface, not a module rail
    destination in this transition.
  excluded:
  - Vision persistent module chrome
  - domain workflow rewrites
  - iPhone native UI
  - Apple Watch native UI
  - arbitrary frontend-generated navigation permissions
preflight_constraints:
- Preserve all existing top-level routes. This transition changes shell presentation
  and backend preparation, not route availability.
- Keep /workspace/commands as the command catalog for search, create, pinned objects,
  and Vision handoff; /workspace/navigation must not duplicate command definitions.
- Use the existing withAuth() frontend request helper and authenticated AppUser backend
  controller pattern.
- Use service-level tests and a focused standalone MockMvc controller test, matching
  current activity conventions.
