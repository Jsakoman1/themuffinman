preflight:
- Verify baseline revision remains dcb983f4ad2b0354101caa8c1cdc47c624fb8b71 before
  starting a child.
- Confirm every child task maps to exactly one execution-inventory item.
- Confirm the current runtime evidence is retained as baseline/failure evidence and
  is not relabeled as passing.
- Confirm browser runtime uses the owned make dev/make dev-stop lifecycle and a fresh
  evidence artifact.
- Confirm every changed logical behavior updates the affected regression catalog and
  living Vision docs.
- Confirm the expanded Chromium denominator is exactly the cases in docs/vision-prompt-contract-matrix.yaml.
- Confirm local deterministic routing is labeled development/test-only and production
  provider outage maps to PROVIDER_UNAVAILABLE.
- Confirm `docs/vision-prompt-contract-matrix.yaml` exists and defines the finite
  prompt/runtime denominator before Child 05 starts.
- Confirm runtime-pending Vision rows have one owner plan and are not double-promoted
  by this master.
rules:
- Backend remains authoritative for intent validation, entity visibility, permission,
  confirmation, mutation, and final readback.
- Exact critical prompts must have provider examples, deterministic safe fallback
  behavior, unit/integration coverage, and browser acceptance coverage.
- Navigation-only prompts may not invent content or mutate state.
- Read-only no-match and provider-failure outcomes must be explicit and recoverable;
  generic placeholder text is not acceptance evidence.
- Mutations require typed slots, review, explicit confirmation, idempotent execution,
  and authoritative readback.
- OpenAI remains the only production semantic interpreter; deterministic local routing
  is limited to explicitly labeled development/test fixtures.
- Every runtime scenario must record prompt, intent/action, route, conversation id,
  provider status, recovery state, browser/API errors, and authoritative readback
  where applicable.
close_when:
- Every child is independently verifier-verified in serial order.
- Critical prompt families no longer depend on an untested helper-injected semantic
  plan.
- The five requested prompts and the expanded prompt matrix have fresh Chromium evidence
  with typed outcomes.
- SEND_MESSAGE no longer degrades to OPEN_CHAT for a send request.
- Provider failure, fallback, retry, no-match, ambiguity, and auth/setup failures
  have explicit outcomes and regression coverage.
- Backend tests, frontend type-check/build, audits, and declared browser scenarios
  pass.
