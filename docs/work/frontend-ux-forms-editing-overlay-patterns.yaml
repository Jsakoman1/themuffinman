kind: work
version: 1
id: frontend-ux-forms-editing-overlay-patterns
title: Standardize forms, inline editing, dialogs, and save states
status: verified
master_plan: docs/work/frontend-ux-modernization-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- work.quest.create
- work.quest.management
- business.profile
- business.booking
- platform.profile.update
objective: 'Make create and edit flows calm, predictable, and reversible while keeping
  validation and workflow authority in backend services.

'
requirements:
- Use inline pencil editing only for short, low-risk fields.
- Use dialogs for bounded create/edit/request/reschedule workflows.
- Use dedicated pages for complex profile, location, permissions, and rich workflows.
- Standardize field labels, helper text, character counts, required markers, server
  errors, and focus behavior.
- Prevent duplicate submits and expose saving/saved/failed states.
- Warn or preserve drafts when a user closes an edited surface with unsaved changes.
- Rich text fields use one editor and one sanitized preview contract.
