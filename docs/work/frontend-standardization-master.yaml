id: frontend-standardization-master
title: Standardize frontend navigation, surfaces, and interaction grammar
status: verified
baseline: 2997ba0
strict_verification: true
serial_task_execution: true
execution_inventory: docs/work/frontend-standardization-master-execution-inventory.yaml
audit: docs/audit-output/frontend-user-facing-audit-2026-07-22.md
plan_review: docs/audit-output/frontend-user-facing-master-plan-deep-dive-2026-07-22.md
goal_pursuing:
  objective: Make the authenticated frontend feel like one coherent product by removing
    duplicate navigation, standardizing collection/detail/context surfaces, unifying
    visible form and state grammar, and proving responsive behavior.
  execution_mode: serial
  first_plan: docs/work/frontend-user-facing-navigation-dedup.yaml
  first_task: route-action-matrix
  start_command: make work-start plan=docs/work/frontend-user-facing-navigation-dedup.yaml
    task=route-action-matrix
  verification_command: make work-verify plan=docs/work/frontend-user-facing-navigation-dedup.yaml
    task=route-action-matrix
  continue_rule: Advance only after the current inventory item and child task are
    verifier-marked done/verified.
  scope_rule: Keep backend behavior, API contracts, permissions, and already verified
    frontend slices baseline-only unless a listed retest trigger occurs.
  evidence_rule: Build/type-check prove source integrity; browser/runtime and visual
    artifacts are required for user-facing claims.
  stop_conditions:
  - A product decision is required for Notifications or Work quest application review
    detail-vs-context behavior.
  - A shared component change causes an unrelated verified surface regression.
  - Required browser/runtime evidence cannot be captured in the owned local environment.
  - A validation failure cannot be repaired without expanding scope.
  closeout_rule: The master remains open until all inventory items, child plans, browser
    evidence, and final audits pass.
scope_control:
  standard: docs/plan-scope-control-standard.yaml
  reused_verified_plans:
  - docs/work/main-surfaces-modernization-master.yaml
  - docs/work/ui-action-integrity-master.yaml
  baseline_only_surfaces:
  - backend domain behavior
  - already verified runtime scenarios not touched by frontend changes
  residual_scope:
  - module-by-module surface cleanup after the foundation slice
  - browser visual and responsive evidence
  retest_triggers:
  - any shared shell or route interaction change
  non_duplication_rule: The child plan owns new implementation status; prior modernization
    and action-integrity plans are baseline evidence only.
change_impact_review:
  required: true
  report: docs/audit-output/system-map-change-impact.json
  disposition: reviewed
