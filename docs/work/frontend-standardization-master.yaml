objective: Replace the remaining fragmented user-facing frontend grammar with one
  authoritative navigation model, explicit collection/detail/context archetypes, consistent
  detail and form frames, normalized states, and predictable responsive behavior.
phases:
- id: navigation-deduplication
  plan: docs/work/frontend-user-facing-navigation-dedup.yaml
  priority: P0
  outcome: Users see one authoritative sibling-route navigation layer and one clear
    primary page action.
- id: surface-archetypes
  plan: docs/work/frontend-user-facing-surface-archetypes.yaml
  priority: P1
  outcome: Every collection is explicitly either direct-list-to-detail or in-place
    review/context.
- id: state-and-form-standardization
  plan: docs/work/frontend-user-facing-state-form-standardization.yaml
  priority: P2
  outcome: Forms, dialogs, loading, errors, empty states, and partial states use one
    visible vocabulary.
- id: responsive-and-visual-consolidation
  plan: docs/work/frontend-user-facing-responsive-consolidation.yaml
  priority: P3
  outcome: Surface archetypes behave predictably at desktop, tablet, and mobile widths
    with less local CSS drift.
dependencies:
- navigation-deduplication -> surface-archetypes
- surface-archetypes -> state-and-form-standardization
- state-and-form-standardization -> responsive-and-visual-consolidation
close_criteria:
- The foundation child plan is independently verified.
- Remaining module cleanup is recorded as explicit residual scope rather than implied
  complete.
- Frontend type-check, build, and static surface validation pass.
- The user-facing audit has been converted into executable child plans with evidence
  for each completed phase.
- No page duplicates sibling-route navigation without an explicit workflow reason.
- No canonical-detail collection uses a preview interaction.
- Browser viewport evidence exists for each shared surface archetype before the master
  is closed.
pre_goal_gates:
- Execution inventory exists at docs/work/frontend-standardization-master-execution-inventory.yaml.
- Durable route/action and surface-archetype matrix outputs are owned by the P0/P1
  child plans under docs/work.
- Browser evidence commands and artifact paths are declared by P0, P1, and P3.
- Activate only one child phase at a time.
