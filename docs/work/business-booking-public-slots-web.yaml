  acceptance:
  - Public Business page first collects the offering's typed demand fields, options,
    quantity, participants/items, and required conditions.
  - The backend returns a quote plus a typed availability result: exact slots, arrival
      windows, all-day/stay capacity, quantity capacity, quote-required, or unavailable.
  - User sees only exact slots that fit duration, buffers, resources, exceptions,
    occupancy, lead time, and advance horizon; non-appointment services never receive
    fake slots.
  - A 30-minute offering exposes 30-minute bookable slots; a 120-minute offering exposes
    only two-hour slots where the entire interval is free.
  - Quantity and shared-capacity offerings show remaining capacity and reject quantities
    that exceed it; a dog daycare can reserve multiple dogs without creating fake
    employee appointments.
  - Cleaning, car-wash, and repair examples render their own demand, option, window,
    queue, package, or quote flows from backend schema.
  - Quote responses explain price lines, modifiers, quantities, capacity consumption,
    required conditions, and whether owner review is required.
  - Capability evidence distinguishes slot booking, window booking, quantity reservation,
    quote request, and public schema-driven demand capture.
  - API methods and frontend components preserve the selected demand and quote state
    through loading, validation, stale availability, owner-review, and retry transitions.
  - Booking uses the selected backend slot/window/quantity/quote and still revalidates
    atomically at write time, with clear stale-state recovery.
  - Public page supports instant confirmation and owner-request flows with correct
    status and next action.
  - Empty availability, timezone, unauthenticated, expired, and conflict states are
    recoverable and do not lose the selected offering unnecessarily.
