kind: work
version: 1
id: product-experience-vision-global-entry
title: Create a distinct global Vision entry with text and microphone modes
status: verified
master_plan: docs/work/product-experience-account-discovery-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- vision.execution
- vision.conversation
- cross_module.shell.navigate
objective: 'Move Vision from repeated page-level Ask Vision buttons into one clearly
  discoverable global shell entry that supports text and microphone input, listening/processing/error
  feedback, recent context, and safe contextual handoff from the current route.

'
requirements:
- Vision entry is present in the authenticated shell and has a keyboard-accessible
  text composer and microphone control.
- Browser permission denial, unsupported microphone, empty prompt, and network failure
  have explicit recovery states.
- Contextual route/prompt handoff is metadata-driven and does not duplicate module
  navigation.
- Vision remains confirmation-gated for mutations and backend-owned for capability
  eligibility.
tasks:
- id: vision-shell-contract
  title: Define global Vision entry, state, and context handoff contract
  type: analysis
  status: done
  paths:
  - docs/work/product-experience-vision-global-entry-analysis.md
  - docs/vision-architecture-patterns.md
  - apps/themuffinman/frontend/src/modules/vision/views/VisionSurfaceModernView.vue
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
- id: vision-global-composer
  title: Implement shell-level Vision text and microphone entry
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/components/GlobalVisionEntry.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/AuthenticatedShellView.vue
  - apps/themuffinman/frontend/src/modules/vision/views/VisionSurfaceModernView.vue
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build
- id: vision-recovery-and-parity
  title: Verify Vision recovery, confirmation, and route handoff behavior
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/run-web-runtime-smoke.mjs
  - docs/runtime-acceptance-matrix.yaml
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
  manual_runtime_command: npm --prefix apps/themuffinman/frontend run web-runtime-smoke
  manual_runtime_requires_escalation: true
acceptance:
- Vision is visible once in the authenticated shell and can be opened from every authenticated
  route.
- Text and microphone paths show transcript/listening/processing/result/error states.
- A contextual handoff preserves the current module context without adding duplicate
  navigation controls.
- Mutation review and confirmation behavior remains explicit and backend governed.
