- docs/work/system-map-optimization-05-cross-layer-pilot.yaml
- docs/work/system-map-optimization-06-closeout.yaml
principles:
- The System Map owns relationships and navigation; detailed facts remain in their
  canonical registries.
- Backend domain services remain authoritative for permissions, validation, workflows,
  and state transitions.
- Capability status, implementation status, runtime proof, and work-plan verification
  remain separate.
- Historical analysis and evidence are preserved unless a deliberate archival policy
  exists.
- Every optimization must reduce ambiguity or maintenance cost and must have measurable
  validation.
- New drift checks should compare machine-readable sources rather than rely on prose
  review alone.
entry_gate:
  required_state:
  - system_map_and_truth_registry_are_current
  - runtime_matrix_counts_are_reconciled
  - no_unclassified_pending_runtime_rows
  required_commands:
  - make audit-runtime-acceptance
  - make audit-capability-evidence
  - make audit-truth-registry
  - make audit-docs
  - make audit-plan-coverage
exit_gate:
  required_conditions:
  - implementation_relationships_have_clear_owners_and_known_unmapped_edges
  - documentation_sources_have_canonical_owner_and_duplicate-claim_policy
  - control_workflow_has_automated_consistency_checks_for_key_statuses
  - one_real_change_has_completed_system-map_impact_analysis
  - all_child_plans_and_final_audits_are_verified
  - unresolved_external_and_runtime_limits_remain_explicitly_pending
success_measures:
- every selected optimization finding has one owner, one canonical source, one affected
  surface, and one validation path
- selected current-state claims have one canonical owner and no unresolved contradictory
  duplicate
- selected high-value cross-file relationships have automated drift checks
- the pilot records measurable reduction in lookup steps, duplicated edits, or unverifiable
  claims
