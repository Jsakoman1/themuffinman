principles:
- Runtime matrix status remains authoritative; closeout artifacts only reconcile evidence.
- Every scenario must prove its declared actions, recovery, and final authoritative
  state.
- Failure injection must be deterministic, local-only, bounded, and removed or explicitly
  controlled after evidence capture.
- Provider failure, database/outbox failure, and process-crash evidence are separate
  evidence classes.
- Native/device rows remain pending and are not counted in this program's completion
  denominator.
entry_gate:
  required_state:
  - previous_optimization_is_committed_and_pushed_at_4bcd499_or_newer
  - worktree_is_clean_or_pre_existing_changes_are_explicitly_baselined
  - runtime_matrix_reconciles_at_65_passed_and_16_pending
  - exactly_11_in_scope_pending_rows_are_present
  - exactly_5_native_device_rows_are_excluded
  required_commands:
  - make audit-runtime-acceptance
  - make audit-capability-evidence
  - make audit-truth-registry
  - make audit-docs
  - make audit-plan-coverage
exit_gate:
  required_conditions:
  - all_11_in_scope_rows_have_fresh_declared_evidence_or_structured_external_blocker
  - no_native_device_row_is_promoted_by_this_plan
  - provider_failure_and_retry_outcomes_are_correlated_to_final_state
  - precommit_rollback_and_after_commit_side_effect_boundaries_are_proven
  - duplicate_delivery_and_process_replay_observations_are_explicit
  - web_vision_visibility_fields_and_actions_reconcile_for_same_viewer_policy
  - final_runtime_audit_and_closeout_report_pass
success_measures:
- pending runtime count decreases only for evidence-backed in-scope rows
- deterministic failure branches produce correlation, recovery, and authoritative
  readback evidence
- native/device pending count remains 5 and explicitly deferred
