completion_policy:
  in_scope_denominator: 11
  excluded_denominator: 5
  promotion_rule: A row changes from pending only after its declared evidence, actions,
    recovery, correlation, and authoritative readback are recorded in the runtime
    matrix and evidence artifact.
  blocker_rule: An external blocker may be recorded only with blocker_type, owner,
    required_environment_or_evidence, next_action, and review_date; an unclassified
    pending row is a closeout failure.
  native_boundary: The five excluded rows remain pending and are reported separately
    from this program's denominator.
