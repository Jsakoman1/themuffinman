goal_pursuing:
  objective: Repair the reported runtime regressions first, then complete the residual frontend standardization pass with shared interaction, state, form, CSS, responsive, and drift-prevention contracts.
  execution_mode: serial
  first_plan: docs/work/frontend-runtime-correctness-regressions.yaml
