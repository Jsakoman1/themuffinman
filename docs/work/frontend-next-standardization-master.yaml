  verification_command: make work-verify plan=docs/work/frontend-runtime-correctness-regressions.yaml task=separate-work-runtime-results
  continue_rule: Advance only after the current task is verifier-marked done/verified and its runtime or visual evidence is recorded when required.
  stop_conditions:
  - Work result intersection remains unexplained after request and database evidence.
  - Things failure requires a backend contract or infrastructure decision.
  - Chat Inbox navigation requires a product decision about the canonical landing route.
  - Shared SurfaceRow changes regress an already verified surface.
objective: Complete the next frontend cleanup pass by unifying collection context surfaces, interaction accessibility, state vocabulary, date formatting, forms, responsive behavior, and the remaining intentional exceptions.
scope_control:
  standard: docs/plan-scope-control-standard.yaml
  baseline_only_surfaces:
  - backend domain rules
  - backend permissions and workflow transitions
  - already verified shell and collection behavior unless a listed retest trigger occurs
  non_duplication_rule: Reuse the verified navigation, shell, collection, and detail work as baseline evidence; this master plan owns only the residual cleanup and standardization listed below.
  retest_triggers:
  - shared component behavior changes
  - route or row interaction changes
  - accessibility behavior changes
  - date/time or user-facing state meaning changes
