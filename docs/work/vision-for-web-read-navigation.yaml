kind: work
version: 1
id: vision-for-web-read-navigation
title: Implement My Work and initial backend-owned Vision Web navigation
status: draft
baseline: 8e422fe
strict_verification: true
serial_task_execution: true
execution_inventory: docs/work/vision-for-web-integration-master-execution-inventory.yaml
master_plan: docs/work/vision-for-web-integration-master.yaml
objective: >-
  Implement the first end-to-end VisionForWeb slice: a user can ask from any
  authenticated route to open My Work or another supported read surface and the
  Web router executes the backend-approved destination.
depends_on:
- docs/work/vision-for-web-contract-rebaseline.yaml
tasks:
- id: implement-my-work-capability
  title: Add VIEW_MY_WORK and owner-scoped Work route resolution
  type: implementation
  status: pending
  sequence: 1
  paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/model/VisionIntent.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/service/VisionSemanticRouteCatalogService.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/service/VisionConversationService.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/service/VisionReadOnlyConversationTurnHandler.java
  - apps/themuffinman/src/test/java/com/themuffinman/app/vision
  required_paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/model/VisionIntent.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/service/VisionSemanticRouteCatalogService.java
  validation: ./apps/themuffinman/mvnw -f apps/themuffinman/pom.xml test
  acceptance:
  - Croatian and English My Work examples resolve to one backend-published route.
  - The query is viewer-scoped and cannot return another user's owned quests.
  - OpenAI response validation rejects unlisted capabilities or slots.
- id: implement-web-action-executor
  title: Execute backend-approved navigation from the shared authenticated shell
  type: implementation
  status: pending
  sequence: 2
  depends_on: implement-my-work-capability
  paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/dto/VisionWebActionDTO.java
  - apps/themuffinman/frontend/src/modules/app-shell/visionWebAction.ts
  - apps/themuffinman/frontend/src/modules/app-shell/composables/useVisionForWeb.ts
  - apps/themuffinman/frontend/src/modules/app-shell/views/AuthenticatedShellView.vue
  - apps/themuffinman/frontend/src/modules/vision/api/visionConversationViewModels.ts
  - apps/themuffinman/src/test/java/com/themuffinman/app/vision
  required_paths:
  - apps/themuffinman/frontend/src/modules/app-shell/visionWebAction.ts
  - apps/themuffinman/frontend/src/modules/app-shell/composables/useVisionForWeb.ts
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix apps/themuffinman/frontend run build && ./apps/themuffinman/mvnw -f apps/themuffinman/pom.xml test
  acceptance:
  - The backend action opens /work/quests without frontend natural-language routing.
  - Existing routes remain reachable and return context is preserved.
  - No duplicate mutation or permission logic is introduced in Vue.
- id: prove-first-navigation-runtime
  title: Capture runtime evidence for My Work and initial read destinations
  type: runtime
  status: pending
  sequence: 3
  depends_on: implement-web-action-executor
  paths:
  - docs/work/vision-for-web-read-navigation.yaml
  - docs/runtime-evidence/vision-for-web-my-work-runtime.json
  required_paths:
  - docs/runtime-evidence/vision-for-web-my-work-runtime.json
  manual_runtime_command: make dev
  runtime_evidence_paths:
  - docs/runtime-evidence/vision-for-web-my-work-runtime.json
  validation: git diff --check
  acceptance:
  - From at least three authenticated Web routes, the text request opens My Work.
  - The exact Croatian example no longer returns unsupported.
  - Evidence records backend response, action contract, final URL, and recovery behavior.
