objective: Unify Home, Attention, Activity, Search, Saved searches, Create, and shell
  personal context into one calm app-like entry layer without duplicating module dashboards
  or inventing navigation authority.
implementation_contract:
  minimum_source_surfaces:
  - HomeHubView.vue
  - AuthenticatedShellView.vue
  - NotificationsView.vue
  - ActivityView.vue
  - SavedSearchIntentsView.vue
  - active global search/create command surface
  required_user_visible_changes:
  - Home clearly orients the user to attention, next action, and continuation.
  - Create exposes mapped actions in one predictable command surface without duplicate
    dashboards.
  - Search supports query, loading, empty, error, result selection, and return-to-context
    behavior.
  - Activity, Attention, and Saved Search share compact state and navigation grammar.
  required_runtime_scenarios:
  - Home summary row continuation
  - Create command surface open/close and each mapped entry handoff
  - Search query/result/empty or recovery state
  - Activity and Saved Search route/context continuity
  anti_partial: Adding a role to a Home hint or testing only Home is insufficient.
scope_control:
  standard: docs/plan-scope-control-standard.yaml
  baseline_only_surfaces:
  - Backend-prepared attention, activity, personal shortcut, command catalog, search,
    and notification data.
  - Existing canonical routes and backend-provided destination/action contracts.
  residual_scope:
  - Home summary and next-action hierarchy.
  - Attention and activity continuity.
  - Global search/command center and create menu presentation.
  - Saved-search management and shell personal navigation.
  retest_triggers:
  - Any shell navigation or command catalog route changes.
  - Any notification/activity destination or read-state presentation change.
  - Any search result routing, comparison, or saved-search action change.
  non_duplication_rule: The shell presents backend-prepared context; it does not derive
    module counts, permissions, or collection membership locally.
change_impact_review:
