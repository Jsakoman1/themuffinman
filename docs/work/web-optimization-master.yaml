kind: master
version: 1
id: web-optimization-master
title: 'New Web Optimization: readable workspace, themes, guided intake, and Home
  landing'
status: verified
baseline: 7972676741cdee89361012afb0a769b43f2c2dc4
strict_verification: true
serial_task_execution: true
execution_inventory: docs/work/web-optimization-execution-inventory.yaml
objective: 'Make the authenticated Web app materially easier to read and operate:
  increase visual scale and contrast, provide persisted dark/light theme selection,
  replace oversized create forms with backend-driven one-step-at-a-time guided intake,
  and migrate every relevant multi-field entity workflow to the same guided intake
  contract before making Home the authenticated landing page, while keeping Vision
  globally available as the contextual assistant rather than the default route.'
product_direction:
  workspace: 'One calm application frame inspired by Linear and the ChatGPT desktop
    app: readable titles and controls, fewer tiny descriptions, progressive disclosure,
    stable left navigation, and clear primary actions.'
  vision: The future Vision console is a separate application boundary. The authenticated
    Web app keeps only the inline VisionForWeb host and entry points, using the same
    backend-owned semantic, slot, permission, and action contracts. VisionForWeb is
    not removed; it stops being the automatic post-login destination.
  mobile_portability: Theme, guided-intake step schema, validation, and completion
    state must be exposed through backend/API contracts so future iPhone and Apple
    Watch clients do not reimplement Web-only workflow logic.
scope:
  included:
  - shared workspace typography, spacing, control sizing, contrast, and density defaults
  - persisted authenticated dark/light appearance preference with system-safe fallback
  - Home as post-auth and root landing route
  - reusable backend-driven guided-intake contract and all relevant entity create/edit
    migrations
  - inline VisionForWeb and direct Web entry points remaining available after the
    changes
  excluded:
  - redesigning domain rules or changing canonical domain URLs
  - redesigning, visually migrating, or extracting the future standalone Vision console
  - making the Web app depend on the current /vision console route
  - implementing native iPhone or Apple Watch clients
  - rewriting every module screen in one batch
architecture_decisions:
- id: reuse-and-backend-authority
  decision: Treat standardization and code reuse as the primary implementation principle;
    keep business rules, workflow orchestration, validation, permissions, entity transitions,
    and personalization behind reusable backend/API contracts.
  reason: Web, inline VisionForWeb, the standalone Vision console, iPhone, and Apple
    Watch must consume the same authoritative behavior instead of rebuilding logic
    per client.
- id: standalone-vision-console-boundary
  decision: Keep the future Vision console as a separate application; this Web master
    changes only the authenticated Web shell and inline VisionForWeb host.
  reason: The Web app needs embedded natural-language assistance without coupling
    its landing, shell, or visual system to the console application's canvas.
- id: shared-vision-backend-contract
  decision: Keep semantic interpretation, personal context, capability resolution,
    guided steps, permissions, and execution in shared backend/API contracts consumable
    by Web and the future standalone Vision client.
  reason: iPhone, Apple Watch, standalone Vision, and Web must not each implement
    workflow or authority logic.
- id: readable-by-default
  decision: Increase semantic body/control/title sizes and minimum touch targets centrally
    before route-specific polish.
  reason: The current global tokens are too small and route CSS repeats tiny metadata
    values.
- id: theme-as-shared-contract
  decision: Store a user appearance preference through an authenticated backend endpoint
    and apply semantic CSS tokens at the app root.
  reason: The choice must survive sessions and remain portable to future clients;
    localStorage alone is not authoritative.
- id: backend-guided-intake
  decision: Expose one current step, allowed input kind, current draft summary, validation,
    and next-step state from backend orchestration.
  reason: The frontend must not own required-field order, conditional fields, or domain
    validation.
- id: home-first
  decision: Login, registration, root redirect, and authenticated recovery land on
    /home; VisionForWeb remains an inline shell/context action and the standalone
    console is not the Web landing route.
  reason: Home is the orientation surface, while Vision is an assistant surface.
gates:
- gate: baseline-before-visual-change
  rule: Freeze shared tokens and shell measurements before editing individual module
    CSS.
- gate: theme-contract-before-theme-ui
  rule: Backend preference and root application behavior must exist before exposing
    theme controls.
- gate: guided-intake-contract-before-form-migration
  rule: Define step ordering, conditional rules, draft semantics, and error states
    before converting create forms.
- gate: home-routing-before-auth-closeout
  rule: Login, register, root, and protected-route recovery must all consistently
    land on Home before the slice closes.
- gate: runtime-before-master-closeout
  rule: Verify readable dark/light Web shell, Home landing, inline VisionForWeb availability,
    and at least one guided create flow in authenticated runtime evidence; do not
    use the standalone console as Web evidence.
