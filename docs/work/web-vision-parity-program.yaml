kind: work
version: 1
id: web-vision-parity-program
title: Make Web UI and Vision equal production clients
status: active
master_plan: docs/work/target-capability-production-readiness.yaml
related_master_plan: docs/work/web-ui-functional-completion-master.yaml
capability_ids: [cross_module.auditability.trace]
objective: Replace route-level surface evidence with usable web and Vision parity evidence and close the direct web UX gaps without weakening backend authority.
principles:
  - Web UI and Vision are equal production clients.
  - A route or component reference is not usability evidence.
  - Every mutation needs a discoverable entry point, complete form or prompt flow, validation, error recovery, and success state.
  - Runtime acceptance is tracked separately from source implementation.
phases:
  - id: parity-inventory
    title: Add usable-entry and completion evidence to the capability inventory
    status: completed
    scope: all 123 target capabilities
  - id: web-entry-closure
    title: Close missing or undiscoverable web entry points and direct flows
    status: completed
    priority: critical
    first_slices: [work.quest.create, chat.conversation.open, chat.conversation.create_group, circles.circle.create, business.booking.create, sharing.thing.create]
  - id: vision-parity-closure
    title: Close Vision text/voice routes for every supported web capability
    status: completed_for_supported_contracts
    priority: critical
  - id: runtime-acceptance
    title: Run browser and Vision interaction scenarios for both clients
    status: absorbed_by_web-ui-functional-completion
    owner_plan: docs/work/web-ui-functional-completion.yaml
  - id: control-sync
    title: Make audits reject route-only claims of web or Vision coverage
    status: completed
evidence:
  batch_plan: docs/work/web-vision-parity-batch.yaml
  residual_audit: docs/work/web-vision-parity-residual-audit.yaml
  coverage_report: docs/work/target-capability-coverage-report.yaml
  note: Runtime/native/device acceptance remains explicitly deferred where the required external client or contract is absent.
  web_runtime_owner: docs/work/web-ui-functional-completion.yaml
