    with visible state
  anti_partial: Fixing one Things API call or adding focus CSS does not satisfy this
    module sweep.
scope_control:
  standard: docs/plan-scope-control-standard.yaml
  baseline_only_surfaces:
  - Existing social, visibility, consent, thing, borrow, ride, business, booking,
    and availability authority.
  - Existing route/action mapping and backend-provided permissions.
  residual_scope:
  - Contextual profile/circle presentation and invite picker.
  - Listing/request and ride lifecycle presentation.
  - Booking/detail/calendar presentation and mobile/recovery behavior.
  retest_triggers:
  - Visibility, consent, membership, booking, lending, or ride state presentation
    changes.
  - Any detail-route versus context-surface decision.
  - Any shared form or dialog change affecting these modules.
  non_duplication_rule: This is a targeted sweep, not a blanket rewrite or capability
    expansion.
