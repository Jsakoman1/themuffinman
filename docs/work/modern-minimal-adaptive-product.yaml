id: modern-minimal-adaptive-product
title: Modern minimal adaptive product system
status: verified
baseline: b3a130c
assessment: docs/modern-minimal-product-assessment.md
objective: Transform the authenticated product from a verbose generic dashboard into
  a quiet, modern, minimal, intuitive adaptive surface while keeping voice and Vision
  as the primary command layer, moving business meaning into backend read models,
  and making the same semantic contracts usable by web, iPhone, and Watch clients.
goals:
- Remove default explanatory copy, duplicated navigation meaning, and internal implementation
  language from user-facing screens.
- Give Work, Chat, Calendar, Business, Circles, Profile, and Vision distinct interaction
  archetypes.
- Make high-volume Work discovery visual, searchable, filterable, paginated, and easy
  to compare.
- Keep prompt and voice as the fastest path while adding compact visual confirmation,
  review, selection, and progress feedback.
- Standardize backend-owned state, permissions, action availability, pagination, density,
  and device handoff contracts.
- Make mobile and Watch clients consumers of the same semantic model instead of future
  frontend rewrites.
non_negotiables:
- No planning or internal ownership explanations in default user-facing UI.
- No frontend reimplementation of permissions, ranking, workflow state, or business
  rules.
- No route is considered complete because it merely renders the shared component;
  route-level interaction acceptance is required.
- Voice actions always have visible listening, processing, result, review, completion,
  and recovery states.
- Default surfaces reveal detail progressively instead of rendering every available
  field.
