exit_criteria:
- All seven child plans are verified with route-level evidence and matching validation
  output.
- Default desktop and mobile surfaces contain only compact labels, current-state feedback,
  primary actions, and user-requested detail.
- Work discovery uses the existing backend search capabilities through a real paginated
  visual surface rather than dashboard truncation.
- Voice, prompt, visual review, and route handoff share one backend-owned state contract.
- The full backend suite, frontend type-check/build, contract freshness, accessibility
  checks, and route acceptance checks pass.
