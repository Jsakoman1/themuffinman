kind: work
version: 1
id: linear-inspired-personal-shortcuts
title: Viewer-owned personal shortcuts and pinned object navigation
status: draft
master_plan: docs/work/linear-inspired-product-behavior-expansion-master.yaml
baseline: 2a34d383aaa91ffd5449a60c3c80085c8563c7dc
objective: >
  Add a bounded, user-owned shortcut contract for explicitly supported object families,
  so the shell can offer useful pinned items without creating a generic client-side favorite system.
requirements:
  - Allow-list object families and canonical route builders in the backend; never persist an arbitrary URL or client-derived title.
  - Read access is rechecked when shortcuts are listed and unavailable objects are omitted or removed by documented policy.
  - Pinned state has no effect on visibility, workflow authority, or notification delivery.
