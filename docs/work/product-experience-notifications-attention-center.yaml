kind: work
version: 1
id: product-experience-notifications-attention-center
title: Notifications and attention center
status: verified
master_plan: docs/work/product-experience-account-discovery-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- platform.notifications
- platform.notifications.preferences
- cross_module.attention
objective: 'Consolidate actionable events from work, chat, bookings, circles, rides,
  things, Vision, and security into one backend-prepared attention center with clear
  read state, grouping, preferences, deep links, and recovery.

'
requirements:
- Notifications are typed, deduplicated, idempotent, ordered, and linked to allowed
  destinations.
- Preferences control category/channel/frequency without hiding security-critical
  events.
- Home shows only a compact attention summary and never duplicates the feed.
tasks:
- id: notification-contract
  title: Define notification taxonomy, delivery, grouping, read state, and preferences
  type: analysis
  status: done
  paths:
  - docs/work/product-experience-notifications-attention-center-analysis.md
  - docs/domain-technical.md
  validation: make audit-docs
- id: notification-backend
  title: Implement unified notification read model, events, and preferences
  type: implementation
  status: done
  paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/notification/service/AttentionCenterService.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/notification/service/NotificationPreferenceService.java
  - docs/runtime-acceptance-matrix.yaml
  validation: cd apps/themuffinman && ./mvnw test
- id: notification-ui
  title: Implement notification center, badges, preferences, and deep links
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views/NotificationsView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/NotificationPreferencesView.vue
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build
- id: notification-runtime
  title: Verify grouping, read state, preferences, and destinations
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/run-web-runtime-smoke.mjs
  - docs/runtime-acceptance-matrix.yaml
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
  manual_runtime_command: npm --prefix apps/themuffinman/frontend run web-runtime-smoke
  manual_runtime_requires_escalation: true
acceptance:
- Supported modules produce actionable notification records through backend events.
- Read state and preferences are durable and viewer-scoped.
- Destinations preserve permission and visibility rules.
