integrity_findings:
  - id: AUDIT-001
    severity: high
    finding: >
      The inventory previously mixed completed plan history into its open-plan
      field and retained a deleted account-recovery plan path.
    resolution: Replace the stale field with open_plans and keep capability planning in the canonical inventory records.
  - id: AUDIT-002
    severity: medium
    finding: >
      Many implemented capabilities retain runtime or mobile gaps. Implemented
      therefore means the primary backend/Web workflow exists; it does not mean
      every target client or runtime scenario is complete.
    resolution: Keep those capabilities implemented or partial according to the current inventory, and plan residual work separately.
  - id: AUDIT-003
    severity: medium
    finding: >
      Aggregate capabilities such as platform.location, chat.attachments, and
      cross_module.search overlap with atomic capability IDs.
    resolution: Use atomic IDs for planner slices and retain aggregate IDs only as roll-up context.
  - id: AUDIT-004
    severity: low
    finding: >
      Runtime screenshots, HAR files, and redesign evidence are intentionally no
      longer retained in the repository.
    resolution: Treat runtime evidence as ephemeral and recreate it only inside a future verified work plan that needs it.
  - id: AUDIT-005
    severity: medium
    finding: >
      The YAML grouping places business.profile.gallery_manage under the circles
      module even though its capability namespace is business.*.
    resolution: Keep the capability in the planner now, then normalize module grouping in a focused inventory maintenance slice without changing its capability ID.
  - id: AUDIT-006
    severity: high
    finding: >
      The previous module grouping placed all detailed business and sharing IDs under
      circles, and classified rides.circles as not_offered even though RideOfferService,
      circle visibility, Web routes, and Vision actions are present.
    resolution: Normalize business and sharing ownership in the module tree and mark
      rides.circles implemented with explicit residual runtime evidence gap.
  - id: AUDIT-007
    severity: medium
    finding: >
      Implemented is not the same as verified: most current capabilities have source,
      test, or contract evidence but not a retained browser/device trace.
    resolution: Keep status semantics explicit and report runtime evidence separately;
      do not promote implemented capabilities to verified without fresh acceptance evidence.
