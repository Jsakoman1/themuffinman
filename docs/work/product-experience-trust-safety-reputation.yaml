kind: work
version: 1
id: product-experience-trust-safety-reputation
title: Trust, safety, blocking, reporting, and reputation layer
status: verified
master_plan: docs/work/product-experience-account-discovery-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- platform.trust
- platform.report
- platform.block
- platform.rating
objective: 'Create shared trust and safety contracts for work, rides, business bookings,
  things, circles, and chat, including verified signals, ratings, report/block, cancellation/no-show
  context, and backend-owned viewer presentation.

'
requirements:
- Trust signals are explainable and never imply verification that did not occur.
- Reports, blocks, moderation state, and safety actions are private and audited.
- Ratings are tied to eligible completed interactions and cannot be self-created or
  duplicated.
- Safety policy can restrict discovery, messaging, booking, and ride actions.
tasks:
- id: trust-safety-contract
  title: Define reputation eligibility, safety actions, moderation, and privacy rules
  type: analysis
  status: done
  paths:
  - docs/work/product-experience-trust-safety-reputation-analysis.md
  - docs/business-logic.md
  - docs/domain-technical.md
  validation: make audit-docs
- id: trust-safety-backend
  title: Implement reports, blocks, eligible ratings, and presentation signals
  type: implementation
  status: done
  paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/trust/service/SafetyReportService.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/social/service/CircleMembershipService.java
  - apps/themuffinman/src/main/resources/db/migration/V64__create_safety_report.sql
  validation: cd apps/themuffinman && ./mvnw test
- id: trust-safety-ui
  title: Implement trust signals, report/block, rating, and safety recovery
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views/PeopleProfileView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/api/userShellApi.ts
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build
- id: trust-safety-runtime
  title: Verify allowed, blocked, reported, and rating-eligible flows
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/run-web-runtime-smoke.mjs
  - docs/runtime-acceptance-matrix.yaml
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
  manual_runtime_command: npm --prefix apps/themuffinman/frontend run web-runtime-smoke
  manual_runtime_requires_escalation: true
acceptance:
- Safety actions are backend-enforced across all supported interaction domains.
- Ratings can only be created after eligible completed interactions.
- Private reports and blocks do not leak to affected users.
