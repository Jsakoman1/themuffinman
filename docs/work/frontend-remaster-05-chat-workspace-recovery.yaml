objective: Simplify the intentional Chat two-pane workspace and improve composer,
  attachment, realtime, mobile, and recovery behavior using existing mapped chat actions.
implementation_contract:
  minimum_source_surfaces:
  - ChatSurfaceView.vue
  - useChatRealtime.ts
  - AppFormFooter.vue
  - AppStatus.vue
  required_user_visible_changes:
  - Conversation selection remains visible and recoverable across desktop split view
    and mobile stacked view.
  - Composer exposes sending, disabled, failed, retry, and success/readback states.
  - Attachment, reply, edit, reaction, and leave actions have visible pending/error/success
    feedback where mapped.
  - Realtime disconnect and reconnect are visible, actionable, and do not destroy
    draft text.
  required_runtime_scenarios:
  - authenticated conversation selection and canonical conversation route
  - composer validation/send or safe unavailable-state recovery
  - realtime connected/disconnected/reconnect presentation
  - mobile conversation-to-list transition and back navigation
  anti_partial: A realtime role/status attribute alone is insufficient.
scope_control:
  standard: docs/plan-scope-control-standard.yaml
  baseline_only_surfaces:
  - Chat membership, message, attachment, realtime, and transition authority.
  - Canonical /chat and /chat/:conversationId routes.
  residual_scope:
  - Two-pane hierarchy and selected-conversation continuity.
  - Composer, attachment, edit/reply/reaction feedback, reconnect, and unavailable-state
    presentation.
  - Mobile presentation and visual consistency with shared primitives.
  retest_triggers:
  - Chat route or selected conversation behavior changes.
  - Realtime/reconnect or attachment state presentation changes.
  - Membership action placement changes.
  non_duplication_rule: Preserve Chat as a deliberate exception and reuse existing
    API/realtime contracts.
change_impact_review:
  required: true
  report: docs/audit-output/system-map-change-impact.json
  disposition: required_before_implementation
