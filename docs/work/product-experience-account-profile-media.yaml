kind: work
version: 1
id: product-experience-account-profile-media
title: Add account menu, avatar, and optional profile gallery
status: verified
master_plan: docs/work/product-experience-account-discovery-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- platform.profile.view
- platform.profile.update
- platform.profile.media
objective: 'Make the username/avatar a single account entry point and extend identity
  with an optional profile avatar plus separate gallery images. Keep storage, visibility,
  moderation, ownership, and deletion rules in backend services.

'
requirements:
- Account popover exposes My profile, Settings, Gallery, notifications, and logout.
- Avatar is distinct from gallery media and is rendered consistently in shell, profile,
  people, and social surfaces.
- Gallery is optional, ordered, deletable, and privacy-scoped per viewer contract.
- Upload failures, unsupported formats, size limits, and missing media have useful
  recovery states.
tasks:
- id: identity-media-contract
  title: Define avatar/gallery entities, storage, visibility, and viewer DTOs
  type: analysis
  status: done
  paths:
  - docs/work/product-experience-account-profile-media-analysis.md
  - docs/domain-technical.md
  - docs/business-logic.md
  validation: make audit-docs
- id: profile-media-backend
  title: Implement backend profile media contract and persistence migration
  type: implementation
  status: done
  paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/identity/model/ProfileGalleryImage.java
  - apps/themuffinman/src/main/resources/db/migration/V60__create_profile_gallery_image.sql
  - apps/themuffinman/src/test/java/com/themuffinman/app/identity/service/ProfileGalleryServiceTest.java
  validation: cd apps/themuffinman && ./mvnw test
- id: account-menu-and-media-ui
  title: Implement account popover, avatar rendering, and gallery management
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/components/AccountMenu.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/AuthenticatedShellView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/ProfileLocationSettingsView.vue
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build
- id: profile-media-runtime
  title: Verify upload, replacement, visibility, deletion, and recovery flows
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/run-web-runtime-smoke.mjs
  - docs/runtime-acceptance-matrix.yaml
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
  manual_runtime_command: npm --prefix apps/themuffinman/frontend run web-runtime-smoke
  manual_runtime_requires_escalation: true
acceptance:
- Account menu is available from username/avatar and contains all account destinations
  without duplicate logout controls.
- Avatar and gallery use separate backend contracts and preserve viewer-specific visibility.
- Profile media can be uploaded, replaced, removed, reordered where applicable, and
  recovered after failure.
- Backend tests, migration checks, type-check, build, and runtime evidence pass.
