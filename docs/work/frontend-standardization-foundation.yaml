  - apps/themuffinman/frontend/src/modules/app-shell/views/ThingsDiscoveryView.vue
  validation: npm --prefix apps/themuffinman/frontend run build
- id: repair-things-partial-loading
  inventory_item: foundation-things-recovery
  title: Preserve Things listings when secondary borrow-request reads fail
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views/ThingsDiscoveryView.vue
  required_paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views/ThingsDiscoveryView.vue
  validation: npm --prefix apps/themuffinman/frontend run validate:web-surface
acceptance:
- Authenticated pages retain the left shell and a stable module context when navigating
  to child routes.
- The global header exposes only Create, Search, Vision, and Account as primary controls.
- Clicking a Work or Things result opens its canonical detail route; Preview is not
  a competing primary action.
- Things listings remain visible when borrow-request enrichment fails, with a recoverable
  status.
- Existing backend authority, route ownership, and permissions remain unchanged.
