  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views/WorkDiscoveryView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/ThingsDiscoveryView.vue
