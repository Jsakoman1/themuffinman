    title: Enumerate every supported Vision capability and its required states
    evidence:
      - docs/vision-capability-acceptance.yaml
  - id: vision-scenarios
    status: done
    title: Add happy-path, ambiguity, permission, transport, and recovery scenarios
    evidence:
      - docs/vision-capability-acceptance.yaml
  - id: vision-result-followup
    status: done
    title: Implement fetch-more behavior for large Vision result sets
    evidence:
      - apps/themuffinman/src/main/java/com/themuffinman/app/vision/model/VisionConversationAction.java
      - apps/themuffinman/src/main/java/com/themuffinman/app/vision/service/VisionConversationService.java
      - apps/themuffinman/frontend/src/modules/vision/components/VisionCanvasRenderer.vue
  - id: vision-validation
    status: done
    title: Run the matrix and synchronize capability evidence
    evidence:
      validation:
        - cd apps/themuffinman/frontend && npm run type-check
        - cd apps/themuffinman/frontend && npm run build
        - cd apps/themuffinman/frontend && npm run validate:modern-surface
        - cd apps/themuffinman && ./mvnw test -q
        - make audit-docs
