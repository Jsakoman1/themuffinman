kind: plan
version: 1
id: vision-execution-acceptance
title: Vision capability execution acceptance
status: done
capability_ids: [vision.create_quest, vision.execution, vision.read_discovery]
baseline: 6018777
objective: >
  Build an explicit acceptance matrix for Vision read, review, confirmation,
