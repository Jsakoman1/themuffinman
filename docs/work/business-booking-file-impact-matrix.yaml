purpose: Map every delivery layer before goal pursuing; this is planning control, not implementation evidence.
global_rules:
- Backend owns validation, permissions, pricing, availability, resource assignment, capacity, quote state, and booking transitions.
- DTO/API contracts are the shared boundary for Web, Vision, and future native clients.
- Web and Vision may collect and present schema-driven fields but may not calculate business outcomes independently.
- Every new logical entity or workflow must update business/domain docs, capability inventory, target catalog, regression scenarios, and synthetic generation coverage.
- Existing migrations remain immutable; new schema uses forward-only migrations beginning at V82 unless the actual migration head changes before implementation starts.
- Every changed read path using Business booking/availability mappers must be audited for fetch scope and lazy initialization.
- Booking-created, status-changed, and rescheduled event consumers must be audited when booking snapshots or lifecycle state changes.
- Employee/resource references must be owner-scoped and must not expose private identity fields to public customers.
- Custom demand fields must have an explicit retention, sanitization, and visibility policy before production use.
