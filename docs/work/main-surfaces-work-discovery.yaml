title: Correct and modernize Find Work discovery
status: verified
master_plan: docs/work/main-surfaces-modernization-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- work.quest.discovery
- work.quest.create
- work.quest.management
objective: 'Make Find Work a true external discovery surface: use the backend AVAILABLE
  preset, exclude the current user''s own quests, reduce visual competition, and make
  result cards easy to scan, preview, and open.

'
requirements:
- "/work/find must call the backend AVAILABLE preset."
- "/work/quests must remain the owned-work surface and use the MY_VISIBLE preset so
  newly created open quests remain visible to their owner."
- Search, sort, schedule filter, count, and pagination remain visible but compact.
- Each result has one dominant preview/open interaction and no duplicate Open link
  competing with the title/card.
- Backend presentation labels and action availability remain authoritative.
