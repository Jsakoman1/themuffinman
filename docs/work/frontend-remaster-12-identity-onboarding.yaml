acceptance:
- Login and registration preserve normalization, session creation, and redirect behavior.
- Recovery and reset distinguish missing token, invalid/expired token, submission
  success, and retryable failure.
- Onboarding progress remains backend-owned and supports load, continue, skip, reset,
  complete, and recovery.
- Public identity pages use the same form, status, focus, contrast, and responsive
  grammar as the workspace.
- No authentication or onboarding capability is inferred or persisted locally beyond
  the existing session contract.
