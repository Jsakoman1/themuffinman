objective: Bring login, registration, recovery, password reset, and optional onboarding
  into the shared calm form/state grammar while preserving authentication, session,
  and backend-owned onboarding authority.
implementation_contract:
  minimum_source_surfaces:
  - LoginView.vue
  - RegisterView.vue
  - PasswordRecoveryView.vue
  - PasswordResetView.vue
  - OnboardingView.vue
  - shared AppFormField/AppFormFooter/AppStatus surfaces
  required_user_visible_changes:
  - All public identity pages share one responsive form hierarchy, field error grammar,
    focus behavior, and action footer.
  - Login/register expose pending, validation, failure, and redirect states without
    duplicate submits.
  - Recovery/reset distinguish missing token, invalid/expired token, success, and
    retryable failure.
  - Onboarding supports backend-owned load, continue, skip, reset, complete, and recovery
    states with clear progress.
  required_runtime_scenarios:
  - login failure and success redirect
  - registration validation and pending state
  - recovery request success/failure
  - reset missing-token and invalid/expired-token states
  - authenticated onboarding continue/skip/reset/complete or documented unavailable
    state
  anti_partial: Login pending markup plus registration/recovery button guards is insufficient.
scope_control:
  standard: docs/plan-scope-control-standard.yaml
  baseline_only_surfaces:
  - Authentication, password recovery, session, token, and onboarding backend authority.
  - Existing public routes and redirect behavior.
  - Existing shared AppFormField, AppFormFooter, AppStatus, and AppButton contracts.
  residual_scope:
  - Consistent public identity visual language with the authenticated workspace.
  - Clear validation, loading, failure, success, and recovery states.
  - Optional onboarding progression that is easy to skip, resume, reset, and complete.
  retest_triggers:
  - Authentication route or redirect behavior changes.
  - Password recovery token/error handling changes.
  - Onboarding progress mutation or skip/reset behavior changes.
  - Shared form primitives are changed for public surfaces.
  non_duplication_rule: Keep identity authority in auth services and onboarding progress
    in backend DTOs; this plan changes presentation and recovery only.
