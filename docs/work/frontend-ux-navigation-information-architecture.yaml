kind: work
version: 1
id: frontend-ux-navigation-information-architecture
title: Simplify navigation and surface information architecture
status: verified
master_plan: docs/work/frontend-ux-modernization-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- cross_module.web_ui
- platform.profile.view_own
objective: 'Reduce navigation noise and make every surface communicate context, current
  location, primary action, and next useful destination consistently on desktop and
  mobile.

'
requirements:
- Define primary navigation versus secondary module navigation.
- Keep Home, Work, Chat, and Calendar easy to reach without hiding active work.
- Move low-frequency destinations into a predictable More/account/settings path.
- Standardize breadcrumb/context, title, count/filter row, and primary action placement.
- Preserve direct routes and deep links for every existing surface.
- Keep Vision discoverable as one clear global/contextual action without duplicating
  competing prompts.
tasks:
- id: nav-model
  title: Define and implement the primary/secondary navigation model
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/shellDefinitions.ts
  - apps/themuffinman/frontend/src/modules/app-shell/shellRouteRegistry.ts
  - apps/themuffinman/frontend/src/modules/app-shell/views/AuthenticatedShellView.vue
  validation: npm --prefix apps/themuffinman/frontend run type-check
- id: surface-header
  title: Standardize context, title, count, filters, and primary action headers
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/components/SurfaceContentView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/views/WorkDiscoveryView.vue
  validation: npm --prefix apps/themuffinman/frontend run build
- id: nav-contract
  title: Add machine-readable route and action acceptance checks
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/validate-modern-surface-contract.mjs
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
acceptance:
- Every authenticated route has one active primary navigation context.
- Desktop and mobile navigation expose the same reachable destinations without duplicate
  competing actions.
- Deep links preserve context and offer a clear return path.
