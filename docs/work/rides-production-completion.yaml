  - rides-backend-contract
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build && npm --prefix apps/themuffinman/frontend
    run validate:web-surface
- id: rides-vision-parity
  title: Implement Vision ride intents, slot collection, review, confirmation, and
    recovery
  type: implementation
  status: done
  paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/model/VisionIntent.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/service/VisionConversationService.java
