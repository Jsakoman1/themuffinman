  validation: cd apps/themuffinman && ./mvnw test
- id: rides-web-client
  title: Implement authenticated Web discovery, offer, detail, join, update, leave,
    cancel, start, and complete flows
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/router.ts
  - apps/themuffinman/frontend/src/modules/app-shell/shellDefinitions.ts
  - apps/themuffinman/frontend/src/modules/app-shell/api/userShellApi.ts
  - apps/themuffinman/frontend/src/modules/app-shell/views/RidesView.vue
