  - apps/themuffinman/frontend/src/modules/vision/views/VisionSurfaceModernView.vue
  depends_on:
  - rides-backend-contract
  validation: cd apps/themuffinman && ./mvnw test && cd ../../ && npm --prefix apps/themuffinman/frontend
    run type-check
- id: rides-runtime-closeout
  title: Add browser runtime harness, capability evidence, living docs, and final
    verification
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/run-web-runtime-smoke.mjs
  - docs/runtime-acceptance-matrix.yaml
  - docs/business-logic.md
  - docs/domain-technical.md
  - docs/implementation-backlog.md
