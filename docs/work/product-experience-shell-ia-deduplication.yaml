kind: work
version: 1
id: product-experience-shell-ia-deduplication
title: Remove duplicated shell and page chrome
status: verified
master_plan: docs/work/product-experience-account-discovery-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- cross_module.shell.navigate
- cross_module.web_ui
objective: 'Standardize authenticated pages around one shell-owned global header and
  one page-owned title. Remove repeated module labels, duplicate headings, repeated
  Ask Vision controls, and ambiguous page-level navigation while preserving deep-link,
  responsive, keyboard, and browser-back behavior.

'
requirements:
- The shell owns logo, primary navigation, global Vision entry, account entry, and
  logout.
- Each page renders one visible canonical h1 and does not repeat the shell title as
  content chrome.
- Page actions are limited to contextual actions for that page and are not navigation
  duplicates.
- Existing route names and backend contracts remain backward compatible.
tasks:
- id: shell-contract-inventory
  title: Inventory title, action, and navigation ownership across authenticated routes
  type: analysis
  status: done
  paths:
  - docs/work/product-experience-shell-ia-analysis.md
  - apps/themuffinman/frontend/src/modules/app-shell/shellDefinitions.ts
  - apps/themuffinman/frontend/src/modules/app-shell/views/AuthenticatedShellView.vue
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
- id: canonical-shell-header
  title: Implement one canonical shell/header and page-title contract
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views/AuthenticatedShellView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/components/SurfaceHeader.vue
  - apps/themuffinman/frontend/src/modules/app-shell/shellDefinitions.ts
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run validate:modern-surface
- id: route-surface-regression
  title: Verify every authenticated route has one title and connected entry points
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/src/router.ts
  - apps/themuffinman/frontend/src/modules/app-shell/shellRouteRegistry.ts
  validation: make audit-frontend
acceptance:
- Home, Work, Chat, Calendar, Business, Circles, Things, Rides, People, Profile, and
  Settings show one canonical page title.
- No page repeats a global Ask Vision, username, or logout control inside its own
  content.
- Sidebar navigation, browser back, deep links, and keyboard focus remain functional.
- Static UI entry-point and modern-surface audits pass.
