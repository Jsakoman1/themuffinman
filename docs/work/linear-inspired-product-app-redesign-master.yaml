principles:
- One object has one backend-owned source of truth and may have several explicit read
  modes.
- Filters change membership; display controls change presentation; neither may invent
  permissions or business state.
- The sidebar is destination and personal-shortcut discovery; content is task context
  and next action.
- Every icon is a named reusable action with keyboard, tooltip, focus, loading, and
  disabled behavior.
- A row, card, or preview has one primary open target; nested actions stay independent.
- Side panels expose backend-prepared utility context and never become duplicate routes.
- Command, creation, and Vision input surfaces remain distinct and backend-contract
  aware.
- Motion explains state change, respects reduced motion, and never hides failure or
  async uncertainty.
audit_strategy:
- Before each child starts, run `make audit-frontend` to regenerate the route/API,
  stale-surface, state-duplication, and permission-boundary inventories.
- Treat audit findings as design inputs: reuse an active primitive, remove or adopt
    a detached primitive deliberately, and never create a parallel mutation or permission
    layer.
- Use `make audit-docs` for every plan/control/regression-matrix edit and `make audit-impact`
  before closeout to identify affected docs and scope warnings.
- Use `make audit-runtime-acceptance` only after runtime scenarios have recorded evidence;
  it validates the evidence ledger, not the browser UI itself.
- The existing `audit-frontend-ux-plan`, `audit-main-surfaces-plan`, and `audit-product-experience-plan`
  target older hard-coded masters. Do not report them as validation for this master;
  generalize their structural checks only in a separately approved tooling slice.
