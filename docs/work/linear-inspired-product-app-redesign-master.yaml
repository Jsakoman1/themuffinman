exit_criteria:
- The product has one documented interaction vocabulary across authenticated modules.
- Collection modes, filters, display preferences, and saved views only exist where
  their backend contracts support them.
- Work, notifications, chat, business operations, things, and rides use consistent
  open/preview/action semantics.
- Keyboard and icon controls are discoverable and accessible without duplicating business
  rules in Vue.
- Object selection, preview, inline edit, command, context menu, and direct button
  paths resolve to one action definition.
- Browser evidence covers create, search/filter, detail/preview, contextual action,
  async recovery, and reduced-motion paths.
- Returning from a supported detail or preview preserves the collection context without
  silently changing backend membership, permissions, or workflow state.
- No Linear brand, asset, copy, private implementation, or product-specific domain
  model is copied.
- Each completed child cites which reusable foundation it extended and why any new
  primitive was necessary.
