objective: 'Make the authenticated TheMuffinMan web client feel like one fast, calm,
  dark-first desktop product application through reusable interaction grammar: stable
  navigation, dense object collections, contextual filters and actions, preview/detail
  utility surfaces, keyboard-friendly access, and deliberate composer behavior. Preserve
  the existing Java/Spring API, backend authority, product domains, routes, and direct
  web workflows. Borrow behavioral principles from public Linear documentation and
  supplied screenshots without copying branding, assets, copy, data model, or exact
  layouts.

'
