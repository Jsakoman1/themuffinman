  acceptance:
  - Owner calendar shows all owner bookings grouped in business-local month/week/day
    views, including pending, confirmed, cancelled, completed, and no-show meaning.
  - Calendar events link to booking detail or an object-focused booking surface and
    preserve allowed actions.
  - Customer My bookings shows the same persisted start/end/timezone/status snapshots
    and customer-allowed actions.
  - Confirm, reject, cancel, reschedule, complete, and no-show paths preserve capacity
    correctly and are idempotent or conflict-safe.
  - Two concurrent requests cannot overbook a SINGLE offering or exceed SHARED capacity,
    including buffers.
  - Multiple Business profiles owned by one user remain correctly scoped in setup,
    public reads, bookings, and calendars.
  - Regression scenarios cover cleaning teams, stylist pools, dog daycare capacity,
    car-wash bays, and quote/project bookings.
  - Booking-created/status/rescheduled events and owner/customer attention signals
    remain correct after snapshot/resource changes.
