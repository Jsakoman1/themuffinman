  validation: cd apps/themuffinman && ./mvnw -q test && cd ../.. && npm --prefix apps/themuffinman/frontend
    run type-check && npm --prefix apps/themuffinman/frontend run build
  acceptance:
  - Rides separates Find a ride, Offer a ride, and Commute preferences into clear
    entry points or progressive sections; discovery is usable without displaying every
    commute field.
  - Ride preview is concise and has one obvious next action; privacy explanation remains
    available as supporting context rather than dominating the collection.
  - Ride edit preserves visibleCircleIds and all unchanged privacy fields.
  - Ride detail and list expose the same edit/join/leave/start/complete/cancel contract.
  - Destructive or irreversible ride lifecycle actions require appropriate confirmation
    and recover after stale state.
  - Commute preferences are separated from the primary ride discovery flow or made
    intentionally collapsible.
