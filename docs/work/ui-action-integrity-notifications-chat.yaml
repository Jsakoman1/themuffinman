  acceptance:
  - Activity renders one coherent timeline; the main list and context rail do not
    duplicate identical events without distinct added value.
  - Activity items use stable ids and show only actions that resume or open a real
    destination.
  - Notification types resolve to canonical Work, Application, Circle, Chat, Business,
    Activity, or Profile destinations.
  - A notification with no destination is intentionally informational and explains
    why.
  - Attention items labeled Continue invoke a real resumable flow; nonresumable items
    say Open.
  - Activity exposes the backend dismissal contract only for resumable items and retains
    route safety.
