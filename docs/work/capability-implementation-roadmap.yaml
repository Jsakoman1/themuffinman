kind: capability_implementation_roadmap
version: 1
id: capability-implementation-roadmap
title: Implementation roadmap for the 33 open capabilities
status: active
created_at: '2026-07-19'
source_audit: docs/work/capability-inventory-audit.yaml
source_planner: docs/work/capability-inventory-planner.yaml
source_inventory: docs/capability-inventory.yaml
source_gap_analysis: docs/work/capability-30-gap-analysis.yaml
product_decisions:
  - id: DEC-001
    decision: Car sharing is a real future product module, not a permanent deferment.
    consequence: Define its domain, consent, safety, matching, scheduling, and trip lifecycle before implementation.
  - id: DEC-002
    decision: Mobile and Watch clients are later delivery phases.
    consequence: Keep backend contracts documented, but do not block current Web/Vision work on native clients.
  - id: DEC-003
    decision: Account recovery is later delivery work.
    consequence: Keep the existing partial recovery implementation visible, but do not make delivery-provider integration a current critical path.
  - id: DEC-004
    decision: Current delivery is Web/backend first, with Vision parity where Vision is already a supported surface.
    consequence: A current slice needs a usable Web flow, backend authority, and failure recovery; mobile evidence is not required for current closeout.
roadmap_rules:
  - Use atomic capability IDs as the unit of implementation.
  - Do not build aggregate capability work twice when its atomic children already cover it.
  - Convert each phase or independently deliverable slice into a strict docs/work/*.yaml plan before coding.
  - Preserve partial or planned status until the owning slice passes its declared validation.
  - Do not recreate the retired redesign master, screenshot archive, HAR archive, or permanent runtime evidence directory.
architecture_contract:
  backend:
    rule: Business rules, permissions, validation, ranking, entity resolution, workflow transitions, personal context, and recovery stay in backend services.
    native_readiness: Backend-prepared DTOs and versioned API contracts are the shared boundary for Web, future iPhone, and future Watch clients.
  api:
    rule: Every capability slice defines a stable request/response contract, allowed actions, visibility rules, failure states, and generated client types where applicable.
  frontend:
    rule: Web and Vision clients stay thin; they render backend-prepared state and never recreate domain authority locally.
  web_experience:
    rule: Authenticated Web uses the established dark, dense, Linear-inspired workspace grammar without copying Linear branding or domain semantics.
  vision_experience:
    rule: Vision supports text and voice through the same backend semantic path, shows recognized input and processing state, uses approved personal context, and returns typed Web detail/navigation handoffs when appropriate.
vision_discovery_acceptance:
  example: 'Show me the lawn-mowing job Frank posted yesterday.'
  expected_behavior:
    - Speech transcription and typed text enter the same backend conversation/semantic pipeline.
    - Backend resolves the person, entity family, title/intent, and time constraint using permitted personal context and backend search/read services.
    - If exactly one authorized quest matches, Vision returns a typed workspace-v1 handoff to the canonical Web Work detail route for that quest.
    - The Web route opens the normal Frank quest detail surface, preserving a safe return target to Vision.
    - If the result is ambiguous, inaccessible, or stale, Vision asks a clarification or shows a recoverable explanation instead of guessing or leaking private existence.
    - Frontend does not search arbitrary objects, invent matching rules, or build the detail route from natural-language text.
phases:
  - id: R1-web-trust-and-context
    order: 1
    priority: critical
    objective: Make identity, visibility, location, and activity reliable for current Web/Vision users.
    capabilities:
      - platform.authentication
      - platform.profile.manage_visibility
      - platform.location.set_preference
      - platform.location.control_visibility
      - platform.location.use_current
      - platform.location.resolve
      - platform.location
      - platform.activity
    delivery_slices:
      - id: R1-A-auth-and-visibility
        scope: Authentication acceptance plus profile visibility and consent explanation.
        capabilities: [platform.authentication, platform.profile.manage_visibility]
        depends_on: []
      - id: R1-B-location-context
        scope: One location settings/read-model path with permission denial, provider failure, manual correction, and visibility recovery.
        capabilities: [platform.location.set_preference, platform.location.control_visibility, platform.location.use_current, platform.location.resolve, platform.location]
        depends_on: [R1-A-auth-and-visibility]
      - id: R1-C-activity-recovery
        scope: Cross-module activity projection, dismiss/resume behavior, and honest empty/error states.
        capabilities: [platform.activity]
        depends_on: [R1-A-auth-and-visibility]
    exit_condition: >
      A signed-in user can authenticate, understand profile/location visibility,
      recover location failures, and resume or dismiss activity without stale or
      unauthorized state.
  - id: R2-domain-completion
    order: 2
    priority: high
    objective: Finish the highest-value structured Web workflows that users use directly.
    capabilities:
      - work.quest.manage_workers
      - chat.realtime
      - chat.attachments
      - chat.message.attach
      - chat.conversation.create_group
      - chat.conversation.leave
      - chat.message.view_attachment
      - things.listings
      - business.profile.gallery_manage
    delivery_slices:
      - id: R2-A-work-assignment
        scope: Worker release/replace, permission recheck, stale-state recovery, and Web acceptance.
        capabilities: [work.quest.manage_workers]
        depends_on: [R1-A-auth-and-visibility]
      - id: R2-B-chat-continuity
        scope: Reconnect/resync, group eligibility, leave behavior, and browser recovery.
        capabilities: [chat.realtime, chat.conversation.create_group, chat.conversation.leave]
        depends_on: [R1-A-auth-and-visibility]
      - id: R2-C-chat-media
        scope: Upload, preview, expiry/URL refresh, and safe unavailable-media states.
        capabilities: [chat.attachments, chat.message.attach, chat.message.view_attachment]
        depends_on: [R2-B-chat-continuity]
      - id: R2-D-things-lifecycle
        scope: Listing, detail, request, owner decision, return, cancellation, and recovery continuity.
        capabilities: [things.listings]
        depends_on: [R1-A-auth-and-visibility]
      - id: R2-E-business-gallery
        scope: Authorized image storage boundary and business gallery Web flow.
        capabilities: [business.profile.gallery_manage]
        depends_on: [R1-A-auth-and-visibility]
    exit_condition: >
      Users can complete the supported Work, Chat, Things, and Business flows on
      Web with backend-owned permissions, validation, loading, empty, error, and retry states.
  - id: R3-vision-and-cross-module-coordination
    order: 3
    priority: high
    objective: Make Vision and cross-module discovery/notifications coherent after core domain reads are stable.
    capabilities:
      - vision.task.confirm
      - vision.discovery.search
      - vision.discovery.open_detail
      - vision.create_quest
      - vision.read_discovery
      - vision.execution
      - cross_module.search.discover
      - cross_module.search.filter
      - cross_module.search
      - cross_module.notification.receive
      - cross_module.notification.manage_preferences
    delivery_slices:
      - id: R3-A-vision-failure-contract
        scope: Shared review, confirmation, adapter failure, retry, and stale-context behavior.
        capabilities: [vision.task.confirm, vision.execution, vision.create_quest]
        depends_on: [R1-A-auth-and-visibility, R2-A-work-assignment]
      - id: R3-B-vision-discovery
        scope: Search filters, comparison, and stable detail handoff for supported entity families.
        capabilities: [vision.discovery.search, vision.discovery.open_detail, vision.read_discovery]
        depends_on: [R2-D-things-lifecycle, R2-B-chat-continuity, R2-E-business-gallery]
      - id: R3-C-unified-search
        scope: Shared result vocabulary, ranking, pagination, filters, empty states, and comparison.
        capabilities: [cross_module.search.discover, cross_module.search.filter, cross_module.search]
        depends_on: [R3-B-vision-discovery]
      - id: R3-D-notification-delivery
        scope: Notification receipt/read state, preference semantics, realtime recovery, and delivery observability.
        capabilities: [cross_module.notification.receive, cross_module.notification.manage_preferences]
        depends_on: [R2-B-chat-continuity, R1-C-activity-recovery]
    exit_condition: >
      Vision actions fail safely and recover consistently, and users can search,
      filter, compare, and understand notifications across modules without
      duplicate ranking or permission logic.
  - id: R4-car-sharing-module
    order: 4
    priority: medium
    objective: Design and build voluntary car sharing for selected circles.
    capabilities: [rides.circles]
    delivery_slices:
      - id: R4-A-product-and-safety-contract
        scope: Circle eligibility, consent, driver/passenger roles, safety constraints, privacy, reporting, and cancellation rules.
        capabilities: [rides.circles]
        depends_on: [R1-A-auth-and-visibility, R1-B-location-context]
      - id: R4-B-matching-and-trip-lifecycle
        scope: Offer/request matching, schedule, join/leave, start/complete/cancel, notifications, and recovery.
        capabilities: []
        subslice_of: R4-A-product-and-safety-contract
        depends_on: [R4-A-product-and-safety-contract]
    exit_condition: >
      A circle member can safely offer or request a ride, see only eligible
      participants, manage the trip lifecycle, and recover from conflicts or cancellation.
  - id: R5-later-account-recovery
    order: 5
    priority: deferred
    objective: Finish account recovery after the current product flows are stable.
    capabilities: [platform.account.recover]
    delivery_slices:
      - id: R5-A-recovery-delivery
        scope: Delivery provider, distributed abuse controls, valid-token browser flow, and mobile recovery surface.
        capabilities: [platform.account.recover]
        depends_on: [R1-A-auth-and-visibility]
    deferred_reason: 'Product decision: account recovery is intentionally later.'
  - id: R6-later-native-clients
    order: 6
    priority: deferred
    objective: Add native iPhone and Watch continuation after native implementation workspaces exist.
    capabilities:
      - cross_module.handoff.mobile
      - cross_module.handoff.watch
      - cross_module.mobile_watch
    delivery_slices:
      - id: R6-A-native-handoff
        scope: Versioned, expiring, resumable iPhone and Watch handoff contracts.
        capabilities: [cross_module.handoff.mobile, cross_module.handoff.watch]
        depends_on: [R3-A-vision-failure-contract]
      - id: R6-B-native-presentation
        scope: Actual iPhone/Watch clients, background delivery, permissions, and compact action presentation.
        capabilities: [cross_module.mobile_watch]
        depends_on: [R6-A-native-handoff]
    deferred_reason: 'Product decision: mobile and Watch are intentionally later.'
implementation_sequence:
  current: [R1-web-trust-and-context, R2-domain-completion, R3-vision-and-cross-module-coordination, R4-car-sharing-module]
  later: [R5-later-account-recovery, R6-later-native-clients]
  recommended_first_plan: R1-A-auth-and-visibility
  recommended_second_plan: R1-B-location-context
  recommended_parallel_plan: R2-B-chat-continuity
coverage_check:
  rule: Every open capability ID from the audit must occur exactly once in this roadmap.
  expected_open_capabilities: 33
  covered_capabilities: 33
  duplicates: []
  missing: []
next_action: >
  Convert R1-A-auth-and-visibility into a strict implementation work plan, then
  execute R1-B-location-context and R2-B-chat-continuity as the first parallelizable
  delivery boundaries.
