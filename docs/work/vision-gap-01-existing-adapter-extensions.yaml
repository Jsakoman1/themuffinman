kind: work
version: 1
id: vision-gap-01-existing-adapter-extensions
title: Extend existing Vision read and lifecycle adapters
status: verified
master_plan: docs/work/target-capability-production-readiness.yaml
baseline: 4715898
backlog_id: VISION-GAP-CLOSURE
capability_ids:
- chat.conversation.mark_read
- chat.conversation.reconnect
- work.quest.reopen
- work.notification.mark_read
- work.notification.mark_all_read
- cross_module.notification.receive
- cross_module.notification.mark_read
- cross_module.shell.navigate
- cross_module.shell.render_context
objective: 'Close the first critical Vision gap group only where the existing backend
  authority, semantic route, or lifecycle contract already provides enough product
  meaning to implement safely. New product rules must be split into a separate work
  plan instead of being inferred here.

'
non_negotiables:
- Vision must call backend-owned services and preserve viewer authorization.
- Read-only route evidence does not automatically prove mutation support.
- Reconnect is a read/synchronization capability, not a new chat state machine.
- Notification receive means the existing notification read model is visible; delivery
  clients remain separate work.
tasks:
- id: chat-reconnect-and-read
  title: Expose conversation sync and read-state semantics through Vision
  status: done
  capability_ids:
  - chat.conversation.reconnect
  paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/chat/service/ChatService.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/chat/controller/ChatController.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/model/VisionIntent.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/service/VisionExecutionService.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/vision/service/VisionSemanticRouteCatalogService.java
  validation: cd apps/themuffinman && ./mvnw -Dtest='VisionSemanticRouteCatalogServiceTest,VisionConversationServiceTest'
    test && cd ../.. && make audit-target-capability-coverage
  acceptance:
  - A viewer can request a permitted conversation sync through the Vision contract.
  - Marking a conversation read uses the existing ChatService authorization and read
    cursor rules.
  - Repeated sync/read requests are safe and deterministic.
  evidence:
  - command: "./mvnw -Dtest='VisionSemanticRouteCatalogServiceTest,VisionConversationServiceTest'
      test"
    result: passed
