preflight:
- Action matrix has entries for every audited module before implementation starts.
- Home metric scope ids and destinations are frozen before Home or Work slices start.
- Shared action hierarchy rules are approved before component refactoring starts.
- Each execution-inventory item closes one functional slice and records its result.
- Runtime closeout uses the scenario catalog and retains only evidence tied to an
  assertion.
close_when:
- All child plans are independently verifier-verified in the declared order.
- Every audited module has a documented action matrix covering viewer, entity state,
  visible action, command, confirmation, destination, and recovery.
- The action matrix and Home query-scope contract are complete for every audited surface
  and referenced by the implementation slices.
- No known P0 finding remains open: ride privacy loss, wrong People action dispatch,
    owner Leave-circle exposure, or Vision console detail fallback.
- Frontend type-check/build, backend tests, contract audits, route/action static audit,
  and declared browser scenarios pass.
- The runtime scenario catalog passes without requiring a broad screenshot suite;
  each scenario proves a meaningful user-visible state transition.
- Each large domain is closed by functional slices with a recorded implementation
  result before the next slice starts.
- Living product/domain/control docs and capability inventory reflect the final action
  contract.
cleanup:
- Remove temporary screenshots, smoke traces, generated reports, and analysis files
  created only by this master.
- Retain only the master, active child plans, canonical docs, and explicitly referenced
  runtime evidence.
