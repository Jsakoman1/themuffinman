objective: Make every offered Web action, link, statistic, status label, and detail
  surface logically correct, backend-authoritative, route-safe, and consistent across
  Work, Things, Rides, Circles, People, Notifications, Activity, Chat, Business, Calendar,
  Home, Profile, and VisionForWeb handoffs.
product_goal: 'The authenticated Web app should feel like one clear desktop application:
  each screen exposes only actions that are valid in the current viewer/entity state,
  every action has one canonical destination and one backend/API contract, lists and
  details have parity, and text/metrics explain the next useful step without clutter.'
source_audit:
  findings: 'The current UI has duplicated action grammars, incomplete list/detail
    parity, invalid or misleading context actions, route fallbacks into Vision console,
    stale URL state in Things, ride privacy loss during edit, incorrect People action
    dispatch, owner Leave-circle exposure, incomplete notification destinations, direct-chat
    navigation loss, and stats that look actionable without reliable filters or object
    focus. A second screen pass also found onboarding controls that only change progress
    without opening the promised setup surface, saved searches that cannot be edited
    or executed, public booking that leaves a successful request dialog open and requires
    blind datetime entry, Profile settings whose unrelated optional requests fail
    the whole screen, location search without stale-response protection, route metadata
    that presents Notifications and Saved searches as Home, duplicated business action
    headings, Activity rows without a stable object identity, and shared keyboard/metric
    affordances that can be visually or functionally inert. Runtime review of the
    Home and Work surfaces additionally shows summary/list semantic drift: Home labels
    a destination as Open work while navigating to a different result set, and the
    displayed summary count does not match the opened collection. Work exposes density
    controls, search, filters, Vision, offer-work, preview, and detail actions before
    the user has a simple primary path. Activity duplicates the same nine items in
    both the main list and Recent context rail, while Rides combines discovery, creation,
    commute preferences, consent, and a preview workflow on one screen without progressive
    disclosure.'
