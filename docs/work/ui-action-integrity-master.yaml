scope:
  included:
  - backend-published action descriptors and canonical route contracts
  - explicit action contract matrix and Home query-scope contract
  - list/detail action parity and viewer/entity-state rendering
  - Work, Things, Rides, Circles, People, Notifications, Activity, Chat, Business,
    Calendar, Home, Profile
  - stats and metrics that navigate or filter data
  - labels, status text, currency, date, and timezone formatting
  - VisionForWeb handoff and entity-target routing from Web
  - targeted backend, frontend, controller, service, contract, and browser regression
    evidence
  - meaningful runtime scenario evidence instead of screenshot-heavy smoke coverage
  excluded:
  - new domain capabilities unrelated to an existing UI action
  - iPhone or Apple Watch UI implementation
  - redesigning Vision console into a Web module
  - replacing domain services with frontend workflow logic
  - production notification provider work or account recovery delivery
invariants:
- Backend services remain authoritative for permission, workflow state, validation,
  and mutation safety.
- Frontend renders backend-published actions and owns only presentation state, form
  draft state, and navigation.
- Every mutation action has one typed API command, one stable action id, one confirmation
  policy, and one success/failure recovery path.
- Every navigational action resolves to a canonical existing Web route; Vision is
  never used as a missing-detail fallback.
- Every list entity and detail entity exposes the same permitted action set for the
  same viewer and entity state.
- A statistic is either informational or a real navigation/filter affordance; it may
  not look actionable while doing nothing meaningful.
- Privacy-sensitive state, including Circle visibility and location scope, must survive
  read-edit-save cycles unchanged unless explicitly edited.
- User locale, currency, and timezone come from backend/user context; no module-specific
  hardcoded display format is allowed.
- A Vision handoff may provide semantic assistance, but known object navigation remains
  a direct Web route.
- Setup, settings, activity, notification, and saved-search routes must identify their
  real workspace context; they may not masquerade as Home solely because they share
  the authenticated shell.
- A progress control must either execute or navigate to the step it names; changing
  a server progress enum alone is not completion of the promised setup work.
- Optional panels on a settings screen fail independently and preserve usable profile/location
  controls when gallery, appearance, or relationship context is unavailable.
- Saved search lifecycle actions must expose an explicit edit/run contract, or the
  screen must clearly declare the item read-only; pause/delete alone cannot imply
  resumable discovery.
- Public booking must expose availability-aware input and a deterministic post-success
  state; a successful mutation may not leave a stale request form open.
- Shared rows, metrics, shortcuts, and keyboard handlers must have a meaningful destination
  or handler for every visible affordance and a stable object identity for selection
  and recovery.
- Home summary labels, counts, filters, and destinations must describe the same backend
  query; a summary count may not open a different collection with a different count
  without an explicit label explaining the scope.
- Each primary collection screen has one clear next action and keeps secondary controls
  behind a compact filter/view menu or context surface; density/debug controls are
  not primary product content.
- Activity is a single actionable timeline with one item rendered once; context, dismissal,
  and destination belong to the item and are not duplicated in a second rail unless
  the rail adds distinct information.
- Rides separates discover, offer, and commute-preference workflows; privacy consent
  and commute configuration are progressive steps rather than a permanent wall of
  fields on the discovery surface.
