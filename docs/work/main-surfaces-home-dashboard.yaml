  - apps/themuffinman/frontend/src/modules/app-shell/components/SurfaceContentView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/shellSurfaceData.ts
  validation: npm --prefix apps/themuffinman/frontend run type-check
- id: home-contract
  title: Add Home no-duplication and clickability contract checks
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/validate-modern-surface-contract.mjs
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
acceptance:
- Home has one title, one compact orientation block, and no repeated navigation rail.
- Every displayed Home metric is either a working link or explicitly marked informational.
- Home loading, partial failure, empty, and retry states remain understandable.
