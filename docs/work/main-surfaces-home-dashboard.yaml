id: main-surfaces-home-dashboard
title: Redesign Home as a useful dashboard
status: verified
master_plan: docs/work/main-surfaces-modernization-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- cross_module.shell.navigate
- work.quest.discovery
- work.quest.management
- work.application
- platform.notifications.view
objective: 'Remove duplicated Home navigation and make Home a concise dashboard with
  clickable summary metrics, attention items, recent activity, and honest empty and
  partial-data states.

'
requirements:
- Remove Home quick actions that duplicate sidebar destinations; retain only a contextual
  primary action when the backend summary makes it useful.
- Add route targets to actionable metrics and attention rows without inventing authorization
  rules.
- Render the backend-provided Home note or replace it with a useful state explanation.
- Keep Home visually distinct from Work discovery and generic list surfaces.
- Preserve direct links to Work, Applications, Notifications, Rides, Things, and Profile
  where the backend model supports them.
tasks:
