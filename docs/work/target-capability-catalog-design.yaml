kind: work
version: 1
id: target-capability-catalog-design
title: Design the production-ready target capability catalog
status: verified
baseline: 4715898
objective: 'Define a machine-readable product capability catalog that describes the
  complete production-ready behavior TheMuffinMan should provide, at atomic user-function
  level, while keeping target product scope separate from current implementation status
  and validation evidence.

'
scope:
  included:
  - module, object, actor, and action taxonomy
  - atomic capability naming and stable identifiers
  - Vision, web UI, mobile, Watch, and API availability dimensions
  - lifecycle, permissions, privacy, consent, and cross-module relationships
  - production-readiness and acceptance metadata
  - relationship to docs/capability-inventory.yaml and existing work plans
  excluded:
  - implementing missing product capabilities in application code
  - changing existing backend or frontend behavior
  - declaring current capabilities implemented or verified
  - replacing product vision, business logic, or domain technical documents
  - generating a full backlog from the catalog before the schema is accepted
design_principles:
- Keep each capability small enough to become one acceptance scenario or one coherent
  work-plan slice.
- Describe user outcomes, not controllers, database tables, or frontend components.
- Treat Vision and UI availability as separate product delivery dimensions.
- Keep target truth, current-state truth, and evidence linked but not duplicated.
- Make permissions, visibility, consent, and state transitions explicit for every
  relevant workflow.
- Prefer deterministic identifiers so audits and generated plans can reference capabilities
  safely.
tasks:
- id: target-catalog-source-review
  title: Review product, domain, inventory, and control sources
  type: analysis
  status: done
  paths:
  - AGENTS.md
  - docs/product-vision.md
  - docs/product-memory.md
  - docs/capability-inventory.yaml
  - docs/business-logic.md
  - docs/domain-technical.md
  - docs/implementation-control.md
  - docs/agent-operating-model.yaml
  - docs/work/*.yaml
  validation: rg -n 'module|object|capability|vision|web|permission|consent|lifecycle'
    docs/product-vision.md docs/capability-inventory.yaml docs/business-logic.md docs/domain-technical.md
- id: target-catalog-schema
  title: Define the canonical target capability schema
  type: documentation
  status: done
  paths:
  - docs/target-capability-catalog.yaml
  - docs/target-capability-catalog.schema.yaml
  validation: ruby -e "require 'yaml'; YAML.load_file('docs/target-capability-catalog.yaml');
    YAML.load_file('docs/target-capability-catalog.schema.yaml'); puts 'YAML valid'"
- id: target-catalog-taxonomy
  title: Build the initial module, object, and atomic action taxonomy
  type: documentation
  status: done
  paths:
  - docs/target-capability-catalog.yaml
  - docs/business-logic.md
  - docs/domain-technical.md
  validation: ruby -e "require 'yaml'; d=YAML.load_file('docs/target-capability-catalog.yaml');
    abort 'missing modules' unless d['modules'].is_a?(Array) && !d['modules'].empty?;
    puts 'taxonomy present'"
- id: target-catalog-coverage-model
  title: Define availability, lifecycle, permission, privacy, and acceptance fields
  type: documentation
  status: done
  paths:
  - docs/target-capability-catalog.yaml
  - docs/domain-technical.md
  - docs/vision-capability-acceptance.yaml
  validation: make audit-target-capability-catalog
- id: target-current-reconciliation
  title: Design the mapping from target capabilities to current inventory entries
  type: documentation
  status: done
  paths:
  - docs/target-capability-catalog.yaml
  - docs/capability-inventory.yaml
  - docs/implementation-control.md
  validation: make audit-docs
- id: target-catalog-audit-design
  title: Specify deterministic audits and generated planning outputs
  type: documentation
  status: done
  paths:
  - docs/target-capability-catalog.yaml
  - docs/implementation-control.md
  - docs/agent-operating-model.yaml
  - docs/work/target-capability-catalog-design.yaml
  - scripts/audits/audit-target-capability-catalog.rb
  - Makefile
  validation: make audit-target-capability-catalog
- id: target-catalog-example-review
  title: Review representative end-to-end examples before broad population
  type: analysis
  status: done
  paths:
  - docs/target-capability-catalog.yaml
  - docs/business-logic.md
  - docs/domain-technical.md
  validation: rg -n 'work.quest.create|work.quest.view_other|work.application.create|circles.circle.create|chat.message.send|platform.profile.view_other'
    docs/target-capability-catalog.yaml
deliverables:
- docs/target-capability-catalog.yaml
- docs/target-capability-catalog.schema.yaml
- documented mapping to docs/capability-inventory.yaml
- documented audit rules for missing target/current/UI/Vision coverage
- representative examples covering creation, reading, interaction, lifecycle, and
  privacy
decision_gates:
- The catalog is a target product contract, not a second current-state inventory.
- Capability IDs are stable and use module.object.action semantics where practical.
- UI and Vision availability are explicit booleans or typed modes, never inferred
  from implementation status.
- A capability is not production-ready unless its permissions, failure behavior, and
  acceptance expectations are defined.
- No broad capability population starts until the schema passes representative examples
  from Work, Circles, Chat, Profile, Things, and Vision.
