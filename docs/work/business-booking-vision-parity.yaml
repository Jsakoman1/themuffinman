  acceptance:
  - Vision can create/update a service with fulfillment mode, demand fields, options,
    duration, pricing, capacity, resource requirements, booking mode, and validation
    prompts; it never invents unsupported defaults.
  - Vision can create/update staff pools, resource pools, recurring availability,
    exceptions, and structured business conditions using local business time and the
    same backend validation as Web.
  - A customer can ask Vision to find a Business, inspect an offering, provide quantity/participant/item
    details, request a quote or availability, choose a concrete slot/window/quantity,
    and create a booking through the existing confirmation boundary.
  - Vision presents 30-minute versus 120-minute choices correctly, handles per-dog/per-vehicle/per-room
    quantities, and does not accept a time or quantity that is not returned as bookable
    without revalidation.
  - Owner can ask Vision to view calendar/bookings and perform only backend-authorized
    lifecycle actions, with confirmation for mutations.
  - Semantic responses are constrained by the published route/slot contract; provider
    failure, ambiguity, stale slot, permission failure, and cancellation are recoverable.
  - Vision explains price/availability/conditions from the same backend quote and
    read-model contract as Web; no duplicate pricing, slot, resource, or capacity
    algorithm is introduced.
  - Vision asks for missing typed demand fields one at a time and presents a review
    summary before any mutation or quote submission.
  - Vision route descriptors, semantic slots, capability IDs, and synthetic fixtures
    are updated together with the new Business schema.
  - Vision actions map to the same documented Business API use cases and never call
    a frontend-only shortcut.
