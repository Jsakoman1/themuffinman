kind: work
version: 1
id: product-experience-commute-ride-matching
title: Add consented recurring commute ride suggestions
status: verified
master_plan: docs/work/product-experience-account-discovery-master.yaml
baseline: 4715898f78e0baa9a06393df5148646d80c3a200
capability_ids:
- sharing.ride.discover
- sharing.ride.create
- platform.location
- circles.visibility
objective: 'Add an opt-in commute-matching capability that compares privacy-safe home/work
  areas and recurring time windows, proposes compatible drivers or passengers, and
  converts an accepted suggestion into the existing circle-aware ride flow.

'
requirements:
- Commute matching is opt-in per user and separately consented for approximate home/work
  areas and schedule windows.
- Exact addresses are never exposed by matching; backend returns bounded areas and
  explainable match reasons.
- Matching respects circles, blocks, visibility, age/safety policy, capacity, and
  ride lifecycle rules.
- Suggestions are advisory; no ride, recurring schedule, or location sharing is created
  without explicit confirmation.
