- id: commute-domain-contract
  title: Define commute preferences, consent, matching inputs, outputs, and retention
    rules
  type: analysis
  status: done
  paths:
  - docs/work/product-experience-commute-ride-matching-analysis.md
  - docs/domain-technical.md
  - docs/business-logic.md
  validation: make audit-docs
- id: commute-preferences-backend
  title: Implement recurring commute preferences and privacy-scoped persistence
  type: implementation
  status: done
  paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/rides/dto/CommutePreferenceRequestDTO.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/rides/service/CommutePreferenceService.java
  - apps/themuffinman/src/main/resources/db/migration/V62__create_commute_preference.sql
  - docs/business-logic.md
  validation: cd apps/themuffinman && ./mvnw test
- id: commute-matching-service
  title: Implement explainable consented match suggestions and ride handoff
  type: implementation
  status: done
  paths:
  - apps/themuffinman/src/main/java/com/themuffinman/app/rides/service/RideOfferService.java
  - apps/themuffinman/src/main/java/com/themuffinman/app/rides/controller/RideOfferController.java
  - apps/themuffinman/src/test/java/com/themuffinman/app/rides/service/CommutePreferenceServiceTest.java
  validation: cd apps/themuffinman && ./mvnw test
- id: commute-web-vision-surfaces
  title: Implement preference, suggestion, consent, and confirmation surfaces for
    Web and Vision
  type: implementation
  status: done
  paths:
  - apps/themuffinman/frontend/src/modules/app-shell/views/RidesView.vue
  - apps/themuffinman/frontend/src/modules/vision/views/VisionSurfaceModernView.vue
  - apps/themuffinman/frontend/src/modules/app-shell/api/userShellApi.ts
  validation: npm --prefix apps/themuffinman/frontend run type-check && npm --prefix
    apps/themuffinman/frontend run build
- id: commute-runtime-privacy
  title: Verify matching consent, no-leakage, suggestion, rejection, and ride handoff
    flows
  type: validation
  status: done
  paths:
  - apps/themuffinman/frontend/scripts/run-web-runtime-smoke.mjs
  - docs/runtime-acceptance-matrix.yaml
  validation: npm --prefix apps/themuffinman/frontend run validate:modern-surface
  manual_runtime_command: npm --prefix apps/themuffinman/frontend run web-runtime-smoke
  manual_runtime_requires_escalation: true
acceptance:
- Users can opt in, configure, pause, and revoke recurring commute matching.
- Suggestions never reveal exact location or schedule data and explain the compatibility
  at a safe level.
- Circle, block, visibility, consent, capacity, and lifecycle rules are enforced by
  backend services.
- Accepted suggestions require explicit confirmation before creating or joining a
  ride.
- Web and Vision expose equivalent supported preference, review, and confirmation
  flows.
