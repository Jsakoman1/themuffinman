findings:
  - id: OPT-BASELINE-001
    priority: p0
    class: truth-synchronization
    finding: Runtime matrix, closeout artifact, and System Map runtime registry are now synchronized at 65 passed and 16 pending; the audit enforces this relationship.
    owner_source: scripts/audits/audit-runtime-acceptance.rb
    affected_sources: [docs/runtime-acceptance-matrix.yaml, docs/runtime-evidence/runtime-capability-closeout-2026-07-22.yaml, docs/system-map-runtime-closeout-registry.yaml]
    success_measure: Any mismatch fails audit-runtime-acceptance.
  - id: OPT-BASELINE-002
    priority: p1
    class: endpoint-consumer-evidence
    finding: Endpoint-to-capability-to-client-to-test linkage exists, but 62 non-Web endpoints remain explicit owner-review items without complete consumer/runtime proof.
    owner_source: docs/endpoint-reconciliation-review.yaml
    affected_sources: [docs/endpoint-capability-traceability-registry.yaml, docs/endpoint-client-evidence-registry.yaml, docs/endpoint-reconciliation-review.yaml]
    success_measure: Selected endpoint rows have owner, consumer, permission, test, runtime class, and evidence linkage.
  - id: OPT-BASELINE-003
    priority: p1
    class: dependency-enforcement
    finding: Package relationships are mapped from imports, but forbidden directions and ownership boundaries are not enforced by an automated check.
    owner_source: docs/module-dependency-registry.yaml
    affected_sources: [docs/module-dependency-registry.yaml, docs/system-map-coverage-registry.yaml]
    success_measure: High-risk forbidden directions have machine-checkable rules or explicit accepted exceptions.
  - id: OPT-BASELINE-004
    priority: p1
    class: documentation-ownership
    finding: Canonical documentation layers are defined, but historical plans and current-state summaries can still be confused without a consistent classification and navigation policy.
    owner_source: docs/system-map.md
    affected_sources: [docs/system-map.md, docs/implementation-control.md, docs/codex-fast-path.md, docs/system-truth-registry.yaml]
    success_measure: Selected current-state claims have one canonical owner and historical documents are clearly labeled.
  - id: OPT-BASELINE-005
    priority: p2
    class: external-and-native-boundaries
    finding: Native/device/offline runtime and production operations remain unknown or externally unproven; static repository mapping must not promote them to verified.
    owner_source: docs/system-map-coverage-registry.yaml
    affected_sources: [docs/native-client-contract.yaml, docs/release-operations-registry.yaml, docs/system-map-coverage-registry.yaml]
    success_measure: Each boundary has an owner, evidence class, explicit next action, and no accidental capability promotion.
