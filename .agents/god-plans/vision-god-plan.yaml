id: vision-god-plan
title: Vision Adaptive Surface Program
status: active
objective: Coordinate the long-running move from legacy module screens toward one backend-governed adaptive vision surface.
scope:
  included:
    - Vision backend orchestration and conversation state
    - Vision API and canvas response contract
    - Vision frontend adaptive canvas rendering
    - Voice, prompt understanding, and semantic mapping
    - Execution rollout behind backend feature flags
    - Vision validation, documentation, and agent-operating alignment
  excluded:
    - Broad legacy frontend rewrite outside vision
    - Ungated destructive or multi-actor execution
    - Production execution that bypasses existing domain services
masterPlans:
  - id: vision-adaptive-architecture
    path: .agents/vision-adaptive-architecture-master-plan.md
    status: active
    role: Primary architecture and phased rollout plan for the adaptive vision surface.
    pros:
      - Defines locked decisions for create_quest, persisted conversation state, and feature-flagged execution.
      - Splits backend, API, frontend, executor, and validation work into child plans.
    cons:
      - Some current reality notes are now stale because phase 1 conversation and create_quest execution have advanced.
  - id: vision-modern-prompt
    path: .agents/vision-modern-prompt-master-plan.md
    status: complete
    role: Coordinates prompt, voice, and modern blank-canvas interaction work.
    pros:
      - Captures the user-facing direction away from fixed form windows.
    cons:
      - Residual continuation and memory behavior still need follow-up as capability coverage expands.
  - id: vision-memory-context
    path: .agents/vision-memory-and-context-master-plan.md
    status: complete
    role: Coordinates memory, resume, and context continuity for the vision surface.
    pros:
      - Keeps persisted conversation and recent-session recovery visible.
    cons:
      - The summary-first memory model is established, but later capability slices still need to reuse it instead of inventing new resume rules.
  - id: vision-voice
    path: .agents/vision-voice-master-plan.md
    status: complete
    role: Coordinates voice input, transcription, speech output, and visual feedback.
    pros:
      - Keeps speech-to-text and text-to-speech concerns separate from orchestration.
    cons:
      - Needs an explicit memory-pressure and local-device safety note after observed development machine pressure.
  - id: vision-schedule-date-time-split
    path: .agents/vision-schedule-date-time-split-master-plan.md
    status: complete
    role: Refactors Vision fixed scheduling from one overloaded absolute timestamp slot into separate conversational date and time collection.
    pros:
      - Aligns the scheduling contract with natural user input and incremental clarification.
      - Creates a cleaner execution boundary where absolute timestamps are derived only when complete.
    cons:
      - Requires coordinated backend, API, frontend, docs, and test migration.
  - id: vision-openai-semantic-orchestration
    path: .agents/vision-openai-semantic-orchestration-master-plan.md
    status: active
    role: Introduce an OpenAI-backed semantic orchestration boundary above Vision conversation routing while keeping backend-owned route catalogs, DTO contracts, locale rules, and execution policy.
    pros:
      - Creates one reusable understanding layer for text and STT transcripts.
      - Lets new capabilities plug into a shared route-and-slot contract instead of adding more intent heuristics.
    cons:
      - Adds prompt-contract and fallback complexity that must stay tightly validated.
  - id: legacy-frontend-decommission
    path: .agents/legacy-frontend-decommission-master-plan.md
    status: active
    role: Removes the unused route-based legacy frontend so Vision can become the dominant runtime during dev phase.
    pros:
      - Reduces duplicate frontend state systems and cleanup drag.
      - Lets new product work focus on one strategic surface.
    cons:
      - Requires careful capability triage so dev-only workflows are not deleted before Vision replacement exists.
implementationState:
  currentPhase: Phase 1 foundation is complete with create_quest conversation, open_chat conversation, review flow, voice input/output, adaptive canvas rendering, read-only quest discovery, shared prompt semantics, read-only execution planning, and a terminal-first Vision route shell.
  nextPhase: Continue capability expansion and rollout hardening while reusing the shared semantic and policy boundary across Vision and Admin Playground, introduce the OpenAI-backed semantic orchestrator above text and STT turns, keep the new split date/time scheduling contract intact, and finish the remaining legacy route-based frontend contraction around a Vision-first runtime.
  backend: Persisted conversation, turn state, create_quest slot collection, open_chat routing, review edit actions, execution boundary services, and execution adapters exist.
  api: Conversation turn, resume, recent, reset, cancel, blocks, slot summaries, and review DTOs exist.
  frontend: Modern vision route, reusable surface-state composable, canvas renderer, inline prompt composer, voice controls, transcript feedback, recent conversations, mode-specific hero states, compact in-shell context reveal, review summary, execution candidate surface, Vision detail route wrappers for quest/application continuity, inline capability hints inside the terminal feed, create_quest-shaped preview semantics, terminal/feed surfaces for chat, application detail, settings, onboarding, quest composer, and quest detail edit, a profile onboarding route with location setup, profiles without a saved location auto-focus the onboarding location section, and a redirect away from the removed `/admin/work` route exist.
  api: Versioned `/vision/conversations/turns` request contract now carries input type, text, client capabilities, state version, and optional choice/confirmation fields.
  semanticMapping: Shared focus-slot mapper exists, shared prompt semantics support now covers both Vision and Admin Playground, the understanding prompt supports read-only discovery planning, backend sanitization now rejects model-selected routes, focus slots, and extracted slot payloads that are outside the published Vision route catalog, semantic prompt understanding now also receives runtime locale/timezone hints with source-aware backend resolution, the first non-quest read-only capability expansion now routes self profile, circles, and applications through the main Vision conversation flow, the first request-style mutation pilot now creates circles through the same terminal-first boundary, a narrow self-profile mutation pilot now updates username and profile description through a preserving backend patch adapter, a narrow application-creation pilot now resolves one applyable quest before collecting message and conditional price slots, a narrow pending-application self-service pilot now resolves one exact current application before update or withdrawal, and the next mutation-expansion batch now covers owner-side application approval and decline, circle-request send/accept/delete, exact owned-circle rename or delete, and self profile-location updates through the same semantic review boundary.
  activeChildPlan: .agents/vision-openai-semantic-orchestration-master-plan.md
pros:
  - Backend state and review gating already match key vision decision records.
  - Frontend receives backend-prepared blocks instead of inventing workflow decisions locally.
  - Voice feedback exposes transcript and current semantic target.
  - Recent conversations and applied-slot summaries support resume-oriented UX.
  - Read-only discovery now shares the same backend-governed surface as create_quest.
  - The surface is converging on a single inline feed model instead of separate launch panels, which matches the create_quest interaction style more closely.
  - The OpenAI semantic boundary is now fail-closed against the backend route catalog instead of trusting arbitrary model-selected capabilities and slot ids.
  - Semantic understanding now receives explicit locale/timezone provenance so STT transcripts and relative dates can be interpreted in the correct user/runtime context.
  - Profile, circles, and applications can now reuse the same terminal-first Vision conversation surface instead of depending on separate route views.
  - The first request-style mutation capability now exists without reintroducing a popup or page-first workflow.
  - Narrow self-profile mutation can now reuse the same terminal-first flow without risking sparse DTO writes that would clear unrelated identity or location fields.
  - Application creation can now reuse the same terminal-first flow while still respecting backend quest visibility and paid-vs-free pricing rules.
  - Pending-application self-service can now reuse the same terminal-first flow while still requiring exact target resolution and explicit confirmation before update or withdrawal.
  - Owner-side application decisions, circle-request lifecycle, owned-circle mutations, and profile-location updates can now reuse the same terminal-first flow without reintroducing legacy dialogs or sparse DTO writes.
  cons:
  - Vision still needs broader capability coverage beyond create_quest and discovery.
  - Request-style and mutating capability expansion beyond the first create-circle pilot, circle-request pilot, create-application pilot, pending-application self-service pilot, owner-side application-decision pilot, owned-circle mutation pilot, and the narrow profile/profile-location update pilots still remains.
  - No generic VisionExecutionPlanner or VisionExecutionService exists yet.
  - Context reveal and continuation behavior still need more tightening before the surface fully reads as one morphing canvas.
  - Memory/context hardening still needs more work before the surface can stay calm across longer sessions.
  - The repo still carries a few legacy helper wrappers and non-Vision route/module surfaces that increase maintenance cost even though the product is still in dev phase.
risks:
  - id: VISION-RISK-001
    description: The plan stack can become stale because implementation is moving quickly.
    mitigation: Update this God Plan after each completed vision master plan or broad implementation batch.
  - id: VISION-RISK-002
    description: The frontend can continue drifting toward a dashboard of panels instead of one adaptive canvas.
    mitigation: Require each frontend vision plan to state how it reduces or justifies visible surface fragmentation.
  - id: VISION-RISK-003
    description: Capability expansion can drift back into create_quest-specific heuristics if future executors stop using the shared semantics boundary.
    mitigation: Reuse the shared prompt-semantics support for every new capability slice before adding more executors.
  - id: VISION-RISK-004
    description: Future capability slices can regress fixed scheduling back into single-slot timestamp heuristics and lose the new partial-state clarity.
    mitigation: Keep `scheduled_date` and `scheduled_time` as the Vision conversation contract and derive `scheduled_at` only at execution boundaries.
  - id: VISION-RISK-005
    description: Legacy frontend decommission can accidentally remove dev-critical routes before Vision or a temporary bridge covers the same workflow.
    mitigation: Use the dedicated legacy frontend decommission master plan with explicit parity thresholds and temporary-survivor decisions before any delete batch.
  - id: VISION-RISK-006
    description: The semantic orchestration layer can blur the backend authority boundary if the model is allowed to infer or invent unsupported routes, DTO fields, or execution permissions.
    mitigation: Keep the route catalog backend-owned per turn, require structured semantic outputs, and reject any model output that references capabilities or fields outside the published contract.
decisions:
  - id: VISION-DEC-001
    decision: Use God Plan > Master Plan > Plan > temporary work product as the coordination hierarchy for broad vision work.
    status: accepted
  - id: VISION-DEC-002
    decision: Keep God Plans durable and machine-readable under `.agents/god-plans/`.
    status: accepted
  - id: VISION-DEC-003
    decision: Keep temporary plan support files under `.agents/tmp/` and remove or promote them at plan closeout.
    status: accepted
  - id: VISION-DEC-004
    decision: The first God Plan implementation slice starts with a generic semantic planning boundary above create_quest slot extraction, and discovery can reuse that boundary for read-only search flows.
    status: accepted
dependencies:
  relatedMasterPlans:
    - path: .agents/agent-surface-standardization-master-plan.md
      role: Cross-surface policy and execution standardization for Vision and Admin Playground.
      status: complete
validation:
  requiredChecks:
    - ruby scripts/generate-agent-operating-model.rb
    - ./mvnw test -Dtest=AgentOperatingModelValidationTest
  closeoutRule: Child master plans must be complete, updated, or explicitly deferred before the vision God Plan can close.
