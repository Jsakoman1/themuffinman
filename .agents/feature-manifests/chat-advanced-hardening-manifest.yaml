docDelta:
  behaviorChanged:
  - Chat conversations now support participant-scoped archive and mute state, and archived conversations are hidden from workspace by default unless explicitly requested.
  - Chat messages now expose delivered and seen receipt timestamps, and websocket clients can acknowledge delivery or seen state up to a selected message id.
  - Chat now persists websocket auth failures, connection lifecycle events, invalid payload attempts, and rate-limit violations as append-only audit records.
