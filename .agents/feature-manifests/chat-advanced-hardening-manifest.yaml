- backend-logic
planFile: ".agents/chat-advanced-hardening-master-plan.md"
summary:
- Added participant-scoped conversation state for mute and archive, per-message delivered and seen receipts, and durable chat websocket and abuse audit storage.
- Synced chat API contracts, websocket handling, agent-operating docs, generated inventories, and frontend contracts with the expanded backend behavior.
