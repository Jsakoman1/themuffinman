validationEvidence:
  commands:
    - command: "./mvnw test -Dtest=DashboardServiceTest"
      scope: backend
      result: passed
      summary: Covers backend voice properties mapping and fail-closed anonymous voice-config behavior in DashboardService.
    - command: "npm --prefix apps/themuffinman/frontend run generate:contracts"
      scope: frontend
      result: passed
      summary: Refreshed frontend contracts after adding the dashboard voice-config DTO endpoint.
    - command: "npm run validate:contracts"
      scope: frontend
      result: passed
      summary: Confirmed the generated workmarket frontend contract is fresh from the frontend workspace.
    - command: "npm run type-check"
      scope: frontend
      result: passed
      summary: Validated `/vision` voice integration types from the frontend workspace using the canonical command string.
    - command: "npm run build"
      scope: frontend
      result: passed
      summary: Confirmed the production frontend build from the frontend workspace using the canonical command string.
    - command: "npm --prefix apps/themuffinman/frontend run type-check"
      scope: frontend
      result: passed
      summary: Validated `/vision` STT/TTS composable and UI integration against regenerated contracts.
    - command: "npm --prefix apps/themuffinman/frontend run build"
      scope: frontend
      result: passed
      summary: Confirmed production build for the adaptive `/vision` surface after browser-native voice integration.
    - command: "./mvnw test -Dtest=AgentOperatingModelValidationTest"
      scope: agent-safety
      result: passed
      summary: Validated machine-readable operating model, intent safety catalog, and feature manifest structure after voice-config additions.
    - command: "make generate-agent-operating-model"
      scope: generated-artifact
      result: passed
      summary: Regenerated the combined machine-readable agent operating model after adding the voice-config endpoint and intent coverage.
    - command: "make generate-agent-artifacts"
      scope: generated-artifact
      result: passed
      summary: Refreshed generated endpoint, read-model, backend-inventory, and source-of-truth artifacts after the voice surface change.
    - command: "make audit-documentation"
      scope: docs
      result: passed
      summary: Checked source-of-truth documentation coverage after the backend-first voice surface update.
    - command: "make audit-doc-canonical-phrases"
      scope: docs
      result: passed
      summary: Confirmed protected canonical wording remained valid after doc synchronization.
    - command: "make audit-summary-index"
      scope: generated-artifact
      result: passed
      summary: Refreshed generated audit summary index after the voice surface closeout.
    - command: "make audit-todo"
      scope: manifest
      result: passed
      summary: Confirmed no open backlog items, inline TODO drift, or unfinished plan tasks remained at closeout.
    - command: "make audit-agent-safety"
      scope: agent-safety
      result: passed
      summary: Confirmed canonical backend and agent-contract validation bundle after manifest audit commands and evidence were fully aligned.
    - command: "./mvnw test -Dtest=AgentOperatingScenarioTest"
      scope: backend
      result: passed
      summary: Confirmed scenario-level agent workflow coverage remained valid after adding the dashboard voice-config read surface.
