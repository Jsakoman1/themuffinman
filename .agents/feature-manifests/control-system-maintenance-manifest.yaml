featureId: control-system-maintenance
title: Control system maintenance
workflowTier: tier4-agent-tooling-workflow
manifestDecision: required
status: complete
riskTier: medium
changeMode: major-change
changeImpact: logic-drift
changeProfiles:
  - agent-contract
  - workflow-expansion
