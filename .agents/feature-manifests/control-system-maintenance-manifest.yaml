    - command: make generate-agent-artifacts
      scope: agent-safety
      result: passed
      summary: Regenerated the agent artifacts during maintenance refresh.
    - command: make audit-agent-safety
      scope: agent-safety
      result: passed
      summary: Passed the agent-safety audit after the maintenance refresh.
    - command: ./mvnw test -Dtest=QuestWorkflowScenarioTest
      scope: other
      result: passed
      summary: Scenario coverage for the maintenance flow passed.
    - command: ./mvnw test -Dtest=AdminAgentExecutionServiceTest,AdminSyntheticQuestExecutionPlannerTest
      scope: other
      result: passed
      summary: Canonical workflow-expansion coverage for the maintenance flow passed.
