summary:
  - Introduce the first shared authenticated shell and stable module entry routes while preserving canonical Vision-native detail ownership for guided deep-work flows.
  - Standardize live route-entry surfaces for Home, Work, Chat, Calendar, Business, Circles, and Profile against existing backend-prepared read models.
  - Add one typed shell-to-Vision handoff contract with contextual prompt and return-route continuity.
