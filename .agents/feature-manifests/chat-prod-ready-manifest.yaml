docDelta:
  behaviorChanged:
  - Chat message history now returns paginated slices with `beforeMessageId` and `limit` instead of forcing whole-thread reads.
  - Chat send-message now supports `clientMessageId`, stricter image validation, and backend send-rate limiting.
  - Chat now exposes update and soft-delete message endpoints plus richer websocket payloads for create, update, delete, and read events.
