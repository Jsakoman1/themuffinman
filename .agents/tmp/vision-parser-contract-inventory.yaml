remaining_gaps:
  - family-specific slot normalization still exists in the understanding service
  - some intents still depend on intent-specific entity resolution switches
  - repair-pass behavior is still a dedicated parser path rather than a shared contract primitive
  - read-only route families are not all equally rich in examples and slot metadata
follow_up_notes:
  - The next slice can reduce special cases by moving shared target-query handling and slot canonicalization into common helpers or route metadata.
  - Regression coverage should target real utterances for create, view, update, delete, and follow-up turns.
