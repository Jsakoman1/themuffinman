spring.application.name=themuffinman
spring.datasource.url=jdbc:postgresql://localhost:5432/side_quest_db
spring.datasource.username=jsakoman
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.orm.jdbc.bind=warn
app.security.jwt.secret=${SIDEQUEST_JWT_SECRET}
app.security.jwt.expiration-millis=${SIDEQUEST_JWT_EXPIRATION_MILLIS:86400000}
app.security.cors.allowed-origins=${SIDEQUEST_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.seed.users.enabled=${SIDEQUEST_SEED_USERS_ENABLED:false}
app.admin.email=${SIDEQUEST_ADMIN_EMAIL:}
app.admin.username=${SIDEQUEST_ADMIN_USERNAME:}
app.admin.password=${SIDEQUEST_ADMIN_PASSWORD:}
app.test.email=${SIDEQUEST_TEST_EMAIL:}
app.test.username=${SIDEQUEST_TEST_USERNAME:}
app.test.password=${SIDEQUEST_TEST_PASSWORD:}
app.bootstrap.admin.enabled=${SIDEQUEST_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.email=${SIDEQUEST_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.username=${SIDEQUEST_BOOTSTRAP_ADMIN_USERNAME:}
app.bootstrap.admin.password=${SIDEQUEST_BOOTSTRAP_ADMIN_PASSWORD:}
app.location.provider=${SIDEQUEST_LOCATION_PROVIDER:none}
app.location.geoapify-api-key=${SIDEQUEST_GEOAPIFY_API_KEY:}
app.location.geoapify-base-url=${SIDEQUEST_GEOAPIFY_BASE_URL:https://api.geoapify.com/v1}
app.agent.provider=${SIDEQUEST_AGENT_PROVIDER:mock}
app.agent.prompt-max-length=${SIDEQUEST_AGENT_PROMPT_MAX_LENGTH:4000}
app.agent.model=${SIDEQUEST_AGENT_MODEL:gpt-5.4-mini}
app.agent.creative-model=${SIDEQUEST_AGENT_CREATIVE_MODEL:gpt-5.4-medium}
app.agent.reasoning-effort=${SIDEQUEST_AGENT_REASONING_EFFORT:medium}
app.agent.api-key=${OPENAI_API_KEY:}
app.agent.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
app.voice.enabled=${SIDEQUEST_VOICE_ENABLED:true}
app.voice.speech-to-text-enabled=${SIDEQUEST_VOICE_SPEECH_TO_TEXT_ENABLED:true}
app.voice.text-to-speech-enabled=${SIDEQUEST_VOICE_TEXT_TO_SPEECH_ENABLED:true}
app.voice.provider=${SIDEQUEST_VOICE_PROVIDER:openai}
app.voice.recognition-provider=${SIDEQUEST_VOICE_RECOGNITION_PROVIDER:openai}
app.voice.synthesis-provider=${SIDEQUEST_VOICE_SYNTHESIS_PROVIDER:openai}
app.voice.transcription-model=${SIDEQUEST_VOICE_TRANSCRIPTION_MODEL:gpt-4o-mini-transcribe}
app.voice.speech-model=${SIDEQUEST_VOICE_SPEECH_MODEL:gpt-4o-mini-tts}
app.voice.speech-voice=${SIDEQUEST_VOICE_SPEECH_VOICE:alloy}
app.voice.preferred-locale=${SIDEQUEST_VOICE_PREFERRED_LOCALE:}
app.voice.interim-results=${SIDEQUEST_VOICE_INTERIM_RESULTS:true}
app.voice.continuous-recognition=${SIDEQUEST_VOICE_CONTINUOUS_RECOGNITION:false}
app.voice.max-alternatives=${SIDEQUEST_VOICE_MAX_ALTERNATIVES:1}
app.voice.auto-speak-responses=${SIDEQUEST_VOICE_AUTO_SPEAK_RESPONSES:false}
app.voice.api-key=${OPENAI_API_KEY:}
app.voice.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
app.retention.notifications.days=${SIDEQUEST_NOTIFICATIONS_RETENTION_DAYS:7}
app.retention.notifications.cleanup-cron=${SIDEQUEST_NOTIFICATIONS_CLEANUP_CRON:0 30 3 * * *}
app.retention.chat.image-days=${SIDEQUEST_CHAT_IMAGE_RETENTION_DAYS:30}
app.retention.chat.message-days=${SIDEQUEST_CHAT_MESSAGE_RETENTION_DAYS:180}
app.retention.chat.cleanup-cron=${SIDEQUEST_CHAT_CLEANUP_CRON:0 45 3 * * *}
app.retention.chat.expired-image-placeholder=${SIDEQUEST_CHAT_EXPIRED_IMAGE_PLACEHOLDER:Image expired}
