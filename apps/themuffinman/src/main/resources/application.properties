spring.application.name=themuffinman
spring.datasource.url=jdbc:postgresql://localhost:5432/side_quest_db
spring.datasource.username=jsakoman
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.orm.jdbc.bind=warn
app.security.jwt.secret=${SIDEQUEST_JWT_SECRET}
app.security.jwt.expiration-millis=${SIDEQUEST_JWT_EXPIRATION_MILLIS:86400000}
app.security.cors.allowed-origins=${SIDEQUEST_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.seed.users.enabled=${SIDEQUEST_SEED_USERS_ENABLED:false}
app.admin.email=${SIDEQUEST_ADMIN_EMAIL:}
app.admin.username=${SIDEQUEST_ADMIN_USERNAME:}
app.admin.password=${SIDEQUEST_ADMIN_PASSWORD:}
app.test.email=${SIDEQUEST_TEST_EMAIL:}
app.test.username=${SIDEQUEST_TEST_USERNAME:}
app.test.password=${SIDEQUEST_TEST_PASSWORD:}
app.bootstrap.admin.enabled=${SIDEQUEST_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.email=${SIDEQUEST_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.username=${SIDEQUEST_BOOTSTRAP_ADMIN_USERNAME:}
app.bootstrap.admin.password=${SIDEQUEST_BOOTSTRAP_ADMIN_PASSWORD:}
app.location.provider=${SIDEQUEST_LOCATION_PROVIDER:none}
app.location.geoapify-api-key=${SIDEQUEST_GEOAPIFY_API_KEY:}
app.location.geoapify-base-url=${SIDEQUEST_GEOAPIFY_BASE_URL:https://api.geoapify.com/v1}
app.retention.notifications.days=${SIDEQUEST_NOTIFICATIONS_RETENTION_DAYS:7}
app.retention.notifications.cleanup-cron=${SIDEQUEST_NOTIFICATIONS_CLEANUP_CRON:0 30 3 * * *}
app.retention.chat.image-days=${SIDEQUEST_CHAT_IMAGE_RETENTION_DAYS:30}
app.retention.chat.message-days=${SIDEQUEST_CHAT_MESSAGE_RETENTION_DAYS:180}
app.retention.chat.cleanup-cron=${SIDEQUEST_CHAT_CLEANUP_CRON:0 45 3 * * *}
app.retention.chat.expired-image-placeholder=${SIDEQUEST_CHAT_EXPIRED_IMAGE_PLACEHOLDER:Image expired}
