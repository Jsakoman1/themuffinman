spring.application.name=themuffinman
spring.datasource.url=jdbc:postgresql://localhost:5432/side_quest_db
spring.datasource.username=jsakoman
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.generate_statistics=${SIDEQUEST_HIBERNATE_STATISTICS:false}
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.orm.jdbc.bind=warn
app.security.jwt.secret=${SIDEQUEST_JWT_SECRET}
app.security.jwt.expiration-millis=${SIDEQUEST_JWT_EXPIRATION_MILLIS:86400000}
app.security.cors.allowed-origins=${SIDEQUEST_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.runtime-observability.enabled=${SIDEQUEST_RUNTIME_OBSERVABILITY_ENABLED:false}
app.account-recovery.requests-per-window=${SIDEQUEST_ACCOUNT_RECOVERY_REQUESTS_PER_WINDOW:5}
app.account-recovery.window-seconds=${SIDEQUEST_ACCOUNT_RECOVERY_WINDOW_SECONDS:900}
app.seed.users.enabled=${SIDEQUEST_SEED_USERS_ENABLED:false}
app.admin.email=${SIDEQUEST_ADMIN_EMAIL:}
app.admin.username=${SIDEQUEST_ADMIN_USERNAME:}
app.admin.password=${SIDEQUEST_ADMIN_PASSWORD:}
app.test.email=${SIDEQUEST_TEST_EMAIL:}
app.test.username=${SIDEQUEST_TEST_USERNAME:}
app.test.password=${SIDEQUEST_TEST_PASSWORD:}
app.bootstrap.admin.enabled=${SIDEQUEST_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.email=${SIDEQUEST_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.username=${SIDEQUEST_BOOTSTRAP_ADMIN_USERNAME:}
app.bootstrap.admin.password=${SIDEQUEST_BOOTSTRAP_ADMIN_PASSWORD:}
app.location.provider=${SIDEQUEST_LOCATION_PROVIDER:none}
app.location.geoapify-api-key=${SIDEQUEST_GEOAPIFY_API_KEY:}
app.location.geoapify-base-url=${SIDEQUEST_GEOAPIFY_BASE_URL:https://api.geoapify.com/v1}
app.agent.provider=${SIDEQUEST_AGENT_PROVIDER:mock}
app.agent.prompt-max-length=${SIDEQUEST_AGENT_PROMPT_MAX_LENGTH:4000}
app.agent.model=${SIDEQUEST_AGENT_MODEL:gpt-4o-mini}
app.agent.semantic-model=${SIDEQUEST_AGENT_SEMANTIC_MODEL:gpt-4o-mini}
app.agent.semantic-model-upgrade-enabled=${SIDEQUEST_AGENT_SEMANTIC_MODEL_UPGRADE_ENABLED:false}
app.agent.semantic-model-upgrade=${SIDEQUEST_AGENT_SEMANTIC_MODEL_UPGRADE:gpt-5.4-mini}
app.agent.creative-model=${SIDEQUEST_AGENT_CREATIVE_MODEL:gpt-4o-mini}
app.agent.reasoning-effort=${SIDEQUEST_AGENT_REASONING_EFFORT:medium}
app.agent.api-key=${OPENAI_API_KEY:}
app.agent.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
# Local parser fixtures are disabled by default and must never be enabled in production.
app.agent.local-emergency-enabled=${SIDEQUEST_AGENT_LOCAL_EMERGENCY_ENABLED:false}
app.voice.enabled=${SIDEQUEST_VOICE_ENABLED:true}
app.voice.speech-to-text-enabled=${SIDEQUEST_VOICE_SPEECH_TO_TEXT_ENABLED:true}
app.voice.text-to-speech-enabled=${SIDEQUEST_VOICE_TEXT_TO_SPEECH_ENABLED:true}
app.voice.provider=${SIDEQUEST_VOICE_PROVIDER:openai}
app.voice.recognition-provider=${SIDEQUEST_VOICE_RECOGNITION_PROVIDER:openai}
app.voice.synthesis-provider=${SIDEQUEST_VOICE_SYNTHESIS_PROVIDER:openai}
app.voice.transcription-model=${SIDEQUEST_VOICE_TRANSCRIPTION_MODEL:gpt-4o-mini-transcribe}
app.voice.speech-model=${SIDEQUEST_VOICE_SPEECH_MODEL:gpt-4o-mini-tts}
app.voice.speech-voice=${SIDEQUEST_VOICE_SPEECH_VOICE:alloy}
app.voice.preferred-locale=${SIDEQUEST_VOICE_PREFERRED_LOCALE:}
app.voice.interim-results=${SIDEQUEST_VOICE_INTERIM_RESULTS:true}
app.voice.continuous-recognition=${SIDEQUEST_VOICE_CONTINUOUS_RECOGNITION:false}
app.voice.max-alternatives=${SIDEQUEST_VOICE_MAX_ALTERNATIVES:1}
app.voice.auto-speak-responses=${SIDEQUEST_VOICE_AUTO_SPEAK_RESPONSES:false}
app.voice.max-recording-millis=${SIDEQUEST_VOICE_MAX_RECORDING_MILLIS:20000}
app.voice.max-audio-bytes=${SIDEQUEST_VOICE_MAX_AUDIO_BYTES:2000000}
app.voice.max-speech-text-length=${SIDEQUEST_VOICE_MAX_SPEECH_TEXT_LENGTH:1000}
app.voice.api-key=${OPENAI_API_KEY:}
app.voice.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
app.business.booking.default-lead-time-minutes=${SIDEQUEST_BUSINESS_DEFAULT_LEAD_TIME_MINUTES:120}
app.business.booking.default-max-advance-days=${SIDEQUEST_BUSINESS_DEFAULT_MAX_ADVANCE_DAYS:60}
app.business.booking.default-customer-cancellation-window-minutes=${SIDEQUEST_BUSINESS_DEFAULT_CUSTOMER_CANCELLATION_WINDOW_MINUTES:1440}
app.business.dashboard.stale-threshold-minutes=${SIDEQUEST_BUSINESS_DASHBOARD_STALE_THRESHOLD_MINUTES:30}
app.business.lists.default-page-size=${SIDEQUEST_BUSINESS_DEFAULT_PAGE_SIZE:20}
app.business.lists.max-page-size=${SIDEQUEST_BUSINESS_MAX_PAGE_SIZE:100}
app.vision.enabled=${SIDEQUEST_VISION_ENABLED:true}
app.vision.execution-enabled=${SIDEQUEST_VISION_EXECUTION_ENABLED:false}
app.vision.create-quest-enabled=${SIDEQUEST_VISION_CREATE_QUEST_ENABLED:true}
app.vision.conversation-ttl-days=${SIDEQUEST_VISION_CONVERSATION_TTL_DAYS:14}
app.vision.max-turns-per-conversation=${SIDEQUEST_VISION_MAX_TURNS_PER_CONVERSATION:30}
app.vision.max-prompt-length=${SIDEQUEST_VISION_MAX_PROMPT_LENGTH:2000}
app.vision.memory.compaction-cron=${SIDEQUEST_VISION_MEMORY_COMPACTION_CRON:0 20 4 * * *}
app.vision.memory.recent-feedback-window=${SIDEQUEST_VISION_MEMORY_RECENT_FEEDBACK_WINDOW:20}
app.vision.memory.summary-window=${SIDEQUEST_VISION_MEMORY_SUMMARY_WINDOW:5}
app.retention.notifications.days=${SIDEQUEST_NOTIFICATIONS_RETENTION_DAYS:7}
app.retention.notifications.cleanup-cron=${SIDEQUEST_NOTIFICATIONS_CLEANUP_CRON:0 30 3 * * *}
app.retention.chat.image-days=${SIDEQUEST_CHAT_IMAGE_RETENTION_DAYS:30}
app.retention.chat.message-days=${SIDEQUEST_CHAT_MESSAGE_RETENTION_DAYS:180}
app.retention.chat.cleanup-cron=${SIDEQUEST_CHAT_CLEANUP_CRON:0 45 3 * * *}
app.retention.chat.expired-image-placeholder=${SIDEQUEST_CHAT_EXPIRED_IMAGE_PLACEHOLDER:Image expired}
app.retention.auth-tokens.cleanup-cron=${SIDEQUEST_AUTH_TOKEN_CLEANUP_CRON:0 15 3 * * *}
app.chat.presence.online-window-seconds=${SIDEQUEST_CHAT_ONLINE_WINDOW_SECONDS:120}
app.chat.presence.heartbeat-limit-per-minute=${SIDEQUEST_CHAT_HEARTBEAT_LIMIT_PER_MINUTE:120}
app.chat.messages.default-page-size=${SIDEQUEST_CHAT_DEFAULT_PAGE_SIZE:50}
app.chat.messages.max-page-size=${SIDEQUEST_CHAT_MAX_PAGE_SIZE:100}
app.chat.messages.open-limit-per-minute=${SIDEQUEST_CHAT_OPEN_LIMIT_PER_MINUTE:30}
app.chat.messages.send-limit-per-minute=${SIDEQUEST_CHAT_SEND_LIMIT_PER_MINUTE:40}
app.chat.messages.delivery-limit-per-minute=${SIDEQUEST_CHAT_DELIVERY_LIMIT_PER_MINUTE:240}
app.chat.messages.read-limit-per-minute=${SIDEQUEST_CHAT_READ_LIMIT_PER_MINUTE:120}
app.chat.messages.edit-window-seconds=${SIDEQUEST_CHAT_EDIT_WINDOW_SECONDS:900}
app.chat.messages.delete-window-seconds=${SIDEQUEST_CHAT_DELETE_WINDOW_SECONDS:3600}
app.chat.messages.deleted-message-placeholder=${SIDEQUEST_CHAT_DELETED_MESSAGE_PLACEHOLDER:Message deleted}
app.chat.attachments.max-image-bytes=${SIDEQUEST_CHAT_MAX_IMAGE_BYTES:262144}
app.chat.attachments.allowed-image-mime-types=${SIDEQUEST_CHAT_ALLOWED_IMAGE_MIME_TYPES:image/jpeg,image/png,image/webp,image/gif}
app.chat.attachments.max-attachment-bytes=${SIDEQUEST_CHAT_MAX_ATTACHMENT_BYTES:524288}
app.chat.attachments.allowed-attachment-mime-types=${SIDEQUEST_CHAT_ALLOWED_ATTACHMENT_MIME_TYPES:application/pdf,text/plain,application/json,image/jpeg,image/png,image/webp}
app.chat.typing.update-limit-per-minute=${SIDEQUEST_CHAT_TYPING_LIMIT_PER_MINUTE:180}
app.chat.typing.timeout-seconds=${SIDEQUEST_CHAT_TYPING_TIMEOUT_SECONDS:8}
app.chat.moderation.audit-list-max-limit=${SIDEQUEST_CHAT_AUDIT_LIST_MAX_LIMIT:200}
app.chat.moderation.reaction-limit-per-minute=${SIDEQUEST_CHAT_REACTION_LIMIT_PER_MINUTE:120}
app.chat.moderation.message-removal-limit-per-minute=${SIDEQUEST_CHAT_MESSAGE_REMOVAL_LIMIT_PER_MINUTE:60}
app.chat.support.recent-messages-limit=${SIDEQUEST_CHAT_SUPPORT_RECENT_MESSAGES_LIMIT:25}
app.chat.support.recent-audit-limit=${SIDEQUEST_CHAT_SUPPORT_RECENT_AUDIT_LIMIT:25}
app.object-storage.enabled=${SIDEQUEST_OBJECT_STORAGE_ENABLED:false}
app.object-storage.provider=${SIDEQUEST_OBJECT_STORAGE_PROVIDER:s3}
app.object-storage.endpoint=${SIDEQUEST_OBJECT_STORAGE_ENDPOINT:}
app.object-storage.region=${SIDEQUEST_OBJECT_STORAGE_REGION:eu-central-1}
app.object-storage.bucket=${SIDEQUEST_OBJECT_STORAGE_BUCKET:}
app.object-storage.access-key=${SIDEQUEST_OBJECT_STORAGE_ACCESS_KEY:}
app.object-storage.secret-key=${SIDEQUEST_OBJECT_STORAGE_SECRET_KEY:}
app.object-storage.path-style-access=${SIDEQUEST_OBJECT_STORAGE_PATH_STYLE_ACCESS:true}
app.object-storage.public-base-url=${SIDEQUEST_OBJECT_STORAGE_PUBLIC_BASE_URL:}
app.object-storage.key-prefix=${SIDEQUEST_OBJECT_STORAGE_KEY_PREFIX:chat}
app.object-storage.presigned-url-ttl-seconds=${SIDEQUEST_OBJECT_STORAGE_PRESIGNED_URL_TTL_SECONDS:900}
app.object-storage.local-base-path=${SIDEQUEST_OBJECT_STORAGE_LOCAL_BASE_PATH:/tmp/themuffinman-object-storage}
app.object-storage.local-proxy-base-url=${SIDEQUEST_OBJECT_STORAGE_LOCAL_PROXY_BASE_URL:/chat/attachments/object}
