      suggestedWorkflows: [resolve_current_location_input, set_profile_current_location]
      unresolvedInputs: [current device coordinates]
  - id: zh_friend_request
    prompt: "给 Tom 发送好友请求"
    driftFingerprint: "lang=zh|signals=connection_request|workflows=resolve_circle_recipient,create_circle_connection|clarify=true|destructive=false|multi=false"
