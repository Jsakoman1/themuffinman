services:
  minio:
    image: minio/minio:RELEASE.2026-06-15T10-15-00Z
    container_name: themuffinman-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: themuffinman
      MINIO_ROOT_PASSWORD: themuffinman-secret
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  createbucket:
    image: minio/mc:RELEASE.2026-06-15T09-37-31Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 themuffinman themuffinman-secret &&
      /usr/bin/mc mb --ignore-existing local/themuffinman-dev-chat
      "

volumes:
  minio-data:
